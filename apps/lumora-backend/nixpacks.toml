[phases.setup]
nixPkgs = [
  "nodejs_20", "ffmpeg", "curl",
  # Languages
  "python3", "ruby", "gcc", "openjdk17", "go", "rustc",
  "php", "perl", "lua", "bash",
  "ghc",           # Haskell (runghc)
  "R",             # R (Rscript)
  "elixir",        # Elixir + Erlang
  "ocaml",         # OCaml
  "dart",          # Dart
  "scala",         # Scala
  "kotlin",        # Kotlin
  "swift",         # Swift
  "mono",          # C# (mcs + mono)
  "tcl",           # Tcl
  # Julia is installed via juliaup in [phases.install] — the current
  # nixpkgs snapshot has no cached julia binary and its source build
  # fails on ittapi's cmake_minimum_required(<3.5).
  "clojure",       # Clojure
]

[phases.install]
cmds = [
  "npm install",
  # Install Julia via juliaup (outside Nix)
  "curl -fsSL https://install.julialang.org | sh -s -- --yes -p /opt/juliaup --default-channel release",
  "ln -sf /opt/juliaup/bin/julia /usr/local/bin/julia",
  "ln -sf /opt/juliaup/bin/juliaup /usr/local/bin/juliaup",
  "julia --version",
]

[phases.build]
cmds = ["echo 'build complete'"]

[start]
cmd = "node src/index.js"

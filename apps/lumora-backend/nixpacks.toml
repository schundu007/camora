[phases.setup]
nixPkgs = [
  "nodejs_20", "ffmpeg",
  # Languages
  "python3", "ruby", "gcc", "openjdk17", "go", "rustc",
  "php", "perl", "lua", "bash",
  "ghc",           # Haskell (runghc)
  "R",             # R (Rscript)
  "elixir",        # Elixir + Erlang
  "ocaml",         # OCaml
  "dart",          # Dart
  "scala",         # Scala
  "kotlin",        # Kotlin
  "swift",         # Swift
  "mono",          # C# (mcs + mono)
  "tcl",           # Tcl
  # "julia",       # Disabled: current nixpkgs snapshot has no cached Julia
  #                # binary and the source build fails on ittapi's
  #                # cmake_minimum_required(<3.5). Re-add when Railway's
  #                # Nix snapshot ships a prebuilt julia again, or install
  #                # via juliaup in the install phase.
  "clojure",       # Clojure
]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["echo 'build complete'"]

[start]
cmd = "node src/index.js"

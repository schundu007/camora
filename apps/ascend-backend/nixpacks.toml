[phases.setup]
nixPkgs = ["nodejs_20", "python3", "graphviz", "gcc", "go", "rustc", "openjdk17", "typescript", "bash"]

[phases.install]
cmds = ["npm install", "python3 -m venv /app/.venv && /app/.venv/bin/pip install diagrams anthropic"]

[phases.build]
cmds = ["echo 'build complete'"]

[start]
cmd = "node src/index.js"

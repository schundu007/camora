<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <rect x="340" y="20" width="520" height="44" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="22" font-weight="700">Problem Definition: Designing Airbnb / Booking</text>

  <!-- Column 1: Users & Core Actions -->
  <text x="200" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Users &amp; Core Actions</text>
  <rect x="40" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <!-- User icons -->
  <circle cx="120" cy="170" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="120" y="176" text-anchor="middle" fill="white" font-size="24">&#x1F9F3;</text>
  <text x="120" y="215" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Guest</text>

  <text x="200" y="176" text-anchor="middle" fill="white" font-size="28">&#x21C4;</text>

  <circle cx="280" cy="170" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="280" y="176" text-anchor="middle" fill="white" font-size="24">&#x1F3E0;</text>
  <text x="280" y="215" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Host</text>

  <!-- Core Actions Box -->
  <rect x="70" y="240" width="260" height="210" rx="12" fill="#f97316" filter="url(#shadow)"/>
  <text x="200" y="270" text-anchor="middle" fill="white" font-size="15" font-weight="700">Core Actions</text>
  <line x1="90" y1="282" x2="310" y2="282" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="100" y="310" fill="white" font-size="13">&#x1F50D;  Search Listings</text>
  <text x="100" y="340" fill="white" font-size="13">&#x1F4C5;  Check Availability</text>
  <text x="100" y="370" fill="white" font-size="13">&#x1F4B3;  Book &amp; Pay</text>
  <text x="100" y="400" fill="white" font-size="13">&#x2B50;  Leave Reviews</text>
  <text x="100" y="430" fill="white" font-size="13">&#x1F3E0;  Manage Listings</text>

  <!-- Column 2: In Scope -->
  <text x="600" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">In Scope: Essentials</text>
  <rect x="440" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="440" y="125" width="320" height="330" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <text x="470" y="160" fill="white" font-size="13" font-weight="600">&#x1F50D;  Listing search (location + dates)</text>
  <text x="490" y="180" fill="rgba(255,255,255,0.7)" font-size="11">(Geo-based with availability filter)</text>
  <text x="470" y="210" fill="white" font-size="13" font-weight="600">&#x1F4C5;  Availability calendar system</text>
  <text x="490" y="230" fill="rgba(255,255,255,0.7)" font-size="11">(Date range queries, blocking)</text>
  <text x="470" y="260" fill="white" font-size="13" font-weight="600">&#x1F4B3;  Booking + payment processing</text>
  <text x="490" y="280" fill="rgba(255,255,255,0.7)" font-size="11">(Stripe, escrow, host payouts)</text>
  <text x="470" y="310" fill="white" font-size="13" font-weight="600">&#x2B50;  Reviews &amp; ratings (two-way)</text>
  <text x="470" y="345" fill="white" font-size="13" font-weight="600">&#x1F3E0;  Host management dashboard</text>
  <text x="490" y="365" fill="rgba(255,255,255,0.7)" font-size="11">(Pricing, calendar, reservations)</text>
  <text x="470" y="395" fill="white" font-size="13" font-weight="600">&#x1F4F7;  Listing photos &amp; details</text>
  <text x="470" y="430" fill="white" font-size="13" font-weight="600">&#x1F4AC;  Guest-Host messaging</text>

  <!-- Column 3: Out of Scope -->
  <text x="1000" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Out of Scope / Future</text>
  <rect x="840" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="840" y="125" width="320" height="295" rx="12" fill="rgba(245,158,11,0.25)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>

  <text x="870" y="160" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Experiences &amp; Activities</text>
  <text x="870" y="195" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Cleaning / Turnover Service</text>
  <text x="870" y="230" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Host Insurance (AirCover)</text>
  <text x="870" y="265" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Dynamic Pricing ML Engine</text>
  <text x="870" y="300" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Tax Calculation &amp; Compliance</text>
  <text x="870" y="335" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Identity Verification (KYC)</text>
  <text x="870" y="370" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Wishlist &amp; Trip Planning</text>
  <text x="870" y="405" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Loyalty / Rewards Program</text>

  <!-- Bottom bar -->
  <rect x="440" y="465" width="320" height="28" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="600" y="484" text-anchor="middle" fill="white" font-size="12" font-weight="600">&#x1F3D7;&#xFE0F;  Listing Search + Booking + Availability Platform</text>
</svg>
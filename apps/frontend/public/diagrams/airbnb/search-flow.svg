<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="450" fill="#fafbfc" rx="16"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Airbnb Search Pipeline Flow</text>
  <text x="600" y="56" text-anchor="middle" fill="#64748b" font-size="12">City + dates + guests through Elasticsearch geo, availability filter, price check, ML ranking</text>

  <!-- User Query -->
  <rect x="20" y="115" width="130" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="20" y="115" width="130" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="85" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">User Query</text>
  <text x="85" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Search inputs</text>
  <text x="85" y="180" text-anchor="middle" fill="#64748b" font-size="9">City + dates</text>
  <text x="85" y="195" text-anchor="middle" fill="#64748b" font-size="9">Guest count</text>
  <text x="85" y="213" text-anchor="middle" fill="#94a3b8" font-size="9">Price, amenities</text>

  <!-- ES Geo Query -->
  <rect x="185" y="115" width="140" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="185" y="115" width="140" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="255" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">ES Geo Query</text>
  <text x="255" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Elasticsearch</text>
  <text x="255" y="180" text-anchor="middle" fill="#64748b" font-size="9">geo_distance + filters</text>
  <text x="255" y="195" text-anchor="middle" fill="#64748b" font-size="9">~1000 candidates</text>
  <text x="255" y="213" text-anchor="middle" fill="#94a3b8" font-size="9">~50ms retrieval</text>

  <!-- Availability Service -->
  <rect x="360" y="115" width="140" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="360" y="115" width="140" height="30" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="430" y="135" text-anchor="middle" fill="white" font-size="10" font-weight="700">Availability Filter</text>
  <text x="430" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">PostgreSQL batch</text>
  <text x="430" y="180" text-anchor="middle" fill="#64748b" font-size="9">Check all candidates</text>
  <text x="430" y="195" text-anchor="middle" fill="#64748b" font-size="9">for date range</text>
  <text x="430" y="213" text-anchor="middle" fill="#94a3b8" font-size="9">~100ms batch query</text>

  <!-- Remove Unavailable -->
  <rect x="535" y="115" width="130" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="535" y="115" width="130" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="600" y="135" text-anchor="middle" fill="white" font-size="10" font-weight="700">Filter Unavailable</text>
  <text x="600" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Remove booked</text>
  <text x="600" y="180" text-anchor="middle" fill="#64748b" font-size="9">BLOCKED or BOOKED</text>
  <text x="600" y="195" text-anchor="middle" fill="#64748b" font-size="9">dates in range</text>
  <text x="600" y="213" text-anchor="middle" fill="#94a3b8" font-size="9">Price check</text>

  <!-- ML Rank -->
  <rect x="700" y="115" width="140" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="700" y="115" width="140" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="770" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">ML Rank</text>
  <text x="770" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Multi-factor score</text>
  <text x="770" y="180" text-anchor="middle" fill="#64748b" font-size="9">Quality 30%</text>
  <text x="770" y="195" text-anchor="middle" fill="#64748b" font-size="9">Book prob 25%</text>
  <text x="770" y="213" text-anchor="middle" fill="#94a3b8" font-size="9">Price 20%, dist 15%</text>

  <!-- Results -->
  <rect x="875" y="115" width="150" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="875" y="115" width="150" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="950" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">Results</text>
  <text x="950" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Top 20 listings</text>
  <text x="950" y="180" text-anchor="middle" fill="#64748b" font-size="9">Preview cards</text>
  <text x="950" y="195" text-anchor="middle" fill="#64748b" font-size="9">Map markers</text>
  <text x="950" y="213" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="600">&lt;500ms total</text>

  <!-- Arrows -->
  <line x1="150" y1="165" x2="181" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="152" y="148" width="22" height="14" rx="3" fill="#f97316"/>
  <text x="163" y="158" text-anchor="middle" fill="white" font-size="8" font-weight="600">1</text>

  <line x1="325" y1="165" x2="356" y2="165" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <rect x="327" y="148" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="338" y="158" text-anchor="middle" fill="white" font-size="8" font-weight="600">2</text>

  <line x1="500" y1="165" x2="531" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="502" y="148" width="22" height="14" rx="3" fill="#7c3aed"/>
  <text x="513" y="158" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>

  <line x1="665" y1="165" x2="696" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="667" y="148" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="678" y="158" text-anchor="middle" fill="white" font-size="8" font-weight="600">4</text>

  <line x1="840" y1="165" x2="871" y2="165" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="842" y="148" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="853" y="158" text-anchor="middle" fill="white" font-size="8" font-weight="600">5</text>

  <!-- Legend -->
  <rect x="30" y="275" width="1140" height="65" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="55" y="297" fill="#1e293b" font-size="11" font-weight="700">Flow Steps:</text>
  <rect x="55" y="307" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="70" y="316" fill="#475569" font-size="9">1 Guest enters city, dates, guest count, optional filters (price, amenities)</text>
  <rect x="55" y="321" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="70" y="330" fill="#475569" font-size="9">2 Elasticsearch geo_distance retrieves ~1000 candidates in ~50ms</text>
  <rect x="500" y="307" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="515" y="316" fill="#475569" font-size="9">3 PostgreSQL batch availability check for all candidates (~100ms)</text>
  <text x="515" y="330" fill="#475569" font-size="9">4-5 ML ranks by quality(30%)+booking probability(25%)+price(20%)+distance(15%)+host(10%)</text>
</svg>
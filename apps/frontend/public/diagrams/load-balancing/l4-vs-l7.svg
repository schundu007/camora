<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #1e293b; }
      .label { font-size: 12px; font-weight: 600; fill: #fff; }
      .box-label { font-size: 11px; font-weight: 600; fill: #1e293b; }
      .desc { font-size: 10px; fill: #64748b; }
    </style>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f8f9"/>
      <stop offset="100%" stop-color="#eef0f2"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="slate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <marker id="arr-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <rect width="600" height="400" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="599" height="399" rx="12" fill="none" stroke="#e2e8f0"/>

  <text x="300" y="36" text-anchor="middle" class="title">Layer 4 vs Layer 7 Load Balancing</text>

  <!-- L4 Section -->
  <text x="155" y="65" text-anchor="middle" class="box-label">Layer 4 (Transport)</text>

  <!-- Client L4 -->
  <g transform="translate(70, 100)">
    <rect x="-40" y="-18" width="80" height="36" rx="8" fill="url(#slate)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label" font-size="10">Client</text>
  </g>

  <!-- L4 LB -->
  <g transform="translate(155, 100)">
    <rect x="-45" y="-18" width="90" height="36" rx="8" fill="url(#amber)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label" font-size="10">L4 LB</text>
  </g>
  <line x1="110" y1="100" x2="108" y2="100" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-a)"/>

  <!-- L4 servers -->
  <g transform="translate(255, 80)">
    <rect x="-30" y="-14" width="60" height="28" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" class="desc" font-weight="600">Srv 1</text>
  </g>
  <g transform="translate(255, 120)">
    <rect x="-30" y="-14" width="60" height="28" rx="6" fill="#fff" stroke="#f59e0b" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" class="desc" font-weight="600">Srv 2</text>
  </g>
  <line x1="200" y1="92" x2="223" y2="80" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="200" y1="108" x2="223" y2="120" stroke="#f59e0b" stroke-width="1.5"/>

  <g transform="translate(155, 152)">
    <rect x="-75" y="-10" width="150" height="20" rx="4" fill="#fef3c7"/>
    <text x="0" y="4" text-anchor="middle" class="desc" fill="#92400e">Routes by IP + port only</text>
  </g>

  <!-- Divider -->
  <line x1="300" y1="55" x2="300" y2="175" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- L7 Section -->
  <text x="450" y="65" text-anchor="middle" class="box-label">Layer 7 (Application)</text>

  <!-- Client L7 -->
  <g transform="translate(365, 100)">
    <rect x="-40" y="-18" width="80" height="36" rx="8" fill="url(#slate)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label" font-size="10">Client</text>
  </g>

  <!-- L7 LB -->
  <g transform="translate(450, 100)">
    <rect x="-45" y="-18" width="90" height="36" rx="8" fill="url(#blue)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label" font-size="10">L7 LB</text>
  </g>
  <line x1="405" y1="100" x2="403" y2="100" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- L7 servers with paths -->
  <g transform="translate(550, 80)">
    <rect x="-40" y="-14" width="80" height="28" rx="6" fill="#fff" stroke="#3b82f6" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" class="desc" font-weight="600">/api Srv</text>
  </g>
  <g transform="translate(550, 120)">
    <rect x="-40" y="-14" width="80" height="28" rx="6" fill="#fff" stroke="#3b82f6" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" class="desc" font-weight="600">/static Srv</text>
  </g>
  <line x1="495" y1="92" x2="508" y2="80" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="495" y1="108" x2="508" y2="120" stroke="#3b82f6" stroke-width="1.5"/>

  <g transform="translate(450, 152)">
    <rect x="-85" y="-10" width="170" height="20" rx="4" fill="#dbeafe"/>
    <text x="0" y="4" text-anchor="middle" class="desc" fill="#1e40af">Routes by URL, headers, cookies</text>
  </g>

  <!-- Comparison table -->
  <g transform="translate(300, 220)">
    <rect x="-270" y="-20" width="540" height="170" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>

    <!-- Header -->
    <rect x="-270" y="-20" width="540" height="28" rx="8" fill="#f1f5f9"/>
    <text x="-160" y="-2" text-anchor="middle" class="box-label">Feature</text>
    <text x="20" y="-2" text-anchor="middle" class="box-label" fill="#d97706">Layer 4</text>
    <text x="180" y="-2" text-anchor="middle" class="box-label" fill="#2563eb">Layer 7</text>

    <!-- Rows -->
    <text x="-160" y="26" text-anchor="middle" class="desc">Speed</text>
    <text x="20" y="26" text-anchor="middle" class="desc" fill="#d97706">Very fast</text>
    <text x="180" y="26" text-anchor="middle" class="desc" fill="#2563eb">Slower</text>

    <text x="-160" y="50" text-anchor="middle" class="desc">Intelligence</text>
    <text x="20" y="50" text-anchor="middle" class="desc" fill="#d97706">Low</text>
    <text x="180" y="50" text-anchor="middle" class="desc" fill="#2563eb">High</text>

    <text x="-160" y="74" text-anchor="middle" class="desc">SSL Termination</text>
    <text x="20" y="74" text-anchor="middle" class="desc" fill="#d97706">Pass-through</text>
    <text x="180" y="74" text-anchor="middle" class="desc" fill="#2563eb">Terminates</text>

    <text x="-160" y="98" text-anchor="middle" class="desc">Content Routing</text>
    <text x="20" y="98" text-anchor="middle" class="desc" fill="#d97706">No</text>
    <text x="180" y="98" text-anchor="middle" class="desc" fill="#2563eb">Yes</text>

    <text x="-160" y="122" text-anchor="middle" class="desc">Examples</text>
    <text x="20" y="122" text-anchor="middle" class="desc" fill="#d97706">AWS NLB, HAProxy</text>
    <text x="180" y="122" text-anchor="middle" class="desc" fill="#2563eb">AWS ALB, Nginx</text>

    <text x="-160" y="142" text-anchor="middle" class="desc">Best For</text>
    <text x="20" y="142" text-anchor="middle" class="desc" fill="#d97706">TCP, gaming, perf</text>
    <text x="180" y="142" text-anchor="middle" class="desc" fill="#2563eb">Web apps, routing</text>
  </g>
</svg>
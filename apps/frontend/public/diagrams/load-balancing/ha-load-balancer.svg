<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #1e293b; }
      .label { font-size: 12px; font-weight: 600; fill: #fff; }
      .box-label { font-size: 11px; font-weight: 600; fill: #1e293b; }
      .desc { font-size: 10px; fill: #64748b; }
    </style>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f8f9"/>
      <stop offset="100%" stop-color="#eef0f2"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="slate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="600" height="400" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="599" height="399" rx="12" fill="none" stroke="#e2e8f0"/>

  <text x="300" y="36" text-anchor="middle" class="title">High Availability Load Balancer Architecture</text>

  <!-- Clients -->
  <g transform="translate(300, 75)">
    <rect x="-50" y="-18" width="100" height="36" rx="8" fill="url(#slate)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label" font-size="11">Clients</text>
  </g>

  <!-- Virtual IP -->
  <g transform="translate(300, 130)">
    <rect x="-80" y="-15" width="160" height="30" rx="15" fill="url(#teal)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label" font-size="10">Virtual IP (Floating)</text>
  </g>
  <line x1="300" y1="93" x2="300" y2="113" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Active LB -->
  <g transform="translate(180, 200)">
    <rect x="-65" y="-25" width="130" height="50" rx="10" fill="url(#green)" filter="url(#shadow)"/>
    <text x="0" y="-4" text-anchor="middle" class="label">Active LB</text>
    <text x="0" y="12" text-anchor="middle" font-size="9" fill="#d1fae5">Handles traffic</text>
  </g>

  <!-- Passive LB -->
  <g transform="translate(420, 200)">
    <rect x="-65" y="-25" width="130" height="50" rx="10" fill="url(#blue)" filter="url(#shadow)"/>
    <text x="0" y="-4" text-anchor="middle" class="label">Passive LB</text>
    <text x="0" y="12" text-anchor="middle" font-size="9" fill="#bfdbfe">Standby</text>
  </g>

  <!-- VIP to LBs -->
  <line x1="240" y1="145" x2="180" y2="173" stroke="#10b981" stroke-width="2"/>
  <line x1="360" y1="145" x2="420" y2="173" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Heartbeat -->
  <line x1="245" y1="200" x2="355" y2="200" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="300" y="195" text-anchor="middle" class="desc" fill="#d97706" font-weight="600">Heartbeat</text>

  <!-- Server pool -->
  <g transform="translate(300, 300)">
    <rect x="-200" y="-25" width="400" height="50" rx="10" fill="#fff" stroke="#14b8a6" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="-200" y="-25" width="400" height="5" rx="2" fill="#14b8a6"/>

    <!-- Individual servers -->
    <g transform="translate(-130, 5)">
      <rect x="-30" y="-12" width="60" height="24" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" class="desc" font-weight="600" fill="#059669">Srv 1</text>
    </g>
    <g transform="translate(-40, 5)">
      <rect x="-30" y="-12" width="60" height="24" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" class="desc" font-weight="600" fill="#059669">Srv 2</text>
    </g>
    <g transform="translate(50, 5)">
      <rect x="-30" y="-12" width="60" height="24" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" class="desc" font-weight="600" fill="#059669">Srv 3</text>
    </g>
    <g transform="translate(140, 5)">
      <rect x="-30" y="-12" width="60" height="24" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
      <text x="0" y="4" text-anchor="middle" class="desc" font-weight="600" fill="#ef4444">Srv 4</text>
    </g>
  </g>

  <line x1="180" y1="225" x2="200" y2="273" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="420" y1="225" x2="400" y2="273" stroke="#3b82f6" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Bottom note -->
  <g transform="translate(300, 375)">
    <rect x="-260" y="-18" width="520" height="36" rx="8" fill="#f0fdfa" stroke="#14b8a6" stroke-width="0.5"/>
    <text x="0" y="-2" text-anchor="middle" class="box-label" fill="#0f766e">If Active fails, Passive takes over the Virtual IP in &lt; 5 seconds (VRRP)</text>
    <text x="0" y="14" text-anchor="middle" class="desc" fill="#0f766e">Cloud LBs (AWS ALB/NLB) are inherently HA across availability zones</text>
  </g>
</svg>
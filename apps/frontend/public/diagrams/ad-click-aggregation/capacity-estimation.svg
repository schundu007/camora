<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgCap" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="550" fill="url(#bgCap)" rx="16"/>

  <!-- Title -->
  <rect x="380" y="16" width="440" height="40" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="43" text-anchor="middle" fill="white" font-size="20" font-weight="700">Back-of-the-Envelope Estimates</text>

  <!-- Column 1: Traffic -->
  <rect x="20" y="80" width="275" height="440" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="20" y="80" width="275" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="157" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Event Ingestion</text>

  <text x="45" y="145" fill="#fbbf24" font-size="13" font-weight="700">&#x1F5B1;️ Billions of clicks/day</text>
  <text x="157" y="170" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="200" fill="white" font-size="12">Estimated click volume:</text>
  <text x="45" y="218" fill="#fbbf24" font-size="15" font-weight="700">10 Billion clicks/day</text>
  <text x="157" y="240" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="268" fill="white" font-size="12">Average click QPS:</text>
  <text x="45" y="288" fill="rgba(255,255,255,0.7)" font-size="10">10B / 86,400</text>
  <text x="45" y="310" fill="#fbbf24" font-size="16" font-weight="800">&#x2248; 115,000 QPS</text>
  <text x="157" y="332" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="358" fill="white" font-size="11">Peak (5x during prime time):</text>
  <text x="45" y="380" fill="#f97316" font-size="18" font-weight="800">&#x2248; 575K QPS</text>
  <text x="157" y="400" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="428" fill="white" font-size="11">Event payload: &#x2248; 200 bytes</text>
  <text x="45" y="448" fill="white" font-size="11">Daily ingestion bandwidth:</text>
  <text x="45" y="468" fill="#fbbf24" font-size="14" font-weight="700">&#x2248; 2 TB raw events/day</text>
  <text x="45" y="490" fill="rgba(255,255,255,0.6)" font-size="10">(10B x 200B = 2TB/day)</text>

  <!-- Column 2: Aggregation -->
  <rect x="310" y="80" width="265" height="250" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="80" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Aggregation Pipeline</text>

  <text x="335" y="148" fill="#fbbf24" font-size="13" font-weight="700">&#x26A1; Target: &lt;1 min latency</text>
  <text x="442" y="170" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="335" y="198" fill="white" font-size="12">Window: 1-minute tumbling</text>
  <text x="335" y="218" fill="rgba(255,255,255,0.7)" font-size="10">Per ad_id: click count, unique users</text>
  <text x="442" y="240" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="335" y="268" fill="white" font-size="11">Unique ads active: &#x2248; 5M</text>
  <text x="335" y="292" fill="#f97316" font-size="16" font-weight="800">5M counters/window</text>

  <rect x="325" y="302" width="235" height="22" rx="6" fill="rgba(239,68,68,0.3)" stroke="rgba(239,68,68,0.5)" stroke-width="1"/>
  <text x="442" y="318" text-anchor="middle" fill="white" font-size="10" font-weight="600">&#x26A0;️ MapReduce + Flink/Spark Streaming</text>

  <!-- Column 2b: Dedup -->
  <rect x="310" y="350" width="265" height="170" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="350" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="374" text-anchor="middle" fill="white" font-size="14" font-weight="700">Deduplication</text>

  <text x="335" y="410" fill="white" font-size="11">Duplicate rate: <tspan fill="#fbbf24" font-weight="700">&#x2248; 5-10%</tspan></text>
  <text x="335" y="432" fill="white" font-size="11">Dedup window: 5 minutes</text>
  <text x="442" y="452" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>

  <text x="335" y="475" fill="white" font-size="11">Event IDs in window:</text>
  <text x="335" y="495" fill="#fbbf24" font-size="14" font-weight="700">&#x2248; 3.5B IDs (Bloom filter)</text>
  <text x="335" y="518" fill="rgba(255,255,255,0.6)" font-size="10">Bloom filter: &#x2248; 4GB memory (1% FPR)</text>

  <!-- Column 3: Fraud -->
  <rect x="590" y="80" width="290" height="250" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="80" width="290" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Fraud Detection</text>

  <text x="615" y="148" fill="white" font-size="12">Fraudulent click rate:</text>
  <text x="615" y="175" fill="#fbbf24" font-size="20" font-weight="800">&#x2248; 20-30%</text>
  <text x="615" y="198" fill="white" font-size="12">of all raw clicks are invalid</text>
  <text x="735" y="218" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>

  <text x="615" y="245" fill="white" font-size="11">Detection signals:</text>
  <text x="615" y="268" fill="rgba(255,255,255,0.7)" font-size="10">IP frequency, user agent, click timing</text>
  <text x="615" y="288" fill="#f97316" font-size="14" font-weight="800">ML model + rule engine</text>
  <text x="615" y="310" fill="rgba(255,255,255,0.6)" font-size="10">Must process inline (&#x2248; 5ms per event)</text>

  <!-- Column 3b: Storage -->
  <rect x="590" y="350" width="290" height="170" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="350" width="290" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="374" text-anchor="middle" fill="white" font-size="14" font-weight="700">Storage</text>

  <text x="615" y="410" fill="white" font-size="11">Raw events: 2 TB/day</text>
  <text x="615" y="432" fill="white" font-size="11">Retention: 90 days raw</text>
  <text x="735" y="452" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>

  <text x="615" y="475" fill="#fbbf24" font-size="14" font-weight="700">&#x2248; 180 TB raw (90 days)</text>
  <text x="615" y="498" fill="white" font-size="11">Aggregated rollups: 1 year</text>
  <text x="615" y="518" fill="#f97316" font-size="14" font-weight="700">&#x2248; 500 GB (compressed)</text>

  <!-- Key insight box -->
  <rect x="900" y="80" width="280" height="440" rx="12" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="1040" y="108" text-anchor="middle" fill="white" font-size="14" font-weight="700">&#x1F4A1; Key Insights</text>
  <line x1="920" y1="118" x2="1160" y2="118" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <text x="920" y="145" fill="white" font-size="11" font-weight="600">Write-heavy system</text>
  <text x="920" y="163" fill="rgba(255,255,255,0.7)" font-size="10">575K peak QPS writes. Kafka</text>
  <text x="920" y="178" fill="rgba(255,255,255,0.7)" font-size="10">as ingestion buffer is essential.</text>

  <text x="920" y="210" fill="white" font-size="11" font-weight="600">Exactly-once matters</text>
  <text x="920" y="228" fill="rgba(255,255,255,0.7)" font-size="10">Duplicate clicks = advertiser</text>
  <text x="920" y="243" fill="rgba(255,255,255,0.7)" font-size="10">overcharge. Bloom filter dedup.</text>

  <text x="920" y="275" fill="white" font-size="11" font-weight="600">Fraud is 20-30% of traffic</text>
  <text x="920" y="293" fill="rgba(255,255,255,0.7)" font-size="10">Must filter before aggregation.</text>
  <text x="920" y="308" fill="rgba(255,255,255,0.7)" font-size="10">ML + rules in streaming layer.</text>

  <text x="920" y="340" fill="white" font-size="11" font-weight="600">Lambda architecture</text>
  <text x="920" y="358" fill="rgba(255,255,255,0.7)" font-size="10">Real-time (Flink) for &lt;1min.</text>
  <text x="920" y="373" fill="rgba(255,255,255,0.7)" font-size="10">Batch (Spark) for corrections.</text>

  <text x="920" y="405" fill="white" font-size="11" font-weight="600">Two storage tiers</text>
  <text x="920" y="423" fill="rgba(255,255,255,0.7)" font-size="10">Raw events: 90 days (180 TB).</text>
  <text x="920" y="438" fill="rgba(255,255,255,0.7)" font-size="10">Aggregated rollups: years (tiny).</text>

  <text x="920" y="470" fill="white" font-size="11" font-weight="600">Idempotent processing</text>
  <text x="920" y="488" fill="rgba(255,255,255,0.7)" font-size="10">Event replay must produce same</text>
  <text x="920" y="503" fill="rgba(255,255,255,0.7)" font-size="10">result. Kafka offsets + checkpoints.</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgCap" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="450" fill="url(#bgCap)" rx="16"/>

  <!-- Title -->
  <rect x="380" y="16" width="440" height="40" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="43" text-anchor="middle" fill="white" font-size="20" font-weight="700">Back-of-the-Envelope: Dropbox</text>

  <!-- Column 1: User Traffic -->
  <rect x="20" y="75" width="275" height="350" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="20" y="75" width="275" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="157" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">User Base &amp; Sync Traffic</text>

  <text x="45" y="140" fill="#fbbf24" font-size="13" font-weight="700">&#x1F465; 700M registered users</text>
  <text x="157" y="162" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="185" fill="white" font-size="12">Files synced per day:</text>
  <text x="45" y="205" fill="#fbbf24" font-size="15" font-weight="700">1.2 Billion files/day</text>
  <text x="157" y="227" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="250" fill="white" font-size="12">Sync operations per second:</text>
  <text x="45" y="272" fill="rgba(255,255,255,0.7)" font-size="10">1.2B / 86400</text>
  <text x="45" y="295" fill="#fbbf24" font-size="16" font-weight="800">&#x2248; 14K sync ops/sec</text>
  <text x="157" y="317" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="340" fill="white" font-size="11">Peak sync (3x):</text>
  <text x="45" y="363" fill="#f97316" font-size="16" font-weight="800">&#x2248; 42K ops/sec</text>

  <text x="45" y="398" fill="white" font-size="11">Metadata updates (10x sync):</text>
  <text x="45" y="418" fill="#f97316" font-size="14" font-weight="700">&#x2248; 420K metadata ops/sec</text>

  <!-- Column 2: Storage -->
  <rect x="310" y="75" width="265" height="170" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="75" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">Total Storage</text>

  <text x="335" y="140" fill="#fbbf24" font-size="15" font-weight="800">500 Petabytes stored</text>
  <text x="335" y="165" fill="white" font-size="11">Avg file size: ~500KB</text>
  <text x="442" y="188" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>
  <text x="335" y="210" fill="white" font-size="11">With 3x replication:</text>
  <text x="335" y="230" fill="#f97316" font-size="15" font-weight="800">1.5 Exabytes raw storage</text>

  <!-- Column 3: Dedup Savings -->
  <rect x="310" y="260" width="265" height="165" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="260" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="284" text-anchor="middle" fill="white" font-size="14" font-weight="700">Deduplication Impact</text>

  <text x="335" y="320" fill="white" font-size="11">Block-level dedup (4MB chunks)</text>
  <text x="335" y="342" fill="white" font-size="11">Typical dedup ratio:</text>
  <text x="335" y="362" fill="#fbbf24" font-size="14" font-weight="700">~60% space savings</text>
  <text x="442" y="382" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>
  <text x="335" y="405" fill="white" font-size="11">Effective unique data:</text>
  <text x="335" y="425" fill="#f97316" font-size="14" font-weight="700">&#x2248; 200 PB unique blocks</text>

  <!-- Column 4: Upload Bandwidth -->
  <rect x="590" y="75" width="290" height="170" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="75" width="290" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">Bandwidth</text>

  <text x="615" y="140" fill="white" font-size="12">Daily upload volume:</text>
  <text x="615" y="163" fill="white" font-size="11">1.2B files x 500KB avg</text>
  <text x="615" y="183" fill="#fbbf24" font-size="15" font-weight="800">&#x2248; 600 TB/day ingress</text>
  <text x="735" y="205" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>
  <text x="615" y="228" fill="#f97316" font-size="14" font-weight="700">&#x2248; 55 Gb/s sustained upload</text>

  <!-- Notification -->
  <rect x="590" y="260" width="290" height="165" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="260" width="290" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="284" text-anchor="middle" fill="white" font-size="14" font-weight="700">Sync Notifications</text>

  <text x="615" y="320" fill="white" font-size="11">Each file change notifies all devices</text>
  <text x="615" y="342" fill="white" font-size="11">Avg 3 devices per user:</text>
  <text x="615" y="365" fill="#fbbf24" font-size="13" font-weight="700">3.6B notifications/day</text>
  <text x="615" y="395" fill="white" font-size="11">Long-polling connections:</text>
  <text x="615" y="415" fill="#f97316" font-size="14" font-weight="700">Millions of open connections</text>

  <!-- Key Insights -->
  <rect x="900" y="75" width="280" height="350" rx="12" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="1040" y="103" text-anchor="middle" fill="white" font-size="14" font-weight="700">&#x1F4A1; Key Insights</text>
  <line x1="920" y1="113" x2="1160" y2="113" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <text x="920" y="140" fill="white" font-size="11" font-weight="600">Dedup is the cost saver</text>
  <text x="920" y="158" fill="rgba(255,255,255,0.7)" font-size="10">60% savings = 300 PB less storage.</text>
  <text x="920" y="173" fill="rgba(255,255,255,0.7)" font-size="10">Content-addressed blocks with</text>
  <text x="920" y="188" fill="rgba(255,255,255,0.7)" font-size="10">SHA-256 hashing.</text>

  <text x="920" y="218" fill="white" font-size="11" font-weight="600">Metadata is the real bottleneck</text>
  <text x="920" y="236" fill="rgba(255,255,255,0.7)" font-size="10">420K metadata ops/sec needs</text>
  <text x="920" y="251" fill="rgba(255,255,255,0.7)" font-size="10">dedicated metadata service with</text>
  <text x="920" y="266" fill="rgba(255,255,255,0.7)" font-size="10">sharded database.</text>

  <text x="920" y="296" fill="white" font-size="11" font-weight="600">Chunked upload is essential</text>
  <text x="920" y="314" fill="rgba(255,255,255,0.7)" font-size="10">Only upload changed blocks,</text>
  <text x="920" y="329" fill="rgba(255,255,255,0.7)" font-size="10">not entire files. Saves 80%+</text>
  <text x="920" y="344" fill="rgba(255,255,255,0.7)" font-size="10">bandwidth on edits.</text>

  <text x="920" y="374" fill="white" font-size="11" font-weight="600">Notification fan-out at scale</text>
  <text x="920" y="392" fill="rgba(255,255,255,0.7)" font-size="10">3.6B notifications/day across</text>
  <text x="920" y="407" fill="rgba(255,255,255,0.7)" font-size="10">millions of persistent connections.</text>
  <text x="920" y="422" fill="rgba(255,255,255,0.7)" font-size="10">Long-polling or WebSocket needed.</text>
</svg>
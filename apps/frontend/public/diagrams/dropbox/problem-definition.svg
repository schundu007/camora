<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="500" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <rect x="370" y="20" width="460" height="44" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="22" font-weight="700">Problem Definition: Designing Dropbox</text>

  <!-- Column 1: Users & Core Actions -->
  <text x="200" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Users &amp; Core Actions</text>
  <rect x="40" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <circle cx="120" cy="165" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="120" y="171" text-anchor="middle" fill="white" font-size="24">&#x1F4BB;</text>
  <text x="120" y="210" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Desktop</text>

  <text x="200" y="171" text-anchor="middle" fill="white" font-size="28">&#x21C4;</text>

  <circle cx="280" cy="165" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="280" y="171" text-anchor="middle" fill="white" font-size="24">&#x1F4F1;</text>
  <text x="280" y="210" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Mobile</text>

  <!-- Core Actions Box -->
  <rect x="60" y="230" width="280" height="240" rx="12" fill="#f97316" filter="url(#shadow)"/>
  <text x="200" y="260" text-anchor="middle" fill="white" font-size="15" font-weight="700">Core Actions</text>
  <line x1="80" y1="272" x2="320" y2="272" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="85" y="300" fill="white" font-size="13">&#x2B06;&#xFE0F;  Upload Files</text>
  <text x="85" y="330" fill="white" font-size="13">&#x2B07;&#xFE0F;  Download Files</text>
  <text x="85" y="360" fill="white" font-size="13">&#x1F504;  Sync Across Devices</text>
  <text x="85" y="390" fill="white" font-size="13">&#x1F4C4;  Browse File Versions</text>
  <text x="85" y="420" fill="white" font-size="13">&#x1F517;  Share Files &amp; Folders</text>
  <text x="85" y="450" fill="white" font-size="13">&#x1F5C2;&#xFE0F;  Organize in Folders</text>

  <!-- Column 2: In Scope -->
  <text x="600" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">In Scope: Essentials</text>
  <rect x="440" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="440" y="120" width="320" height="350" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <text x="470" y="155" fill="white" font-size="13" font-weight="600">&#x2B06;&#xFE0F;  File upload &amp; download</text>
  <text x="490" y="175" fill="rgba(255,255,255,0.7)" font-size="11">(Chunked upload, resumable)</text>
  <text x="470" y="205" fill="white" font-size="13" font-weight="600">&#x1F504;  Cross-device sync</text>
  <text x="490" y="225" fill="rgba(255,255,255,0.7)" font-size="11">(Desktop, mobile, web clients)</text>
  <text x="470" y="255" fill="white" font-size="13" font-weight="600">&#x1F9E9;  Block-level deduplication</text>
  <text x="490" y="275" fill="rgba(255,255,255,0.7)" font-size="11">(Content-addressed, 4MB blocks)</text>
  <text x="470" y="305" fill="white" font-size="13" font-weight="600">&#x1F4DC;  File versioning</text>
  <text x="490" y="325" fill="rgba(255,255,255,0.7)" font-size="11">(30-day history, restore any version)</text>
  <text x="470" y="355" fill="white" font-size="13" font-weight="600">&#x1F517;  Sharing &amp; permissions</text>
  <text x="490" y="375" fill="rgba(255,255,255,0.7)" font-size="11">(Link sharing, folder access control)</text>
  <text x="470" y="405" fill="white" font-size="13" font-weight="600">&#x1F4C1;  File metadata &amp; search</text>
  <text x="490" y="425" fill="rgba(255,255,255,0.7)" font-size="11">(Name, size, type, modified date)</text>

  <!-- Column 3: Out of Scope -->
  <text x="1000" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Out of Scope / Future</text>
  <rect x="840" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="840" y="120" width="320" height="250" rx="12" fill="rgba(245,158,11,0.25)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>

  <text x="870" y="155" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Dropbox Paper / Docs</text>
  <text x="870" y="190" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  HelloSign Integration</text>
  <text x="870" y="225" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Team Admin Console</text>
  <text x="870" y="260" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Smart Sync (on-demand)</text>
  <text x="870" y="295" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  File Requests</text>
  <text x="870" y="330" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Third-party App Integrations</text>

  <!-- Bottom -->
  <text x="600" y="492" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="12">Focus on reliable file sync infrastructure first &#x2192; extend to collaboration features later</text>
</svg>
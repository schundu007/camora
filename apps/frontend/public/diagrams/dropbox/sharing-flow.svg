<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
  </defs>

  <rect width="1200" height="450" fill="#ffffff" rx="16"/>

  <text x="600" y="32" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Dropbox File Sharing Flow</text>
  <text x="600" y="52" text-anchor="middle" fill="#64748b" font-size="12">User shares file, permission check, generate link, store ACL, recipient opens, authenticate, serve via CDN</text>

  <!-- User Shares -->
  <rect x="15" y="105" width="120" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="15" y="105" width="120" height="28" rx="10 10 0 0" fill="#0061ff"/>
  <text x="75" y="124" text-anchor="middle" fill="white" font-size="11" font-weight="700">User Shares</text>
  <text x="75" y="152" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Share Action</text>
  <text x="75" y="170" text-anchor="middle" fill="#64748b" font-size="9">Right-click share</text>
  <text x="75" y="186" text-anchor="middle" fill="#64748b" font-size="9">Set permissions</text>
  <text x="75" y="202" text-anchor="middle" fill="#64748b" font-size="9">View/Edit/Comment</text>

  <!-- Permission Check -->
  <rect x="185" y="95" width="120" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="185" y="95" width="120" height="28" rx="10 10 0 0" fill="#ef4444"/>
  <text x="245" y="114" text-anchor="middle" fill="white" font-size="11" font-weight="700">Permission Check</text>
  <text x="245" y="142" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Verify Owner</text>
  <text x="245" y="160" text-anchor="middle" fill="#64748b" font-size="9">Is user the owner?</text>
  <text x="245" y="176" text-anchor="middle" fill="#64748b" font-size="9">Can they re-share?</text>
  <text x="245" y="192" text-anchor="middle" fill="#64748b" font-size="9">Team policy check</text>
  <text x="245" y="212" text-anchor="middle" fill="#94a3b8" font-size="8">ACL service</text>

  <!-- Generate Link -->
  <rect x="355" y="95" width="120" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="355" y="95" width="120" height="28" rx="10 10 0 0" fill="#16a34a"/>
  <text x="415" y="114" text-anchor="middle" fill="white" font-size="11" font-weight="700">Generate Link</text>
  <text x="415" y="142" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Unique Share URL</text>
  <text x="415" y="160" text-anchor="middle" fill="#64748b" font-size="9">Random token</text>
  <text x="415" y="176" text-anchor="middle" fill="#64748b" font-size="9">Expiry date opt</text>
  <text x="415" y="192" text-anchor="middle" fill="#64748b" font-size="9">Password opt</text>
  <text x="415" y="212" text-anchor="middle" fill="#94a3b8" font-size="8">dl.dropbox.com/s/...</text>

  <!-- Store ACL -->
  <rect x="525" y="95" width="120" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="525" y="95" width="120" height="28" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="585" y="114" text-anchor="middle" fill="white" font-size="11" font-weight="700">Store ACL</text>
  <text x="585" y="142" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Access Control</text>
  <text x="585" y="160" text-anchor="middle" fill="#64748b" font-size="9">Shared folder/file ID</text>
  <text x="585" y="176" text-anchor="middle" fill="#64748b" font-size="9">User/email list</text>
  <text x="585" y="192" text-anchor="middle" fill="#64748b" font-size="9">Permission level</text>
  <text x="585" y="212" text-anchor="middle" fill="#94a3b8" font-size="8">PostgreSQL</text>

  <!-- Recipient Opens -->
  <rect x="695" y="105" width="120" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="695" y="105" width="120" height="28" rx="10 10 0 0" fill="#f97316"/>
  <text x="755" y="124" text-anchor="middle" fill="white" font-size="11" font-weight="700">Recipient Opens</text>
  <text x="755" y="152" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Click Link</text>
  <text x="755" y="170" text-anchor="middle" fill="#64748b" font-size="9">Email / chat / copy</text>
  <text x="755" y="186" text-anchor="middle" fill="#64748b" font-size="9">Opens share URL</text>
  <text x="755" y="210" text-anchor="middle" fill="#64748b" font-size="14">&#x1F517;</text>

  <!-- Auth -->
  <rect x="865" y="95" width="110" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="865" y="95" width="110" height="28" rx="10 10 0 0" fill="#ef4444"/>
  <text x="920" y="114" text-anchor="middle" fill="white" font-size="11" font-weight="700">Authenticate</text>
  <text x="920" y="142" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Verify Access</text>
  <text x="920" y="160" text-anchor="middle" fill="#64748b" font-size="9">Token valid?</text>
  <text x="920" y="176" text-anchor="middle" fill="#64748b" font-size="9">Password check?</text>
  <text x="920" y="192" text-anchor="middle" fill="#64748b" font-size="9">Not expired?</text>
  <text x="920" y="212" text-anchor="middle" fill="#94a3b8" font-size="8">ACL lookup</text>

  <!-- Serve via CDN -->
  <rect x="1025" y="95" width="155" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="1025" y="95" width="155" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="1102" y="114" text-anchor="middle" fill="white" font-size="11" font-weight="700">Serve via CDN</text>
  <text x="1102" y="142" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Download / Preview</text>
  <text x="1102" y="160" text-anchor="middle" fill="#64748b" font-size="9">Signed URL to CDN</text>
  <text x="1102" y="176" text-anchor="middle" fill="#64748b" font-size="9">Browser preview or</text>
  <text x="1102" y="192" text-anchor="middle" fill="#64748b" font-size="9">direct download</text>
  <text x="1102" y="212" text-anchor="middle" fill="#94a3b8" font-size="8">CloudFront + S3</text>

  <!-- Arrows -->
  <line x1="135" y1="160" x2="182" y2="160" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="137" y="146" width="42" height="14" rx="3" fill="#ef4444"/>
  <text x="158" y="156" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2460;</text>

  <line x1="305" y1="160" x2="352" y2="160" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="307" y="146" width="42" height="14" rx="3" fill="#16a34a"/>
  <text x="328" y="156" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2461;</text>

  <line x1="475" y1="160" x2="522" y2="160" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <rect x="477" y="146" width="42" height="14" rx="3" fill="#7c3aed"/>
  <text x="498" y="156" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2462;</text>

  <line x1="645" y1="160" x2="692" y2="160" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="647" y="146" width="42" height="14" rx="3" fill="#f97316"/>
  <text x="668" y="156" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2463;</text>

  <line x1="815" y1="160" x2="862" y2="160" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="817" y="146" width="42" height="14" rx="3" fill="#ef4444"/>
  <text x="838" y="156" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2464;</text>

  <line x1="975" y1="160" x2="1022" y2="160" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="977" y="146" width="42" height="14" rx="3" fill="#2563eb"/>
  <text x="998" y="156" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2465;</text>

  <!-- Legend -->
  <rect x="20" y="340" width="1160" height="95" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="362" fill="#1e293b" font-size="12" font-weight="700">Flow Steps:</text>
  <rect x="50" y="372" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="66" y="381" fill="#475569" font-size="9">&#x2460; User initiates share: permission check verifies ownership and team policies</text>
  <rect x="50" y="388" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="66" y="397" fill="#475569" font-size="9">&#x2461; Generate unique share link with optional expiry and password protection</text>
  <rect x="50" y="404" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="66" y="413" fill="#475569" font-size="9">&#x2462; Store ACL: shared item ID, permitted users/emails, permission level (view/edit)</text>
  <text x="430" y="381" fill="#475569" font-size="9">&#x2463; Recipient clicks shared link (via email, chat, or copied URL)</text>
  <text x="430" y="397" fill="#475569" font-size="9">&#x2464; Authenticate: verify token, check password, ensure not expired, ACL lookup</text>
  <text x="430" y="413" fill="#475569" font-size="9">&#x2465; Serve file via CDN: signed URL for download or browser preview (CloudFront + S3)</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="350" fill="#fafbfc" rx="12"/>
  <text x="400" y="28" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="700">Content-Addressed Deduplication — Same Content Stored Once</text>

  <!-- Without dedup -->
  <rect x="20" y="50" width="370" height="270" rx="10" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="20" y="50" width="370" height="28" rx="10 10 0 0" fill="#ef4444"/>
  <text x="205" y="69" text-anchor="middle" fill="white" font-size="12" font-weight="700">❌ Without Dedup — Naive Approach</text>

  <text x="40" y="100" fill="#1e293b" font-size="10" font-weight="600">1M users upload same 100MB file:</text>

  <rect x="40" y="115" width="60" height="25" rx="4" fill="#94a3b8"/>
  <text x="70" y="132" text-anchor="middle" fill="white" font-size="8">User 1</text>
  <rect x="110" y="115" width="80" height="25" rx="4" fill="#ef4444"/>
  <text x="150" y="132" text-anchor="middle" fill="white" font-size="8">100 MB copy</text>

  <rect x="40" y="145" width="60" height="25" rx="4" fill="#94a3b8"/>
  <text x="70" y="162" text-anchor="middle" fill="white" font-size="8">User 2</text>
  <rect x="110" y="145" width="80" height="25" rx="4" fill="#ef4444"/>
  <text x="150" y="162" text-anchor="middle" fill="white" font-size="8">100 MB copy</text>

  <rect x="40" y="175" width="60" height="25" rx="4" fill="#94a3b8"/>
  <text x="70" y="192" text-anchor="middle" fill="white" font-size="8">User 3</text>
  <rect x="110" y="175" width="80" height="25" rx="4" fill="#ef4444"/>
  <text x="150" y="192" text-anchor="middle" fill="white" font-size="8">100 MB copy</text>

  <text x="40" y="218" fill="#64748b" font-size="10">...</text>

  <rect x="40" y="228" width="60" height="25" rx="4" fill="#94a3b8"/>
  <text x="70" y="245" text-anchor="middle" fill="white" font-size="8">User 1M</text>
  <rect x="110" y="228" width="80" height="25" rx="4" fill="#ef4444"/>
  <text x="150" y="245" text-anchor="middle" fill="white" font-size="8">100 MB copy</text>

  <text x="40" y="280" fill="#ef4444" font-size="12" font-weight="700">Total: 100 TB stored</text>
  <text x="40" y="300" fill="#64748b" font-size="9">1M copies × 100 MB each = 100 TB</text>
  <text x="40" y="315" fill="#64748b" font-size="9">Massive waste of storage!</text>

  <!-- With dedup -->
  <rect x="410" y="50" width="370" height="270" rx="10" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="410" y="50" width="370" height="28" rx="10 10 0 0" fill="#22c55e"/>
  <text x="595" y="69" text-anchor="middle" fill="white" font-size="12" font-weight="700">✓ With Dedup — Content-Addressed Storage</text>

  <text x="430" y="100" fill="#1e293b" font-size="10" font-weight="600">Same file = same SHA-256 hash = stored once:</text>

  <rect x="430" y="115" width="60" height="25" rx="4" fill="#94a3b8"/>
  <text x="460" y="132" text-anchor="middle" fill="white" font-size="8">User 1</text>
  <text x="500" y="132" fill="#64748b" font-size="10">→</text>

  <rect x="430" y="145" width="60" height="25" rx="4" fill="#94a3b8"/>
  <text x="460" y="162" text-anchor="middle" fill="white" font-size="8">User 2</text>
  <text x="500" y="162" fill="#64748b" font-size="10">→</text>

  <rect x="430" y="175" width="60" height="25" rx="4" fill="#94a3b8"/>
  <text x="460" y="192" text-anchor="middle" fill="white" font-size="8">User 3</text>
  <text x="500" y="192" fill="#64748b" font-size="10">→</text>

  <text x="430" y="218" fill="#64748b" font-size="10">...</text>

  <rect x="430" y="228" width="60" height="25" rx="4" fill="#94a3b8"/>
  <text x="460" y="245" text-anchor="middle" fill="white" font-size="8">User 1M</text>
  <text x="500" y="245" fill="#64748b" font-size="10">→</text>

  <!-- Single stored copy -->
  <rect x="520" y="120" width="130" height="130" rx="10" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="2"/>
  <text x="585" y="165" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="800">ONE COPY</text>
  <text x="585" y="185" text-anchor="middle" fill="#16a34a" font-size="10">100 MB</text>
  <text x="585" y="205" text-anchor="middle" fill="#64748b" font-size="8">hash: a7f3c...</text>
  <text x="585" y="225" text-anchor="middle" fill="#64748b" font-size="8">ref_count: 1,000,000</text>

  <!-- Refs pointer -->
  <rect x="665" y="150" width="100" height="70" rx="6" fill="rgba(37,99,235,0.1)" stroke="#2563eb"/>
  <text x="715" y="172" text-anchor="middle" fill="#2563eb" font-size="9" font-weight="600">1M metadata</text>
  <text x="715" y="190" text-anchor="middle" fill="#2563eb" font-size="9" font-weight="600">references</text>
  <text x="715" y="210" text-anchor="middle" fill="#64748b" font-size="8">~100 bytes each</text>

  <text x="430" y="280" fill="#22c55e" font-size="12" font-weight="700">Total: 100 MB + 100 MB metadata</text>
  <text x="430" y="300" fill="#64748b" font-size="9">99.99% storage savings!</text>
  <text x="430" y="315" fill="#64748b" font-size="9">Upload skipped entirely — just create metadata ref</text>

  <!-- Bottom note -->
  <rect x="20" y="328" width="760" height="18" rx="4" fill="rgba(30,41,59,0.05)"/>
  <text x="400" y="341" text-anchor="middle" fill="#64748b" font-size="9">Dropbox reports 40-60% dedup savings across all users • Common files: OS updates, shared docs, templates</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/></marker>
  </defs>

  <rect width="1200" height="450" fill="#ffffff" rx="16"/>

  <text x="600" y="32" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Ticketmaster Seat Selection Flow</text>
  <text x="600" y="52" text-anchor="middle" fill="#64748b" font-size="12">View seat map with real-time WebSocket updates, select, optimistic lock, pay, confirm, release others</text>

  <!-- View Seat Map -->
  <rect x="15" y="95" width="120" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="15" y="95" width="120" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="75" y="114" text-anchor="middle" fill="white" font-size="11" font-weight="700">View Seat Map</text>
  <text x="75" y="142" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">CDN Snapshot</text>
  <text x="75" y="160" text-anchor="middle" fill="#64748b" font-size="9">16 MB initial load</text>
  <text x="75" y="176" text-anchor="middle" fill="#64748b" font-size="9">Section colors</text>
  <text x="75" y="192" text-anchor="middle" fill="#64748b" font-size="9">Price tiers</text>
  <text x="75" y="212" text-anchor="middle" fill="#94a3b8" font-size="8">~50ms edge cache</text>

  <!-- WebSocket Updates -->
  <rect x="180" y="95" width="130" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="180" y="95" width="130" height="28" rx="10 10 0 0" fill="#16a34a"/>
  <text x="245" y="114" text-anchor="middle" fill="white" font-size="11" font-weight="700">WS Live Updates</text>
  <text x="245" y="142" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Real-Time Avail</text>
  <text x="245" y="160" text-anchor="middle" fill="#64748b" font-size="9">~50 bytes per delta</text>
  <text x="245" y="176" text-anchor="middle" fill="#64748b" font-size="9">Seat taken/released</text>
  <text x="245" y="192" text-anchor="middle" fill="#64748b" font-size="9">Color changes live</text>
  <text x="245" y="212" text-anchor="middle" fill="#94a3b8" font-size="8">&lt;500ms latency</text>

  <!-- Select -->
  <rect x="355" y="105" width="110" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="355" y="105" width="110" height="28" rx="10 10 0 0" fill="#f97316"/>
  <text x="410" y="124" text-anchor="middle" fill="white" font-size="11" font-weight="700">Select Seats</text>
  <text x="410" y="152" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">User Picks</text>
  <text x="410" y="170" text-anchor="middle" fill="#64748b" font-size="9">Click on map</text>
  <text x="410" y="186" text-anchor="middle" fill="#64748b" font-size="9">Or "Best Available"</text>
  <text x="410" y="202" text-anchor="middle" fill="#64748b" font-size="9">Price shown</text>

  <!-- Optimistic Lock -->
  <rect x="510" y="90" width="130" height="140" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="510" y="90" width="130" height="28" rx="10 10 0 0" fill="#ef4444"/>
  <text x="575" y="109" text-anchor="middle" fill="white" font-size="11" font-weight="700">Optimistic Lock</text>
  <text x="575" y="136" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Redis SETNX</text>
  <text x="575" y="154" text-anchor="middle" fill="#64748b" font-size="9">seat:{id} lock</text>
  <text x="575" y="170" text-anchor="middle" fill="#64748b" font-size="9">10-min TTL</text>
  <text x="575" y="186" text-anchor="middle" fill="#64748b" font-size="9">If held: suggest</text>
  <text x="575" y="202" text-anchor="middle" fill="#64748b" font-size="9">alternatives</text>
  <text x="575" y="218" text-anchor="middle" fill="#94a3b8" font-size="8">Auto-expire</text>

  <!-- Payment -->
  <rect x="685" y="95" width="120" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="685" y="95" width="120" height="28" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="745" y="114" text-anchor="middle" fill="white" font-size="11" font-weight="700">Payment</text>
  <text x="745" y="142" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Stripe Charge</text>
  <text x="745" y="160" text-anchor="middle" fill="#64748b" font-size="9">Verify hold exists</text>
  <text x="745" y="176" text-anchor="middle" fill="#64748b" font-size="9">PaymentIntent</text>
  <text x="745" y="192" text-anchor="middle" fill="#64748b" font-size="9">Card authorized</text>
  <text x="745" y="212" text-anchor="middle" fill="#94a3b8" font-size="8">Idempotent key</text>

  <!-- Confirm -->
  <rect x="850" y="105" width="110" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="850" y="105" width="110" height="28" rx="10 10 0 0" fill="#16a34a"/>
  <text x="905" y="124" text-anchor="middle" fill="white" font-size="11" font-weight="700">Confirm</text>
  <text x="905" y="152" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Status = SOLD</text>
  <text x="905" y="170" text-anchor="middle" fill="#64748b" font-size="9">DB commit</text>
  <text x="905" y="186" text-anchor="middle" fill="#64748b" font-size="9">Barcode generated</text>
  <text x="905" y="202" text-anchor="middle" fill="#16a34a" font-size="14">&#x2713;</text>

  <!-- Release Others -->
  <rect x="1005" y="105" width="110" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="1005" y="105" width="110" height="28" rx="10 10 0 0" fill="#f97316"/>
  <text x="1060" y="124" text-anchor="middle" fill="white" font-size="10" font-weight="700">Release Others</text>
  <text x="1060" y="152" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Pub/Sub Notify</text>
  <text x="1060" y="170" text-anchor="middle" fill="#64748b" font-size="9">Update seat map</text>
  <text x="1060" y="186" text-anchor="middle" fill="#64748b" font-size="9">WS push to all</text>
  <text x="1060" y="202" text-anchor="middle" fill="#64748b" font-size="9">browsing users</text>

  <!-- Arrows -->
  <line x1="135" y1="155" x2="177" y2="155" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="137" y="141" width="38" height="14" rx="3" fill="#16a34a"/>
  <text x="156" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2460;</text>

  <line x1="310" y1="155" x2="352" y2="155" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="312" y="141" width="38" height="14" rx="3" fill="#f97316"/>
  <text x="331" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2461;</text>

  <line x1="465" y1="155" x2="507" y2="155" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <rect x="467" y="141" width="38" height="14" rx="3" fill="#ef4444"/>
  <text x="486" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2462;</text>

  <line x1="640" y1="155" x2="682" y2="155" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="642" y="141" width="38" height="14" rx="3" fill="#7c3aed"/>
  <text x="661" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2463;</text>

  <line x1="805" y1="155" x2="847" y2="155" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="807" y="141" width="38" height="14" rx="3" fill="#16a34a"/>
  <text x="826" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2464;</text>

  <line x1="960" y1="155" x2="1002" y2="155" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="962" y="141" width="38" height="14" rx="3" fill="#f97316"/>
  <text x="981" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2465;</text>

  <!-- Release back arrow -->
  <path d="M 1060 215 L 1060 265 L 245 265 L 245 228" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowGreen)"/>
  <rect x="580" y="256" width="130" height="14" rx="3" fill="#16a34a"/>
  <text x="645" y="266" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2466; WS: seat map updated</text>

  <!-- Legend -->
  <rect x="20" y="340" width="1160" height="95" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="362" fill="#1e293b" font-size="12" font-weight="700">Flow Steps:</text>
  <rect x="50" y="372" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="66" y="381" fill="#475569" font-size="9">&#x2460; View CDN-cached seat map (16 MB snapshot) + establish WebSocket for live availability deltas</text>
  <rect x="50" y="388" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="66" y="397" fill="#475569" font-size="9">&#x2461; User selects specific seats (click on map) or uses "Best Available" algorithm</text>
  <rect x="50" y="404" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="66" y="413" fill="#475569" font-size="9">&#x2462; Optimistic lock via Redis SETNX with 10-min TTL; if held, suggest alternatives</text>
  <text x="430" y="381" fill="#475569" font-size="9">&#x2463; Process payment (verify hold still active, Stripe PaymentIntent, charge card)</text>
  <text x="430" y="397" fill="#475569" font-size="9">&#x2464; Confirm booking: DB commit, status=SOLD, encrypted barcode ticket generated</text>
  <text x="430" y="413" fill="#475569" font-size="9">&#x2465; Release other held seats, Pub/Sub notification updates all browsing users' seat maps</text>
  <text x="870" y="381" fill="#475569" font-size="9">&#x2466; WebSocket pushes seat map deltas to all connected clients in real-time</text>
</svg>
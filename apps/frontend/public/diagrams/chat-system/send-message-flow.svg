<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="450" fill="#fafbfc" rx="16"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Slack / Discord Send Message Flow</text>
  <text x="600" y="56" text-anchor="middle" fill="#64748b" font-size="12">Message delivery from client through WebSocket gateway, persistence, and fan-out to channel subscribers</text>

  <!-- Client -->
  <rect x="20" y="110" width="120" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="20" y="110" width="120" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="80" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Client</text>
  <text x="80" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Send message</text>
  <text x="80" y="175" text-anchor="middle" fill="#64748b" font-size="9">WebSocket frame</text>
  <text x="80" y="190" text-anchor="middle" fill="#64748b" font-size="9">Client nonce</text>
  <text x="80" y="207" text-anchor="middle" fill="#94a3b8" font-size="9">for dedup</text>

  <!-- WS Gateway -->
  <rect x="175" y="110" width="130" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="175" y="110" width="130" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="240" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">WS Gateway</text>
  <text x="240" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Validate + route</text>
  <text x="240" y="175" text-anchor="middle" fill="#64748b" font-size="9">Auth token check</text>
  <text x="240" y="190" text-anchor="middle" fill="#64748b" font-size="9">Channel membership</text>
  <text x="240" y="207" text-anchor="middle" fill="#94a3b8" font-size="9">50K conn/node</text>

  <!-- Channel Server -->
  <rect x="340" y="110" width="130" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="340" y="110" width="130" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="405" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Channel Server</text>
  <text x="405" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Sequence assign</text>
  <text x="405" y="175" text-anchor="middle" fill="#64748b" font-size="9">Redis INCR seq</text>
  <text x="405" y="190" text-anchor="middle" fill="#64748b" font-size="9">Message ordering</text>
  <text x="405" y="207" text-anchor="middle" fill="#94a3b8" font-size="9">Per-channel</text>

  <!-- Persist DB -->
  <rect x="505" y="110" width="130" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="505" y="110" width="130" height="30" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="570" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Persist DB</text>
  <text x="570" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Vitess / ScyllaDB</text>
  <text x="570" y="175" text-anchor="middle" fill="#64748b" font-size="9">Shard by channel_id</text>
  <text x="570" y="190" text-anchor="middle" fill="#64748b" font-size="9">Write with seq num</text>
  <text x="570" y="207" text-anchor="middle" fill="#94a3b8" font-size="9">17K writes/sec</text>

  <!-- Publish Event -->
  <rect x="670" y="110" width="130" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="670" y="110" width="130" height="30" rx="10 10 0 0" fill="#ef4444"/>
  <text x="735" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Redis Pub/Sub</text>
  <text x="735" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Publish event</text>
  <text x="735" y="175" text-anchor="middle" fill="#64748b" font-size="9">Channel topic</text>
  <text x="735" y="190" text-anchor="middle" fill="#64748b" font-size="9">All subscribed</text>
  <text x="735" y="207" text-anchor="middle" fill="#94a3b8" font-size="9">gateways notified</text>

  <!-- Fan-out -->
  <rect x="835" y="110" width="130" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="835" y="110" width="130" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="900" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Gateway Fan-out</text>
  <text x="900" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Push to members</text>
  <text x="900" y="175" text-anchor="middle" fill="#64748b" font-size="9">Each gateway pushes</text>
  <text x="900" y="190" text-anchor="middle" fill="#64748b" font-size="9">to local connections</text>
  <text x="900" y="207" text-anchor="middle" fill="#94a3b8" font-size="9">of channel members</text>

  <!-- Deliver via WS -->
  <rect x="1000" y="110" width="160" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="1000" y="110" width="160" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="1080" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Deliver via WS</text>
  <text x="1080" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Subscribers receive</text>
  <text x="1080" y="175" text-anchor="middle" fill="#64748b" font-size="9">WebSocket push</text>
  <text x="1080" y="190" text-anchor="middle" fill="#64748b" font-size="9">Message appears</text>
  <text x="1080" y="207" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="600">&lt;100ms end-to-end</text>

  <!-- Kafka (async) -->
  <rect x="505" y="275" width="190" height="45" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="505" y="275" width="190" height="18" rx="8 8 0 0" fill="#f97316"/>
  <text x="600" y="288" text-anchor="middle" fill="white" font-size="9" font-weight="700">Kafka Async Pipeline</text>
  <text x="600" y="307" text-anchor="middle" fill="#64748b" font-size="9">Search indexing, analytics, offline push</text>

  <!-- Arrows -->
  <line x1="140" y1="158" x2="171" y2="158" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="142" y="141" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="153" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">1</text>

  <line x1="305" y1="158" x2="336" y2="158" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="307" y="141" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="318" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">2</text>

  <line x1="470" y1="158" x2="501" y2="158" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <rect x="472" y="141" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="483" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>

  <line x1="635" y1="158" x2="666" y2="158" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="637" y="141" width="22" height="14" rx="3" fill="#7c3aed"/>
  <text x="648" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">4</text>

  <line x1="800" y1="158" x2="831" y2="158" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="802" y="141" width="22" height="14" rx="3" fill="#ef4444"/>
  <text x="813" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">5</text>

  <line x1="965" y1="158" x2="996" y2="158" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="967" y="141" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="978" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">6</text>

  <!-- Kafka arrow -->
  <line x1="570" y1="220" x2="590" y2="271" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <text x="615" y="250" fill="#f97316" font-size="9">7 Async</text>

  <!-- Legend -->
  <rect x="30" y="360" width="1140" height="65" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="55" y="382" fill="#1e293b" font-size="11" font-weight="700">Flow Steps:</text>
  <rect x="55" y="392" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="70" y="401" fill="#475569" font-size="9">1 Client sends message via WebSocket with dedup nonce</text>
  <rect x="55" y="406" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="70" y="415" fill="#475569" font-size="9">2 Gateway validates auth and channel membership</text>
  <text x="380" y="401" fill="#475569" font-size="9">3-4 Assign sequence number, persist to sharded database</text>
  <text x="380" y="415" fill="#475569" font-size="9">5 Redis Pub/Sub notifies all subscribed gateway nodes</text>
  <rect x="760" y="392" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="775" y="401" fill="#475569" font-size="9">6 Each gateway pushes to local WS connections</text>
  <rect x="760" y="406" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="775" y="415" fill="#475569" font-size="9">7 Kafka triggers search indexing + offline notifications</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="450" fill="#fafbfc" rx="16"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Presence Update Flow</text>
  <text x="600" y="56" text-anchor="middle" fill="#64748b" font-size="12">Client heartbeat through gateway to Redis HSET with TTL, Pub/Sub notification, contact list update</text>

  <!-- Client Heartbeat -->
  <rect x="40" y="130" width="150" height="115" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="40" y="130" width="150" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="115" y="150" text-anchor="middle" fill="white" font-size="11" font-weight="700">Client Heartbeat</text>
  <text x="115" y="178" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">WebSocket ping</text>
  <text x="115" y="195" text-anchor="middle" fill="#64748b" font-size="9">Every 30 seconds</text>
  <text x="115" y="210" text-anchor="middle" fill="#64748b" font-size="9">Includes user status</text>
  <text x="115" y="228" text-anchor="middle" fill="#94a3b8" font-size="9">(active / away / dnd)</text>

  <!-- Gateway -->
  <rect x="240" y="130" width="150" height="115" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="240" y="130" width="150" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="315" y="150" text-anchor="middle" fill="white" font-size="11" font-weight="700">WS Gateway</text>
  <text x="315" y="178" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Process heartbeat</text>
  <text x="315" y="195" text-anchor="middle" fill="#64748b" font-size="9">Refresh connection</text>
  <text x="315" y="210" text-anchor="middle" fill="#64748b" font-size="9">Update user state</text>
  <text x="315" y="228" text-anchor="middle" fill="#94a3b8" font-size="9">167K heartbeats/s</text>

  <!-- Redis HSET -->
  <rect x="440" y="130" width="160" height="115" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="440" y="130" width="160" height="30" rx="10 10 0 0" fill="#ef4444"/>
  <text x="520" y="150" text-anchor="middle" fill="white" font-size="11" font-weight="700">Redis HSET + TTL</text>
  <text x="520" y="178" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">presence:{user_id}</text>
  <text x="520" y="195" text-anchor="middle" fill="#64748b" font-size="9">HSET status, gateway_id</text>
  <text x="520" y="210" text-anchor="middle" fill="#64748b" font-size="9">EXPIRE 90s TTL</text>
  <text x="520" y="228" text-anchor="middle" fill="#94a3b8" font-size="9">TTL expiry = offline</text>

  <!-- Pub/Sub Notify -->
  <rect x="650" y="130" width="150" height="115" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="650" y="130" width="150" height="30" rx="10 10 0 0" fill="#ef4444"/>
  <text x="725" y="150" text-anchor="middle" fill="white" font-size="11" font-weight="700">Redis Pub/Sub</text>
  <text x="725" y="178" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Status change notify</text>
  <text x="725" y="195" text-anchor="middle" fill="#64748b" font-size="9">Only on transitions</text>
  <text x="725" y="210" text-anchor="middle" fill="#64748b" font-size="9">offline-&gt;active</text>
  <text x="725" y="228" text-anchor="middle" fill="#94a3b8" font-size="9">active-&gt;away, etc.</text>

  <!-- Contact List Update -->
  <rect x="850" y="130" width="150" height="115" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="850" y="130" width="150" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="925" y="150" text-anchor="middle" fill="white" font-size="10" font-weight="700">Selective Broadcast</text>
  <text x="925" y="178" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">5-sec batch</text>
  <text x="925" y="195" text-anchor="middle" fill="#64748b" font-size="9">Only to users with</text>
  <text x="925" y="210" text-anchor="middle" fill="#64748b" font-size="9">target in sidebar</text>
  <text x="925" y="228" text-anchor="middle" fill="#94a3b8" font-size="9">Aggregated updates</text>

  <!-- Contact Updated -->
  <rect x="1050" y="130" width="120" height="115" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="1050" y="130" width="120" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="1110" y="150" text-anchor="middle" fill="white" font-size="10" font-weight="700">UI Updated</text>
  <text x="1110" y="178" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Green dot</text>
  <text x="1110" y="195" text-anchor="middle" fill="#64748b" font-size="9">Status indicator</text>
  <text x="1110" y="210" text-anchor="middle" fill="#64748b" font-size="9">changes in sidebar</text>
  <text x="1110" y="228" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="600">Real-time presence</text>

  <!-- Arrows -->
  <line x1="190" y1="182" x2="236" y2="182" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="198" y="165" width="22" height="14" rx="3" fill="#f97316"/>
  <text x="209" y="175" text-anchor="middle" fill="white" font-size="8" font-weight="600">1</text>

  <line x1="390" y1="182" x2="436" y2="182" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="398" y="165" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="409" y="175" text-anchor="middle" fill="white" font-size="8" font-weight="600">2</text>

  <line x1="600" y1="182" x2="646" y2="182" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="608" y="165" width="22" height="14" rx="3" fill="#ef4444"/>
  <text x="619" y="175" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>

  <line x1="800" y1="182" x2="846" y2="182" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="808" y="165" width="22" height="14" rx="3" fill="#ef4444"/>
  <text x="819" y="175" text-anchor="middle" fill="white" font-size="8" font-weight="600">4</text>

  <line x1="1000" y1="182" x2="1046" y2="182" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="1008" y="165" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="1019" y="175" text-anchor="middle" fill="white" font-size="8" font-weight="600">5</text>

  <!-- Legend -->
  <rect x="30" y="300" width="1140" height="65" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="55" y="322" fill="#1e293b" font-size="11" font-weight="700">Flow Steps:</text>
  <rect x="55" y="332" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="70" y="341" fill="#475569" font-size="9">1 Client sends heartbeat every 30 seconds via WebSocket</text>
  <rect x="55" y="346" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="70" y="355" fill="#475569" font-size="9">2 Gateway refreshes Redis HSET with 90-second TTL (no heartbeat = key expires = offline)</text>
  <rect x="530" y="332" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="545" y="341" fill="#475569" font-size="9">3-4 On status transition, Redis Pub/Sub notifies gateways, batched every 5s</text>
  <rect x="530" y="346" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="545" y="355" fill="#475569" font-size="9">5 Only users with the target in their sidebar receive the presence update</text>
</svg>
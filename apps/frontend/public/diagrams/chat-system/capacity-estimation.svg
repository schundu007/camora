<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgCap" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="450" fill="url(#bgCap)" rx="16"/>

  <!-- Title -->
  <rect x="380" y="16" width="440" height="40" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="43" text-anchor="middle" fill="white" font-size="20" font-weight="700">Back-of-the-Envelope Estimates</text>

  <!-- Column 1: Traffic -->
  <rect x="20" y="75" width="275" height="350" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="20" y="75" width="275" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="157" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">Traffic Estimates</text>

  <text x="45" y="138" fill="#fbbf24" font-size="13" font-weight="700">&#x1F465; 47 Million DAU</text>
  <text x="157" y="160" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="185" fill="white" font-size="12">Avg user sends</text>
  <text x="45" y="203" fill="#fbbf24" font-size="15" font-weight="700">32 messages/day</text>
  <text x="157" y="225" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="250" fill="white" font-size="12">Total messages per day:</text>
  <text x="45" y="270" fill="#fbbf24" font-size="16" font-weight="800">1.5 Billion msgs/day</text>
  <text x="157" y="292" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="317" fill="white" font-size="11">Write QPS (Average):</text>
  <text x="45" y="335" fill="rgba(255,255,255,0.7)" font-size="10">1.5B / 86,400s</text>
  <text x="45" y="357" fill="#fbbf24" font-size="16" font-weight="800">&#x2248; 17,361 msg/sec</text>
  <text x="157" y="377" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>

  <text x="45" y="397" fill="white" font-size="11">Peak QPS (3x):</text>
  <text x="45" y="415" fill="#f97316" font-size="16" font-weight="800">&#x2248; 52K msg/sec</text>

  <!-- Column 2: WebSocket Connections -->
  <rect x="310" y="75" width="265" height="190" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="75" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">WebSocket Connections</text>

  <text x="335" y="138" fill="#fbbf24" font-size="13" font-weight="700">&#x1F50C; 94M connections/day</text>
  <text x="442" y="160" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="335" y="185" fill="white" font-size="12">Peak concurrent:</text>
  <text x="335" y="208" fill="#f97316" font-size="18" font-weight="800">5M simultaneous</text>

  <text x="335" y="235" fill="white" font-size="11">At 50K conn/server:</text>
  <text x="335" y="255" fill="#fbbf24" font-size="14" font-weight="700">100 WebSocket servers</text>

  <!-- Column 3: Storage -->
  <rect x="310" y="280" width="265" height="145" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="280" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="304" text-anchor="middle" fill="white" font-size="14" font-weight="700">Storage Estimates</text>

  <text x="335" y="340" fill="white" font-size="11">Avg message size: <tspan fill="#fbbf24" font-weight="700">1 KB</tspan></text>
  <text x="442" y="358" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>

  <text x="335" y="378" fill="white" font-size="11">Storage/day: 1.5B x 1KB</text>
  <text x="335" y="398" fill="#fbbf24" font-size="15" font-weight="800">= 1.5 TB/day</text>

  <text x="335" y="418" fill="white" font-size="10">Storage/year: <tspan fill="#f97316" font-weight="700">547 TB/year</tspan></text>

  <!-- Column 4: Search Load -->
  <rect x="590" y="75" width="280" height="190" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="75" width="280" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="730" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">Search &amp; Indexing</text>

  <text x="615" y="140" fill="white" font-size="12">Messages indexed for search:</text>
  <text x="615" y="163" fill="#fbbf24" font-size="16" font-weight="800">1.5B docs/day</text>
  <text x="730" y="185" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>

  <text x="615" y="208" fill="white" font-size="11">Elasticsearch cluster size:</text>
  <text x="615" y="230" fill="#fbbf24" font-size="14" font-weight="700">3 TB index (90 days)</text>
  <text x="615" y="255" fill="#f97316" font-size="14" font-weight="700">~2,000 search QPS peak</text>

  <!-- Column 5: Notifications -->
  <rect x="590" y="280" width="280" height="145" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="280" width="280" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="730" y="304" text-anchor="middle" fill="white" font-size="14" font-weight="700">Notification Load</text>

  <text x="615" y="340" fill="white" font-size="11">Push notifications/day:</text>
  <text x="615" y="362" fill="#fbbf24" font-size="15" font-weight="800">~500M pushes/day</text>

  <text x="615" y="390" fill="white" font-size="11">Peak push rate:</text>
  <text x="615" y="410" fill="#f97316" font-size="15" font-weight="800">&#x2248; 17K pushes/sec</text>

  <!-- Key Insights -->
  <rect x="890" y="75" width="290" height="350" rx="12" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="1035" y="103" text-anchor="middle" fill="white" font-size="14" font-weight="700">&#x1F4A1; Key Insights</text>
  <line x1="910" y1="113" x2="1160" y2="113" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <text x="910" y="140" fill="white" font-size="11" font-weight="600">Moderate write throughput</text>
  <text x="910" y="158" fill="rgba(255,255,255,0.7)" font-size="10">17K msg/sec is well within reach</text>
  <text x="910" y="173" fill="rgba(255,255,255,0.7)" font-size="10">of a sharded message store.</text>

  <text x="910" y="203" fill="white" font-size="11" font-weight="600">WebSocket is the bottleneck</text>
  <text x="910" y="221" fill="rgba(255,255,255,0.7)" font-size="10">5M concurrent connections need</text>
  <text x="910" y="236" fill="rgba(255,255,255,0.7)" font-size="10">100+ servers with sticky sessions.</text>

  <text x="910" y="266" fill="white" font-size="11" font-weight="600">Search indexing at scale</text>
  <text x="910" y="284" fill="rgba(255,255,255,0.7)" font-size="10">1.5B messages/day into</text>
  <text x="910" y="299" fill="rgba(255,255,255,0.7)" font-size="10">Elasticsearch requires async</text>
  <text x="910" y="314" fill="rgba(255,255,255,0.7)" font-size="10">indexing pipeline (Kafka).</text>

  <text x="910" y="344" fill="white" font-size="11" font-weight="600">Channel fan-out complexity</text>
  <text x="910" y="362" fill="rgba(255,255,255,0.7)" font-size="10">One message in a 1000-member</text>
  <text x="910" y="377" fill="rgba(255,255,255,0.7)" font-size="10">channel = 1000 WebSocket pushes.</text>
  <text x="910" y="392" fill="rgba(255,255,255,0.7)" font-size="10">Pub/Sub pattern is essential.</text>
</svg>
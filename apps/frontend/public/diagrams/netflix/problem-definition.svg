<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <rect x="380" y="20" width="440" height="44" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="22" font-weight="700">Problem Definition: Designing Netflix</text>

  <!-- Column 1: Users & Core Actions -->
  <text x="200" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Users &amp; Core Actions</text>
  <rect x="40" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <!-- User icons -->
  <circle cx="120" cy="160" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="120" y="166" text-anchor="middle" fill="white" font-size="24">&#x1F3AC;</text>
  <text x="120" y="205" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Content Team</text>

  <text x="200" y="166" text-anchor="middle" fill="white" font-size="28">&#x27A1;</text>

  <circle cx="280" cy="160" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="280" y="166" text-anchor="middle" fill="white" font-size="24">&#x1F4FA;</text>
  <text x="280" y="205" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Subscriber</text>

  <!-- Core Actions Box -->
  <rect x="60" y="225" width="280" height="220" rx="12" fill="#f97316" filter="url(#shadow)"/>
  <text x="200" y="255" text-anchor="middle" fill="white" font-size="15" font-weight="700">Core Actions</text>
  <line x1="80" y1="267" x2="320" y2="267" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="90" y="295" fill="white" font-size="13">&#x25B6;  Click play, start streaming</text>
  <text x="90" y="325" fill="white" font-size="13">&#x1F50D;  Browse &amp; search catalog</text>
  <text x="90" y="355" fill="white" font-size="13">&#x1F4CB;  Manage watchlist</text>
  <text x="90" y="385" fill="white" font-size="13">&#x1F4F6;  Adaptive quality playback</text>
  <text x="90" y="415" fill="white" font-size="13">&#x23EF;  Resume where you left off</text>

  <!-- Column 2: In Scope -->
  <text x="600" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">In Scope: Essentials</text>
  <rect x="440" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="440" y="125" width="320" height="340" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <text x="470" y="160" fill="white" font-size="13" font-weight="600">&#x25B6;  Video streaming / playback</text>
  <text x="490" y="180" fill="rgba(255,255,255,0.7)" font-size="11">(Adaptive bitrate, multi-codec)</text>
  <text x="470" y="210" fill="white" font-size="13" font-weight="600">&#x1F3AC;  Content ingestion pipeline</text>
  <text x="490" y="230" fill="rgba(255,255,255,0.7)" font-size="11">(Transcode to 100+ profiles)</text>
  <text x="470" y="260" fill="white" font-size="13" font-weight="600">&#x1F310;  CDN / Open Connect delivery</text>
  <text x="490" y="280" fill="rgba(255,255,255,0.7)" font-size="11">(Edge servers in ISP networks)</text>
  <text x="470" y="310" fill="white" font-size="13" font-weight="600">&#x1F510;  DRM &amp; license management</text>
  <text x="490" y="330" fill="rgba(255,255,255,0.7)" font-size="11">(Widevine, FairPlay, PlayReady)</text>
  <text x="470" y="360" fill="white" font-size="13" font-weight="600">&#x1F50D;  Search &amp; catalog browsing</text>
  <text x="470" y="390" fill="white" font-size="13" font-weight="600">&#x23F1;  Playback state / resume</text>
  <text x="490" y="410" fill="rgba(255,255,255,0.7)" font-size="11">(Cross-device position sync)</text>
  <text x="470" y="440" fill="white" font-size="13" font-weight="600">&#x1F464;  User profiles &amp; preferences</text>

  <!-- Column 3: Out of Scope -->
  <text x="1000" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Out of Scope / Future</text>
  <rect x="840" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="840" y="125" width="320" height="310" rx="12" fill="rgba(245,158,11,0.25)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>

  <text x="870" y="160" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Recommendation ML engine</text>
  <text x="870" y="195" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  A/B testing framework</text>
  <text x="870" y="230" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Billing / subscription mgmt</text>
  <text x="870" y="265" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Live streaming / events</text>
  <text x="870" y="300" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Download for offline</text>
  <text x="870" y="335" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Parental controls</text>
  <text x="870" y="370" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Social features / sharing</text>
  <text x="870" y="405" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Content licensing deals</text>

  <!-- Bottom: Focus statement -->
  <text x="600" y="480" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="12">Focus on streaming infrastructure + CDN delivery first &#x2192; extend to recommendations, live, offline later</text>
</svg>
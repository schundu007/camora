<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgCap" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="450" fill="url(#bgCap)" rx="16"/>

  <!-- Title -->
  <rect x="380" y="16" width="440" height="40" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="43" text-anchor="middle" fill="white" font-size="20" font-weight="700">Back-of-the-Envelope Estimates</text>

  <!-- Column 1: Streaming Traffic -->
  <rect x="20" y="75" width="270" height="350" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="20" y="75" width="270" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="155" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">Streaming Traffic</text>

  <text x="45" y="138" fill="#fbbf24" font-size="13" font-weight="700">&#x1F4FA; 325 Million subscribers</text>
  <text x="155" y="158" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="182" fill="white" font-size="12">Peak concurrent viewers:</text>
  <text x="45" y="202" fill="#fbbf24" font-size="16" font-weight="800">20 Million concurrent</text>
  <text x="155" y="222" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="248" fill="white" font-size="11">Average bitrate per stream:</text>
  <text x="45" y="268" fill="#fbbf24" font-size="15" font-weight="700">5 Mbps (1080p avg)</text>
  <text x="155" y="290" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="315" fill="white" font-size="11">Peak bandwidth required:</text>
  <text x="45" y="333" fill="rgba(255,255,255,0.7)" font-size="10">20M x 5 Mbps</text>
  <text x="45" y="358" fill="#f97316" font-size="18" font-weight="800">&#x2248; 73 Tbps peak</text>

  <rect x="35" y="375" width="240" height="22" rx="6" fill="rgba(239,68,68,0.3)" stroke="rgba(239,68,68,0.5)" stroke-width="1"/>
  <text x="155" y="391" text-anchor="middle" fill="white" font-size="10" font-weight="600">&#x26A0;  ~15% of global internet traffic!</text>

  <!-- Column 2: Encoding & Storage -->
  <rect x="305" y="75" width="270" height="350" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="305" y="75" width="270" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="440" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">Encoding &amp; Storage</text>

  <text x="330" y="138" fill="#fbbf24" font-size="13" font-weight="700">&#x1F3AC; 18,000+ titles in catalog</text>
  <text x="440" y="158" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="330" y="182" fill="white" font-size="12">Encoding profiles per title:</text>
  <text x="330" y="202" fill="#fbbf24" font-size="15" font-weight="700">~100 versions each</text>
  <text x="330" y="220" fill="rgba(255,255,255,0.7)" font-size="10">(resolutions x codecs x audio tracks)</text>
  <text x="440" y="242" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="330" y="268" fill="white" font-size="11">Average encoded title: ~200 GB</text>
  <text x="330" y="288" fill="rgba(255,255,255,0.7)" font-size="10">18K x 200 GB</text>
  <text x="330" y="312" fill="#fbbf24" font-size="18" font-weight="800">&#x2248; 3.6 PB origin</text>
  <text x="440" y="335" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="330" y="358" fill="white" font-size="11">Encode time per title:</text>
  <text x="330" y="378" fill="rgba(255,255,255,0.7)" font-size="10">~48 hours on 100 GPU cluster</text>
  <text x="330" y="398" fill="#f97316" font-size="14" font-weight="700">Encode pipeline runs 24/7</text>

  <!-- Column 3: CDN / Open Connect -->
  <rect x="590" y="75" width="270" height="350" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="75" width="270" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="725" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">CDN / Open Connect</text>

  <text x="615" y="140" fill="#fbbf24" font-size="13" font-weight="700">&#x1F5A5; 17,000+ OCA servers</text>
  <text x="725" y="158" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="615" y="182" fill="white" font-size="12">Deployed in ISP networks</text>
  <text x="615" y="202" fill="rgba(255,255,255,0.7)" font-size="10">1,000+ ISP partners worldwide</text>
  <text x="725" y="222" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="615" y="248" fill="white" font-size="11">Total CDN capacity:</text>
  <text x="615" y="272" fill="#fbbf24" font-size="18" font-weight="800">150+ Tbps</text>
  <text x="725" y="295" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="615" y="320" fill="white" font-size="11">Offload from origin:</text>
  <text x="615" y="342" fill="#16a34a" font-size="18" font-weight="800">95%+ from edge</text>

  <text x="615" y="375" fill="rgba(255,255,255,0.7)" font-size="10">Popular content pre-filled at</text>
  <text x="615" y="393" fill="rgba(255,255,255,0.7)" font-size="10">edge during off-peak hours</text>

  <!-- Column 4: Key Insights -->
  <rect x="880" y="75" width="300" height="350" rx="12" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="1030" y="103" text-anchor="middle" fill="white" font-size="14" font-weight="700">&#x1F4A1; Key Insights</text>
  <line x1="900" y1="113" x2="1160" y2="113" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <text x="900" y="140" fill="white" font-size="11" font-weight="600">Bandwidth is the #1 challenge</text>
  <text x="900" y="158" fill="rgba(255,255,255,0.7)" font-size="10">73 Tbps peak = 15% of all</text>
  <text x="900" y="173" fill="rgba(255,255,255,0.7)" font-size="10">internet traffic globally.</text>

  <text x="900" y="205" fill="white" font-size="11" font-weight="600">Own CDN is essential</text>
  <text x="900" y="223" fill="rgba(255,255,255,0.7)" font-size="10">Open Connect appliances inside</text>
  <text x="900" y="238" fill="rgba(255,255,255,0.7)" font-size="10">ISP data centers eliminate</text>
  <text x="900" y="253" fill="rgba(255,255,255,0.7)" font-size="10">transit costs entirely.</text>

  <text x="900" y="285" fill="white" font-size="11" font-weight="600">Encoding is compute-intensive</text>
  <text x="900" y="303" fill="rgba(255,255,255,0.7)" font-size="10">100 versions per title means</text>
  <text x="900" y="318" fill="rgba(255,255,255,0.7)" font-size="10">massive GPU farm running 24/7.</text>
  <text x="900" y="333" fill="rgba(255,255,255,0.7)" font-size="10">Per-title optimized encoding.</text>

  <text x="900" y="365" fill="white" font-size="11" font-weight="600">Read-only after encode</text>
  <text x="900" y="383" fill="rgba(255,255,255,0.7)" font-size="10">Content is immutable once</text>
  <text x="900" y="398" fill="rgba(255,255,255,0.7)" font-size="10">encoded. Perfect for CDN caching</text>
  <text x="900" y="413" fill="rgba(255,255,255,0.7)" font-size="10">and edge pre-positioning.</text>
</svg>
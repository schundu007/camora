<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="450" fill="#ffffff" rx="16"/>

  <!-- Title -->
  <text x="600" y="32" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Netflix Playback Flow</text>
  <text x="600" y="52" text-anchor="middle" fill="#64748b" font-size="12">Click Play through DRM license, OCA steering, adaptive bitrate buffering, and progress reporting</text>

  <!-- User Device -->
  <rect x="20" y="100" width="110" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="20" y="100" width="110" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="75" y="120" text-anchor="middle" fill="white" font-size="11" font-weight="700">User Device</text>
  <text x="75" y="150" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Click Play</text>
  <text x="75" y="168" text-anchor="middle" fill="#64748b" font-size="9">Smart TV / Mobile</text>
  <text x="75" y="198" text-anchor="middle" fill="#64748b" font-size="18">&#x1F4FA;</text>

  <!-- Playback Service -->
  <rect x="185" y="85" width="130" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="185" y="85" width="130" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="250" y="105" text-anchor="middle" fill="white" font-size="11" font-weight="700">Playback Service</text>
  <text x="250" y="132" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">AWS Control Plane</text>
  <text x="250" y="150" text-anchor="middle" fill="#64748b" font-size="9">Entitlement check</text>
  <text x="250" y="166" text-anchor="middle" fill="#64748b" font-size="9">Stream limit verify</text>
  <text x="250" y="182" text-anchor="middle" fill="#64748b" font-size="9">Region availability</text>
  <text x="250" y="200" text-anchor="middle" fill="#94a3b8" font-size="8">Microservice</text>

  <!-- DRM License -->
  <rect x="370" y="85" width="120" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="370" y="85" width="120" height="30" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="430" y="105" text-anchor="middle" fill="white" font-size="11" font-weight="700">DRM License</text>
  <text x="430" y="132" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Key Server</text>
  <text x="430" y="150" text-anchor="middle" fill="#64748b" font-size="9">Widevine / FairPlay</text>
  <text x="430" y="166" text-anchor="middle" fill="#64748b" font-size="9">PlayReady</text>
  <text x="430" y="182" text-anchor="middle" fill="#64748b" font-size="9">Device capability</text>
  <text x="430" y="200" text-anchor="middle" fill="#94a3b8" font-size="8">Encrypted</text>

  <!-- Steering Service -->
  <rect x="545" y="85" width="120" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="545" y="85" width="120" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="605" y="105" text-anchor="middle" fill="white" font-size="11" font-weight="700">Steering Svc</text>
  <text x="605" y="132" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Select OCA</text>
  <text x="605" y="150" text-anchor="middle" fill="#64748b" font-size="9">ISP proximity</text>
  <text x="605" y="166" text-anchor="middle" fill="#64748b" font-size="9">Load balancing</text>
  <text x="605" y="182" text-anchor="middle" fill="#64748b" font-size="9">Health check</text>
  <text x="605" y="200" text-anchor="middle" fill="#94a3b8" font-size="8">Open Connect</text>

  <!-- Manifest URL -->
  <rect x="720" y="85" width="120" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="720" y="85" width="120" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="780" y="105" text-anchor="middle" fill="white" font-size="11" font-weight="700">Manifest URL</text>
  <text x="780" y="132" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">DASH / HLS</text>
  <text x="780" y="150" text-anchor="middle" fill="#64748b" font-size="9">All quality levels</text>
  <text x="780" y="166" text-anchor="middle" fill="#64748b" font-size="9">Segment index</text>
  <text x="780" y="182" text-anchor="middle" fill="#64748b" font-size="9">Audio tracks</text>
  <text x="780" y="200" text-anchor="middle" fill="#94a3b8" font-size="8">.mpd / .m3u8</text>

  <!-- ABR Buffer -->
  <rect x="895" y="85" width="120" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="895" y="85" width="120" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="955" y="105" text-anchor="middle" fill="white" font-size="11" font-weight="700">ABR Buffer</text>
  <text x="955" y="132" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Quality Adapt</text>
  <text x="955" y="150" text-anchor="middle" fill="#64748b" font-size="9">Start low quality</text>
  <text x="955" y="166" text-anchor="middle" fill="#64748b" font-size="9">Measure bandwidth</text>
  <text x="955" y="182" text-anchor="middle" fill="#64748b" font-size="9">Ramp up quality</text>
  <text x="955" y="200" text-anchor="middle" fill="#94a3b8" font-size="8">&lt;3s start</text>

  <!-- Progress Report -->
  <rect x="1070" y="100" width="110" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="1070" y="100" width="110" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="1125" y="120" text-anchor="middle" fill="white" font-size="11" font-weight="700">Progress</text>
  <text x="1125" y="150" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Report</text>
  <text x="1125" y="168" text-anchor="middle" fill="#64748b" font-size="9">Save position</text>
  <text x="1125" y="184" text-anchor="middle" fill="#64748b" font-size="9">Every 30s</text>

  <!-- Flow Arrows -->
  <line x1="130" y1="150" x2="182" y2="150" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="133" y="135" width="46" height="14" rx="3" fill="#2563eb"/>
  <text x="156" y="145" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2460;</text>

  <line x1="315" y1="150" x2="367" y2="150" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <rect x="318" y="135" width="46" height="14" rx="3" fill="#7c3aed"/>
  <text x="341" y="145" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2461;</text>

  <line x1="490" y1="150" x2="542" y2="150" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="493" y="135" width="46" height="14" rx="3" fill="#16a34a"/>
  <text x="516" y="145" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2462;</text>

  <line x1="665" y1="150" x2="717" y2="150" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="668" y="135" width="46" height="14" rx="3" fill="#2563eb"/>
  <text x="691" y="145" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2463;</text>

  <line x1="840" y1="150" x2="892" y2="150" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="843" y="135" width="46" height="14" rx="3" fill="#f97316"/>
  <text x="866" y="145" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2464;</text>

  <line x1="1015" y1="150" x2="1067" y2="150" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="1018" y="135" width="46" height="14" rx="3" fill="#16a34a"/>
  <text x="1041" y="145" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2465;</text>

  <!-- Quality adaptation loop arrow -->
  <path d="M 955 215 Q 955 250 920 250 Q 885 250 885 215" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="955" y="265" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="600">&#x2466; Quality adapt loop</text>

  <!-- Return arrow from Progress to Playback Service -->
  <path d="M 1125 210 L 1125 290 L 250 290 L 250 218" stroke="#16a34a" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <rect x="600" y="280" width="120" height="14" rx="3" fill="#16a34a"/>
  <text x="660" y="290" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2467; Position saved</text>

  <!-- Legend -->
  <rect x="20" y="340" width="1160" height="95" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="362" fill="#1e293b" font-size="12" font-weight="700">Flow Steps:</text>
  <rect x="50" y="372" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="66" y="381" fill="#475569" font-size="9">&#x2460; User clicks Play, request sent to Playback Service on AWS</text>
  <rect x="50" y="388" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="66" y="397" fill="#475569" font-size="9">&#x2461; Negotiate DRM license (Widevine/FairPlay/PlayReady)</text>
  <rect x="50" y="404" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="66" y="413" fill="#475569" font-size="9">&#x2462; Steering service selects optimal OCA based on ISP + load</text>
  <text x="400" y="381" fill="#475569" font-size="9">&#x2463; Return DASH/HLS manifest URL with all quality levels</text>
  <text x="400" y="397" fill="#475569" font-size="9">&#x2464; Client buffers segments, starts at low quality for &lt;3s startup</text>
  <text x="400" y="413" fill="#475569" font-size="9">&#x2465; Progress reported back to service every 30 seconds</text>
  <text x="780" y="381" fill="#475569" font-size="9">&#x2466; ABR algorithm continuously adapts quality based on bandwidth</text>
  <text x="780" y="397" fill="#475569" font-size="9">&#x2467; Watch position saved for cross-device resume</text>
  <rect x="780" y="406" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="796" y="415" fill="#475569" font-size="9">Dashed lines = async / return paths</text>
</svg>
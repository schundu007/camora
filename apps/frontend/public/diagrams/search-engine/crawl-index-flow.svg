<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="450" fill="#fafbfc" rx="16"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Web Crawl and Index Pipeline</text>
  <text x="600" y="56" text-anchor="middle" fill="#64748b" font-size="12">From seed URLs through crawling, parsing, dedup to inverted index construction and PageRank</text>

  <!-- Seed URLs -->
  <rect x="20" y="115" width="120" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="20" y="115" width="120" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="80" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">Seed URLs</text>
  <text x="80" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">URL sources</text>
  <text x="80" y="180" text-anchor="middle" fill="#64748b" font-size="9">Sitemaps, backlinks</text>
  <text x="80" y="195" text-anchor="middle" fill="#64748b" font-size="9">API submissions</text>
  <text x="80" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">100B+ known URLs</text>

  <!-- URL Frontier -->
  <rect x="175" y="115" width="130" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="175" y="115" width="130" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="240" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">URL Frontier</text>
  <text x="240" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Priority queue</text>
  <text x="240" y="180" text-anchor="middle" fill="#64748b" font-size="9">PageRank x freshness</text>
  <text x="240" y="195" text-anchor="middle" fill="#64748b" font-size="9">Politeness: 1 req/s/domain</text>
  <text x="240" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">robots.txt respect</text>

  <!-- Crawler -->
  <rect x="340" y="115" width="120" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="340" y="115" width="120" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="400" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">Crawler</text>
  <text x="400" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Fetch pages</text>
  <text x="400" y="180" text-anchor="middle" fill="#64748b" font-size="9">50K+ workers</text>
  <text x="400" y="195" text-anchor="middle" fill="#64748b" font-size="9">HTTP GET, 30s timeout</text>
  <text x="400" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">20B crawls/day</text>

  <!-- HTML Parser -->
  <rect x="495" y="115" width="120" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="495" y="115" width="120" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="555" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">HTML Parser</text>
  <text x="555" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Extract content</text>
  <text x="555" y="180" text-anchor="middle" fill="#64748b" font-size="9">Title, text, links</text>
  <text x="555" y="195" text-anchor="middle" fill="#64748b" font-size="9">Strip boilerplate</text>
  <text x="555" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">SimHash dedup</text>

  <!-- Inverted Index Builder -->
  <rect x="650" y="115" width="140" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="650" y="115" width="140" height="30" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="720" y="135" text-anchor="middle" fill="white" font-size="10" font-weight="700">Index Builder</text>
  <text x="720" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Inverted index</text>
  <text x="720" y="180" text-anchor="middle" fill="#64748b" font-size="9">Term posting lists</text>
  <text x="720" y="195" text-anchor="middle" fill="#64748b" font-size="9">TF-IDF scores</text>
  <text x="720" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">100+ PB total</text>

  <!-- PageRank -->
  <rect x="825" y="115" width="140" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="825" y="115" width="140" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="895" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">PageRank</text>
  <text x="895" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Graph computation</text>
  <text x="895" y="180" text-anchor="middle" fill="#64748b" font-size="9">MapReduce iterations</text>
  <text x="895" y="195" text-anchor="middle" fill="#64748b" font-size="9">100B+ page graph</text>
  <text x="895" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">Authority scores</text>

  <!-- Index Shards -->
  <rect x="1000" y="115" width="160" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="1000" y="115" width="160" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="1080" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">Index Shards</text>
  <text x="1080" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Serving ready</text>
  <text x="1080" y="180" text-anchor="middle" fill="#64748b" font-size="9">10K+ serving nodes</text>
  <text x="1080" y="195" text-anchor="middle" fill="#64748b" font-size="9">3 replicas per shard</text>
  <text x="1080" y="210" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="600">Ready for queries</text>

  <!-- Arrows -->
  <line x1="140" y1="162" x2="171" y2="162" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="142" y="145" width="22" height="14" rx="3" fill="#f97316"/>
  <text x="153" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">1</text>

  <line x1="305" y1="162" x2="336" y2="162" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="307" y="145" width="22" height="14" rx="3" fill="#f97316"/>
  <text x="318" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">2</text>

  <line x1="460" y1="162" x2="491" y2="162" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="462" y="145" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="473" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>

  <line x1="615" y1="162" x2="646" y2="162" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <rect x="617" y="145" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="628" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">4</text>

  <line x1="790" y1="162" x2="821" y2="162" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="792" y="145" width="22" height="14" rx="3" fill="#7c3aed"/>
  <text x="803" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">5</text>

  <line x1="965" y1="162" x2="996" y2="162" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="967" y="145" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="978" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">6</text>

  <!-- Feedback loop from Parser back to Frontier -->
  <path d="M555 220 L555 270 L240 270 L240 224" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="400" y="264" text-anchor="middle" fill="#94a3b8" font-size="9">Extracted links fed back to URL Frontier</text>

  <!-- Legend -->
  <rect x="30" y="360" width="1140" height="65" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="55" y="382" fill="#1e293b" font-size="11" font-weight="700">Flow Steps:</text>
  <rect x="55" y="392" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="70" y="401" fill="#475569" font-size="9">1-2 URLs discovered and prioritized in URL Frontier with politeness constraints</text>
  <rect x="55" y="406" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="70" y="415" fill="#475569" font-size="9">3-4 Crawl workers fetch pages, parser extracts content and deduplicates</text>
  <rect x="530" y="392" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="545" y="401" fill="#475569" font-size="9">5 Inverted index built with TF-IDF scores, PageRank computed over web graph</text>
  <rect x="530" y="406" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="545" y="415" fill="#475569" font-size="9">6 Index shards replicated and deployed to 10K+ serving nodes</text>
</svg>
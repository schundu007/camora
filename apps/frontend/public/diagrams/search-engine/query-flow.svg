<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="450" fill="#fafbfc" rx="16"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Search Engine Query Processing Flow</text>
  <text x="600" y="56" text-anchor="middle" fill="#64748b" font-size="12">User query through parsing, spell check, fan-out to index shards, BM25 scoring, merge and rerank</text>

  <!-- User Query -->
  <rect x="20" y="115" width="120" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="20" y="115" width="120" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="80" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">User Query</text>
  <text x="80" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Search bar</text>
  <text x="80" y="180" text-anchor="middle" fill="#64748b" font-size="9">GeoDNS routing</text>
  <text x="80" y="195" text-anchor="middle" fill="#64748b" font-size="9">Nearest datacenter</text>
  <text x="80" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">8.5B queries/day</text>

  <!-- Query Parser -->
  <rect x="175" y="115" width="120" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="175" y="115" width="120" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="235" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">Query Parser</text>
  <text x="235" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Tokenize + parse</text>
  <text x="235" y="180" text-anchor="middle" fill="#64748b" font-size="9">Detect phrases</text>
  <text x="235" y="195" text-anchor="middle" fill="#64748b" font-size="9">Identify entities</text>
  <text x="235" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">Add synonyms</text>

  <!-- Spell Check -->
  <rect x="330" y="115" width="120" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="330" y="115" width="120" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="390" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">Spell Check</text>
  <text x="390" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Fix typos</text>
  <text x="390" y="180" text-anchor="middle" fill="#64748b" font-size="9">Edit distance</text>
  <text x="390" y="195" text-anchor="middle" fill="#64748b" font-size="9">Query log mining</text>
  <text x="390" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">"samgsung" -&gt; "samsung"</text>

  <!-- Fan-out to Shards -->
  <rect x="485" y="115" width="140" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="485" y="115" width="140" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="555" y="135" text-anchor="middle" fill="white" font-size="10" font-weight="700">Fan-out to Shards</text>
  <text x="555" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Parallel scatter</text>
  <text x="555" y="180" text-anchor="middle" fill="#64748b" font-size="9">10K+ index shards</text>
  <text x="555" y="195" text-anchor="middle" fill="#64748b" font-size="9">Each returns top-K</text>
  <text x="555" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">~50ms per shard</text>

  <!-- Per-shard BM25 -->
  <rect x="660" y="115" width="130" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="660" y="115" width="130" height="30" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="725" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">BM25 Scoring</text>
  <text x="725" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Per-shard ranking</text>
  <text x="725" y="180" text-anchor="middle" fill="#64748b" font-size="9">Term frequency</text>
  <text x="725" y="195" text-anchor="middle" fill="#64748b" font-size="9">Doc frequency</text>
  <text x="725" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">Position scoring</text>

  <!-- Merge + Rerank -->
  <rect x="825" y="115" width="130" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="825" y="115" width="130" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="890" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">Merge + Rerank</text>
  <text x="890" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">ML neural ranker</text>
  <text x="890" y="180" text-anchor="middle" fill="#64748b" font-size="9">BERT model</text>
  <text x="890" y="195" text-anchor="middle" fill="#64748b" font-size="9">200+ features</text>
  <text x="890" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">1K candidates scored</text>

  <!-- Top-10 Results -->
  <rect x="990" y="115" width="160" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="990" y="115" width="160" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="1070" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">Top-10 Results</text>
  <text x="1070" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Search results page</text>
  <text x="1070" y="180" text-anchor="middle" fill="#64748b" font-size="9">Snippets generated</text>
  <text x="1070" y="195" text-anchor="middle" fill="#64748b" font-size="9">Ads blended in</text>
  <text x="1070" y="210" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="600">&lt;200ms total latency</text>

  <!-- Cache (below) -->
  <rect x="330" y="270" width="140" height="45" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="330" y="270" width="140" height="18" rx="8 8 0 0" fill="#ef4444"/>
  <text x="400" y="283" text-anchor="middle" fill="white" font-size="9" font-weight="700">Redis Query Cache</text>
  <text x="400" y="302" text-anchor="middle" fill="#64748b" font-size="9">60% hit rate, serve cached</text>

  <!-- Arrows -->
  <line x1="140" y1="162" x2="171" y2="162" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="142" y="145" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="153" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">1</text>

  <line x1="295" y1="162" x2="326" y2="162" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="297" y="145" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="308" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">2</text>

  <line x1="450" y1="162" x2="481" y2="162" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="452" y="145" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="463" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>

  <line x1="625" y1="162" x2="656" y2="162" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="627" y="145" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="638" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">4</text>

  <line x1="790" y1="162" x2="821" y2="162" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="792" y="145" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="803" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">5</text>

  <line x1="955" y1="162" x2="986" y2="162" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="957" y="145" width="22" height="14" rx="3" fill="#16a34a"/>
  <text x="968" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">6</text>

  <!-- Cache arrow -->
  <line x1="390" y1="220" x2="400" y2="266" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="420" y="248" fill="#ef4444" font-size="9">Cache check</text>

  <!-- Legend -->
  <rect x="30" y="360" width="1140" height="65" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="55" y="382" fill="#1e293b" font-size="11" font-weight="700">Flow Steps:</text>
  <rect x="55" y="392" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="70" y="401" fill="#475569" font-size="9">1 User submits query, routed to nearest datacenter via GeoDNS</text>
  <rect x="55" y="406" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="70" y="415" fill="#475569" font-size="9">2-3 Parse, tokenize, spell check, add synonyms</text>
  <text x="420" y="401" fill="#475569" font-size="9">4 Fan-out to 10K+ shards, each returns top-K via BM25 scoring</text>
  <text x="420" y="415" fill="#475569" font-size="9">5 Merge results, BERT neural reranker scores 1K candidates</text>
  <rect x="850" y="392" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="865" y="401" fill="#475569" font-size="9">6 Top-10 with snippets, ads, cached &lt;200ms</text>
</svg>
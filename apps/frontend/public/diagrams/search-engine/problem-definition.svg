<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="500" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <rect x="340" y="20" width="520" height="44" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="22" font-weight="700">Problem Definition: Designing a Search Engine</text>

  <!-- Column 1: Users & Core Actions -->
  <text x="200" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Users &amp; Core Actions</text>
  <rect x="40" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <circle cx="120" cy="165" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="120" y="171" text-anchor="middle" fill="white" font-size="24">&#x1F50D;</text>
  <text x="120" y="210" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Searcher</text>

  <text x="200" y="171" text-anchor="middle" fill="white" font-size="28">&#x21C4;</text>

  <circle cx="280" cy="165" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="280" y="171" text-anchor="middle" fill="white" font-size="24">&#x1F310;</text>
  <text x="280" y="210" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Web</text>

  <!-- Core Actions Box -->
  <rect x="60" y="230" width="280" height="240" rx="12" fill="#f97316" filter="url(#shadow)"/>
  <text x="200" y="260" text-anchor="middle" fill="white" font-size="15" font-weight="700">Core Actions</text>
  <line x1="80" y1="272" x2="320" y2="272" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="85" y="300" fill="white" font-size="13">&#x1F50D;  Submit Search Query</text>
  <text x="85" y="330" fill="white" font-size="13">&#x1F4CB;  View Ranked Results</text>
  <text x="85" y="360" fill="white" font-size="13">&#x2328;&#xFE0F;  Get Autocomplete</text>
  <text x="85" y="390" fill="white" font-size="13">&#x1F4DD;  Spell Check Suggestion</text>
  <text x="85" y="420" fill="white" font-size="13">&#x1F578;&#xFE0F;  Crawl &amp; Index Pages</text>
  <text x="85" y="450" fill="white" font-size="13">&#x1F4CA;  Rank with PageRank</text>

  <!-- Column 2: In Scope -->
  <text x="600" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">In Scope: Essentials</text>
  <rect x="440" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="440" y="120" width="320" height="350" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <text x="470" y="155" fill="white" font-size="13" font-weight="600">&#x1F578;&#xFE0F;  Web Crawler</text>
  <text x="490" y="175" fill="rgba(255,255,255,0.7)" font-size="11">(Distributed crawling, politeness)</text>
  <text x="470" y="205" fill="white" font-size="13" font-weight="600">&#x1F4DA;  Inverted Index</text>
  <text x="490" y="225" fill="rgba(255,255,255,0.7)" font-size="11">(Term-to-document mapping, sharded)</text>
  <text x="470" y="255" fill="white" font-size="13" font-weight="600">&#x1F4CA;  Ranking (PageRank)</text>
  <text x="490" y="275" fill="rgba(255,255,255,0.7)" font-size="11">(Link analysis + relevance scoring)</text>
  <text x="470" y="305" fill="white" font-size="13" font-weight="600">&#x26A1;  Query Processing</text>
  <text x="490" y="325" fill="rgba(255,255,255,0.7)" font-size="11">(Parsing, tokenization, expansion)</text>
  <text x="470" y="355" fill="white" font-size="13" font-weight="600">&#x2328;&#xFE0F;  Autocomplete</text>
  <text x="490" y="375" fill="rgba(255,255,255,0.7)" font-size="11">(Trie-based, prefix matching)</text>
  <text x="470" y="405" fill="white" font-size="13" font-weight="600">&#x1F524;  Spell Correction</text>
  <text x="490" y="425" fill="rgba(255,255,255,0.7)" font-size="11">(Edit distance, n-gram models)</text>

  <!-- Column 3: Out of Scope -->
  <text x="1000" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Out of Scope / Future</text>
  <rect x="840" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="840" y="120" width="320" height="280" rx="12" fill="rgba(245,158,11,0.25)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>

  <text x="870" y="155" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Ads Auction System</text>
  <text x="870" y="190" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Knowledge Graph / Panels</text>
  <text x="870" y="225" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Voice Search</text>
  <text x="870" y="260" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Image / Video Search</text>
  <text x="870" y="295" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Personalized Results</text>
  <text x="870" y="330" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Shopping / Maps Integration</text>
  <text x="870" y="365" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  AI-generated Summaries</text>

  <!-- Bottom -->
  <text x="600" y="492" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="12">Focus on core text search infrastructure first &#x2192; extend to vertical search later</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 350" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
  </defs>

  <rect width="1200" height="350" fill="white" rx="12"/>

  <text x="600" y="30" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Simulcast Layer Selection</text>
  <text x="600" y="48" text-anchor="middle" fill="#64748b" font-size="12">How the SFU selects quality layers for each recipient based on role and bandwidth</text>

  <!-- 1. Sender Encodes 3 Layers -->
  <rect x="20" y="70" width="180" height="155" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="20" y="70" width="180" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="110" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="700">Sender Encodes 3 Layers</text>
  <rect x="35" y="112" width="150" height="22" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="110" y="127" text-anchor="middle" fill="#166534" font-size="10" font-weight="600">High: 1080p @ 2.5 Mbps</text>
  <rect x="35" y="140" width="150" height="22" rx="4" fill="#fef9c3" stroke="#fde047" stroke-width="1"/>
  <text x="110" y="155" text-anchor="middle" fill="#854d0e" font-size="10" font-weight="600">Med: 480p @ 500 Kbps</text>
  <rect x="35" y="168" width="150" height="22" rx="4" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1"/>
  <text x="110" y="183" text-anchor="middle" fill="#9d174d" font-size="10" font-weight="600">Low: 180p @ 100 Kbps</text>
  <text x="110" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">H.264 / VP8 encoder</text>

  <!-- Arrow 1-2 -->
  <line x1="200" y1="147" x2="248" y2="147" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <rect x="207" y="130" width="36" height="16" rx="4" fill="#2563eb"/>
  <text x="225" y="141" text-anchor="middle" fill="white" font-size="8" font-weight="600">1</text>

  <!-- 2. Upload All to SFU -->
  <rect x="258" y="70" width="160" height="155" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="258" y="70" width="160" height="30" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="338" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="700">Upload All to SFU</text>
  <text x="338" y="120" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">3 streams in parallel</text>
  <text x="338" y="140" text-anchor="middle" fill="#64748b" font-size="9">Total upload: ~3 Mbps</text>
  <text x="338" y="157" text-anchor="middle" fill="#64748b" font-size="9">SFU receives all layers</text>
  <text x="338" y="174" text-anchor="middle" fill="#64748b" font-size="9">but forwards selectively</text>
  <text x="338" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">SRTP over UDP</text>

  <!-- Arrow 2-3 -->
  <line x1="418" y1="147" x2="466" y2="147" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="425" y="130" width="36" height="16" rx="4" fill="#7c3aed"/>
  <text x="443" y="141" text-anchor="middle" fill="white" font-size="8" font-weight="600">2</text>

  <!-- 3. Monitor Bandwidth -->
  <rect x="476" y="70" width="155" height="155" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="476" y="70" width="155" height="30" rx="10 10 0 0" fill="#f59e0b"/>
  <text x="553" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="700">Bandwidth Monitor</text>
  <text x="553" y="120" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Per-recipient BW</text>
  <text x="553" y="140" text-anchor="middle" fill="#64748b" font-size="9">RTCP receiver reports</text>
  <text x="553" y="157" text-anchor="middle" fill="#64748b" font-size="9">Packet loss %</text>
  <text x="553" y="174" text-anchor="middle" fill="#64748b" font-size="9">RTT measurement</text>
  <text x="553" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">GCC algorithm</text>

  <!-- Arrow 3-4 -->
  <line x1="631" y1="147" x2="679" y2="147" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="638" y="130" width="36" height="16" rx="4" fill="#f59e0b"/>
  <text x="656" y="141" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>

  <!-- 4. Speaker Detection -->
  <rect x="689" y="70" width="140" height="155" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="689" y="70" width="140" height="30" rx="10 10 0 0" fill="#ef4444"/>
  <text x="759" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="700">Speaker Detect</text>
  <text x="759" y="120" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Audio Energy</text>
  <text x="759" y="140" text-anchor="middle" fill="#64748b" font-size="9">Analyze audio levels</text>
  <text x="759" y="157" text-anchor="middle" fill="#64748b" font-size="9">2s debounce window</text>
  <text x="759" y="174" text-anchor="middle" fill="#64748b" font-size="9">Identify speaker</text>
  <text x="759" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">VAD (voice activity)</text>

  <!-- Arrow 4-5 -->
  <line x1="829" y1="147" x2="877" y2="147" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="836" y="130" width="36" height="16" rx="4" fill="#ef4444"/>
  <text x="854" y="141" text-anchor="middle" fill="white" font-size="8" font-weight="600">4</text>

  <!-- 5. Layer Selection -->
  <rect x="887" y="70" width="140" height="155" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="887" y="70" width="140" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="957" y="90" text-anchor="middle" fill="white" font-size="11" font-weight="700">Layer Selection</text>
  <rect x="900" y="112" width="114" height="18" rx="4" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="957" y="125" text-anchor="middle" fill="#166534" font-size="9" font-weight="600">Active = High</text>
  <rect x="900" y="136" width="114" height="18" rx="4" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1"/>
  <text x="957" y="149" text-anchor="middle" fill="#9d174d" font-size="9" font-weight="600">Thumbnails = Low</text>
  <rect x="900" y="160" width="114" height="18" rx="4" fill="#fef9c3" stroke="#fde047" stroke-width="1"/>
  <text x="957" y="173" text-anchor="middle" fill="#854d0e" font-size="9" font-weight="600">Pinned = Medium</text>
  <text x="957" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">Per-recipient logic</text>

  <!-- Arrow 5-6 -->
  <line x1="1027" y1="147" x2="1070" y2="147" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="1032" y="130" width="36" height="16" rx="4" fill="#16a34a"/>
  <text x="1050" y="141" text-anchor="middle" fill="white" font-size="8" font-weight="600">5</text>

  <!-- 6. Dynamic Switch -->
  <rect x="1080" y="70" width="105" height="155" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="1080" y="70" width="105" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="1132" y="90" text-anchor="middle" fill="white" font-size="10" font-weight="700">Switch</text>
  <text x="1132" y="120" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Dynamic</text>
  <text x="1132" y="140" text-anchor="middle" fill="#64748b" font-size="9">BW drops?</text>
  <text x="1132" y="157" text-anchor="middle" fill="#64748b" font-size="9">Instant lower</text>
  <text x="1132" y="174" text-anchor="middle" fill="#64748b" font-size="9">BW recovers?</text>
  <text x="1132" y="191" text-anchor="middle" fill="#64748b" font-size="9">Switch back up</text>
  <text x="1132" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">No renegotiation</text>

  <!-- Legend -->
  <rect x="30" y="250" width="1140" height="80" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="275" fill="#1e293b" font-size="12" font-weight="700">Flow Steps</text>

  <rect x="60" y="290" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="76" y="300" fill="#475569" font-size="10">1. Sender encodes 3 simultaneous quality layers (1080p, 480p, 180p)</text>
  <rect x="60" y="308" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="76" y="318" fill="#475569" font-size="10">2. All 3 layers uploaded to SFU (~3 Mbps total)</text>
  <rect x="450" y="290" width="10" height="10" rx="2" fill="#f59e0b"/>
  <text x="466" y="300" fill="#475569" font-size="10">3. SFU monitors each recipient's bandwidth via RTCP</text>
  <rect x="450" y="308" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="466" y="318" fill="#475569" font-size="10">4. Active speaker detected via audio energy analysis</text>
  <rect x="830" y="290" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="846" y="300" fill="#475569" font-size="10">5. Layer selected per recipient role</text>
  <rect x="830" y="308" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="846" y="318" fill="#475569" font-size="10">6. Instant switch on bandwidth change</text>
</svg>
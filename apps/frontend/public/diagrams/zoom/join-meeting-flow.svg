<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
  </defs>

  <rect width="1200" height="400" fill="white" rx="12"/>

  <text x="600" y="35" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Join Meeting Flow</text>
  <text x="600" y="55" text-anchor="middle" fill="#64748b" font-size="12">Complete flow from clicking Join to seeing video in gallery/speaker view</text>

  <!-- 1. Click Join -->
  <rect x="15" y="100" width="120" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="15" y="100" width="120" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="75" y="120" text-anchor="middle" fill="white" font-size="11" font-weight="700">Click Join</text>
  <text x="75" y="148" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">User Action</text>
  <text x="75" y="165" text-anchor="middle" fill="#64748b" font-size="9">Enter meeting ID</text>
  <text x="75" y="182" text-anchor="middle" fill="#64748b" font-size="9">+ password</text>
  <text x="75" y="205" text-anchor="middle" fill="#94a3b8" font-size="8">Client browser/app</text>

  <!-- Arrow 1-2 -->
  <line x1="135" y1="160" x2="168" y2="160" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="138" y="140" width="28" height="16" rx="4" fill="#2563eb"/>
  <text x="152" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">1</text>

  <!-- 2. API Lookup -->
  <rect x="178" y="100" width="120" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="178" y="100" width="120" height="30" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="238" y="120" text-anchor="middle" fill="white" font-size="11" font-weight="700">API Lookup</text>
  <text x="238" y="148" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Meeting Service</text>
  <text x="238" y="165" text-anchor="middle" fill="#64748b" font-size="9">Find SFU cluster</text>
  <text x="238" y="182" text-anchor="middle" fill="#64748b" font-size="9">hosting meeting</text>
  <text x="238" y="205" text-anchor="middle" fill="#94a3b8" font-size="8">Redis registry</text>

  <!-- Arrow 2-3 -->
  <line x1="298" y1="160" x2="331" y2="160" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="301" y="140" width="28" height="16" rx="4" fill="#7c3aed"/>
  <text x="315" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">2</text>

  <!-- 3. Geo-Route -->
  <rect x="341" y="100" width="120" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="341" y="100" width="120" height="30" rx="10 10 0 0" fill="#f59e0b"/>
  <text x="401" y="120" text-anchor="middle" fill="white" font-size="11" font-weight="700">Geo-Route</text>
  <text x="401" y="148" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Nearest SFU</text>
  <text x="401" y="165" text-anchor="middle" fill="#64748b" font-size="9">IP geolocation</text>
  <text x="401" y="182" text-anchor="middle" fill="#64748b" font-size="9">selects region</text>
  <text x="401" y="205" text-anchor="middle" fill="#94a3b8" font-size="8">GeoDNS / Anycast</text>

  <!-- Arrow 3-4 -->
  <line x1="461" y1="160" x2="494" y2="160" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="464" y="140" width="28" height="16" rx="4" fill="#f59e0b"/>
  <text x="478" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>

  <!-- 4. WebSocket Connect -->
  <rect x="504" y="100" width="130" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="504" y="100" width="130" height="30" rx="10 10 0 0" fill="#ef4444"/>
  <text x="569" y="120" text-anchor="middle" fill="white" font-size="11" font-weight="700">WS Connect</text>
  <text x="569" y="148" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Signaling Link</text>
  <text x="569" y="165" text-anchor="middle" fill="#64748b" font-size="9">WebSocket to SFU</text>
  <text x="569" y="182" text-anchor="middle" fill="#64748b" font-size="9">Auth + room join</text>
  <text x="569" y="205" text-anchor="middle" fill="#94a3b8" font-size="8">wss:// upgrade</text>

  <!-- Arrow 4-5 -->
  <line x1="634" y1="160" x2="667" y2="160" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="637" y="140" width="28" height="16" rx="4" fill="#ef4444"/>
  <text x="651" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">4</text>

  <!-- 5. SDP Exchange -->
  <rect x="677" y="100" width="120" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="677" y="100" width="120" height="30" rx="10 10 0 0" fill="#ec4899"/>
  <text x="737" y="120" text-anchor="middle" fill="white" font-size="11" font-weight="700">SDP Exchange</text>
  <text x="737" y="148" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Codec Negotiation</text>
  <text x="737" y="165" text-anchor="middle" fill="#64748b" font-size="9">Offer/Answer</text>
  <text x="737" y="182" text-anchor="middle" fill="#64748b" font-size="9">VP8, H.264, Opus</text>
  <text x="737" y="205" text-anchor="middle" fill="#94a3b8" font-size="8">SDP protocol</text>

  <!-- Arrow 5-6 -->
  <line x1="797" y1="160" x2="830" y2="160" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="800" y="140" width="28" height="16" rx="4" fill="#ec4899"/>
  <text x="814" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">5</text>

  <!-- 6. ICE Gathering -->
  <rect x="840" y="100" width="120" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="840" y="100" width="120" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="900" y="120" text-anchor="middle" fill="white" font-size="11" font-weight="700">ICE Gathering</text>
  <text x="900" y="148" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">NAT Traversal</text>
  <text x="900" y="165" text-anchor="middle" fill="#64748b" font-size="9">STUN discover IP</text>
  <text x="900" y="182" text-anchor="middle" fill="#64748b" font-size="9">TURN fallback</text>
  <text x="900" y="205" text-anchor="middle" fill="#94a3b8" font-size="8">~85% STUN ok</text>

  <!-- Arrow 6-7 -->
  <line x1="960" y1="160" x2="993" y2="160" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="963" y="140" width="28" height="16" rx="4" fill="#f97316"/>
  <text x="977" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">6</text>

  <!-- 7. Media Flow -->
  <rect x="1003" y="100" width="80" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="1003" y="100" width="80" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="1043" y="120" text-anchor="middle" fill="white" font-size="10" font-weight="700">Media</text>
  <text x="1043" y="148" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">UDP</text>
  <text x="1043" y="165" text-anchor="middle" fill="#64748b" font-size="9">Audio+Video</text>
  <text x="1043" y="182" text-anchor="middle" fill="#64748b" font-size="9">to SFU</text>
  <text x="1043" y="205" text-anchor="middle" fill="#94a3b8" font-size="8">SRTP</text>

  <!-- Arrow 7-8 -->
  <line x1="1083" y1="160" x2="1106" y2="160" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="1084" y="140" width="22" height="16" rx="4" fill="#16a34a"/>
  <text x="1095" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">7</text>

  <!-- 8. Layout Render -->
  <rect x="1113" y="100" width="72" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="1113" y="100" width="72" height="30" rx="10 10 0 0" fill="#0ea5e9"/>
  <text x="1149" y="120" text-anchor="middle" fill="white" font-size="10" font-weight="700">Render</text>
  <text x="1149" y="148" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Layout</text>
  <text x="1149" y="165" text-anchor="middle" fill="#64748b" font-size="9">Gallery or</text>
  <text x="1149" y="182" text-anchor="middle" fill="#64748b" font-size="9">Speaker</text>
  <text x="1149" y="205" text-anchor="middle" fill="#94a3b8" font-size="8">GPU render</text>

  <!-- Legend -->
  <rect x="30" y="270" width="1140" height="110" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="295" fill="#1e293b" font-size="12" font-weight="700">Flow Steps</text>

  <rect x="60" y="308" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="76" y="318" fill="#475569" font-size="10">1. User enters meeting ID + password and clicks Join</text>
  <rect x="60" y="326" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="76" y="336" fill="#475569" font-size="10">2. Meeting service looks up which SFU cluster hosts this meeting (Redis)</text>
  <rect x="60" y="344" width="10" height="10" rx="2" fill="#f59e0b"/>
  <text x="76" y="354" fill="#475569" font-size="10">3. Geo-route selects nearest SFU region via IP geolocation</text>
  <rect x="60" y="362" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="76" y="372" fill="#475569" font-size="10">4. Establish WebSocket signaling connection to SFU server</text>

  <rect x="620" y="308" width="10" height="10" rx="2" fill="#ec4899"/>
  <text x="636" y="318" fill="#475569" font-size="10">5. SDP offer/answer exchange negotiates codecs (VP8, H.264, Opus)</text>
  <rect x="620" y="326" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="636" y="336" fill="#475569" font-size="10">6. ICE gathering discovers paths via STUN; falls back to TURN relay</text>
  <rect x="620" y="344" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="636" y="354" fill="#475569" font-size="10">7. Audio + video streams flow over UDP (SRTP encrypted) to SFU</text>
  <rect x="620" y="362" width="10" height="10" rx="2" fill="#0ea5e9"/>
  <text x="636" y="372" fill="#475569" font-size="10">8. Client renders received streams in gallery or active speaker view</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <rect x="370" y="20" width="460" height="44" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="22" font-weight="700">Problem Definition: Designing Zoom</text>

  <!-- Column 1: Users & Core Actions -->
  <text x="200" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Users &amp; Core Actions</text>
  <rect x="40" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <!-- User icons -->
  <circle cx="100" cy="170" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="100" y="176" text-anchor="middle" fill="white" font-size="24">👤</text>
  <text x="100" y="215" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Host</text>

  <text x="200" y="176" text-anchor="middle" fill="white" font-size="28">⇄</text>

  <circle cx="300" cy="170" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="300" y="176" text-anchor="middle" fill="white" font-size="24">👥</text>
  <text x="300" y="215" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Participants</text>

  <!-- Core Actions Box -->
  <rect x="50" y="240" width="300" height="220" rx="12" fill="#f97316" filter="url(#shadow)"/>
  <text x="200" y="270" text-anchor="middle" fill="white" font-size="15" font-weight="700">Core Actions</text>
  <line x1="70" y1="282" x2="330" y2="282" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="80" y="310" fill="white" font-size="13">📹  Start/Join Video Meeting</text>
  <text x="80" y="340" fill="white" font-size="13">🎤  Real-time Audio/Video</text>
  <text x="80" y="370" fill="white" font-size="13">🖥️  Share Screen</text>
  <text x="80" y="400" fill="white" font-size="13">💬  In-Meeting Chat</text>
  <text x="80" y="430" fill="white" font-size="13">⏺️  Record Sessions</text>

  <!-- Column 2: In Scope -->
  <text x="600" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">In Scope: Essentials</text>
  <rect x="440" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="440" y="125" width="320" height="340" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <text x="470" y="160" fill="white" font-size="13" font-weight="600">📹  Real-time video/audio streaming</text>
  <text x="490" y="180" fill="rgba(255,255,255,0.7)" font-size="11">(WebRTC + SFU architecture)</text>
  <text x="470" y="210" fill="white" font-size="13" font-weight="600">🖥️  Screen sharing</text>
  <text x="490" y="230" fill="rgba(255,255,255,0.7)" font-size="11">(Selective Forwarding Unit)</text>
  <text x="470" y="260" fill="white" font-size="13" font-weight="600">⏺️  Cloud recording</text>
  <text x="490" y="280" fill="rgba(255,255,255,0.7)" font-size="11">(Stored to S3/blob storage)</text>
  <text x="470" y="310" fill="white" font-size="13" font-weight="600">💬  In-meeting chat</text>
  <text x="470" y="340" fill="white" font-size="13" font-weight="600">🎭  Virtual backgrounds</text>
  <text x="490" y="360" fill="rgba(255,255,255,0.7)" font-size="11">(ML-based segmentation)</text>
  <text x="470" y="390" fill="white" font-size="13" font-weight="600">🔐  Meeting security</text>
  <text x="490" y="410" fill="rgba(255,255,255,0.7)" font-size="11">(Waiting room, passwords, E2EE)</text>
  <text x="470" y="440" fill="white" font-size="13" font-weight="600">📊  Gallery &amp; speaker view</text>

  <!-- Column 3: Out of Scope -->
  <text x="1000" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Out of Scope / Future</text>
  <rect x="840" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="840" y="125" width="320" height="280" rx="12" fill="rgba(245,158,11,0.25)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>

  <text x="870" y="160" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Zoom Phone (VoIP/PSTN)</text>
  <text x="870" y="195" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Zoom Apps marketplace</text>
  <text x="870" y="230" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Whiteboard collaboration</text>
  <text x="870" y="265" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Webinar mode (10K+ viewers)</text>
  <text x="870" y="300" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  AI Companion / transcription</text>
  <text x="870" y="335" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Zoom Rooms (hardware)</text>
  <text x="870" y="370" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Calendar/email integration</text>

  <!-- Bottom -->
  <text x="600" y="520" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="12">Focus on real-time media infrastructure first &#x2192; extend to webinars and platform features later</text>

  <rect x="440" y="480" width="320" height="36" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="600" y="504" text-anchor="middle" fill="white" font-size="13" font-weight="600">&#x1F3D7;️  WebRTC/SFU Media Infrastructure</text>
</svg>
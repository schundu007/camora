<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#334155"/></marker>
    <marker id="aBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2563eb"/></marker>
    <marker id="aGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#16a34a"/></marker>
    <marker id="aOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#f97316"/></marker>
  </defs>

  <rect width="800" height="280" fill="#fafbfc" rx="12"/>
  <text x="400" y="26" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="700">NAT Traversal with STUN / TURN</text>

  <!-- Client behind NAT -->
  <rect x="20" y="55" width="140" height="100" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="20" y="55" width="140" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="90" y="74" text-anchor="middle" fill="white" font-size="11" font-weight="700">Client behind NAT</text>
  <text x="90" y="100" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Private IP</text>
  <text x="90" y="117" text-anchor="middle" fill="#64748b" font-size="9">192.168.1.5:54321</text>
  <text x="90" y="142" text-anchor="middle" fill="#94a3b8" font-size="8">Cannot receive direct UDP</text>

  <!-- NAT Router -->
  <rect x="195" y="55" width="100" height="100" rx="10" fill="#fff" stroke="#ef4444" stroke-width="2" filter="url(#s)"/>
  <rect x="195" y="55" width="100" height="28" rx="10 10 0 0" fill="#ef4444"/>
  <text x="245" y="74" text-anchor="middle" fill="white" font-size="11" font-weight="700">NAT Router</text>
  <text x="245" y="100" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Translates</text>
  <text x="245" y="117" text-anchor="middle" fill="#64748b" font-size="9">Private to Public</text>
  <text x="245" y="142" text-anchor="middle" fill="#94a3b8" font-size="8">Blocks inbound</text>

  <!-- Arrow Client to NAT -->
  <line x1="160" y1="105" x2="191" y2="105" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- STUN Server -->
  <rect x="350" y="45" width="130" height="70" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="350" y="45" width="130" height="28" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="415" y="64" text-anchor="middle" fill="white" font-size="11" font-weight="700">STUN Server</text>
  <text x="415" y="88" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Discover Public IP</text>
  <text x="415" y="105" text-anchor="middle" fill="#64748b" font-size="9">Reflects: 203.0.113.5:8080</text>

  <!-- Arrow NAT to STUN -->
  <line x1="295" y1="85" x2="346" y2="80" stroke="#7c3aed" stroke-width="2" marker-end="url(#a)"/>
  <rect x="302" y="67" width="36" height="16" rx="4" fill="#7c3aed"/>
  <text x="320" y="78" text-anchor="middle" fill="white" font-size="8" font-weight="600">1</text>

  <!-- Arrow STUN reply -->
  <line x1="346" y1="98" x2="295" y2="102" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a)"/>
  <text x="320" y="112" fill="#7c3aed" font-size="8">Public IP reply</text>

  <!-- Direct Connection Attempt -->
  <rect x="540" y="45" width="120" height="70" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="540" y="45" width="120" height="28" rx="10 10 0 0" fill="#16a34a"/>
  <text x="600" y="64" text-anchor="middle" fill="white" font-size="11" font-weight="700">Try Direct</text>
  <text x="600" y="88" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">UDP to SFU</text>
  <text x="600" y="105" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="600">Works ~85% of time</text>

  <!-- Arrow STUN to Direct -->
  <line x1="480" y1="80" x2="536" y2="80" stroke="#16a34a" stroke-width="2" marker-end="url(#aGreen)"/>
  <rect x="490" y="64" width="36" height="16" rx="4" fill="#16a34a"/>
  <text x="508" y="75" text-anchor="middle" fill="white" font-size="8" font-weight="600">2</text>

  <!-- SFU target -->
  <rect x="700" y="55" width="80" height="50" rx="10" fill="#2563eb" filter="url(#s)"/>
  <text x="740" y="78" text-anchor="middle" fill="white" font-size="11" font-weight="700">SFU</text>
  <text x="740" y="95" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="8">Media server</text>

  <!-- Arrow Direct to SFU -->
  <line x1="660" y1="80" x2="696" y2="80" stroke="#16a34a" stroke-width="2" marker-end="url(#aGreen)"/>

  <!-- TURN fallback path (lower section) -->
  <text x="400" y="148" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="700">If blocked (corporate firewall, symmetric NAT):</text>

  <!-- TURN Server -->
  <rect x="305" y="160" width="190" height="70" rx="10" fill="#fff" stroke="#f97316" stroke-width="2" filter="url(#s)"/>
  <rect x="305" y="160" width="190" height="28" rx="10 10 0 0" fill="#f97316"/>
  <text x="400" y="179" text-anchor="middle" fill="white" font-size="11" font-weight="700">TURN Relay Server</text>
  <text x="400" y="202" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Relay all media traffic</text>
  <text x="400" y="219" text-anchor="middle" fill="#64748b" font-size="9">Adds ~20-50ms latency, higher bandwidth cost</text>

  <!-- Client to TURN -->
  <line x1="160" y1="145" x2="160" y2="195" stroke="#f97316" stroke-width="2"/>
  <line x1="160" y1="195" x2="301" y2="195" stroke="#f97316" stroke-width="2" marker-end="url(#aOrange)"/>
  <rect x="200" y="180" width="36" height="16" rx="4" fill="#f97316"/>
  <text x="218" y="191" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>

  <!-- TURN to SFU -->
  <line x1="495" y1="195" x2="740" y2="195" stroke="#f97316" stroke-width="2"/>
  <line x1="740" y1="195" x2="740" y2="109" stroke="#f97316" stroke-width="2" marker-end="url(#aOrange)"/>
  <rect x="590" y="180" width="36" height="16" rx="4" fill="#f97316"/>
  <text x="608" y="191" text-anchor="middle" fill="white" font-size="8" font-weight="600">4</text>

  <!-- Stats -->
  <rect x="20" y="245" width="760" height="22" rx="6" fill="rgba(37,99,235,0.05)" stroke="rgba(37,99,235,0.15)" stroke-width="1"/>
  <text x="400" y="260" text-anchor="middle" fill="#475569" font-size="9">~85% succeed with STUN only  |  ~13% need TURN relay  |  ~2% fall back to TCP/443 tunneling (for firewalls blocking all UDP)</text>
</svg>
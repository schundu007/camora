<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#334155"/></marker>
  </defs>

  <rect width="800" height="300" fill="#fafbfc" rx="12"/>
  <text x="400" y="26" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="700">Cascaded SFU Architecture for Global Meetings</text>

  <!-- US Region -->
  <rect x="20" y="50" width="230" height="180" rx="12" fill="rgba(37,99,235,0.04)" stroke="rgba(37,99,235,0.2)" stroke-width="1.5"/>
  <text x="135" y="70" text-anchor="middle" fill="#2563eb" font-size="11" font-weight="700">US Region</text>

  <rect x="90" y="82" width="90" height="50" rx="8" fill="#2563eb" filter="url(#s)"/>
  <text x="135" y="104" text-anchor="middle" fill="white" font-size="10" font-weight="700">SFU US</text>
  <text x="135" y="120" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="8">us-west-1</text>

  <rect x="35" y="150" width="60" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="65" y="168" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Alice</text>
  <rect x="105" y="150" width="60" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="135" y="168" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Bob</text>
  <rect x="175" y="150" width="60" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="205" y="168" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Carol</text>

  <!-- US user arrows -->
  <line x1="65" y1="150" x2="110" y2="132" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="135" y1="150" x2="135" y2="135" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="205" y1="150" x2="160" y2="132" stroke="#2563eb" stroke-width="1.5" marker-end="url(#a)"/>

  <text x="135" y="200" text-anchor="middle" fill="#64748b" font-size="9">Users connect to</text>
  <text x="135" y="213" text-anchor="middle" fill="#2563eb" font-size="9" font-weight="600">nearest SFU (~20ms)</text>

  <!-- Europe Region -->
  <rect x="285" y="50" width="230" height="180" rx="12" fill="rgba(16,185,129,0.04)" stroke="rgba(16,185,129,0.2)" stroke-width="1.5"/>
  <text x="400" y="70" text-anchor="middle" fill="#10b981" font-size="11" font-weight="700">Europe Region</text>

  <rect x="355" y="82" width="90" height="50" rx="8" fill="#10b981" filter="url(#s)"/>
  <text x="400" y="104" text-anchor="middle" fill="white" font-size="10" font-weight="700">SFU EU</text>
  <text x="400" y="120" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="8">eu-west-1</text>

  <rect x="305" y="150" width="60" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="335" y="168" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Dave</text>
  <rect x="370" y="150" width="60" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="168" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Eve</text>
  <rect x="440" y="150" width="60" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="470" y="168" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Frank</text>

  <!-- EU user arrows -->
  <line x1="335" y1="150" x2="375" y2="132" stroke="#10b981" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="400" y1="150" x2="400" y2="135" stroke="#10b981" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="470" y1="150" x2="425" y2="132" stroke="#10b981" stroke-width="1.5" marker-end="url(#a)"/>

  <text x="400" y="200" text-anchor="middle" fill="#64748b" font-size="9">Users connect to</text>
  <text x="400" y="213" text-anchor="middle" fill="#10b981" font-size="9" font-weight="600">nearest SFU (~15ms)</text>

  <!-- Asia Region -->
  <rect x="550" y="50" width="230" height="180" rx="12" fill="rgba(245,158,11,0.04)" stroke="rgba(245,158,11,0.2)" stroke-width="1.5"/>
  <text x="665" y="70" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">Asia Region</text>

  <rect x="620" y="82" width="90" height="50" rx="8" fill="#f59e0b" filter="url(#s)"/>
  <text x="665" y="104" text-anchor="middle" fill="white" font-size="10" font-weight="700">SFU Asia</text>
  <text x="665" y="120" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="8">ap-east-1</text>

  <rect x="575" y="150" width="60" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="605" y="168" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Grace</text>
  <rect x="640" y="150" width="60" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="670" y="168" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Hiro</text>
  <rect x="705" y="150" width="60" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="735" y="168" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Ivy</text>

  <!-- Asia user arrows -->
  <line x1="605" y1="150" x2="640" y2="132" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="670" y1="150" x2="665" y2="135" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="735" y1="150" x2="690" y2="132" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#a)"/>

  <text x="665" y="200" text-anchor="middle" fill="#64748b" font-size="9">Users connect to</text>
  <text x="665" y="213" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="600">nearest SFU (~25ms)</text>

  <!-- Backbone connections between SFUs -->
  <line x1="180" y1="107" x2="351" y2="107" stroke="#7c3aed" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#a)"/>
  <line x1="351" y1="107" x2="180" y2="107" stroke="#7c3aed" stroke-width="3" stroke-dasharray="8,4"/>
  <line x1="445" y1="107" x2="616" y2="107" stroke="#7c3aed" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#a)"/>
  <line x1="616" y1="107" x2="445" y2="107" stroke="#7c3aed" stroke-width="3" stroke-dasharray="8,4"/>

  <rect x="228" y="92" width="80" height="16" rx="4" fill="#7c3aed"/>
  <text x="268" y="103" text-anchor="middle" fill="white" font-size="8" font-weight="600">Backbone ~50ms</text>
  <rect x="492" y="92" width="80" height="16" rx="4" fill="#7c3aed"/>
  <text x="532" y="103" text-anchor="middle" fill="white" font-size="8" font-weight="600">Backbone ~70ms</text>

  <!-- Key insight -->
  <rect x="20" y="248" width="760" height="38" rx="8" fill="rgba(124,58,237,0.05)" stroke="rgba(124,58,237,0.15)" stroke-width="1"/>
  <text x="40" y="265" fill="#1e293b" font-size="10" font-weight="600">Each user connects to nearest SFU for low latency. SFUs relay streams between regions over dedicated backbone links.</text>
  <text x="40" y="279" fill="#475569" font-size="9">Max 2 SFU hops (local to root to remote). Tree topology avoids N-squared SFU-to-SFU connections. Failover: ICE restart to next-nearest SFU within 2-3 seconds.</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#334155"/></marker>
    <marker id="aBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2563eb"/></marker>
    <marker id="aGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#16a34a"/></marker>
  </defs>

  <rect width="800" height="300" fill="#fafbfc" rx="12"/>
  <text x="400" y="26" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="700">SFU vs MCU Architecture Comparison</text>

  <!-- SFU Side -->
  <rect x="15" y="42" width="375" height="195" rx="10" fill="rgba(37,99,235,0.04)" stroke="rgba(37,99,235,0.2)" stroke-width="1.5"/>
  <text x="202" y="60" text-anchor="middle" fill="#2563eb" font-size="12" font-weight="700">SFU (Selective Forwarding Unit) -- Zoom uses this</text>

  <!-- SFU box -->
  <rect x="160" y="95" width="80" height="55" rx="8" fill="#2563eb" filter="url(#s)"/>
  <text x="200" y="118" text-anchor="middle" fill="white" font-size="11" font-weight="700">SFU</text>
  <text x="200" y="135" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="8">Forward only</text>

  <!-- SFU Participants -->
  <rect x="30" y="78" width="55" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="57" y="96" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">User A</text>
  <rect x="30" y="118" width="55" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="57" y="136" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">User B</text>
  <rect x="30" y="158" width="55" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="57" y="176" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">User C</text>

  <rect x="310" y="78" width="55" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="337" y="96" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">User A</text>
  <rect x="310" y="118" width="55" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="337" y="136" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">User B</text>
  <rect x="310" y="158" width="55" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="337" y="176" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">User C</text>

  <!-- SFU upload arrows -->
  <line x1="85" y1="92" x2="156" y2="110" stroke="#2563eb" stroke-width="1.5" marker-end="url(#aBlue)"/>
  <line x1="85" y1="132" x2="156" y2="122" stroke="#2563eb" stroke-width="1.5" marker-end="url(#aBlue)"/>
  <line x1="85" y1="172" x2="156" y2="140" stroke="#2563eb" stroke-width="1.5" marker-end="url(#aBlue)"/>

  <!-- SFU download arrows -->
  <line x1="240" y1="110" x2="306" y2="92" stroke="#16a34a" stroke-width="1.5" marker-end="url(#aGreen)"/>
  <line x1="240" y1="122" x2="306" y2="132" stroke="#16a34a" stroke-width="1.5" marker-end="url(#aGreen)"/>
  <line x1="240" y1="140" x2="306" y2="172" stroke="#16a34a" stroke-width="1.5" marker-end="url(#aGreen)"/>

  <!-- SFU labels -->
  <text x="110" y="82" fill="#2563eb" font-size="8" font-weight="600">1 upload</text>
  <text x="260" y="82" fill="#16a34a" font-size="8" font-weight="600">N-1 downloads</text>

  <!-- SFU stats -->
  <text x="30" y="210" fill="#475569" font-size="9">N uploads, N x (N-1) downloads</text>
  <text x="30" y="224" fill="#16a34a" font-size="9" font-weight="600">Low CPU (no decoding/re-encoding)</text>

  <!-- MCU Side -->
  <rect x="410" y="42" width="375" height="195" rx="10" fill="rgba(239,68,68,0.04)" stroke="rgba(239,68,68,0.2)" stroke-width="1.5"/>
  <text x="597" y="60" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="700">MCU (Multipoint Control Unit) -- Legacy</text>

  <!-- MCU box -->
  <rect x="557" y="85" width="80" height="75" rx="8" fill="#ef4444" filter="url(#s)"/>
  <text x="597" y="110" text-anchor="middle" fill="white" font-size="11" font-weight="700">MCU</text>
  <text x="597" y="125" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="8">Decode + Mix</text>
  <text x="597" y="140" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="8">+ Re-encode</text>

  <!-- MCU Participants left -->
  <rect x="430" y="78" width="55" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="457" y="96" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">User A</text>
  <rect x="430" y="118" width="55" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="457" y="136" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">User B</text>
  <rect x="430" y="158" width="55" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="457" y="176" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">User C</text>

  <!-- MCU right side -->
  <rect x="705" y="78" width="55" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="732" y="96" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">User A</text>
  <rect x="705" y="118" width="55" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="732" y="136" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">User B</text>
  <rect x="705" y="158" width="55" height="28" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="732" y="176" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">User C</text>

  <!-- MCU upload arrows -->
  <line x1="485" y1="92" x2="553" y2="108" stroke="#ef4444" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="485" y1="132" x2="553" y2="120" stroke="#ef4444" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="485" y1="172" x2="553" y2="138" stroke="#ef4444" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- MCU download arrows (1 mixed stream each) -->
  <line x1="637" y1="108" x2="701" y2="92" stroke="#f97316" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="637" y1="120" x2="701" y2="132" stroke="#f97316" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="637" y1="138" x2="701" y2="172" stroke="#f97316" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- MCU labels -->
  <text x="505" y="82" fill="#ef4444" font-size="8" font-weight="600">N uploads</text>
  <text x="650" y="82" fill="#f97316" font-size="8" font-weight="600">1 mixed stream</text>

  <!-- MCU stats -->
  <text x="425" y="210" fill="#475569" font-size="9">N uploads, N downloads (1 composite each)</text>
  <text x="425" y="224" fill="#ef4444" font-size="9" font-weight="600">Very high CPU (decode + mix + re-encode)</text>

  <!-- Key insight -->
  <rect x="15" y="250" width="770" height="35" rx="8" fill="rgba(37,99,235,0.05)" stroke="rgba(37,99,235,0.15)" stroke-width="1"/>
  <text x="35" y="272" fill="#1e293b" font-size="10" font-weight="600">Zoom uses SFU: Forwards streams without decoding = low server CPU, original video quality preserved, scales to 1000+ participants. MCU only for legacy low-bandwidth scenarios.</text>
</svg>
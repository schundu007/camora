<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/></marker>
  </defs>

  <rect width="1200" height="450" fill="#ffffff" rx="16"/>

  <text x="600" y="32" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Token Bucket Rate Limiter Flow</text>
  <text x="600" y="52" text-anchor="middle" fill="#64748b" font-size="12">Request through API Gateway, Redis Lua script atomic check, allow/reject decision, response headers</text>

  <!-- Client Request -->
  <rect x="15" y="100" width="110" height="115" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="15" y="100" width="110" height="28" rx="10 10 0 0" fill="#f97316"/>
  <text x="70" y="119" text-anchor="middle" fill="white" font-size="11" font-weight="700">Request</text>
  <text x="70" y="147" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Client API Call</text>
  <text x="70" y="165" text-anchor="middle" fill="#64748b" font-size="9">Extract key:</text>
  <text x="70" y="181" text-anchor="middle" fill="#64748b" font-size="9">userId / IP / API key</text>
  <text x="70" y="200" text-anchor="middle" fill="#64748b" font-size="14">&#x1F4E8;</text>

  <!-- API Gateway -->
  <rect x="175" y="90" width="130" height="135" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="175" y="90" width="130" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="240" y="109" text-anchor="middle" fill="white" font-size="11" font-weight="700">API Gateway</text>
  <text x="240" y="136" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Rate Limit Check</text>
  <text x="240" y="154" text-anchor="middle" fill="#64748b" font-size="9">Local cache check</text>
  <text x="240" y="170" text-anchor="middle" fill="#64748b" font-size="9">Hot key? reject fast</text>
  <text x="240" y="186" text-anchor="middle" fill="#64748b" font-size="9">Else call Redis</text>
  <text x="240" y="212" text-anchor="middle" fill="#94a3b8" font-size="8">100+ nodes</text>

  <!-- Redis EVALSHA -->
  <rect x="355" y="80" width="150" height="155" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="355" y="80" width="150" height="28" rx="10 10 0 0" fill="#ef4444"/>
  <text x="430" y="99" text-anchor="middle" fill="white" font-size="11" font-weight="700">Redis EVALSHA</text>
  <text x="430" y="126" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Lua Script (Atomic)</text>
  <text x="430" y="144" text-anchor="middle" fill="#64748b" font-size="9">1. Read bucket state</text>
  <text x="430" y="160" text-anchor="middle" fill="#64748b" font-size="9">2. Calc token refill</text>
  <text x="430" y="176" text-anchor="middle" fill="#64748b" font-size="9">3. Check tokens avail</text>
  <text x="430" y="192" text-anchor="middle" fill="#64748b" font-size="9">4. Deduct or reject</text>
  <text x="430" y="222" text-anchor="middle" fill="#94a3b8" font-size="8">Single-threaded, &lt;1ms</text>

  <!-- Check Tokens Decision -->
  <rect x="555" y="110" width="110" height="100" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="555" y="110" width="110" height="28" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="610" y="129" text-anchor="middle" fill="white" font-size="11" font-weight="700">Check Tokens</text>
  <text x="610" y="156" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">tokens &gt;= cost?</text>
  <text x="610" y="176" text-anchor="middle" fill="#16a34a" font-size="10" font-weight="600">YES: deduct</text>
  <text x="610" y="196" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">NO: reject</text>

  <!-- Allow Path - 200 -->
  <rect x="720" y="80" width="110" height="100" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="720" y="80" width="110" height="28" rx="10 10 0 0" fill="#16a34a"/>
  <text x="775" y="99" text-anchor="middle" fill="white" font-size="11" font-weight="700">Allow (200)</text>
  <text x="775" y="126" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Request Passes</text>
  <text x="775" y="144" text-anchor="middle" fill="#64748b" font-size="9">Tokens deducted</text>
  <text x="775" y="160" text-anchor="middle" fill="#64748b" font-size="9">Forward to backend</text>
  <text x="775" y="172" text-anchor="middle" fill="#16a34a" font-size="14">&#x2713;</text>

  <!-- Reject Path - 429 -->
  <rect x="720" y="200" width="110" height="100" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="720" y="200" width="110" height="28" rx="10 10 0 0" fill="#ef4444"/>
  <text x="775" y="219" text-anchor="middle" fill="white" font-size="11" font-weight="700">Reject (429)</text>
  <text x="775" y="246" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Too Many Requests</text>
  <text x="775" y="264" text-anchor="middle" fill="#64748b" font-size="9">Retry-After header</text>
  <text x="775" y="280" text-anchor="middle" fill="#64748b" font-size="9">Return immediately</text>
  <text x="775" y="292" text-anchor="middle" fill="#ef4444" font-size="14">&#x2717;</text>

  <!-- Response Headers -->
  <rect x="885" y="80" width="130" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="885" y="80" width="130" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="950" y="99" text-anchor="middle" fill="white" font-size="11" font-weight="700">Response Headers</text>
  <text x="950" y="126" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Rate Limit Info</text>
  <text x="950" y="144" text-anchor="middle" fill="#64748b" font-size="9">X-RateLimit-Limit</text>
  <text x="950" y="160" text-anchor="middle" fill="#64748b" font-size="9">X-RateLimit-Remaining</text>
  <text x="950" y="176" text-anchor="middle" fill="#64748b" font-size="9">X-RateLimit-Reset</text>
  <text x="950" y="192" text-anchor="middle" fill="#94a3b8" font-size="8">RFC 6585</text>

  <!-- Refill Timer -->
  <rect x="1060" y="100" width="120" height="100" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="1060" y="100" width="120" height="28" rx="10 10 0 0" fill="#f97316"/>
  <text x="1120" y="119" text-anchor="middle" fill="white" font-size="11" font-weight="700">Refill Timer</text>
  <text x="1120" y="147" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Token Replenish</text>
  <text x="1120" y="165" text-anchor="middle" fill="#64748b" font-size="9">Lazy refill on check</text>
  <text x="1120" y="181" text-anchor="middle" fill="#64748b" font-size="9">elapsed * rate</text>
  <text x="1120" y="192" text-anchor="middle" fill="#f97316" font-size="12">&#x23F0;</text>

  <!-- Flow Arrows -->
  <line x1="125" y1="155" x2="172" y2="155" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="127" y="141" width="42" height="14" rx="3" fill="#2563eb"/>
  <text x="148" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2460;</text>

  <line x1="305" y1="155" x2="352" y2="155" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <rect x="307" y="141" width="42" height="14" rx="3" fill="#ef4444"/>
  <text x="328" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2461;</text>

  <line x1="505" y1="155" x2="552" y2="155" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="507" y="141" width="42" height="14" rx="3" fill="#7c3aed"/>
  <text x="528" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2462;</text>

  <!-- Decision to Allow -->
  <line x1="665" y1="130" x2="717" y2="125" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="668" y="112" width="46" height="14" rx="3" fill="#16a34a"/>
  <text x="691" y="122" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2463; Yes</text>

  <!-- Decision to Reject -->
  <line x1="665" y1="185" x2="717" y2="240" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <rect x="668" y="210" width="46" height="14" rx="3" fill="#ef4444"/>
  <text x="691" y="220" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2464; No</text>

  <!-- Allow / Reject to Response Headers -->
  <line x1="830" y1="130" x2="882" y2="135" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="830" y1="250" x2="882" y2="185" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <rect x="842" y="165" width="38" height="14" rx="3" fill="#2563eb"/>
  <text x="861" y="175" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2465;</text>

  <!-- Refill connection -->
  <path d="M 1120 200 L 1120 260 L 430 260 L 430 238" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowOrange)"/>
  <rect x="700" y="250" width="100" height="14" rx="3" fill="#f97316"/>
  <text x="750" y="260" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2466; Lazy refill</text>

  <!-- Legend -->
  <rect x="20" y="340" width="1160" height="95" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="362" fill="#1e293b" font-size="12" font-weight="700">Flow Steps:</text>
  <rect x="50" y="372" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="66" y="381" fill="#475569" font-size="9">&#x2460; Request arrives at API Gateway, extract rate limit key (userId, IP, or API key)</text>
  <rect x="50" y="388" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="66" y="397" fill="#475569" font-size="9">&#x2461; Gateway calls Redis EVALSHA with Lua script for atomic token bucket check</text>
  <rect x="50" y="404" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="66" y="413" fill="#475569" font-size="9">&#x2462; Lua script: read bucket, calc refill from elapsed time, check if tokens available</text>
  <text x="430" y="381" fill="#475569" font-size="9">&#x2463; If tokens &gt;= cost: deduct tokens, return ALLOWED, forward request to backend</text>
  <text x="430" y="397" fill="#475569" font-size="9">&#x2464; If tokens &lt; cost: return 429 Too Many Requests with Retry-After header</text>
  <text x="430" y="413" fill="#475569" font-size="9">&#x2465; Both paths set X-RateLimit-Limit, Remaining, Reset headers on response</text>
  <text x="850" y="381" fill="#475569" font-size="9">&#x2466; Token refill is lazy: calculated on each check based on elapsed time</text>
</svg>
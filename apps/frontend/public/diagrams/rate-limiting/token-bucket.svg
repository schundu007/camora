<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="600" height="350" fill="#f7f8f9" rx="12"/>
  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Token Bucket Algorithm</text>

  <!-- Refill source -->
  <rect x="20" y="60" width="100" height="50" rx="8" fill="white" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="70" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Token</text>
  <text x="70" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Refill</text>

  <!-- Arrow from refill to bucket -->
  <line x1="120" y1="85" x2="170" y2="85" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
  <text x="145" y="75" text-anchor="middle" font-size="9" fill="#64748b">r tokens/sec</text>

  <!-- Bucket -->
  <rect x="175" y="50" width="160" height="120" rx="8" fill="white" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="255" y="72" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Token Bucket</text>
  <text x="255" y="88" text-anchor="middle" font-size="10" fill="#64748b">capacity = b</text>

  <!-- Tokens inside bucket -->
  <circle cx="205" cy="120" r="12" fill="#10b981" opacity="0.9"/>
  <text x="205" y="124" text-anchor="middle" font-size="9" font-weight="600" fill="white">T</text>
  <circle cx="235" cy="120" r="12" fill="#10b981" opacity="0.9"/>
  <text x="235" y="124" text-anchor="middle" font-size="9" font-weight="600" fill="white">T</text>
  <circle cx="265" cy="120" r="12" fill="#10b981" opacity="0.9"/>
  <text x="265" y="124" text-anchor="middle" font-size="9" font-weight="600" fill="white">T</text>
  <circle cx="295" cy="120" r="12" fill="#10b981" opacity="0.7"/>
  <text x="295" y="124" text-anchor="middle" font-size="9" font-weight="600" fill="white">T</text>
  <circle cx="235" cy="148" r="12" fill="#10b981" opacity="0.5"/>
  <text x="235" y="152" text-anchor="middle" font-size="9" font-weight="600" fill="white">T</text>
  <circle cx="265" cy="148" r="12" fill="#10b981" opacity="0.5"/>
  <text x="265" y="152" text-anchor="middle" font-size="9" font-weight="600" fill="white">T</text>

  <!-- Requests -->
  <rect x="400" y="50" width="170" height="60" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="485" y="74" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Incoming Requests</text>
  <text x="485" y="92" text-anchor="middle" font-size="10" fill="#64748b">1 token per request</text>

  <!-- Arrow from bucket to requests -->
  <line x1="335" y1="85" x2="395" y2="80" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="365" y="72" text-anchor="middle" font-size="9" fill="#64748b">consume</text>

  <!-- Allowed path -->
  <rect x="400" y="140" width="170" height="50" rx="8" fill="white" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="485" y="163" text-anchor="middle" font-size="11" font-weight="600" fill="#10b981">Allowed</text>
  <text x="485" y="178" text-anchor="middle" font-size="10" fill="#64748b">tokens available</text>

  <!-- Rejected path -->
  <rect x="400" y="210" width="170" height="50" rx="8" fill="white" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="485" y="233" text-anchor="middle" font-size="11" font-weight="600" fill="#ef4444">Rejected (429)</text>
  <text x="485" y="248" text-anchor="middle" font-size="10" fill="#64748b">bucket empty</text>

  <!-- Arrows to allowed/rejected -->
  <line x1="485" y1="110" x2="485" y2="135" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="485" y1="190" x2="485" y2="205" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Key properties -->
  <rect x="20" y="200" width="310" height="130" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="40" y="224" font-size="12" font-weight="600" fill="#1e293b">Key Properties</text>
  <circle cx="40" cy="248" r="4" fill="#10b981"/>
  <text x="52" y="252" font-size="10" fill="#64748b">Refill rate (r): tokens added per second</text>
  <circle cx="40" cy="270" r="4" fill="#3b82f6"/>
  <text x="52" y="274" font-size="10" fill="#64748b">Bucket size (b): max burst capacity</text>
  <circle cx="40" cy="292" r="4" fill="#8b5cf6"/>
  <text x="52" y="296" font-size="10" fill="#64748b">Allows short bursts up to b tokens</text>
  <circle cx="40" cy="314" r="4" fill="#f59e0b"/>
  <text x="52" y="318" font-size="10" fill="#64748b">Smooths traffic to avg rate r over time</text>
</svg>
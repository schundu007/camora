<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgCE" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4c1d95"/></linearGradient>
  </defs>

  <rect width="1200" height="550" fill="url(#bgCE)" rx="16"/>

  <rect x="380" y="16" width="440" height="40" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="43" text-anchor="middle" fill="white" font-size="20" font-weight="700">Back-of-the-Envelope Estimates</text>

  <!-- Column 1: Traffic -->
  <rect x="20" y="80" width="280" height="440" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)"/>
  <rect x="20" y="80" width="280" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="160" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Trip Traffic</text>

  <text x="45" y="140" fill="#fbbf24" font-size="13" font-weight="700">202M Monthly Active Users</text>
  <text x="160" y="162" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="16">↓</text>
  <text x="45" y="185" fill="white" font-size="12">~20% daily active</text>
  <text x="45" y="203" fill="#fbbf24" font-size="15" font-weight="700">~40M daily riders</text>
  <text x="160" y="225" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="16">↓</text>
  <text x="45" y="248" fill="white" font-size="12">Avg 1 trip/rider/day:</text>
  <text x="45" y="268" fill="#fbbf24" font-size="16" font-weight="800">42M trips/day</text>
  <text x="160" y="290" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="16">↓</text>
  <text x="45" y="313" fill="white" font-size="11">Match QPS (Average):</text>
  <text x="45" y="331" fill="rgba(255,255,255,0.7)" font-size="10">42M / 86,400s</text>
  <text x="45" y="353" fill="#fbbf24" font-size="16" font-weight="800">≈ 486 QPS</text>
  <text x="160" y="375" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="16">↓</text>
  <text x="45" y="398" fill="white" font-size="11">Peak Match QPS (5×):</text>
  <text x="45" y="421" fill="#f97316" font-size="18" font-weight="800">≈ 2,500 QPS</text>

  <!-- Column 2: Location Updates -->
  <rect x="320" y="80" width="280" height="300" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)"/>
  <rect x="320" y="80" width="280" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="460" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Location Updates (GPS)</text>

  <text x="345" y="140" fill="#fbbf24" font-size="13" font-weight="700">10M active drivers</text>
  <text x="460" y="162" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="16">↓</text>
  <text x="345" y="185" fill="white" font-size="12">GPS update every</text>
  <text x="345" y="205" fill="#fbbf24" font-size="15" font-weight="700">3 seconds</text>
  <text x="460" y="225" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="16">↓</text>
  <text x="345" y="248" fill="white" font-size="11">Avg Location QPS:</text>
  <text x="345" y="268" fill="rgba(255,255,255,0.7)" font-size="10">10M / 3s</text>
  <text x="345" y="290" fill="#fbbf24" font-size="16" font-weight="800">≈ 3.3M QPS</text>
  <text x="460" y="312" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="16">↓</text>
  <text x="345" y="335" fill="white" font-size="11">Peak (3× average):</text>
  <text x="345" y="358" fill="#f97316" font-size="18" font-weight="800">≈ 10M QPS</text>

  <!-- Column 3: Storage -->
  <rect x="620" y="80" width="270" height="300" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)"/>
  <rect x="620" y="80" width="270" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="755" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Storage</text>

  <text x="645" y="140" fill="white" font-size="12">Ride metadata (~1 KB/ride):</text>
  <text x="645" y="162" fill="#fbbf24" font-size="14" font-weight="700">42M × 1KB = 42 GB/day</text>
  <text x="755" y="184" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="16">↓</text>
  <text x="645" y="207" fill="white" font-size="12">Location data (~100B/update):</text>
  <text x="645" y="229" fill="#fbbf24" font-size="14" font-weight="700">3.3M/s × 86.4K = 2.8 TB/day</text>
  <text x="755" y="251" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="16">↓</text>
  <text x="645" y="274" fill="white" font-size="12">Annual ride storage:</text>
  <text x="645" y="296" fill="#fbbf24" font-size="16" font-weight="800">~15 TB/year</text>
  <text x="645" y="322" fill="white" font-size="12">Annual location storage:</text>
  <text x="645" y="344" fill="#f97316" font-size="16" font-weight="800">~1 PB/year</text>

  <!-- Column 4: Connections -->
  <rect x="910" y="80" width="270" height="300" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)"/>
  <rect x="910" y="80" width="270" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="1045" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Connections</text>

  <text x="935" y="140" fill="white" font-size="12">Active driver WebSockets:</text>
  <text x="935" y="162" fill="#fbbf24" font-size="16" font-weight="800">10M</text>
  <text x="1045" y="184" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="16">+</text>
  <text x="935" y="207" fill="white" font-size="12">Active rider WebSockets:</text>
  <text x="935" y="229" fill="#fbbf24" font-size="16" font-weight="800">~10M</text>
  <text x="1045" y="251" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="16">↓</text>
  <text x="935" y="274" fill="white" font-size="11">Total concurrent connections:</text>
  <text x="935" y="296" fill="#f97316" font-size="18" font-weight="800">~20M WebSockets</text>
  <text x="935" y="330" fill="rgba(255,255,255,0.6)" font-size="11">At ~100K connections/server</text>
  <text x="935" y="350" fill="#fbbf24" font-size="14" font-weight="700">≈ 200 WebSocket servers</text>

  <!-- Bottom summary -->
  <rect x="20" y="500" width="1160" height="36" rx="8" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.3)"/>
  <text x="600" y="523" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">Summary: 42M trips/day • 10M location QPS peak • 2.8 TB GPS data/day • 20M concurrent WebSocket connections</text>
</svg>
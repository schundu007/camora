<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgCA" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4c1d95"/></linearGradient>
    <marker id="aw" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="white"/></marker>
  </defs>

  <rect width="1200" height="450" fill="url(#bgCA)" rx="16"/>
  <text x="600" y="35" text-anchor="middle" fill="white" font-size="20" font-weight="800">Cell-Based Geospatial Architecture</text>
  <text x="600" y="55" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">City divided into S2 cells, each managed by a dedicated service</text>

  <!-- City Grid -->
  <rect x="30" y="75" width="350" height="340" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/>
  <text x="205" y="100" text-anchor="middle" fill="white" font-size="14" font-weight="700">City Map — S2 Cell Grid</text>

  <!-- Hex cells -->
  <polygon points="130,140 160,125 190,140 190,170 160,185 130,170" fill="rgba(34,197,94,0.3)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="160" y="160" text-anchor="middle" fill="white" font-size="9" font-weight="600">Cell A</text>

  <polygon points="190,140 220,125 250,140 250,170 220,185 190,170" fill="rgba(59,130,246,0.3)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="220" y="160" text-anchor="middle" fill="white" font-size="9" font-weight="600">Cell B</text>

  <polygon points="250,140 280,125 310,140 310,170 280,185 250,170" fill="rgba(168,85,247,0.3)" stroke="#a855f7" stroke-width="1.5"/>
  <text x="280" y="160" text-anchor="middle" fill="white" font-size="9" font-weight="600">Cell C</text>

  <polygon points="100,170 130,155 160,170 160,200 130,215 100,200" fill="rgba(249,115,22,0.3)" stroke="#f97316" stroke-width="1.5"/>
  <text x="130" y="190" text-anchor="middle" fill="white" font-size="9" font-weight="600">Cell D</text>

  <polygon points="160,170 190,155 220,170 220,200 190,215 160,200" fill="rgba(236,72,153,0.3)" stroke="#ec4899" stroke-width="2"/>
  <text x="190" y="188" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="800">PICKUP</text>

  <polygon points="220,170 250,155 280,170 280,200 250,215 220,200" fill="rgba(20,184,166,0.3)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="250" y="190" text-anchor="middle" fill="white" font-size="9" font-weight="600">Cell F</text>

  <polygon points="130,200 160,185 190,200 190,230 160,245 130,230" fill="rgba(234,179,8,0.3)" stroke="#eab308" stroke-width="1.5"/>
  <text x="160" y="220" text-anchor="middle" fill="white" font-size="9" font-weight="600">Cell G</text>

  <polygon points="190,200 220,185 250,200 250,230 220,245 190,230" fill="rgba(100,116,139,0.3)" stroke="#64748b" stroke-width="1.5"/>
  <text x="220" y="220" text-anchor="middle" fill="white" font-size="9" font-weight="600">Cell H</text>

  <!-- Driver dots -->
  <circle cx="175" cy="175" r="4" fill="#fbbf24"/>
  <circle cx="200" cy="185" r="4" fill="#fbbf24"/>
  <circle cx="230" cy="175" r="4" fill="#fbbf24"/>
  <circle cx="145" cy="195" r="4" fill="#fbbf24"/>
  <circle cx="260" cy="185" r="4" fill="#fbbf24"/>

  <!-- Rider pin -->
  <circle cx="190" cy="180" r="7" fill="#ef4444" stroke="white" stroke-width="2"/>
  <text x="190" y="184" text-anchor="middle" fill="white" font-size="7" font-weight="800">R</text>

  <!-- Legend -->
  <circle cx="50" y="285" r="5" fill="#ef4444"/>
  <text x="65" y="289" fill="white" font-size="10">Rider (pickup location)</text>
  <circle cx="50" y="305" r="4" fill="#fbbf24"/>
  <text x="65" y="309" fill="white" font-size="10">Available drivers</text>
  <rect x="43" y="320" width="14" height="14" rx="2" fill="none" stroke="#ec4899" stroke-width="2"/>
  <text x="65" y="331" fill="white" font-size="10">Primary cell (routes to Cell E service)</text>
  <rect x="43" y="340" width="14" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="65" y="351" fill="white" font-size="10">Adjacent cells (cross-boundary query)</text>

  <!-- Architecture diagram -->
  <rect x="420" y="75" width="750" height="340" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/>
  <text x="795" y="100" text-anchor="middle" fill="white" font-size="14" font-weight="700">Cell Service Architecture</text>

  <!-- Gateway -->
  <rect x="440" y="120" width="140" height="55" rx="10" fill="#3b82f6"/>
  <text x="510" y="145" text-anchor="middle" fill="white" font-size="12" font-weight="700">API Gateway</text>
  <text x="510" y="162" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">S2 Cell Lookup</text>

  <!-- Cell Services -->
  <line x1="580" y1="135" x2="640" y2="135" stroke="white" stroke-width="1.5" marker-end="url(#aw)"/>
  <line x1="580" y1="155" x2="640" y2="220" stroke="white" stroke-width="1.5" marker-end="url(#aw)"/>
  <line x1="580" y1="165" x2="640" y2="305" stroke="white" stroke-width="1.5" marker-end="url(#aw)"/>

  <rect x="645" y="115" width="160" height="45" rx="8" fill="#22c55e"/>
  <text x="725" y="137" text-anchor="middle" fill="white" font-size="11" font-weight="700">Cell A Service</text>
  <text x="725" y="152" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Downtown • 2K drivers</text>

  <rect x="645" y="200" width="160" height="45" rx="8" fill="#ec4899" stroke="#fbbf24" stroke-width="2"/>
  <text x="725" y="222" text-anchor="middle" fill="white" font-size="11" font-weight="700">Cell E Service</text>
  <text x="725" y="237" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Midtown • 3K drivers</text>

  <rect x="645" y="285" width="160" height="45" rx="8" fill="#a855f7"/>
  <text x="725" y="307" text-anchor="middle" fill="white" font-size="11" font-weight="700">Cell H Service</text>
  <text x="725" y="322" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Airport • 1K drivers</text>

  <!-- Each cell has its own Redis -->
  <line x1="805" y1="137" x2="870" y2="137" stroke="white" stroke-width="1.5" marker-end="url(#aw)"/>
  <line x1="805" y1="222" x2="870" y2="222" stroke="#fbbf24" stroke-width="2" marker-end="url(#aw)"/>
  <line x1="805" y1="307" x2="870" y2="307" stroke="white" stroke-width="1.5" marker-end="url(#aw)"/>

  <rect x="875" y="115" width="130" height="45" rx="8" fill="#ef4444"/>
  <text x="940" y="142" text-anchor="middle" fill="white" font-size="10" font-weight="600">Redis Geo (Cell A)</text>

  <rect x="875" y="200" width="130" height="45" rx="8" fill="#ef4444" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="940" y="227" text-anchor="middle" fill="white" font-size="10" font-weight="600">Redis Geo (Cell E)</text>

  <rect x="875" y="285" width="130" height="45" rx="8" fill="#ef4444"/>
  <text x="940" y="312" text-anchor="middle" fill="white" font-size="10" font-weight="600">Redis Geo (Cell H)</text>

  <!-- Cross-cell query note -->
  <rect x="1020" y="175" width="140" height="90" rx="8" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1"/>
  <text x="1090" y="200" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">Cross-Cell Query</text>
  <text x="1090" y="218" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">If pickup is near</text>
  <text x="1090" y="232" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">cell boundary, also</text>
  <text x="1090" y="246" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">query adjacent cells</text>

  <!-- Bottom note -->
  <rect x="420" y="375" width="750" height="30" rx="6" fill="rgba(255,255,255,0.06)"/>
  <text x="795" y="395" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">Each cell scales independently • Failures isolated to one geographic area • New cells added as city grows</text>
</svg>
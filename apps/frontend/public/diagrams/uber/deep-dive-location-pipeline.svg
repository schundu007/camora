<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgDL" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4c1d95"/></linearGradient>
    <marker id="aW" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="white"/></marker>
  </defs>

  <rect width="1200" height="400" fill="url(#bgDL)" rx="16"/>
  <text x="600" y="35" text-anchor="middle" fill="white" font-size="20" font-weight="800">Real-Time Location Ingestion Pipeline</text>
  <text x="600" y="55" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">Processing 3.3M average / 10M+ peak GPS updates per second</text>

  <!-- Hot path -->
  <rect x="30" y="70" width="1140" height="140" rx="12" fill="rgba(239,68,68,0.08)" stroke="rgba(239,68,68,0.3)"/>
  <text x="55" y="92" fill="#ef4444" font-size="12" font-weight="800">HOT PATH (Critical — p99 &lt; 5ms)</text>

  <rect x="50" y="110" width="120" height="50" rx="8" fill="#22c55e"/>
  <text x="110" y="138" text-anchor="middle" fill="white" font-size="11" font-weight="700">10M Drivers</text>
  <text x="110" y="152" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">GPS every 3s</text>

  <line x1="170" y1="135" x2="220" y2="135" stroke="#fbbf24" stroke-width="2" marker-end="url(#aW)"/>

  <rect x="225" y="110" width="130" height="50" rx="8" fill="#3b82f6"/>
  <text x="290" y="133" text-anchor="middle" fill="white" font-size="11" font-weight="700">Load Balancer</text>
  <text x="290" y="148" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Hash(cellId)</text>

  <line x1="355" y1="135" x2="405" y2="135" stroke="#fbbf24" stroke-width="2" marker-end="url(#aW)"/>

  <rect x="410" y="105" width="150" height="60" rx="8" fill="#8b5cf6"/>
  <text x="485" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Location Service</text>
  <text x="485" y="148" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Validate + Snap-to-Road</text>

  <line x1="560" y1="135" x2="620" y2="135" stroke="#fbbf24" stroke-width="2" marker-end="url(#aW)"/>

  <rect x="625" y="100" width="170" height="70" rx="8" fill="#ef4444" stroke="white" stroke-width="2"/>
  <text x="710" y="128" text-anchor="middle" fill="white" font-size="14" font-weight="800">Redis Geo</text>
  <text x="710" y="148" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="10">GEOADD per cell shard</text>
  <text x="710" y="162" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="9">O(log N) per update</text>

  <line x1="795" y1="135" x2="850" y2="135" stroke="#fbbf24" stroke-width="2" marker-end="url(#aW)"/>

  <rect x="855" y="110" width="150" height="50" rx="8" fill="#ec4899"/>
  <text x="930" y="133" text-anchor="middle" fill="white" font-size="11" font-weight="700">Matching Engine</text>
  <text x="930" y="148" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">GEORADIUS queries</text>

  <!-- Warm/Cold path -->
  <rect x="30" y="230" width="1140" height="150" rx="12" fill="rgba(249,115,22,0.08)" stroke="rgba(249,115,22,0.3)"/>
  <text x="55" y="252" fill="#f97316" font-size="12" font-weight="800">ASYNC PATH (Non-blocking — 50-500ms latency acceptable)</text>

  <rect x="50" y="270" width="130" height="50" rx="8" fill="#f97316"/>
  <text x="115" y="293" text-anchor="middle" fill="white" font-size="12" font-weight="700">Kafka</text>
  <text x="115" y="308" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">location-updates</text>

  <!-- Line from Location Service down to Kafka -->
  <line x1="485" y1="165" x2="485" y2="220" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="485" y1="220" x2="180" y2="295" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#aW)"/>

  <!-- Kafka consumers -->
  <line x1="180" y1="285" x2="240" y2="285" stroke="white" stroke-width="1.5" marker-end="url(#aW)"/>

  <rect x="245" y="270" width="140" height="45" rx="8" fill="#6366f1"/>
  <text x="315" y="293" text-anchor="middle" fill="white" font-size="10" font-weight="700">WS Broadcaster</text>
  <text x="315" y="308" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">→ Rider map updates</text>

  <line x1="180" y1="300" x2="240" y2="330" stroke="white" stroke-width="1.5" marker-end="url(#aW)"/>

  <rect x="245" y="325" width="140" height="40" rx="8" fill="#14b8a6"/>
  <text x="315" y="350" text-anchor="middle" fill="white" font-size="10" font-weight="700">ETA Service</text>

  <rect x="440" y="270" width="140" height="45" rx="8" fill="#a855f7"/>
  <text x="510" y="293" text-anchor="middle" fill="white" font-size="10" font-weight="700">Traffic Analytics</text>
  <text x="510" y="308" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Speed per road segment</text>
  <line x1="385" y1="292" x2="440" y2="292" stroke="white" stroke-width="1" marker-end="url(#aW)"/>

  <rect x="635" y="270" width="140" height="45" rx="8" fill="#eab308"/>
  <text x="705" y="293" text-anchor="middle" fill="white" font-size="10" font-weight="700">Surge Engine</text>
  <text x="705" y="308" text-anchor="middle" fill="rgba(0,0,0,0.5)" font-size="9">Supply/demand ratio</text>
  <line x1="580" y1="292" x2="635" y2="292" stroke="white" stroke-width="1" marker-end="url(#aW)"/>

  <rect x="830" y="270" width="140" height="45" rx="8" fill="#64748b"/>
  <text x="900" y="293" text-anchor="middle" fill="white" font-size="10" font-weight="700">Cold Storage (S3)</text>
  <text x="900" y="308" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">2.8 TB/day archival</text>
  <line x1="775" y1="292" x2="830" y2="292" stroke="white" stroke-width="1" marker-end="url(#aW)"/>

  <rect x="1000" y="270" width="150" height="45" rx="8" fill="#374151"/>
  <text x="1075" y="293" text-anchor="middle" fill="white" font-size="10" font-weight="700">ML Training</text>
  <text x="1075" y="308" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Demand prediction</text>
  <line x1="970" y1="292" x2="1000" y2="292" stroke="white" stroke-width="1" marker-end="url(#aW)"/>
</svg>
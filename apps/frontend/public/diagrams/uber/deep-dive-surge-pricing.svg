<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgSP" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4c1d95"/></linearGradient>
    <marker id="aS" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#fbbf24"/></marker>
  </defs>

  <rect width="1200" height="400" fill="url(#bgSP)" rx="16"/>
  <text x="600" y="35" text-anchor="middle" fill="white" font-size="20" font-weight="800">Surge Pricing Engine</text>
  <text x="600" y="55" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">Dynamic pricing based on real-time supply/demand per geographic cell</text>

  <!-- Input signals -->
  <rect x="30" y="80" width="220" height="280" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/>
  <text x="140" y="105" text-anchor="middle" fill="white" font-size="13" font-weight="700">Input Signals</text>

  <rect x="50" y="120" width="180" height="40" rx="8" fill="#3b82f6"/>
  <text x="140" y="145" text-anchor="middle" fill="white" font-size="11" font-weight="600">Ride Requests / Cell</text>

  <rect x="50" y="175" width="180" height="40" rx="8" fill="#22c55e"/>
  <text x="140" y="200" text-anchor="middle" fill="white" font-size="11" font-weight="600">Available Drivers / Cell</text>

  <rect x="50" y="230" width="180" height="40" rx="8" fill="#a855f7"/>
  <text x="140" y="255" text-anchor="middle" fill="white" font-size="11" font-weight="600">Historical Patterns</text>

  <rect x="50" y="285" width="180" height="40" rx="8" fill="#f97316"/>
  <text x="140" y="310" text-anchor="middle" fill="white" font-size="11" font-weight="600">Events / Weather</text>

  <!-- Computation -->
  <line x1="250" y1="200" x2="310" y2="200" stroke="#fbbf24" stroke-width="2" marker-end="url(#aS)"/>

  <rect x="315" y="100" width="250" height="260" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(251,191,36,0.3)"/>
  <text x="440" y="125" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">Surge Computation (every 60s)</text>

  <text x="335" y="155" fill="white" font-size="11">1. For each cell:</text>
  <text x="345" y="175" fill="rgba(255,255,255,0.8)" font-size="10">ratio = requests / available_drivers</text>

  <text x="335" y="205" fill="white" font-size="11">2. Smoothing:</text>
  <text x="345" y="225" fill="rgba(255,255,255,0.8)" font-size="10">5-min rolling average</text>
  <text x="345" y="242" fill="rgba(255,255,255,0.8)" font-size="10">Fast ramp-up, slow decay</text>

  <text x="335" y="270" fill="white" font-size="11">3. Apply caps:</text>
  <text x="345" y="290" fill="rgba(255,255,255,0.8)" font-size="10">Max multiplier per city config</text>
  <text x="345" y="307" fill="rgba(255,255,255,0.8)" font-size="10">Geographic smoothing (neighbors)</text>

  <text x="335" y="335" fill="white" font-size="11">4. Output:</text>
  <text x="345" y="352" fill="#fbbf24" font-size="12" font-weight="700">surge_multiplier per cell</text>

  <!-- Redis cache -->
  <line x1="565" y1="200" x2="625" y2="200" stroke="#fbbf24" stroke-width="2" marker-end="url(#aS)"/>

  <rect x="630" y="150" width="160" height="100" rx="12" fill="#ef4444" stroke="white" stroke-width="1.5"/>
  <text x="710" y="185" text-anchor="middle" fill="white" font-size="14" font-weight="800">Redis Cache</text>
  <text x="710" y="205" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">surge:{cellId} → multiplier</text>
  <text x="710" y="222" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">TTL: 60 seconds</text>
  <text x="710" y="242" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">O(1) lookup</text>

  <!-- Consumer: Pricing API -->
  <line x1="790" y1="180" x2="850" y2="140" stroke="white" stroke-width="1.5" marker-end="url(#aS)"/>
  <rect x="855" y="110" width="170" height="60" rx="10" fill="#6366f1"/>
  <text x="940" y="138" text-anchor="middle" fill="white" font-size="12" font-weight="700">Pricing API</text>
  <text x="940" y="156" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">fare = base × surge × (dist + time)</text>

  <!-- Consumer: Driver Heat Map -->
  <line x1="790" y1="200" x2="850" y2="220" stroke="white" stroke-width="1.5" marker-end="url(#aS)"/>
  <rect x="855" y="195" width="170" height="55" rx="10" fill="#22c55e"/>
  <text x="940" y="218" text-anchor="middle" fill="white" font-size="12" font-weight="700">Driver Heat Map</text>
  <text x="940" y="236" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Show high-demand cells</text>

  <!-- Consumer: Analytics -->
  <line x1="790" y1="220" x2="850" y2="290" stroke="white" stroke-width="1.5" marker-end="url(#aS)"/>
  <rect x="855" y="270" width="170" height="55" rx="10" fill="#64748b"/>
  <text x="940" y="293" text-anchor="middle" fill="white" font-size="12" font-weight="700">Analytics Dashboard</text>
  <text x="940" y="311" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Monitor surge patterns</text>

  <!-- Lock note -->
  <rect x="1055" y="110" width="130" height="55" rx="8" fill="rgba(251,191,36,0.15)" stroke="#fbbf24"/>
  <text x="1120" y="132" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">Price Lock</text>
  <text x="1120" y="148" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Surge locked at</text>
  <text x="1120" y="160" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">booking time</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="600" height="350" fill="#f7f8f9" rx="4"/>
  <text x="300" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">PACELC Theorem &#8212; Decision Tree</text>
  <text x="300" y="44" text-anchor="middle" font-size="10" fill="#64748b">if Partition &#8594; (A vs C), Else &#8594; (L vs C)</text>

  <!-- Root: Network Partition? -->
  <rect x="215" y="60" width="170" height="45" rx="10" fill="white" stroke="#f59e0b" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="300" y="80" text-anchor="middle" font-size="11" font-weight="700" fill="#f59e0b">Network Partition?</text>
  <text x="300" y="96" text-anchor="middle" font-size="9" fill="#64748b">P in PACELC</text>

  <!-- Yes branch -->
  <line x1="250" y1="105" x2="140" y2="145" stroke="#ef4444" stroke-width="2" marker-end="url(#arr)"/>
  <text x="180" y="120" font-size="10" font-weight="700" fill="#ef4444">YES</text>

  <!-- No branch -->
  <line x1="350" y1="105" x2="460" y2="145" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr)"/>
  <text x="415" y="120" font-size="10" font-weight="700" fill="#3b82f6">NO (E)</text>

  <!-- PAC box -->
  <rect x="50" y="148" width="180" height="40" rx="8" fill="white" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="165" text-anchor="middle" font-size="11" font-weight="700" fill="#ef4444">Choose: A or C</text>
  <text x="140" y="180" text-anchor="middle" font-size="8" fill="#64748b">Availability vs Consistency</text>

  <!-- ELC box -->
  <rect x="370" y="148" width="180" height="40" rx="8" fill="white" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="460" y="165" text-anchor="middle" font-size="11" font-weight="700" fill="#3b82f6">Choose: L or C</text>
  <text x="460" y="180" text-anchor="middle" font-size="8" fill="#64748b">Latency vs Consistency</text>

  <!-- Left: Availability -->
  <line x1="100" y1="188" x2="70" y2="220" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="20" y="222" width="105" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="72" y="244" text-anchor="middle" font-size="10" font-weight="700" fill="#10b981">Availability (A)</text>
  <text x="72" y="260" text-anchor="middle" font-size="8" fill="#64748b">Respond, maybe stale</text>

  <!-- Left: Consistency -->
  <line x1="180" y1="188" x2="210" y2="220" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="155" y="222" width="105" height="50" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="208" y="244" text-anchor="middle" font-size="10" font-weight="700" fill="#8b5cf6">Consistency (C)</text>
  <text x="208" y="260" text-anchor="middle" font-size="8" fill="#64748b">Error until resolved</text>

  <!-- Right: Latency -->
  <line x1="420" y1="188" x2="390" y2="220" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="335" y="222" width="105" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="388" y="244" text-anchor="middle" font-size="10" font-weight="700" fill="#10b981">Latency (L)</text>
  <text x="388" y="260" text-anchor="middle" font-size="8" fill="#64748b">Fast, eventual cons.</text>

  <!-- Right: Consistency -->
  <line x1="500" y1="188" x2="530" y2="220" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="475" y="222" width="105" height="50" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="528" y="244" text-anchor="middle" font-size="10" font-weight="700" fill="#8b5cf6">Consistency (C)</text>
  <text x="528" y="260" text-anchor="middle" font-size="8" fill="#64748b">Slow, strong cons.</text>

  <!-- Examples -->
  <rect x="30" y="290" width="540" height="50" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="300" y="308" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Real-World Examples</text>
  <text x="120" y="326" text-anchor="middle" font-size="9" fill="#10b981" font-weight="600">Cassandra: PA/EL</text>
  <text x="300" y="326" text-anchor="middle" font-size="9" fill="#8b5cf6" font-weight="600">MongoDB: PA/EC</text>
  <text x="480" y="326" text-anchor="middle" font-size="9" fill="#3b82f6" font-weight="600">Spanner: PC/EC</text>
</svg>
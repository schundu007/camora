<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">Cloud Disaster Recovery Strategies</text>

  <!-- RPO ← Disaster → RTO Timeline -->
  <line x1="120" y1="68" x2="680" y2="68" stroke="#475569" stroke-width="2"/>
  <polygon points="120,68 130,63 130,73" fill="#f87171"/>
  <polygon points="680,68 670,63 670,73" fill="#38bdf8"/>
  <!-- Disaster marker -->
  <circle cx="400" cy="68" r="8" fill="#ef4444" filter="url(#glow)"/>
  <text x="400" y="60" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">DISASTER</text>
  <text x="160" y="88" text-anchor="start" fill="#f87171" font-size="11" font-weight="600">← RPO (data loss window)</text>
  <text x="640" y="88" text-anchor="end" fill="#38bdf8" font-size="11" font-weight="600">RTO (downtime window) →</text>

  <!-- Row 1: Backup & Restore (purple) -->
  <rect x="20" y="105" width="370" height="165" rx="8" fill="#1e1b3a" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="20" y="105" width="370" height="28" rx="8" fill="#7c3aed" opacity="0.2"/>
  <circle cx="38" cy="119" r="6" fill="#7c3aed"/>
  <text x="52" y="123" fill="#c4b5fd" font-size="13" font-weight="700">Backup &amp; Restore</text>
  <text x="340" y="123" text-anchor="end" fill="#a78bfa" font-size="10">RPO: hours | RTO: hours</text>
  <!-- Primary Site -->
  <rect x="45" y="145" width="110" height="50" rx="6" fill="#312e81" stroke="#7c3aed" stroke-width="1"/>
  <text x="100" y="165" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="600">Primary Site</text>
  <text x="100" y="182" text-anchor="middle" fill="#a5b4fc" font-size="9">Active - Full load</text>
  <!-- Arrow with snapshot icon -->
  <line x1="160" y1="170" x2="220" y2="170" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="220,170 214,166 214,174" fill="#7c3aed"/>
  <text x="190" y="162" text-anchor="middle" fill="#a78bfa" font-size="8">Snapshots</text>
  <!-- DR Site -->
  <rect x="225" y="145" width="110" height="50" rx="6" fill="#1e1b3a" stroke="#4c1d95" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="280" y="165" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">DR Site</text>
  <text x="280" y="182" text-anchor="middle" fill="#64748b" font-size="9">Off - Cold storage</text>
  <!-- Cost/speed labels -->
  <rect x="45" y="210" width="55" height="18" rx="4" fill="#22c55e" opacity="0.15"/>
  <text x="72" y="223" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="600">$ Cheapest</text>
  <rect x="110" y="210" width="55" height="18" rx="4" fill="#ef4444" opacity="0.15"/>
  <text x="137" y="223" text-anchor="middle" fill="#f87171" font-size="9" font-weight="600">Slowest</text>

  <!-- Row 1: Pilot Light (teal) -->
  <rect x="410" y="105" width="370" height="165" rx="8" fill="#0f2b2b" stroke="#14b8a6" stroke-width="1.5"/>
  <rect x="410" y="105" width="370" height="28" rx="8" fill="#14b8a6" opacity="0.2"/>
  <circle cx="428" cy="119" r="6" fill="#14b8a6"/>
  <text x="442" y="123" fill="#5eead4" font-size="13" font-weight="700">Pilot Light</text>
  <text x="730" y="123" text-anchor="end" fill="#2dd4bf" font-size="10">RPO: min | RTO: tens of min</text>
  <!-- Primary Site -->
  <rect x="435" y="145" width="110" height="50" rx="6" fill="#134e4a" stroke="#14b8a6" stroke-width="1"/>
  <text x="490" y="165" text-anchor="middle" fill="#ccfbf1" font-size="11" font-weight="600">Primary Site</text>
  <text x="490" y="182" text-anchor="middle" fill="#5eead4" font-size="9">Active - Full load</text>
  <!-- Arrow with continuous sync -->
  <line x1="550" y1="170" x2="610" y2="170" stroke="#14b8a6" stroke-width="1.5"/>
  <polygon points="610,170 604,166 604,174" fill="#14b8a6"/>
  <text x="580" y="162" text-anchor="middle" fill="#2dd4bf" font-size="8">Data sync</text>
  <!-- DR Site -->
  <rect x="615" y="145" width="110" height="50" rx="6" fill="#0f2b2b" stroke="#0d9488" stroke-width="1"/>
  <text x="670" y="165" text-anchor="middle" fill="#ccfbf1" font-size="11" font-weight="600">DR Site</text>
  <text x="670" y="182" text-anchor="middle" fill="#5eead4" font-size="9">Minimal core only</text>
  <!-- Flame icon for pilot light -->
  <text x="662" y="204" fill="#f59e0b" font-size="12">🔥</text>
  <text x="680" y="207" fill="#fbbf24" font-size="8">pilot light</text>
  <!-- Cost label -->
  <rect x="435" y="210" width="40" height="18" rx="4" fill="#22c55e" opacity="0.15"/>
  <text x="455" y="223" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="600">$ $</text>

  <!-- Row 2: Warm Standby (amber) -->
  <rect x="20" y="285" width="370" height="165" rx="8" fill="#2b2010" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="20" y="285" width="370" height="28" rx="8" fill="#f59e0b" opacity="0.2"/>
  <circle cx="38" cy="299" r="6" fill="#f59e0b"/>
  <text x="52" y="303" fill="#fde68a" font-size="13" font-weight="700">Warm Standby</text>
  <text x="340" y="303" text-anchor="end" fill="#fbbf24" font-size="10">RPO: seconds | RTO: minutes</text>
  <!-- Primary Site -->
  <rect x="45" y="325" width="110" height="50" rx="6" fill="#78350f" stroke="#f59e0b" stroke-width="1"/>
  <text x="100" y="345" text-anchor="middle" fill="#fef3c7" font-size="11" font-weight="600">Primary Site</text>
  <text x="100" y="362" text-anchor="middle" fill="#fde68a" font-size="9">Active - Full load</text>
  <!-- Arrow with LB -->
  <line x1="160" y1="350" x2="220" y2="350" stroke="#f59e0b" stroke-width="1.5"/>
  <polygon points="220,350 214,346 214,354" fill="#f59e0b"/>
  <text x="190" y="342" text-anchor="middle" fill="#fbbf24" font-size="8">LB + sync</text>
  <!-- DR Site -->
  <rect x="225" y="325" width="110" height="50" rx="6" fill="#451a03" stroke="#d97706" stroke-width="1"/>
  <text x="280" y="345" text-anchor="middle" fill="#fef3c7" font-size="11" font-weight="600">DR Site</text>
  <text x="280" y="362" text-anchor="middle" fill="#fde68a" font-size="9">Scaled-down copy</text>
  <!-- Auto-scale indicator -->
  <text x="280" y="392" text-anchor="middle" fill="#fbbf24" font-size="9">↑ Auto-scales on disaster</text>
  <!-- Cost label -->
  <rect x="45" y="400" width="45" height="18" rx="4" fill="#f59e0b" opacity="0.15"/>
  <text x="67" y="413" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">$ $ $</text>

  <!-- Row 2: Multi-Site Active-Active (green) -->
  <rect x="410" y="285" width="370" height="165" rx="8" fill="#0b2b1a" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="410" y="285" width="370" height="28" rx="8" fill="#22c55e" opacity="0.2"/>
  <circle cx="428" cy="299" r="6" fill="#22c55e"/>
  <text x="442" y="303" fill="#bbf7d0" font-size="13" font-weight="700">Multi-Site Active-Active</text>
  <text x="730" y="303" text-anchor="end" fill="#4ade80" font-size="10">RPO: ~0 | RTO: ~0</text>
  <!-- Site A -->
  <rect x="435" y="325" width="110" height="50" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="490" y="345" text-anchor="middle" fill="#dcfce7" font-size="11" font-weight="600">Site A</text>
  <text x="490" y="362" text-anchor="middle" fill="#86efac" font-size="9">Active - 50% traffic</text>
  <!-- Bidirectional arrow -->
  <line x1="550" y1="345" x2="610" y2="345" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="610,345 604,341 604,349" fill="#22c55e"/>
  <line x1="610" y1="355" x2="550" y2="355" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="550,355 556,351 556,359" fill="#22c55e"/>
  <text x="580" y="337" text-anchor="middle" fill="#4ade80" font-size="8">Real-time</text>
  <text x="580" y="367" text-anchor="middle" fill="#4ade80" font-size="8">sync</text>
  <!-- Site B -->
  <rect x="615" y="325" width="110" height="50" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="670" y="345" text-anchor="middle" fill="#dcfce7" font-size="11" font-weight="600">Site B</text>
  <text x="670" y="362" text-anchor="middle" fill="#86efac" font-size="9">Active - 50% traffic</text>
  <!-- LB indicator -->
  <text x="580" y="395" text-anchor="middle" fill="#4ade80" font-size="9">Load Balancer routes all traffic to survivor</text>
  <!-- Cost label -->
  <rect x="435" y="400" width="55" height="18" rx="4" fill="#ef4444" opacity="0.15"/>
  <text x="462" y="413" text-anchor="middle" fill="#f87171" font-size="9" font-weight="600">$ $ $ $</text>
  <rect x="500" y="400" width="50" height="18" rx="4" fill="#22c55e" opacity="0.15"/>
  <text x="525" y="413" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="600">Fastest</text>

  <!-- Bottom legend -->
  <text x="400" y="475" text-anchor="middle" fill="#64748b" font-size="10">RPO = Recovery Point Objective (acceptable data loss)  |  RTO = Recovery Time Objective (acceptable downtime)</text>
  <text x="400" y="492" text-anchor="middle" fill="#475569" font-size="9">Cost increases left → right, top → bottom  |  Recovery speed increases accordingly</text>
</svg>
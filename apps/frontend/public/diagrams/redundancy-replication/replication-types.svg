<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="600" height="350" fill="#f7f8f9" rx="4"/>
  <text x="300" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Replication Types</text>

  <!-- Column 1: Single-Leader -->
  <rect x="10" y="45" width="180" height="295" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="100" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#10b981">Single-Leader</text>
  <rect x="55" y="85" width="90" height="35" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="100" y="106" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Leader</text>
  <text x="100" y="132" text-anchor="middle" font-size="8" fill="#64748b">writes &#8595;</text>
  <rect x="25" y="140" width="70" height="30" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="60" y="159" text-anchor="middle" font-size="9" fill="#1e293b">Follower 1</text>
  <rect x="105" y="140" width="70" height="30" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="140" y="159" text-anchor="middle" font-size="9" fill="#1e293b">Follower 2</text>
  <line x1="85" y1="120" x2="60" y2="140" stroke="#10b981" stroke-width="1.2" marker-end="url(#arrG)"/>
  <line x1="115" y1="120" x2="140" y2="140" stroke="#10b981" stroke-width="1.2" marker-end="url(#arrG)"/>
  <text x="100" y="190" text-anchor="middle" font-size="8" fill="#64748b">All writes go to leader.</text>
  <text x="100" y="202" text-anchor="middle" font-size="8" fill="#64748b">Followers replicate</text>
  <text x="100" y="214" text-anchor="middle" font-size="8" fill="#64748b">asynchronously.</text>
  <rect x="30" y="228" width="140" height="22" rx="4" fill="#ecfdf5"/>
  <text x="100" y="243" text-anchor="middle" font-size="8" fill="#10b981">+ Simple, consistent</text>
  <rect x="30" y="256" width="140" height="22" rx="4" fill="#fef2f2"/>
  <text x="100" y="271" text-anchor="middle" font-size="8" fill="#ef4444">- Single point of failure</text>

  <!-- Column 2: Multi-Leader -->
  <rect x="210" y="45" width="180" height="295" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="300" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#3b82f6">Multi-Leader</text>
  <rect x="225" y="85" width="70" height="35" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="260" y="106" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Leader A</text>
  <rect x="305" y="85" width="70" height="35" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="340" y="106" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Leader B</text>
  <!-- Bidirectional arrows between leaders -->
  <line x1="295" y1="96" x2="305" y2="96" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrB)"/>
  <line x1="305" y1="108" x2="295" y2="108" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrB)"/>
  <rect x="265" y="140" width="70" height="30" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="300" y="159" text-anchor="middle" font-size="9" fill="#1e293b">Follower</text>
  <line x1="260" y1="120" x2="285" y2="140" stroke="#3b82f6" stroke-width="1" marker-end="url(#arrB)"/>
  <line x1="340" y1="120" x2="315" y2="140" stroke="#3b82f6" stroke-width="1" marker-end="url(#arrB)"/>
  <text x="300" y="190" text-anchor="middle" font-size="8" fill="#64748b">Multiple nodes accept</text>
  <text x="300" y="202" text-anchor="middle" font-size="8" fill="#64748b">writes. Leaders sync</text>
  <text x="300" y="214" text-anchor="middle" font-size="8" fill="#64748b">with each other.</text>
  <rect x="230" y="228" width="140" height="22" rx="4" fill="#eff6ff"/>
  <text x="300" y="243" text-anchor="middle" font-size="8" fill="#3b82f6">+ Multi-region writes</text>
  <rect x="230" y="256" width="140" height="22" rx="4" fill="#fef2f2"/>
  <text x="300" y="271" text-anchor="middle" font-size="8" fill="#ef4444">- Conflict resolution needed</text>

  <!-- Column 3: Leaderless -->
  <rect x="410" y="45" width="180" height="295" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="500" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#8b5cf6">Leaderless</text>
  <rect x="425" y="85" width="60" height="30" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="455" y="104" text-anchor="middle" font-size="9" font-weight="600" fill="#1e293b">Node 1</text>
  <rect x="500" y="85" width="60" height="30" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="530" y="104" text-anchor="middle" font-size="9" font-weight="600" fill="#1e293b">Node 2</text>
  <rect x="462" y="130" width="60" height="30" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="492" y="149" text-anchor="middle" font-size="9" font-weight="600" fill="#1e293b">Node 3</text>
  <!-- Mesh arrows -->
  <line x1="485" y1="100" x2="500" y2="100" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="465" y1="115" x2="475" y2="130" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="520" y1="115" x2="510" y2="130" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="500" y="182" text-anchor="middle" font-size="8" fill="#64748b">Client writes to multiple</text>
  <text x="500" y="194" text-anchor="middle" font-size="8" fill="#64748b">nodes. Reads from multiple</text>
  <text x="500" y="206" text-anchor="middle" font-size="8" fill="#64748b">nodes. Quorum-based.</text>
  <rect x="430" y="228" width="140" height="22" rx="4" fill="#f5f3ff"/>
  <text x="500" y="243" text-anchor="middle" font-size="8" fill="#8b5cf6">+ High availability</text>
  <rect x="430" y="256" width="140" height="22" rx="4" fill="#fef2f2"/>
  <text x="500" y="271" text-anchor="middle" font-size="8" fill="#ef4444">- Eventual consistency</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
  </defs>

  <rect width="1200" height="400" fill="white" rx="12"/>

  <text x="600" y="35" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Metrics Monitoring Pipeline Flow</text>
  <text x="600" y="55" text-anchor="middle" fill="#64748b" font-size="12">App metric emission through collection, TSDB storage, query engine, alerting, and dashboard</text>

  <!-- 1. App Emits Metric -->
  <rect x="15" y="110" width="130" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="15" y="110" width="130" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="80" y="130" text-anchor="middle" fill="white" font-size="10" font-weight="700">App Emits Metric</text>
  <text x="80" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Application</text>
  <text x="80" y="175" text-anchor="middle" fill="#64748b" font-size="9">Counter / gauge / hist</text>
  <text x="80" y="192" text-anchor="middle" fill="#64748b" font-size="9">StatsD / Prometheus</text>
  <text x="80" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">SDK instrumentation</text>

  <!-- Arrow 1→2 -->
  <line x1="145" y1="170" x2="178" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="147" y="150" width="30" height="16" rx="4" fill="#2563eb"/>
  <text x="162" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">1</text>

  <!-- 2. Agent Collects -->
  <rect x="188" y="110" width="130" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="188" y="110" width="130" height="30" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="253" y="130" text-anchor="middle" fill="white" font-size="10" font-weight="700">Agent Collects</text>
  <text x="253" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">OTel Collector</text>
  <text x="253" y="175" text-anchor="middle" fill="#64748b" font-size="9">Scrape /metrics</text>
  <text x="253" y="192" text-anchor="middle" fill="#64748b" font-size="9">Batch + compress</text>
  <text x="253" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">10s scrape interval</text>

  <!-- Arrow 2→3 -->
  <line x1="318" y1="170" x2="351" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="320" y="150" width="30" height="16" rx="4" fill="#7c3aed"/>
  <text x="335" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">2</text>

  <!-- 3. Kafka -->
  <rect x="361" y="110" width="130" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="361" y="110" width="130" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="426" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Kafka</text>
  <text x="426" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Metrics Stream</text>
  <text x="426" y="175" text-anchor="middle" fill="#64748b" font-size="9">Buffer spikes</text>
  <text x="426" y="192" text-anchor="middle" fill="#64748b" font-size="9">Decouple write path</text>
  <text x="426" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">Partitioned by metric</text>

  <!-- Arrow 3→4 -->
  <line x1="491" y1="170" x2="524" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="493" y="150" width="30" height="16" rx="4" fill="#f97316"/>
  <text x="508" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>

  <!-- 4. TSDB Write -->
  <rect x="534" y="110" width="130" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="534" y="110" width="130" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="599" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">TSDB Write</text>
  <text x="599" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Time Series DB</text>
  <text x="599" y="175" text-anchor="middle" fill="#64748b" font-size="9">Columnar storage</text>
  <text x="599" y="192" text-anchor="middle" fill="#64748b" font-size="9">Downsample old data</text>
  <text x="599" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">VictoriaMetrics</text>

  <!-- Arrow 4→5 -->
  <line x1="664" y1="170" x2="697" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="666" y="150" width="30" height="16" rx="4" fill="#16a34a"/>
  <text x="681" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">4</text>

  <!-- 5. Query Engine -->
  <rect x="707" y="110" width="130" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="707" y="110" width="130" height="30" rx="10 10 0 0" fill="#ec4899"/>
  <text x="772" y="130" text-anchor="middle" fill="white" font-size="10" font-weight="700">Query Engine</text>
  <text x="772" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">PromQL / MetricsQL</text>
  <text x="772" y="175" text-anchor="middle" fill="#64748b" font-size="9">Aggregate + transform</text>
  <text x="772" y="192" text-anchor="middle" fill="#64748b" font-size="9">Rate, avg, percentile</text>
  <text x="772" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">Range queries</text>

  <!-- Arrow 5→6 -->
  <line x1="837" y1="170" x2="870" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="839" y="150" width="30" height="16" rx="4" fill="#ec4899"/>
  <text x="854" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">5</text>

  <!-- 6. Alert Rules -->
  <rect x="880" y="110" width="130" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="880" y="110" width="130" height="30" rx="10 10 0 0" fill="#ef4444"/>
  <text x="945" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Alert Rules</text>
  <text x="945" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Alertmanager</text>
  <text x="945" y="175" text-anchor="middle" fill="#64748b" font-size="9">Threshold triggers</text>
  <text x="945" y="192" text-anchor="middle" fill="#64748b" font-size="9">PagerDuty / Slack</text>
  <text x="945" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">Dedup + silence</text>

  <!-- Arrow 6→7 -->
  <line x1="1010" y1="170" x2="1043" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="1012" y="150" width="30" height="16" rx="4" fill="#ef4444"/>
  <text x="1027" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">6</text>

  <!-- 7. Dashboard -->
  <rect x="1053" y="110" width="130" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="1053" y="110" width="130" height="30" rx="10 10 0 0" fill="#0891b2"/>
  <text x="1118" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Dashboard</text>
  <text x="1118" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Grafana</text>
  <text x="1118" y="175" text-anchor="middle" fill="#64748b" font-size="9">Real-time charts</text>
  <text x="1118" y="192" text-anchor="middle" fill="#64748b" font-size="9">SLO tracking</text>
  <text x="1118" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">Auto-refresh 15s</text>

  <!-- Legend -->
  <rect x="30" y="280" width="1140" height="100" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="305" fill="#1e293b" font-size="12" font-weight="700">Flow Steps</text>

  <rect x="60" y="318" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="76" y="328" fill="#475569" font-size="10">1. Application emits metrics via SDK (counters, gauges, histograms)</text>
  <rect x="60" y="336" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="76" y="346" fill="#475569" font-size="10">2. OTel collector scrapes /metrics endpoint every 10s, batches data</text>
  <rect x="60" y="354" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="76" y="364" fill="#475569" font-size="10">3. Kafka buffers metric stream, decouples write path from storage</text>

  <rect x="600" y="318" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="616" y="328" fill="#475569" font-size="10">4. TSDB stores time series data, downsamples old data for retention</text>
  <rect x="600" y="336" width="10" height="10" rx="2" fill="#ec4899"/>
  <text x="616" y="346" fill="#475569" font-size="10">5. Query engine evaluates PromQL for rates, averages, percentiles</text>
  <rect x="600" y="354" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="616" y="364" fill="#475569" font-size="10">6-7. Alertmanager fires alerts to PagerDuty/Slack, Grafana renders dashboards</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="system-ui, -apple-system, sans-serif">
  <defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#334155"/></marker></defs>
  <rect width="800" height="350" fill="#fafbfc" rx="12"/>
  <text x="400" y="28" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="700">Group Message Fan-out — Write vs Read Strategy</text>

  <!-- Fan-out on Write -->
  <rect x="20" y="50" width="370" height="270" rx="10" fill="#fff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="20" y="50" width="370" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="205" y="69" text-anchor="middle" fill="white" font-size="12" font-weight="700">Fan-out on Write (Small Groups ≤256)</text>

  <!-- Sender -->
  <rect x="40" y="95" width="80" height="40" rx="8" fill="#f97316" stroke="none"/>
  <text x="80" y="120" text-anchor="middle" fill="white" font-size="10" font-weight="700">Sender</text>

  <!-- Message Service -->
  <rect x="160" y="95" width="100" height="40" rx="8" fill="#2563eb" stroke="none"/>
  <text x="210" y="115" text-anchor="middle" fill="white" font-size="9" font-weight="700">Message Svc</text>
  <text x="210" y="127" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="8">Writes N copies</text>

  <!-- Recipients -->
  <rect x="300" y="85" width="70" height="25" rx="6" fill="#16a34a"/>
  <text x="335" y="102" text-anchor="middle" fill="white" font-size="8" font-weight="600">Member 1</text>
  <rect x="300" y="115" width="70" height="25" rx="6" fill="#16a34a"/>
  <text x="335" y="132" text-anchor="middle" fill="white" font-size="8" font-weight="600">Member 2</text>
  <rect x="300" y="145" width="70" height="25" rx="6" fill="#16a34a"/>
  <text x="335" y="162" text-anchor="middle" fill="white" font-size="8" font-weight="600">Member N</text>

  <line x1="120" y1="115" x2="156" y2="115" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="260" y1="100" x2="296" y2="97" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="260" y1="115" x2="296" y2="127" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="260" y1="130" x2="296" y2="157" stroke="#16a34a" stroke-width="1.5" marker-end="url(#a)"/>

  <text x="40" y="200" fill="#16a34a" font-size="10" font-weight="700">✓ Pros</text>
  <text x="40" y="218" fill="#475569" font-size="9">• Fast reads (pre-computed inbox)</text>
  <text x="40" y="233" fill="#475569" font-size="9">• Simple recipient query</text>
  <text x="40" y="248" fill="#475569" font-size="9">• Low read latency</text>

  <text x="220" y="200" fill="#ef4444" font-size="10" font-weight="700">✗ Cons</text>
  <text x="220" y="218" fill="#475569" font-size="9">• N writes per message (costly)</text>
  <text x="220" y="233" fill="#475569" font-size="9">• N× storage amplification</text>
  <text x="220" y="248" fill="#475569" font-size="9">• Slow for large groups</text>

  <rect x="40" y="260" width="330" height="22" rx="6" fill="rgba(37,99,235,0.08)"/>
  <text x="205" y="276" text-anchor="middle" fill="#2563eb" font-size="9" font-weight="600">Best for: WhatsApp groups (≤256 members)</text>

  <!-- Fan-out on Read -->
  <rect x="410" y="50" width="370" height="270" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="410" y="50" width="370" height="28" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="595" y="69" text-anchor="middle" fill="white" font-size="12" font-weight="700">Fan-out on Read (Channels 1000+)</text>

  <!-- Sender -->
  <rect x="430" y="95" width="80" height="40" rx="8" fill="#f97316" stroke="none"/>
  <text x="470" y="120" text-anchor="middle" fill="white" font-size="10" font-weight="700">Sender</text>

  <!-- Single store -->
  <rect x="550" y="95" width="100" height="40" rx="8" fill="#7c3aed" stroke="none"/>
  <text x="600" y="115" text-anchor="middle" fill="white" font-size="9" font-weight="700">Group Store</text>
  <text x="600" y="127" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="8">1 write only</text>

  <!-- Readers -->
  <rect x="690" y="85" width="70" height="25" rx="6" fill="#94a3b8"/>
  <text x="725" y="102" text-anchor="middle" fill="white" font-size="8" font-weight="600">Reader 1</text>
  <rect x="690" y="115" width="70" height="25" rx="6" fill="#94a3b8"/>
  <text x="725" y="132" text-anchor="middle" fill="white" font-size="8" font-weight="600">Reader 2</text>
  <rect x="690" y="145" width="70" height="25" rx="6" fill="#94a3b8"/>
  <text x="725" y="162" text-anchor="middle" fill="white" font-size="8" font-weight="600">Reader N</text>

  <line x1="510" y1="115" x2="546" y2="115" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="686" y1="97" x2="653" y2="107" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="686" y1="127" x2="653" y2="120" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="686" y1="157" x2="653" y2="133" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="668" y="108" fill="#94a3b8" font-size="7">fetch</text>

  <text x="430" y="200" fill="#16a34a" font-size="10" font-weight="700">✓ Pros</text>
  <text x="430" y="218" fill="#475569" font-size="9">• 1 write only (efficient)</text>
  <text x="430" y="233" fill="#475569" font-size="9">• No storage amplification</text>
  <text x="430" y="248" fill="#475569" font-size="9">• Scales to millions of members</text>

  <text x="610" y="200" fill="#ef4444" font-size="10" font-weight="700">✗ Cons</text>
  <text x="610" y="218" fill="#475569" font-size="9">• Slower reads (aggregate)</text>
  <text x="610" y="233" fill="#475569" font-size="9">• Complex read queries</text>
  <text x="610" y="248" fill="#475569" font-size="9">• Higher read latency</text>

  <rect x="430" y="260" width="330" height="22" rx="6" fill="rgba(124,58,237,0.08)"/>
  <text x="595" y="276" text-anchor="middle" fill="#7c3aed" font-size="9" font-weight="600">Best for: Telegram channels, broadcast lists (1000+ members)</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="280" fill="#fafbfc" rx="12"/>
  <text x="400" y="28" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="700">Hot / Warm / Cold Storage Tiering</text>

  <!-- Hot -->
  <rect x="30" y="55" width="220" height="140" rx="10" fill="#fff" stroke="#ef4444" stroke-width="2"/>
  <rect x="30" y="55" width="220" height="28" rx="10 10 0 0" fill="#ef4444"/>
  <text x="140" y="74" text-anchor="middle" fill="white" font-size="12" font-weight="700">🔥 HOT (0-7 days)</text>
  <text x="50" y="105" fill="#1e293b" font-size="11" font-weight="600">Redis + Cassandra</text>
  <text x="50" y="125" fill="#475569" font-size="10">Recent messages cached in Redis</text>
  <text x="50" y="142" fill="#475569" font-size="10">Cassandra SSD-backed cluster</text>
  <text x="50" y="165" fill="#ef4444" font-size="10" font-weight="600">Latency: &lt;10ms</text>
  <text x="50" y="182" fill="#64748b" font-size="9">~70 TB (7 days × 10 TB/day)</text>

  <!-- Warm -->
  <rect x="290" y="55" width="220" height="140" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
  <rect x="290" y="55" width="220" height="28" rx="10 10 0 0" fill="#f59e0b"/>
  <text x="400" y="74" text-anchor="middle" fill="white" font-size="12" font-weight="700">🌡️ WARM (7-90 days)</text>
  <text x="310" y="105" fill="#1e293b" font-size="11" font-weight="600">Cassandra (HDD tier)</text>
  <text x="310" y="125" fill="#475569" font-size="10">Older messages on cheaper disks</text>
  <text x="310" y="142" fill="#475569" font-size="10">Compacted, less replicas</text>
  <text x="310" y="165" fill="#f59e0b" font-size="10" font-weight="600">Latency: ~50-100ms</text>
  <text x="310" y="182" fill="#64748b" font-size="9">~830 TB (83 days × 10 TB/day)</text>

  <!-- Cold -->
  <rect x="550" y="55" width="220" height="140" rx="10" fill="#fff" stroke="#2563eb" stroke-width="2"/>
  <rect x="550" y="55" width="220" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="660" y="74" text-anchor="middle" fill="white" font-size="12" font-weight="700">❄️ COLD (90+ days)</text>
  <text x="570" y="105" fill="#1e293b" font-size="11" font-weight="600">S3 / Glacier</text>
  <text x="570" y="125" fill="#475569" font-size="10">Compressed + archived to S3</text>
  <text x="570" y="142" fill="#475569" font-size="10">Per-user zip bundles</text>
  <text x="570" y="165" fill="#2563eb" font-size="10" font-weight="600">Latency: 200ms-seconds</text>
  <text x="570" y="182" fill="#64748b" font-size="9">~2.75 PB (275 days × 10 TB/day)</text>

  <!-- Arrows -->
  <text x="262" y="130" fill="#94a3b8" font-size="16">→</text>
  <text x="522" y="130" fill="#94a3b8" font-size="16">→</text>

  <!-- Cost comparison -->
  <rect x="30" y="210" width="740" height="50" rx="8" fill="rgba(37,99,235,0.04)" stroke="rgba(37,99,235,0.12)" stroke-width="1"/>
  <text x="50" y="235" fill="#1e293b" font-size="11" font-weight="700">💡 Cost Impact:</text>
  <text x="160" y="235" fill="#475569" font-size="10">SSD Cassandra ≈ $0.10/GB/mo</text>
  <text x="370" y="235" fill="#475569" font-size="10">HDD Cassandra ≈ $0.03/GB/mo</text>
  <text x="570" y="235" fill="#475569" font-size="10">S3 Glacier ≈ $0.004/GB/mo</text>
  <text x="50" y="252" fill="#16a34a" font-size="10" font-weight="600">Tiering saves ~90% storage cost compared to keeping everything on SSD</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="340" fill="#fafbfc" rx="12"/>
  <text x="400" y="28" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="700">Message Ordering — Sequence Numbers per Conversation</text>

  <!-- Sender side -->
  <rect x="20" y="50" width="160" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="20" y="50" width="160" height="26" rx="10 10 0 0" fill="#f97316"/>
  <text x="100" y="68" text-anchor="middle" fill="white" font-size="11" font-weight="700">User A sends 3 msgs</text>
  <text x="40" y="95" fill="#475569" font-size="10">msg₁ → "Hello"</text>
  <text x="40" y="115" fill="#475569" font-size="10">msg₂ → "How are you?"</text>
  <text x="40" y="135" fill="#475569" font-size="10">msg₃ → "Let's meet"</text>
  <text x="40" y="160" fill="#94a3b8" font-size="9">Sent in order but may</text>
  <text x="40" y="172" fill="#94a3b8" font-size="9">arrive out of order</text>

  <!-- Server -->
  <rect x="240" y="50" width="300" height="180" rx="10" fill="#fff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="240" y="50" width="300" height="26" rx="10 10 0 0" fill="#2563eb"/>
  <text x="390" y="68" text-anchor="middle" fill="white" font-size="11" font-weight="700">Chat Server — Sequence Assignment</text>

  <text x="260" y="98" fill="#1e293b" font-size="10" font-weight="600">Redis: INCR seq:{convId}</text>
  <rect x="260" y="108" width="260" height="28" rx="6" fill="#f0f9ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="270" y="127" fill="#1e293b" font-size="10" font-family="monospace">msg₁ → seq=1  |  msg₂ → seq=2  |  msg₃ → seq=3</text>

  <text x="260" y="160" fill="#1e293b" font-size="10" font-weight="600">Cassandra: CLUSTERING KEY (seq DESC)</text>
  <rect x="260" y="168" width="260" height="50" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="270" y="185" fill="#475569" font-size="9" font-family="monospace">SELECT * FROM messages</text>
  <text x="270" y="198" fill="#475569" font-size="9" font-family="monospace">WHERE convId=X ORDER BY seq DESC</text>
  <text x="270" y="211" fill="#16a34a" font-size="9" font-weight="600">→ Always returns correct order</text>

  <!-- Recipient -->
  <rect x="600" y="50" width="180" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="600" y="50" width="180" height="26" rx="10 10 0 0" fill="#16a34a"/>
  <text x="690" y="68" text-anchor="middle" fill="white" font-size="11" font-weight="700">User B receives</text>
  <text x="620" y="95" fill="#475569" font-size="10">seq=1 → "Hello"         ✓</text>
  <text x="620" y="115" fill="#475569" font-size="10">seq=2 → "How are you?"  ✓</text>
  <text x="620" y="135" fill="#475569" font-size="10">seq=3 → "Let's meet"    ✓</text>
  <text x="620" y="160" fill="#16a34a" font-size="9" font-weight="600">Ordered by sequence</text>
  <text x="620" y="172" fill="#16a34a" font-size="9" font-weight="600">number, not arrival time</text>

  <!-- Arrows -->
  <line x1="180" y1="110" x2="236" y2="110" stroke="#f97316" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="540" y1="110" x2="596" y2="110" stroke="#16a34a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Key insight -->
  <rect x="20" y="250" width="760" height="70" rx="10" fill="rgba(37,99,235,0.05)" stroke="rgba(37,99,235,0.15)" stroke-width="1"/>
  <text x="40" y="275" fill="#1e293b" font-size="11" font-weight="700">Why not use timestamps?</text>
  <text x="40" y="295" fill="#475569" font-size="10">Clock skew between devices makes timestamps unreliable. Server-assigned monotonic sequence numbers guarantee</text>
  <text x="40" y="310" fill="#475569" font-size="10">total ordering within each conversation. Cross-conversation ordering uses server timestamps (eventual consistency OK).</text>

  <defs><marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#334155"/></marker></defs>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
    <marker id="arrB" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/></marker>
  </defs>

  <rect width="1200" height="580" fill="#fafbfc" rx="16"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Offline Message Delivery (Store-and-Forward)</text>
  <text x="600" y="55" text-anchor="middle" fill="#64748b" font-size="12">User B is offline when User A sends — message is queued and delivered on reconnection</text>

  <!-- Phase 1: Send + Queue -->
  <rect x="20" y="70" width="570" height="220" rx="12" fill="rgba(37,99,235,0.04)" stroke="rgba(37,99,235,0.15)" stroke-width="1"/>
  <text x="40" y="92" fill="#2563eb" font-size="12" font-weight="700">PHASE 1: Send + Queue (User B Offline)</text>

  <!-- User A -->
  <rect x="40" y="110" width="100" height="80" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="40" y="110" width="100" height="28" rx="10 10 0 0" fill="#f97316"/>
  <text x="90" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">User A</text>
  <text x="90" y="160" text-anchor="middle" fill="#1e293b" font-size="18">📱</text>
  <text x="90" y="180" text-anchor="middle" fill="#64748b" font-size="9">Online</text>

  <!-- CG1 -->
  <rect x="200" y="110" width="120" height="80" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="200" y="110" width="120" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="260" y="130" text-anchor="middle" fill="white" font-size="10" font-weight="700">Chat Gateway 1</text>
  <text x="260" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">CG1</text>
  <text x="260" y="180" text-anchor="middle" fill="#64748b" font-size="9">Routes message</text>

  <!-- Redis -->
  <rect x="380" y="110" width="100" height="50" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="380" y="110" width="100" height="20" rx="8 8 0 0" fill="#ef4444"/>
  <text x="430" y="125" text-anchor="middle" fill="white" font-size="9" font-weight="700">Redis</text>
  <text x="430" y="150" text-anchor="middle" fill="#1e293b" font-size="9">User B = OFFLINE</text>

  <!-- Offline Queue -->
  <rect x="200" y="210" width="120" height="60" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#s)"/>
  <rect x="200" y="210" width="120" height="24" rx="10 10 0 0" fill="#f59e0b"/>
  <text x="260" y="228" text-anchor="middle" fill="white" font-size="9" font-weight="700">Offline Queue</text>
  <text x="260" y="252" text-anchor="middle" fill="#64748b" font-size="9">Store message</text>
  <text x="260" y="264" text-anchor="middle" fill="#64748b" font-size="8">TTL: 30 days</text>

  <!-- Push Service -->
  <rect x="380" y="210" width="100" height="60" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="380" y="210" width="100" height="24" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="430" y="228" text-anchor="middle" fill="white" font-size="9" font-weight="700">Push Service</text>
  <text x="430" y="252" text-anchor="middle" fill="#64748b" font-size="9">FCM / APNs</text>

  <!-- User B Offline -->
  <rect x="510" y="210" width="70" height="60" rx="10" fill="#fff" stroke="#ef4444" stroke-width="2" filter="url(#s)"/>
  <text x="545" y="240" text-anchor="middle" fill="#1e293b" font-size="18">📵</text>
  <text x="545" y="260" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="600">B Offline</text>

  <!-- Arrows Phase 1 -->
  <line x1="140" y1="145" x2="196" y2="145" stroke="#2563eb" stroke-width="2" marker-end="url(#arrB)"/>
  <text x="168" y="138" text-anchor="middle" fill="#2563eb" font-size="8" font-weight="600">① Send</text>

  <line x1="320" y1="135" x2="376" y2="135" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="348" y="128" text-anchor="middle" fill="#64748b" font-size="7">② Lookup</text>

  <line x1="260" y1="190" x2="260" y2="206" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="285" y="200" fill="#f59e0b" font-size="7" font-weight="600">③ Queue</text>

  <line x1="320" y1="240" x2="376" y2="240" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="348" y="233" text-anchor="middle" fill="#7c3aed" font-size="7">④ Push</text>

  <line x1="480" y1="240" x2="506" y2="240" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <line x1="196" y1="170" x2="142" y2="170" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrG)"/>
  <text x="168" y="183" text-anchor="middle" fill="#16a34a" font-size="7" font-weight="600">⑤ ACK ✓</text>

  <!-- Phase 2: Reconnect + Deliver -->
  <rect x="610" y="70" width="570" height="220" rx="12" fill="rgba(22,163,106,0.04)" stroke="rgba(22,163,106,0.15)" stroke-width="1"/>
  <text x="630" y="92" fill="#16a34a" font-size="12" font-weight="700">PHASE 2: Reconnect + Deliver (User B Comes Online)</text>

  <!-- User B Online -->
  <rect x="630" y="110" width="100" height="80" rx="10" fill="#fff" stroke="#16a34a" stroke-width="2" filter="url(#s)"/>
  <rect x="630" y="110" width="100" height="28" rx="10 10 0 0" fill="#16a34a"/>
  <text x="680" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">User B</text>
  <text x="680" y="160" text-anchor="middle" fill="#1e293b" font-size="18">📱</text>
  <text x="680" y="180" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="600">Now Online!</text>

  <!-- CG2 -->
  <rect x="790" y="110" width="120" height="80" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="790" y="110" width="120" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="850" y="130" text-anchor="middle" fill="white" font-size="10" font-weight="700">Chat Gateway 2</text>
  <text x="850" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">CG2</text>
  <text x="850" y="180" text-anchor="middle" fill="#64748b" font-size="9">Delivers queued</text>

  <!-- Queue Flush -->
  <rect x="960" y="110" width="110" height="60" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#s)"/>
  <rect x="960" y="110" width="110" height="24" rx="10 10 0 0" fill="#f59e0b"/>
  <text x="1015" y="128" text-anchor="middle" fill="white" font-size="9" font-weight="700">Offline Queue</text>
  <text x="1015" y="152" text-anchor="middle" fill="#64748b" font-size="9">Flush pending</text>
  <text x="1015" y="164" text-anchor="middle" fill="#64748b" font-size="8">messages for B</text>

  <!-- Arrows Phase 2 -->
  <line x1="730" y1="145" x2="786" y2="145" stroke="#2563eb" stroke-width="2" marker-end="url(#arrB)"/>
  <text x="758" y="138" text-anchor="middle" fill="#2563eb" font-size="7" font-weight="600">⑥ Connect</text>

  <line x1="910" y1="140" x2="956" y2="140" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="933" y="133" text-anchor="middle" fill="#f59e0b" font-size="7">⑦ Fetch</text>

  <line x1="956" y1="155" x2="912" y2="165" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <line x1="786" y1="170" x2="732" y2="170" stroke="#16a34a" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="758" y="183" text-anchor="middle" fill="#16a34a" font-size="7" font-weight="600">⑧ Deliver all</text>

  <!-- ACK back to sender -->
  <rect x="790" y="210" width="280" height="60" rx="10" fill="#fff" stroke="#16a34a" stroke-width="1" filter="url(#s)"/>
  <text x="930" y="235" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="700">⑨ Batch DELIVERED ACK → Update status → Notify User A</text>
  <text x="930" y="255" text-anchor="middle" fill="#64748b" font-size="9">User A now sees ✓✓ double grey ticks for all delivered messages</text>

  <!-- Legend -->
  <rect x="20" y="310" width="1160" height="260" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="340" fill="#1e293b" font-size="14" font-weight="700">How Store-and-Forward Works</text>

  <text x="50" y="370" fill="#2563eb" font-size="12" font-weight="600">Phase 1: User B is Offline</text>
  <text x="50" y="390" fill="#475569" font-size="11">① User A sends message via WebSocket to their assigned Chat Gateway</text>
  <text x="50" y="408" fill="#475569" font-size="11">② Gateway checks Redis — discovers User B is not connected to any server</text>
  <text x="50" y="426" fill="#475569" font-size="11">③ Message stored in offline_queue (Cassandra) with 30-day TTL</text>
  <text x="50" y="444" fill="#475569" font-size="11">④ Push notification sent via FCM/APNs (generic alert, no message content for privacy)</text>
  <text x="50" y="462" fill="#475569" font-size="11">⑤ User A gets ✓ (Sent) — message is safely persisted but not yet delivered</text>

  <text x="650" y="370" fill="#16a34a" font-size="12" font-weight="600">Phase 2: User B Reconnects</text>
  <text x="650" y="390" fill="#475569" font-size="11">⑥ User B opens app, establishes WebSocket to a Chat Gateway</text>
  <text x="650" y="408" fill="#475569" font-size="11">⑦ Gateway queries offline_queue for all pending messages</text>
  <text x="650" y="426" fill="#475569" font-size="11">⑧ All queued messages delivered in chronological order (batched)</text>
  <text x="650" y="444" fill="#475569" font-size="11">⑨ User B sends batch ACK → status updated to DELIVERED</text>
  <text x="650" y="462" fill="#475569" font-size="11">     User A's app shows ✓✓ (Delivered) for each message</text>

  <!-- Key insight -->
  <rect x="50" y="480" width="1110" height="40" rx="8" fill="rgba(245,158,11,0.08)" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>
  <text x="75" y="505" fill="#92400e" font-size="11" font-weight="600">💡 Key Insight: Messages are NEVER lost. The offline queue guarantees at-least-once delivery. Client-side deduplication (using messageId) handles duplicates if the ACK is lost.</text>
</svg>
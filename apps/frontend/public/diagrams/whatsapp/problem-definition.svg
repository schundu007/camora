<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <rect x="380" y="20" width="440" height="44" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="22" font-weight="700">Problem Definition: Designing WhatsApp</text>

  <!-- Column 1: Users & Core Actions -->
  <text x="200" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Users &amp; Core Actions</text>
  <rect x="40" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <!-- User icons -->
  <circle cx="120" cy="170" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="120" y="176" text-anchor="middle" fill="white" font-size="24">👤</text>
  <text x="120" y="215" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Sender</text>

  <text x="200" y="176" text-anchor="middle" fill="white" font-size="28">⇄</text>

  <circle cx="280" cy="170" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="280" y="176" text-anchor="middle" fill="white" font-size="24">👤</text>
  <text x="280" y="215" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Recipient</text>

  <!-- Core Actions Box -->
  <rect x="70" y="240" width="260" height="190" rx="12" fill="#f97316" filter="url(#shadow)"/>
  <text x="200" y="270" text-anchor="middle" fill="white" font-size="15" font-weight="700">Core Actions</text>
  <line x1="90" y1="282" x2="310" y2="282" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="100" y="310" fill="white" font-size="13">✉️  Send Messages</text>
  <text x="100" y="340" fill="white" font-size="13">⚡  Receive Instantly</text>
  <text x="100" y="370" fill="white" font-size="13">✓✓  See Status (Sent/Delivered/Read)</text>
  <text x="100" y="400" fill="white" font-size="13">🟢  See Online/Last Seen</text>

  <!-- Column 2: In Scope -->
  <text x="600" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">In Scope: Essentials</text>
  <rect x="440" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="440" y="125" width="320" height="310" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <text x="470" y="160" fill="white" font-size="13" font-weight="600">📱  One-to-one text messaging</text>
  <text x="470" y="195" fill="white" font-size="13" font-weight="600">⚡  Real-time delivery</text>
  <text x="470" y="230" fill="white" font-size="13" font-weight="600">✓✓  Message Status Indicators</text>
  <text x="490" y="250" fill="rgba(255,255,255,0.7)" font-size="11">(Sent, Delivered, Read)</text>
  <text x="470" y="280" fill="white" font-size="13" font-weight="600">🟢  User Presence</text>
  <text x="490" y="300" fill="rgba(255,255,255,0.7)" font-size="11">(Online / Last Seen)</text>
  <text x="470" y="330" fill="white" font-size="13" font-weight="600">💾  Offline message storage</text>
  <text x="490" y="350" fill="rgba(255,255,255,0.7)" font-size="11">(Store-and-forward delivery)</text>
  <text x="470" y="380" fill="white" font-size="13" font-weight="600">📜  Chat history retrieval</text>
  <text x="470" y="410" fill="white" font-size="13" font-weight="600">🔐  End-to-end encryption</text>

  <!-- Column 3: Out of Scope -->
  <text x="1000" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Out of Scope / Future</text>
  <rect x="840" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="840" y="125" width="320" height="310" rx="12" fill="rgba(245,158,11,0.25)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>

  <text x="870" y="160" fill="rgba(255,255,255,0.85)" font-size="13">❌  Group Chats</text>
  <text x="870" y="195" fill="rgba(255,255,255,0.85)" font-size="13">❌  Voice / Video Calls</text>
  <text x="870" y="230" fill="rgba(255,255,255,0.85)" font-size="13">❌  Status Updates (Stories)</text>
  <text x="870" y="265" fill="rgba(255,255,255,0.85)" font-size="13">❌  Media Messages (Images/Videos)</text>
  <text x="870" y="300" fill="rgba(255,255,255,0.85)" font-size="13">❌  E2EE Cryptographic Details</text>
  <text x="870" y="335" fill="rgba(255,255,255,0.85)" font-size="13">❌  Payment Integration</text>
  <text x="870" y="370" fill="rgba(255,255,255,0.85)" font-size="13">❌  Business API / Chatbots</text>

  <!-- Bottom: Arrow flow -->
  <text x="600" y="520" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="12">Focus on the core messaging infrastructure first → extend to group/media later</text>

  <!-- Arrow from In Scope to architecture -->
  <rect x="440" y="470" width="320" height="36" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="600" y="494" text-anchor="middle" fill="white" font-size="13" font-weight="600">🏗️  Real-Time Messaging Infrastructure</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #1e293b; }
      .label { font-size: 12px; font-weight: 600; fill: #fff; }
      .box-label { font-size: 11px; font-weight: 600; fill: #1e293b; }
      .desc { font-size: 10px; fill: #64748b; }
    </style>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f8f9"/>
      <stop offset="100%" stop-color="#eef0f2"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="600" height="400" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="599" height="399" rx="12" fill="none" stroke="#e2e8f0"/>

  <text x="300" y="36" text-anchor="middle" class="title">Caching Layers in a Web Application</text>

  <!-- Layer 1: Browser -->
  <g transform="translate(300, 75)">
    <rect x="-250" y="-20" width="500" height="40" rx="8" fill="#10b981" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label">Browser Cache (HTTP headers, Service Worker)</text>
  </g>
  <text x="560" y="79" text-anchor="end" class="desc">~0ms</text>

  <!-- Arrow -->
  <line x1="300" y1="95" x2="300" y2="115" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer 2: CDN -->
  <g transform="translate(300, 140)">
    <rect x="-230" y="-20" width="460" height="40" rx="8" fill="#3b82f6" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label">CDN Edge Cache (CloudFront, Cloudflare)</text>
  </g>
  <text x="545" y="144" text-anchor="end" class="desc">~5ms</text>

  <!-- Arrow -->
  <line x1="300" y1="160" x2="300" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer 3: API Gateway -->
  <g transform="translate(300, 205)">
    <rect x="-210" y="-20" width="420" height="40" rx="8" fill="#8b5cf6" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label">API Gateway / Reverse Proxy Cache (Nginx)</text>
  </g>
  <text x="530" y="209" text-anchor="end" class="desc">~10ms</text>

  <!-- Arrow -->
  <line x1="300" y1="225" x2="300" y2="245" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer 4: Application -->
  <g transform="translate(300, 270)">
    <rect x="-190" y="-20" width="380" height="40" rx="8" fill="#f59e0b" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label">Application Cache (Redis, Memcached)</text>
  </g>
  <text x="515" y="274" text-anchor="end" class="desc">~1ms</text>

  <!-- Arrow -->
  <line x1="300" y1="290" x2="300" y2="310" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Layer 5: Database -->
  <g transform="translate(300, 335)">
    <rect x="-170" y="-20" width="340" height="40" rx="8" fill="#ef4444" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label">Database (Query Cache, Buffer Pool)</text>
  </g>
  <text x="498" y="339" text-anchor="end" class="desc">10-100ms</text>

  <!-- Bottom label -->
  <g transform="translate(300, 385)">
    <text x="0" y="0" text-anchor="middle" class="desc">Each layer reduces load on the layer below. Cache closest to user = lowest latency.</text>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #1e293b; }
      .subtitle { font-size: 11px; fill: #64748b; }
      .label { font-size: 12px; font-weight: 600; fill: #fff; }
      .desc { font-size: 10px; fill: #64748b; }
      .bold { font-size: 11px; font-weight: 600; fill: #1e293b; }
    </style>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f8f9"/>
      <stop offset="100%" stop-color="#eef0f2"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="599" height="399" rx="12" fill="none" stroke="#e2e8f0"/>

  <text x="300" y="36" text-anchor="middle" class="title">SQL vs NoSQL Decision Tree</text>

  <!-- SQL side -->
  <g transform="translate(150, 80)">
    <rect x="-120" y="-20" width="240" height="40" rx="20" fill="url(#blue)" filter="url(#shadow)"/>
    <text x="0" y="6" text-anchor="middle" class="label">SQL (Relational)</text>
  </g>
  <g transform="translate(150, 130)">
    <rect x="-110" y="-14" width="220" height="28" rx="6" fill="#fff" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
    <text x="0" y="4" text-anchor="middle" class="bold">Tables, Rows, Columns</text>
  </g>
  <g transform="translate(150, 168)">
    <rect x="-110" y="-14" width="220" height="28" rx="6" fill="#fff" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
    <text x="0" y="4" text-anchor="middle" class="bold">ACID Transactions</text>
  </g>
  <g transform="translate(150, 206)">
    <rect x="-110" y="-14" width="220" height="28" rx="6" fill="#fff" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
    <text x="0" y="4" text-anchor="middle" class="bold">Complex JOINs</text>
  </g>
  <g transform="translate(150, 244)">
    <rect x="-110" y="-14" width="220" height="28" rx="6" fill="#fff" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
    <text x="0" y="4" text-anchor="middle" class="bold">Vertical Scaling</text>
  </g>
  <g transform="translate(150, 290)">
    <text x="0" y="0" text-anchor="middle" class="desc">PostgreSQL, MySQL, Oracle</text>
    <text x="0" y="16" text-anchor="middle" class="desc">Best for: Banking, E-commerce, CRM</text>
  </g>

  <!-- NoSQL side -->
  <g transform="translate(450, 80)">
    <rect x="-120" y="-20" width="240" height="40" rx="20" fill="url(#green)" filter="url(#shadow)"/>
    <text x="0" y="6" text-anchor="middle" class="label">NoSQL (Non-relational)</text>
  </g>
  <g transform="translate(450, 130)">
    <rect x="-110" y="-14" width="220" height="28" rx="6" fill="#fff" stroke="#10b981" stroke-width="1" filter="url(#shadow)"/>
    <text x="0" y="4" text-anchor="middle" class="bold">Documents, Key-Value, Graph</text>
  </g>
  <g transform="translate(450, 168)">
    <rect x="-110" y="-14" width="220" height="28" rx="6" fill="#fff" stroke="#10b981" stroke-width="1" filter="url(#shadow)"/>
    <text x="0" y="4" text-anchor="middle" class="bold">BASE / Eventual Consistency</text>
  </g>
  <g transform="translate(450, 206)">
    <rect x="-110" y="-14" width="220" height="28" rx="6" fill="#fff" stroke="#10b981" stroke-width="1" filter="url(#shadow)"/>
    <text x="0" y="4" text-anchor="middle" class="bold">Simple Key-Based Access</text>
  </g>
  <g transform="translate(450, 244)">
    <rect x="-110" y="-14" width="220" height="28" rx="6" fill="#fff" stroke="#10b981" stroke-width="1" filter="url(#shadow)"/>
    <text x="0" y="4" text-anchor="middle" class="bold">Horizontal Scaling</text>
  </g>
  <g transform="translate(450, 290)">
    <text x="0" y="0" text-anchor="middle" class="desc">MongoDB, Cassandra, DynamoDB, Redis</text>
    <text x="0" y="16" text-anchor="middle" class="desc">Best for: Social media, IoT, Real-time</text>
  </g>

  <!-- Divider -->
  <line x1="300" y1="60" x2="300" y2="320" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <g transform="translate(300, 340)">
    <rect x="-60" y="-14" width="120" height="28" rx="14" fill="#1e293b"/>
    <text x="0" y="5" text-anchor="middle" class="label" font-size="11">VS</text>
  </g>

  <!-- Bottom note -->
  <g transform="translate(300, 382)">
    <text x="0" y="0" text-anchor="middle" class="desc">Most systems use BOTH -- SQL for transactions, NoSQL for caching and flexible data</text>
  </g>
</svg>
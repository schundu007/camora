<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #1e293b; }
      .label { font-size: 12px; font-weight: 600; fill: #fff; }
      .box-label { font-size: 11px; font-weight: 600; fill: #1e293b; }
      .desc { font-size: 10px; fill: #64748b; }
    </style>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f8f9"/>
      <stop offset="100%" stop-color="#eef0f2"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="599" height="399" rx="12" fill="none" stroke="#e2e8f0"/>

  <text x="300" y="36" text-anchor="middle" class="title">Database Sharding</text>

  <!-- Application -->
  <g transform="translate(300, 80)">
    <rect x="-70" y="-18" width="140" height="36" rx="18" fill="url(#violet)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label">Application</text>
  </g>

  <!-- Arrow down -->
  <line x1="300" y1="100" x2="300" y2="135" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Shard Router -->
  <g transform="translate(300, 155)">
    <rect x="-90" y="-18" width="180" height="36" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="box-label">Shard Router (hash key)</text>
  </g>

  <!-- Fan-out arrows -->
  <line x1="210" y1="173" x2="105" y2="225" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="270" y1="173" x2="245" y2="225" stroke="#10b981" stroke-width="1.5"/>
  <line x1="330" y1="173" x2="355" y2="225" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="390" y1="173" x2="495" y2="225" stroke="#ef4444" stroke-width="1.5"/>

  <!-- Shard 1 -->
  <g transform="translate(105, 255)">
    <rect x="-60" y="-28" width="120" height="56" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="-60" y="-28" width="120" height="5" rx="2" fill="#3b82f6"/>
    <text x="0" y="-4" text-anchor="middle" class="box-label">Shard 1</text>
    <text x="0" y="12" text-anchor="middle" class="desc">Users A-F</text>
  </g>

  <!-- Shard 2 -->
  <g transform="translate(245, 255)">
    <rect x="-60" y="-28" width="120" height="56" rx="8" fill="#fff" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="-60" y="-28" width="120" height="5" rx="2" fill="#10b981"/>
    <text x="0" y="-4" text-anchor="middle" class="box-label">Shard 2</text>
    <text x="0" y="12" text-anchor="middle" class="desc">Users G-M</text>
  </g>

  <!-- Shard 3 -->
  <g transform="translate(385, 255)">
    <rect x="-60" y="-28" width="120" height="56" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="-60" y="-28" width="120" height="5" rx="2" fill="#f59e0b"/>
    <text x="0" y="-4" text-anchor="middle" class="box-label">Shard 3</text>
    <text x="0" y="12" text-anchor="middle" class="desc">Users N-S</text>
  </g>

  <!-- Shard 4 -->
  <g transform="translate(525, 255)">
    <rect x="-60" y="-28" width="120" height="56" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="-60" y="-28" width="120" height="5" rx="2" fill="#ef4444"/>
    <text x="0" y="-4" text-anchor="middle" class="box-label">Shard 4</text>
    <text x="0" y="12" text-anchor="middle" class="desc">Users T-Z</text>
  </g>

  <!-- Key strategies -->
  <g transform="translate(300, 340)">
    <rect x="-260" y="-22" width="520" height="44" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="0" y="-4" text-anchor="middle" class="box-label" fill="#92400e">Common shard keys: user_id, geographic region, tenant_id</text>
    <text x="0" y="14" text-anchor="middle" class="desc" fill="#92400e">Good shard key = even distribution + query locality</text>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="pollGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="webhookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">Polling vs Webhooks</text>

  <!-- POLLING SECTION (Left) -->
  <rect x="20" y="48" width="370" height="175" rx="10" fill="url(#pollGrad)" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="205" y="70" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="600">Polling (Pull Model)</text>

  <!-- Service A box -->
  <rect x="45" y="85" width="90" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="90" y="110" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">Service A</text>

  <!-- Service B box -->
  <rect x="275" y="85" width="90" height="40" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="320" y="110" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">Service B</text>

  <!-- Polling arrows (repeated requests) -->
  <!-- Request 1 -->
  <line x1="135" y1="92" x2="270" y2="92" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="200" y="88" text-anchor="middle" fill="#94a3b8" font-size="9">Any updates?</text>
  <line x1="270" y1="98" x2="135" y2="98" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="200" y="97" text-anchor="middle" fill="#64748b" font-size="8">No</text>

  <!-- Clock icon between requests -->
  <circle cx="200" cy="110" r="7" fill="none" stroke="#f59e0b" stroke-width="1"/>
  <line x1="200" y1="106" x2="200" y2="110" stroke="#f59e0b" stroke-width="1"/>
  <line x1="200" y1="110" x2="203" y2="108" stroke="#f59e0b" stroke-width="1"/>
  <text x="215" y="113" fill="#f59e0b" font-size="8">5s</text>

  <!-- Request 2 -->
  <line x1="135" y1="118" x2="270" y2="118" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="200" y="116" text-anchor="middle" fill="#94a3b8" font-size="9">Any updates?</text>
  <line x1="270" y1="124" x2="135" y2="124" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="200" y="123" text-anchor="middle" fill="#64748b" font-size="8">No</text>

  <!-- Clock icon -->
  <circle cx="200" cy="136" r="7" fill="none" stroke="#f59e0b" stroke-width="1"/>
  <line x1="200" y1="132" x2="200" y2="136" stroke="#f59e0b" stroke-width="1"/>
  <line x1="200" y1="136" x2="203" y2="134" stroke="#f59e0b" stroke-width="1"/>
  <text x="215" y="139" fill="#f59e0b" font-size="8">5s</text>

  <!-- Request 3 (with data) -->
  <line x1="135" y1="148" x2="270" y2="148" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="200" y="146" text-anchor="middle" fill="#94a3b8" font-size="9">Any updates?</text>
  <line x1="270" y1="154" x2="135" y2="154" stroke="#10b981" stroke-width="1.5"/>
  <text x="200" y="164" text-anchor="middle" fill="#34d399" font-size="9" font-weight="600">Data!</text>

  <!-- Polling summary -->
  <text x="205" y="190" text-anchor="middle" fill="#94a3b8" font-size="10">Client checks repeatedly at intervals</text>
  <text x="205" y="205" text-anchor="middle" fill="#f59e0b" font-size="10">Most requests return empty</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34d399"/>
    </marker>
  </defs>

  <!-- WEBHOOKS SECTION (Right) -->
  <rect x="410" y="48" width="370" height="175" rx="10" fill="url(#webhookGrad)" stroke="#10b981" stroke-width="1" stroke-opacity="0.3"/>
  <text x="595" y="70" text-anchor="middle" fill="#34d399" font-size="14" font-weight="600">Webhooks (Push Model)</text>

  <!-- Service A box -->
  <rect x="435" y="85" width="90" height="40" rx="6" fill="#1a3a2a" stroke="#10b981" stroke-width="1.5"/>
  <text x="480" y="110" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="600">Service A</text>

  <!-- Service B box -->
  <rect x="665" y="85" width="90" height="40" rx="6" fill="#1a3a2a" stroke="#10b981" stroke-width="1.5"/>
  <text x="710" y="110" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="600">Service B</text>

  <!-- Idle period -->
  <text x="590" y="95" text-anchor="middle" fill="#475569" font-size="9">idle...</text>
  <line x1="530" y1="100" x2="660" y2="100" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Event occurs indicator -->
  <circle cx="710" cy="135" r="10" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
  <text x="710" y="139" text-anchor="middle" fill="#34d399" font-size="10" font-weight="700">!</text>
  <text x="740" y="139" fill="#34d399" font-size="9">Event</text>

  <!-- Webhook push arrow -->
  <line x1="660" y1="150" x2="530" y2="150" stroke="#34d399" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="595" y="146" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">POST /webhook</text>
  <text x="595" y="165" text-anchor="middle" fill="#34d399" font-size="10">Push data immediately</text>

  <!-- Webhook summary -->
  <text x="595" y="190" text-anchor="middle" fill="#94a3b8" font-size="10">Server pushes only when event occurs</text>
  <text x="595" y="205" text-anchor="middle" fill="#34d399" font-size="10">No wasted requests</text>

  <!-- COMPARISON TABLE -->
  <rect x="20" y="235" width="760" height="155" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- Table header -->
  <rect x="20" y="235" width="760" height="30" rx="10" fill="#334155"/>
  <rect x="20" y="255" width="760" height="5" fill="#334155"/>
  <text x="120" y="255" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="700">Aspect</text>
  <text x="350" y="255" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">Polling</text>
  <text x="610" y="255" text-anchor="middle" fill="#34d399" font-size="12" font-weight="700">Webhooks</text>

  <!-- Row 1: Data Flow -->
  <line x1="40" y1="275" x2="760" y2="275" stroke="#334155" stroke-width="0.5"/>
  <text x="50" y="292" fill="#cbd5e1" font-size="11" font-weight="600">Data Flow</text>
  <text x="350" y="292" text-anchor="middle" fill="#94a3b8" font-size="11">Client pulls from server</text>
  <text x="610" y="292" text-anchor="middle" fill="#94a3b8" font-size="11">Server pushes to client</text>

  <!-- Row 2: Resource Use -->
  <line x1="40" y1="305" x2="760" y2="305" stroke="#334155" stroke-width="0.5"/>
  <text x="50" y="322" fill="#cbd5e1" font-size="11" font-weight="600">Resource Use</text>
  <text x="350" y="322" text-anchor="middle" fill="#f87171" font-size="11">High (constant requests)</text>
  <text x="610" y="322" text-anchor="middle" fill="#34d399" font-size="11">Low (only on events)</text>

  <!-- Row 3: Control -->
  <line x1="40" y1="335" x2="760" y2="335" stroke="#334155" stroke-width="0.5"/>
  <text x="50" y="352" fill="#cbd5e1" font-size="11" font-weight="600">Control</text>
  <text x="350" y="352" text-anchor="middle" fill="#94a3b8" font-size="11">Client controls timing</text>
  <text x="610" y="352" text-anchor="middle" fill="#94a3b8" font-size="11">Server controls timing</text>

  <!-- Row 4: Risks -->
  <line x1="40" y1="365" x2="760" y2="365" stroke="#334155" stroke-width="0.5"/>
  <text x="50" y="382" fill="#cbd5e1" font-size="11" font-weight="600">Risks</text>
  <text x="350" y="382" text-anchor="middle" fill="#94a3b8" font-size="11">Wasted bandwidth, delayed data</text>
  <text x="610" y="382" text-anchor="middle" fill="#94a3b8" font-size="11">Missed events if endpoint down</text>
</svg>
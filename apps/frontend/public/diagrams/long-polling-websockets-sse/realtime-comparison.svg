<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrR" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrV" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
  </defs>
  <rect width="600" height="350" fill="#f7f8f9" rx="4"/>
  <text x="300" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Real-Time Communication Patterns</text>

  <!-- Column 1: Long Polling -->
  <rect x="10" y="40" width="185" height="300" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="102" y="62" text-anchor="middle" font-size="12" font-weight="700" fill="#ef4444">Long Polling</text>
  <text x="35" y="82" font-size="9" font-weight="600" fill="#64748b">Client</text>
  <text x="150" y="82" font-size="9" font-weight="600" fill="#64748b">Server</text>
  <!-- Timeline -->
  <line x1="50" y1="90" x2="50" y2="310" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="160" y1="90" x2="160" y2="310" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Request 1 -->
  <line x1="53" y1="100" x2="155" y2="110" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrR)"/>
  <text x="95" y="97" text-anchor="middle" font-size="7" fill="#ef4444">request</text>
  <rect x="150" y="112" width="20" height="30" rx="2" fill="#fef2f2" stroke="#ef4444" stroke-width="0.5"/>
  <text x="160" y="130" text-anchor="middle" font-size="6" fill="#ef4444">wait</text>
  <line x1="157" y1="145" x2="53" y2="155" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="95" y="155" text-anchor="middle" font-size="7" fill="#10b981">response</text>
  <!-- Request 2 -->
  <line x1="53" y1="170" x2="155" y2="180" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrR)"/>
  <text x="95" y="168" text-anchor="middle" font-size="7" fill="#ef4444">request</text>
  <rect x="150" y="182" width="20" height="40" rx="2" fill="#fef2f2" stroke="#ef4444" stroke-width="0.5"/>
  <text x="160" y="204" text-anchor="middle" font-size="6" fill="#ef4444">wait</text>
  <line x1="157" y1="225" x2="53" y2="235" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="95" y="235" text-anchor="middle" font-size="7" fill="#10b981">response</text>
  <text x="102" y="268" text-anchor="middle" font-size="8" fill="#64748b">Repeated request/</text>
  <text x="102" y="280" text-anchor="middle" font-size="8" fill="#64748b">response cycles.</text>
  <text x="102" y="296" text-anchor="middle" font-size="8" fill="#ef4444">High overhead</text>

  <!-- Column 2: WebSocket -->
  <rect x="207" y="40" width="185" height="300" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="300" y="62" text-anchor="middle" font-size="12" font-weight="700" fill="#3b82f6">WebSocket</text>
  <text x="232" y="82" font-size="9" font-weight="600" fill="#64748b">Client</text>
  <text x="348" y="82" font-size="9" font-weight="600" fill="#64748b">Server</text>
  <line x1="247" y1="90" x2="247" y2="310" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="358" y1="90" x2="358" y2="310" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Handshake -->
  <line x1="250" y1="100" x2="353" y2="105" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrB)"/>
  <text x="300" y="97" text-anchor="middle" font-size="7" fill="#3b82f6">upgrade</text>
  <line x1="355" y1="115" x2="250" y2="120" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrB)"/>
  <text x="300" y="115" text-anchor="middle" font-size="7" fill="#3b82f6">101 Switching</text>
  <!-- Persistent connection -->
  <rect x="245" y="128" width="115" height="110" rx="4" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="302" y="142" text-anchor="middle" font-size="7" fill="#3b82f6">persistent connection</text>
  <line x1="250" y1="155" x2="353" y2="155" stroke="#3b82f6" stroke-width="1" marker-end="url(#arrB)"/>
  <text x="302" y="152" text-anchor="middle" font-size="7" fill="#1e293b">msg</text>
  <line x1="355" y1="175" x2="250" y2="175" stroke="#10b981" stroke-width="1" marker-end="url(#arrG)"/>
  <text x="302" y="172" text-anchor="middle" font-size="7" fill="#1e293b">msg</text>
  <line x1="250" y1="195" x2="353" y2="195" stroke="#3b82f6" stroke-width="1" marker-end="url(#arrB)"/>
  <text x="302" y="192" text-anchor="middle" font-size="7" fill="#1e293b">msg</text>
  <line x1="355" y1="215" x2="250" y2="215" stroke="#10b981" stroke-width="1" marker-end="url(#arrG)"/>
  <text x="302" y="212" text-anchor="middle" font-size="7" fill="#1e293b">msg</text>
  <line x1="355" y1="228" x2="250" y2="228" stroke="#10b981" stroke-width="1" marker-end="url(#arrG)"/>
  <text x="302" y="225" text-anchor="middle" font-size="7" fill="#1e293b">msg</text>
  <text x="300" y="268" text-anchor="middle" font-size="8" fill="#64748b">Full-duplex, persistent.</text>
  <text x="300" y="280" text-anchor="middle" font-size="8" fill="#64748b">Both sides send anytime.</text>
  <text x="300" y="296" text-anchor="middle" font-size="8" fill="#3b82f6">Bidirectional</text>

  <!-- Column 3: SSE -->
  <rect x="405" y="40" width="185" height="300" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="498" y="62" text-anchor="middle" font-size="12" font-weight="700" fill="#8b5cf6">Server-Sent Events</text>
  <text x="428" y="82" font-size="9" font-weight="600" fill="#64748b">Client</text>
  <text x="548" y="82" font-size="9" font-weight="600" fill="#64748b">Server</text>
  <line x1="443" y1="90" x2="443" y2="310" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="558" y1="90" x2="558" y2="310" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Initial request -->
  <line x1="446" y1="100" x2="553" y2="105" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrV)"/>
  <text x="498" y="97" text-anchor="middle" font-size="7" fill="#8b5cf6">subscribe</text>
  <!-- Server push stream -->
  <rect x="441" y="115" width="120" height="130" rx="4" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="501" y="128" text-anchor="middle" font-size="7" fill="#8b5cf6">text/event-stream</text>
  <line x1="555" y1="140" x2="446" y2="140" stroke="#8b5cf6" stroke-width="1" marker-end="url(#arrV)"/>
  <text x="501" y="137" text-anchor="middle" font-size="7" fill="#1e293b">event</text>
  <line x1="555" y1="160" x2="446" y2="160" stroke="#8b5cf6" stroke-width="1" marker-end="url(#arrV)"/>
  <text x="501" y="157" text-anchor="middle" font-size="7" fill="#1e293b">event</text>
  <line x1="555" y1="180" x2="446" y2="180" stroke="#8b5cf6" stroke-width="1" marker-end="url(#arrV)"/>
  <text x="501" y="177" text-anchor="middle" font-size="7" fill="#1e293b">event</text>
  <line x1="555" y1="200" x2="446" y2="200" stroke="#8b5cf6" stroke-width="1" marker-end="url(#arrV)"/>
  <text x="501" y="197" text-anchor="middle" font-size="7" fill="#1e293b">event</text>
  <line x1="555" y1="220" x2="446" y2="220" stroke="#8b5cf6" stroke-width="1" marker-end="url(#arrV)"/>
  <text x="501" y="217" text-anchor="middle" font-size="7" fill="#1e293b">event</text>
  <line x1="555" y1="235" x2="446" y2="235" stroke="#8b5cf6" stroke-width="1" marker-end="url(#arrV)"/>
  <text x="501" y="232" text-anchor="middle" font-size="7" fill="#1e293b">event</text>
  <text x="498" y="268" text-anchor="middle" font-size="8" fill="#64748b">Server pushes events.</text>
  <text x="498" y="280" text-anchor="middle" font-size="8" fill="#64748b">Auto-reconnect built in.</text>
  <text x="498" y="296" text-anchor="middle" font-size="8" fill="#8b5cf6">Server &#8594; Client only</text>
</svg>
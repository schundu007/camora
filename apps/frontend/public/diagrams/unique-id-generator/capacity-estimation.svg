<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgCap" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="550" fill="url(#bgCap)" rx="16"/>

  <!-- Title -->
  <rect x="380" y="16" width="440" height="40" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="43" text-anchor="middle" fill="white" font-size="20" font-weight="700">Back-of-the-Envelope Estimates</text>

  <!-- Column 1: Traffic -->
  <rect x="20" y="80" width="275" height="440" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="20" y="80" width="275" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="157" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Generation Rate</text>

  <text x="45" y="145" fill="#fbbf24" font-size="13" font-weight="700">⚡ Target throughput</text>
  <text x="157" y="170" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">↓</text>

  <text x="45" y="200" fill="white" font-size="12">IDs generated per second:</text>
  <text x="45" y="218" fill="#fbbf24" font-size="15" font-weight="700">10 Million IDs/sec</text>
  <text x="157" y="240" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">↓</text>

  <text x="45" y="268" fill="white" font-size="12">IDs per day:</text>
  <text x="45" y="288" fill="#fbbf24" font-size="16" font-weight="800">864 Billion IDs/day</text>
  <text x="157" y="310" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">↓</text>

  <text x="45" y="338" fill="white" font-size="11">Per data center (5 DCs):</text>
  <text x="45" y="356" fill="rgba(255,255,255,0.7)" font-size="10">2M IDs/sec per DC</text>
  <text x="45" y="378" fill="#fbbf24" font-size="14" font-weight="800">Per machine (1024 machines):</text>
  <text x="157" y="400" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">↓</text>

  <text x="45" y="425" fill="white" font-size="11">IDs per machine per second:</text>
  <text x="45" y="448" fill="#f97316" font-size="18" font-weight="800">≈ 10,000 IDs/sec</text>
  <text x="45" y="475" fill="rgba(255,255,255,0.7)" font-size="10">Well within single-thread capacity</text>

  <!-- Column 2: Snowflake Bit Layout -->
  <rect x="310" y="80" width="265" height="250" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="80" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Snowflake 64-bit Layout</text>

  <text x="335" y="145" fill="#fbbf24" font-size="12" font-weight="700">1 bit: sign (always 0)</text>
  <text x="335" y="175" fill="#fbbf24" font-size="12" font-weight="700">41 bits: timestamp (ms)</text>
  <text x="355" y="195" fill="rgba(255,255,255,0.7)" font-size="10">= 69 years of unique IDs</text>
  <text x="335" y="225" fill="#fbbf24" font-size="12" font-weight="700">5 bits: datacenter ID (32 DCs)</text>
  <text x="335" y="255" fill="#fbbf24" font-size="12" font-weight="700">5 bits: machine ID (32/DC)</text>
  <text x="335" y="285" fill="#fbbf24" font-size="12" font-weight="700">12 bits: sequence (4096/ms)</text>
  <text x="355" y="305" fill="rgba(255,255,255,0.7)" font-size="10">= 4M IDs/sec per machine</text>

  <rect x="325" y="312" width="235" height="10" rx="3" fill="rgba(255,255,255,0.1)"/>

  <!-- Column 3: Clock -->
  <rect x="310" y="350" width="265" height="170" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="350" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="374" text-anchor="middle" fill="white" font-size="14" font-weight="700">Clock Synchronization</text>

  <text x="335" y="410" fill="white" font-size="11">NTP accuracy: <tspan fill="#fbbf24" font-weight="700">~10ms drift</tspan></text>
  <text x="442" y="430" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">↓</text>

  <text x="335" y="450" fill="white" font-size="11">IDs within 10ms window may</text>
  <text x="335" y="470" fill="white" font-size="11">not be strictly ordered</text>

  <text x="335" y="500" fill="white" font-size="11">Clock backward detection:</text>
  <text x="335" y="520" fill="#f97316" font-size="13" font-weight="800">Reject or wait until caught up</text>

  <!-- Column 4: Comparison -->
  <rect x="590" y="80" width="290" height="250" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="80" width="290" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Approach Comparison</text>

  <text x="615" y="145" fill="#fbbf24" font-size="12" font-weight="700">Snowflake (recommended)</text>
  <text x="615" y="165" fill="rgba(255,255,255,0.7)" font-size="10">64-bit, time-sorted, no coordination</text>

  <text x="615" y="195" fill="white" font-size="12" font-weight="600">UUID v4</text>
  <text x="615" y="215" fill="rgba(255,255,255,0.7)" font-size="10">128-bit, random, no ordering</text>

  <text x="615" y="245" fill="white" font-size="12" font-weight="600">DB auto-increment</text>
  <text x="615" y="265" fill="rgba(255,255,255,0.7)" font-size="10">Sequential but bottleneck on single DB</text>

  <text x="615" y="295" fill="white" font-size="12" font-weight="600">Ticket server (Flickr)</text>
  <text x="615" y="315" fill="rgba(255,255,255,0.7)" font-size="10">Centralized, simpler, SPOF risk</text>

  <!-- Column 5: Capacity -->
  <rect x="590" y="350" width="290" height="170" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="350" width="290" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="374" text-anchor="middle" fill="white" font-size="14" font-weight="700">ID Space Capacity</text>

  <text x="615" y="410" fill="white" font-size="11">41-bit timestamp (ms since epoch):</text>
  <text x="615" y="432" fill="#fbbf24" font-size="14" font-weight="700">69 years before rollover</text>

  <text x="615" y="462" fill="white" font-size="11">Total unique IDs possible:</text>
  <text x="615" y="484" fill="#f97316" font-size="14" font-weight="700">2^63 = 9.2 quintillion</text>

  <text x="615" y="510" fill="rgba(255,255,255,0.6)" font-size="10">At 10M/sec, lasts 29,000+ years</text>

  <!-- Key Insights -->
  <rect x="900" y="80" width="280" height="440" rx="12" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="1040" y="108" text-anchor="middle" fill="white" font-size="14" font-weight="700">💡 Key Insights</text>
  <line x1="920" y1="118" x2="1160" y2="118" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <text x="920" y="145" fill="white" font-size="11" font-weight="600">No coordination needed</text>
  <text x="920" y="163" fill="rgba(255,255,255,0.7)" font-size="10">Each machine generates IDs</text>
  <text x="920" y="178" fill="rgba(255,255,255,0.7)" font-size="10">independently. No network calls,</text>
  <text x="920" y="193" fill="rgba(255,255,255,0.7)" font-size="10">no consensus protocol needed.</text>

  <text x="920" y="225" fill="white" font-size="11" font-weight="600">Time-sorting enables indexing</text>
  <text x="920" y="243" fill="rgba(255,255,255,0.7)" font-size="10">IDs are roughly time-ordered,</text>
  <text x="920" y="258" fill="rgba(255,255,255,0.7)" font-size="10">so B-tree indexes stay efficient.</text>
  <text x="920" y="273" fill="rgba(255,255,255,0.7)" font-size="10">UUIDs cause random IO = slow.</text>

  <text x="920" y="305" fill="white" font-size="11" font-weight="600">Clock skew is the biggest risk</text>
  <text x="920" y="323" fill="rgba(255,255,255,0.7)" font-size="10">If clock goes backward, IDs</text>
  <text x="920" y="338" fill="rgba(255,255,255,0.7)" font-size="10">could collide. Must detect and</text>
  <text x="920" y="353" fill="rgba(255,255,255,0.7)" font-size="10">wait or use logical clock.</text>

  <text x="920" y="385" fill="white" font-size="11" font-weight="600">64-bit fits everywhere</text>
  <text x="920" y="403" fill="rgba(255,255,255,0.7)" font-size="10">Native integer in most languages.</text>
  <text x="920" y="418" fill="rgba(255,255,255,0.7)" font-size="10">Half the storage of 128-bit UUID.</text>
  <text x="920" y="433" fill="rgba(255,255,255,0.7)" font-size="10">Fits in a single DB bigint column.</text>

  <text x="920" y="465" fill="white" font-size="11" font-weight="600">Sequence bits limit burst rate</text>
  <text x="920" y="483" fill="rgba(255,255,255,0.7)" font-size="10">12 bits = 4096 IDs per millisecond</text>
  <text x="920" y="498" fill="rgba(255,255,255,0.7)" font-size="10">per machine. If exceeded, must</text>
  <text x="920" y="513" fill="rgba(255,255,255,0.7)" font-size="10">wait until next millisecond.</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <rect x="320" y="20" width="560" height="44" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="22" font-weight="700">Problem Definition: Designing a Unique ID Generator</text>

  <!-- Column 1: Users & Core Actions -->
  <text x="200" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Users &amp; Core Actions</text>
  <rect x="40" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <!-- User icons -->
  <circle cx="120" cy="170" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="120" y="176" text-anchor="middle" fill="white" font-size="24">🖥️</text>
  <text x="120" y="215" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Service A</text>

  <text x="200" y="176" text-anchor="middle" fill="white" font-size="28">&#x2192;</text>

  <circle cx="280" cy="170" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="280" y="176" text-anchor="middle" fill="white" font-size="24">🔢</text>
  <text x="280" y="215" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">ID Service</text>

  <!-- Core Actions Box -->
  <rect x="70" y="240" width="260" height="190" rx="12" fill="#f97316" filter="url(#shadow)"/>
  <text x="200" y="270" text-anchor="middle" fill="white" font-size="15" font-weight="700">Core Requirements</text>
  <line x1="90" y1="282" x2="310" y2="282" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="100" y="310" fill="white" font-size="13">🔢  Generate unique 64-bit IDs</text>
  <text x="100" y="340" fill="white" font-size="13">📈  Time-sortable ordering</text>
  <text x="100" y="370" fill="white" font-size="13">⚡  Millions of IDs per second</text>
  <text x="100" y="400" fill="white" font-size="13">🌍  Multi-datacenter support</text>

  <!-- Column 2: In Scope -->
  <text x="600" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">In Scope: Essentials</text>
  <rect x="440" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="440" y="125" width="320" height="340" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <text x="470" y="160" fill="white" font-size="13" font-weight="600">❄️  Snowflake-style ID generation</text>
  <text x="490" y="180" fill="rgba(255,255,255,0.7)" font-size="11">(timestamp + datacenter + machine + seq)</text>
  <text x="470" y="210" fill="white" font-size="13" font-weight="600">🔑  UUID v4 generation</text>
  <text x="490" y="230" fill="rgba(255,255,255,0.7)" font-size="11">(128-bit, no coordination needed)</text>
  <text x="470" y="260" fill="white" font-size="13" font-weight="600">🔢  Auto-increment ranges</text>
  <text x="490" y="280" fill="rgba(255,255,255,0.7)" font-size="11">(pre-allocated blocks per service)</text>
  <text x="470" y="310" fill="white" font-size="13" font-weight="600">🕐  Clock synchronization (NTP)</text>
  <text x="490" y="330" fill="rgba(255,255,255,0.7)" font-size="11">(handle clock skew gracefully)</text>
  <text x="470" y="360" fill="white" font-size="13" font-weight="600">📊  Roughly time-ordered IDs</text>
  <text x="470" y="390" fill="white" font-size="13" font-weight="600">🔒  No collisions (globally unique)</text>
  <text x="470" y="420" fill="white" font-size="13" font-weight="600">📏  64-bit compact representation</text>

  <!-- Column 3: Out of Scope -->
  <text x="1000" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Out of Scope / Future</text>
  <rect x="840" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="840" y="125" width="320" height="250" rx="12" fill="rgba(245,158,11,0.25)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>

  <text x="870" y="160" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Human-readable IDs</text>
  <text x="870" y="195" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  URL-friendly slugs</text>
  <text x="870" y="230" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Strictly sequential ordering</text>
  <text x="870" y="265" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  ID-to-metadata lookup</text>
  <text x="870" y="300" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  ID revocation / invalidation</text>
  <text x="870" y="335" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Cryptographic randomness</text>

  <!-- Bottom -->
  <text x="600" y="530" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="12">Focus on Snowflake-style 64-bit IDs: timestamp-ordered, no coordination, millions/sec across data centers</text>

  <rect x="440" y="480" width="320" height="36" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="600" y="504" text-anchor="middle" fill="white" font-size="13" font-weight="600">🏗️  Distributed ID Generation Service</text>
</svg>
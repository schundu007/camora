<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
  </defs>

  <rect width="1200" height="400" fill="white" rx="12"/>

  <text x="600" y="35" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Snowflake ID Generation Flow</text>
  <text x="600" y="55" text-anchor="middle" fill="#64748b" font-size="12">Request through machine ID, timestamp, and sequence to a unique 64-bit ID</text>

  <!-- 1. Request -->
  <rect x="15" y="110" width="130" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="15" y="110" width="130" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="80" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Request</text>
  <text x="80" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">ID Service API</text>
  <text x="80" y="175" text-anchor="middle" fill="#64748b" font-size="9">POST /generate</text>
  <text x="80" y="192" text-anchor="middle" fill="#64748b" font-size="9">Batch: 1-1000 IDs</text>
  <text x="80" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">~1ms latency</text>

  <!-- Arrow 1→2 -->
  <line x1="145" y1="170" x2="183" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="147" y="150" width="36" height="16" rx="4" fill="#2563eb"/>
  <text x="165" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">1</text>

  <!-- 2. Machine ID -->
  <rect x="193" y="110" width="140" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="193" y="110" width="140" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="263" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Machine ID</text>
  <text x="263" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">ZooKeeper Lease</text>
  <text x="263" y="175" text-anchor="middle" fill="#64748b" font-size="9">10-bit worker ID</text>
  <text x="263" y="192" text-anchor="middle" fill="#64748b" font-size="9">Datacenter + machine</text>
  <text x="263" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">1024 unique workers</text>

  <!-- Arrow 2→3 -->
  <line x1="333" y1="170" x2="371" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="335" y="150" width="36" height="16" rx="4" fill="#f97316"/>
  <text x="353" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">2</text>

  <!-- 3. Timestamp -->
  <rect x="381" y="110" width="140" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="381" y="110" width="140" height="30" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="451" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Timestamp (ms)</text>
  <text x="451" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">41-bit Epoch</text>
  <text x="451" y="175" text-anchor="middle" fill="#64748b" font-size="9">ms since custom epoch</text>
  <text x="451" y="192" text-anchor="middle" fill="#64748b" font-size="9">~69 years range</text>
  <text x="451" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">Clock monotonic</text>

  <!-- Arrow 3→4 -->
  <line x1="521" y1="170" x2="559" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="523" y="150" width="36" height="16" rx="4" fill="#7c3aed"/>
  <text x="541" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>

  <!-- 4. Sequence Counter -->
  <rect x="569" y="110" width="140" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="569" y="110" width="140" height="30" rx="10 10 0 0" fill="#ef4444"/>
  <text x="639" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Sequence Counter</text>
  <text x="639" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">12-bit Counter</text>
  <text x="639" y="175" text-anchor="middle" fill="#64748b" font-size="9">0-4095 per ms</text>
  <text x="639" y="192" text-anchor="middle" fill="#64748b" font-size="9">Reset each ms tick</text>
  <text x="639" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">4096 IDs/ms/machine</text>

  <!-- Arrow 4→5 -->
  <line x1="709" y1="170" x2="747" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="711" y="150" width="36" height="16" rx="4" fill="#ef4444"/>
  <text x="729" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">4</text>

  <!-- 5. Combine 64-bit -->
  <rect x="757" y="110" width="140" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="757" y="110" width="140" height="30" rx="10 10 0 0" fill="#ec4899"/>
  <text x="827" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Combine 64-bit</text>
  <text x="827" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Bit Packing</text>
  <text x="827" y="175" text-anchor="middle" fill="#64748b" font-size="9">1 + 41 + 10 + 12 bits</text>
  <text x="827" y="192" text-anchor="middle" fill="#64748b" font-size="9">Bitwise OR shift</text>
  <text x="827" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">Time-sortable</text>

  <!-- Arrow 5→6 -->
  <line x1="897" y1="170" x2="935" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="899" y="150" width="36" height="16" rx="4" fill="#ec4899"/>
  <text x="917" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">5</text>

  <!-- 6. Return ID -->
  <rect x="945" y="110" width="140" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="945" y="110" width="140" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="1015" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Return ID</text>
  <text x="1015" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">API Response</text>
  <text x="1015" y="175" text-anchor="middle" fill="#64748b" font-size="9">Base62 / int64</text>
  <text x="1015" y="192" text-anchor="middle" fill="#64748b" font-size="9">Globally unique</text>
  <text x="1015" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">No coordination</text>

  <!-- Bit layout diagram -->
  <rect x="200" y="260" width="800" height="35" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="200" y="260" width="30" height="35" rx="6 0 0 6" fill="#94a3b8"/>
  <text x="215" y="282" text-anchor="middle" fill="white" font-size="8" font-weight="700">0</text>
  <rect x="230" y="260" width="410" height="35" fill="#7c3aed" opacity="0.15"/>
  <text x="435" y="282" text-anchor="middle" fill="#7c3aed" font-size="10" font-weight="700">41-bit Timestamp (ms since epoch)</text>
  <rect x="640" y="260" width="160" height="35" fill="#f97316" opacity="0.15"/>
  <text x="720" y="282" text-anchor="middle" fill="#f97316" font-size="10" font-weight="700">10-bit Machine ID</text>
  <rect x="800" y="260" width="200" height="35" rx="0 6 6 0" fill="#ef4444" opacity="0.15"/>
  <text x="900" y="282" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="700">12-bit Sequence</text>

  <!-- Legend -->
  <rect x="30" y="310" width="1140" height="75" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="333" fill="#1e293b" font-size="12" font-weight="700">Flow Steps</text>

  <rect x="60" y="343" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="76" y="353" fill="#475569" font-size="10">1. Service receives ID generation request</text>
  <rect x="60" y="360" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="76" y="370" fill="#475569" font-size="10">2. Worker's 10-bit machine ID from ZooKeeper lease</text>

  <rect x="400" y="343" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="416" y="353" fill="#475569" font-size="10">3. 41-bit ms timestamp from custom epoch</text>
  <rect x="400" y="360" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="416" y="370" fill="#475569" font-size="10">4. 12-bit sequence increments per ms</text>

  <rect x="740" y="343" width="10" height="10" rx="2" fill="#ec4899"/>
  <text x="756" y="353" fill="#475569" font-size="10">5. Bits packed into single 64-bit integer</text>
  <rect x="740" y="360" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="756" y="370" fill="#475569" font-size="10">6. Unique, time-sortable ID returned</text>
</svg>
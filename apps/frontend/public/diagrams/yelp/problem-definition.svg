<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <rect x="350" y="20" width="500" height="44" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="22" font-weight="700">Problem Definition: Designing Yelp / Nearby Search</text>

  <!-- Column 1: Users & Core Actions -->
  <text x="200" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Users &amp; Core Actions</text>
  <rect x="40" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <!-- User icons -->
  <circle cx="120" cy="170" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="120" y="176" text-anchor="middle" fill="white" font-size="24">&#x1F50D;</text>
  <text x="120" y="215" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Searcher</text>

  <text x="200" y="176" text-anchor="middle" fill="white" font-size="28">&#x21C4;</text>

  <circle cx="280" cy="170" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="280" y="176" text-anchor="middle" fill="white" font-size="24">&#x1F3EA;</text>
  <text x="280" y="215" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Business Owner</text>

  <!-- Core Actions Box -->
  <rect x="70" y="240" width="260" height="210" rx="12" fill="#f97316" filter="url(#shadow)"/>
  <text x="200" y="270" text-anchor="middle" fill="white" font-size="15" font-weight="700">Core Actions</text>
  <line x1="90" y1="282" x2="310" y2="282" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="100" y="310" fill="white" font-size="13">&#x1F4CD;  Search Nearby Places</text>
  <text x="100" y="340" fill="white" font-size="13">&#x2B50;  Read &amp; Write Reviews</text>
  <text x="100" y="370" fill="white" font-size="13">&#x1F3EA;  View Business Profiles</text>
  <text x="100" y="400" fill="white" font-size="13">&#x1F5FA;&#xFE0F;  Browse Map Results</text>
  <text x="100" y="430" fill="white" font-size="13">&#x1F4F7;  Upload Photos</text>

  <!-- Column 2: In Scope -->
  <text x="600" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">In Scope: Essentials</text>
  <rect x="440" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="440" y="125" width="320" height="330" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <text x="470" y="160" fill="white" font-size="13" font-weight="600">&#x1F4CD;  Nearby search (lat/lng + radius)</text>
  <text x="470" y="195" fill="white" font-size="13" font-weight="600">&#x1F30D;  Geospatial index (QuadTree)</text>
  <text x="490" y="215" fill="rgba(255,255,255,0.7)" font-size="11">(Efficient spatial lookups)</text>
  <text x="470" y="245" fill="white" font-size="13" font-weight="600">&#x2B50;  Reviews &amp; ratings system</text>
  <text x="490" y="265" fill="rgba(255,255,255,0.7)" font-size="11">(Aggregate scores, sort by recency)</text>
  <text x="470" y="295" fill="white" font-size="13" font-weight="600">&#x1F3EA;  Business profiles &amp; details</text>
  <text x="470" y="330" fill="white" font-size="13" font-weight="600">&#x1F50D;  Search with filters</text>
  <text x="490" y="350" fill="rgba(255,255,255,0.7)" font-size="11">(Category, price, rating, hours)</text>
  <text x="470" y="380" fill="white" font-size="13" font-weight="600">&#x1F4F7;  Photo uploads &amp; gallery</text>
  <text x="470" y="415" fill="white" font-size="13" font-weight="600">&#x1F5FA;&#xFE0F;  Map view with clustering</text>
  <text x="470" y="440" fill="white" font-size="13" font-weight="600">&#x1F4CA;  Business analytics dashboard</text>

  <!-- Column 3: Out of Scope -->
  <text x="1000" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Out of Scope / Future</text>
  <rect x="840" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="840" y="125" width="320" height="225" rx="12" fill="rgba(245,158,11,0.25)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>

  <text x="870" y="160" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Food Delivery / Ordering</text>
  <text x="870" y="195" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Restaurant Reservations</text>
  <text x="870" y="230" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Ad Auction / Sponsored Listings</text>
  <text x="870" y="265" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Social Features (Friends, Feed)</text>
  <text x="870" y="300" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Business Verification (KYC)</text>
  <text x="870" y="335" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Waitlist Management</text>

  <!-- Bottom bar -->
  <rect x="440" y="465" width="320" height="28" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="600" y="484" text-anchor="middle" fill="white" font-size="12" font-weight="600">&#x1F3D7;&#xFE0F;  Proximity-Based Business Discovery Platform</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="450" fill="#fafbfc" rx="16"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Yelp Write Review Flow</text>
  <text x="600" y="56" text-anchor="middle" fill="#64748b" font-size="12">Review submission through spam detection, storage, rating update, search indexing, and CDN invalidation</text>

  <!-- Submit Review -->
  <rect x="20" y="120" width="140" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="20" y="120" width="140" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="90" y="140" text-anchor="middle" fill="white" font-size="11" font-weight="700">Submit Review</text>
  <text x="90" y="168" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">POST /api/reviews</text>
  <text x="90" y="185" text-anchor="middle" fill="#64748b" font-size="9">Rating (1-5 stars)</text>
  <text x="90" y="200" text-anchor="middle" fill="#64748b" font-size="9">Review text + photos</text>
  <text x="90" y="218" text-anchor="middle" fill="#94a3b8" font-size="9">businessId, userId</text>

  <!-- Spam ML Check -->
  <rect x="200" y="120" width="140" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="200" y="120" width="140" height="30" rx="10 10 0 0" fill="#ef4444"/>
  <text x="270" y="140" text-anchor="middle" fill="white" font-size="11" font-weight="700">Spam ML Check</text>
  <text x="270" y="168" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Fraud detection</text>
  <text x="270" y="185" text-anchor="middle" fill="#64748b" font-size="9">Account age score</text>
  <text x="270" y="200" text-anchor="middle" fill="#64748b" font-size="9">Review velocity</text>
  <text x="270" y="218" text-anchor="middle" fill="#94a3b8" font-size="9">Linguistic patterns</text>

  <!-- Store in DB -->
  <rect x="380" y="120" width="140" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="380" y="120" width="140" height="30" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="450" y="140" text-anchor="middle" fill="white" font-size="11" font-weight="700">Store in DB</text>
  <text x="450" y="168" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">PostgreSQL write</text>
  <text x="450" y="185" text-anchor="middle" fill="#64748b" font-size="9">Review record</text>
  <text x="450" y="200" text-anchor="middle" fill="#64748b" font-size="9">Photos to S3</text>
  <text x="450" y="218" text-anchor="middle" fill="#94a3b8" font-size="9">Kafka event published</text>

  <!-- Update Rating -->
  <rect x="560" y="120" width="140" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="560" y="120" width="140" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="630" y="140" text-anchor="middle" fill="white" font-size="11" font-weight="700">Update Rating</text>
  <text x="630" y="168" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Recompute average</text>
  <text x="630" y="185" text-anchor="middle" fill="#64748b" font-size="9">avg_rating recalc</text>
  <text x="630" y="200" text-anchor="middle" fill="#64748b" font-size="9">review_count++</text>
  <text x="630" y="218" text-anchor="middle" fill="#94a3b8" font-size="9">Invalidate cache</text>

  <!-- Index in ES -->
  <rect x="740" y="120" width="140" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="740" y="120" width="140" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="810" y="140" text-anchor="middle" fill="white" font-size="10" font-weight="700">Index in ES</text>
  <text x="810" y="168" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Elasticsearch update</text>
  <text x="810" y="185" text-anchor="middle" fill="#64748b" font-size="9">Full-text searchable</text>
  <text x="810" y="200" text-anchor="middle" fill="#64748b" font-size="9">Updated rating score</text>
  <text x="810" y="218" text-anchor="middle" fill="#94a3b8" font-size="9">Near-real-time</text>

  <!-- CDN Invalidate -->
  <rect x="920" y="120" width="140" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="920" y="120" width="140" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="990" y="140" text-anchor="middle" fill="white" font-size="10" font-weight="700">CDN Invalidate</text>
  <text x="990" y="168" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Cache purge</text>
  <text x="990" y="185" text-anchor="middle" fill="#64748b" font-size="9">Business profile page</text>
  <text x="990" y="200" text-anchor="middle" fill="#64748b" font-size="9">Stale data removed</text>
  <text x="990" y="218" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="600">Fresh on next request</text>

  <!-- Kafka (below) -->
  <rect x="450" y="280" width="180" height="45" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="450" y="280" width="180" height="18" rx="8 8 0 0" fill="#f97316"/>
  <text x="540" y="293" text-anchor="middle" fill="white" font-size="9" font-weight="700">Kafka Event Bus</text>
  <text x="540" y="312" text-anchor="middle" fill="#64748b" font-size="9">review.created triggers async pipeline</text>

  <!-- Arrows -->
  <line x1="160" y1="170" x2="196" y2="170" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="163" y="153" width="22" height="14" rx="3" fill="#f97316"/>
  <text x="174" y="163" text-anchor="middle" fill="white" font-size="8" font-weight="600">1</text>

  <line x1="340" y1="170" x2="376" y2="170" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <rect x="343" y="153" width="22" height="14" rx="3" fill="#ef4444"/>
  <text x="354" y="163" text-anchor="middle" fill="white" font-size="8" font-weight="600">2</text>

  <line x1="520" y1="170" x2="556" y2="170" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="523" y="153" width="22" height="14" rx="3" fill="#7c3aed"/>
  <text x="534" y="163" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>

  <line x1="700" y1="170" x2="736" y2="170" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="703" y="153" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="714" y="163" text-anchor="middle" fill="white" font-size="8" font-weight="600">4</text>

  <line x1="880" y1="170" x2="916" y2="170" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="883" y="153" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="894" y="163" text-anchor="middle" fill="white" font-size="8" font-weight="600">5</text>

  <!-- Kafka arrow -->
  <line x1="470" y1="230" x2="520" y2="276" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <text x="520" y="260" fill="#f97316" font-size="9">Async</text>

  <!-- Legend -->
  <rect x="30" y="365" width="1140" height="65" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="55" y="387" fill="#1e293b" font-size="11" font-weight="700">Flow Steps:</text>
  <rect x="55" y="397" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="70" y="406" fill="#475569" font-size="9">1 User submits rating + review text + photos</text>
  <rect x="55" y="411" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="70" y="420" fill="#475569" font-size="9">2 ML fraud detection scores spam probability</text>
  <rect x="370" y="397" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="385" y="406" fill="#475569" font-size="9">3 Store review in PostgreSQL, photos to S3, publish Kafka event</text>
  <text x="385" y="420" fill="#475569" font-size="9">4-5 Async: recompute rating, update Elasticsearch index, invalidate CDN</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="450" fill="#fafbfc" rx="16"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Yelp Nearby Search Flow</text>
  <text x="600" y="56" text-anchor="middle" fill="#64748b" font-size="12">Proximity search from client location through Geohash lookup, Haversine filtering, and ranked results</text>

  <!-- Client -->
  <rect x="20" y="115" width="120" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="20" y="115" width="120" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="80" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">Client</text>
  <text x="80" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">lat, lng, radius</text>
  <text x="80" y="180" text-anchor="middle" fill="#64748b" font-size="9">GPS location</text>
  <text x="80" y="195" text-anchor="middle" fill="#64748b" font-size="9">Search term</text>
  <text x="80" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">+ filters</text>

  <!-- API Gateway -->
  <rect x="175" y="115" width="120" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="175" y="115" width="120" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="235" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">API Gateway</text>
  <text x="235" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Compute Geohash</text>
  <text x="235" y="180" text-anchor="middle" fill="#64748b" font-size="9">lat/lng to prefix</text>
  <text x="235" y="195" text-anchor="middle" fill="#64748b" font-size="9">Rate limit check</text>
  <text x="235" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">Auth validation</text>

  <!-- Query 9 Cells -->
  <rect x="330" y="115" width="130" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="330" y="115" width="130" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="395" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">Query 9 Cells</text>
  <text x="395" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Geohash neighbors</text>
  <text x="395" y="180" text-anchor="middle" fill="#64748b" font-size="9">Center + 8 adjacent</text>
  <text x="395" y="195" text-anchor="middle" fill="#64748b" font-size="9">QuadTree traversal</text>
  <text x="395" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">Candidate set</text>

  <!-- Haversine Filter -->
  <rect x="495" y="115" width="130" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="495" y="115" width="130" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="560" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">Haversine Filter</text>
  <text x="560" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Exact distance</text>
  <text x="560" y="180" text-anchor="middle" fill="#64748b" font-size="9">Great-circle calc</text>
  <text x="560" y="195" text-anchor="middle" fill="#64748b" font-size="9">Filter by max radius</text>
  <text x="560" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">Remove out-of-range</text>

  <!-- Apply Filters -->
  <rect x="660" y="115" width="130" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="660" y="115" width="130" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="725" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">Apply Filters</text>
  <text x="725" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Category + price</text>
  <text x="725" y="180" text-anchor="middle" fill="#64748b" font-size="9">Rating minimum</text>
  <text x="725" y="195" text-anchor="middle" fill="#64748b" font-size="9">Open now check</text>
  <text x="725" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">Elasticsearch</text>

  <!-- Rank -->
  <rect x="825" y="115" width="130" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="825" y="115" width="130" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="890" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">Rank Results</text>
  <text x="890" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Score formula</text>
  <text x="890" y="180" text-anchor="middle" fill="#64748b" font-size="9">Distance 40%</text>
  <text x="890" y="195" text-anchor="middle" fill="#64748b" font-size="9">Rating 30%</text>
  <text x="890" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">Recency 15% + 15%</text>

  <!-- Response -->
  <rect x="990" y="115" width="160" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="990" y="115" width="160" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="1070" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">Response</text>
  <text x="1070" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Top 20 results</text>
  <text x="1070" y="180" text-anchor="middle" fill="#64748b" font-size="9">Business previews</text>
  <text x="1070" y="195" text-anchor="middle" fill="#64748b" font-size="9">Distances, facets</text>
  <text x="1070" y="210" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="600">&lt;200ms total</text>

  <!-- Arrows -->
  <line x1="140" y1="162" x2="171" y2="162" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="142" y="145" width="22" height="14" rx="3" fill="#f97316"/>
  <text x="153" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">1</text>

  <line x1="295" y1="162" x2="326" y2="162" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="297" y="145" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="308" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">2</text>

  <line x1="460" y1="162" x2="491" y2="162" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="462" y="145" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="473" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>

  <line x1="625" y1="162" x2="656" y2="162" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="627" y="145" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="638" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">4</text>

  <line x1="790" y1="162" x2="821" y2="162" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="792" y="145" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="803" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">5</text>

  <line x1="955" y1="162" x2="986" y2="162" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="957" y="145" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="968" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">6</text>

  <!-- Legend -->
  <rect x="30" y="265" width="1140" height="65" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="55" y="287" fill="#1e293b" font-size="11" font-weight="700">Flow Steps:</text>
  <rect x="55" y="297" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="70" y="306" fill="#475569" font-size="9">1 Client sends lat/lng/radius + search term</text>
  <rect x="55" y="311" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="70" y="320" fill="#475569" font-size="9">2 Compute Geohash prefix, query center + 8 adjacent cells</text>
  <text x="400" y="306" fill="#475569" font-size="9">3-4 Haversine distance filter, then category/price/rating/open-now filters</text>
  <text x="400" y="320" fill="#475569" font-size="9">5 Rank by distance(40%) + rating(30%) + recency(15%) + completeness(15%)</text>
  <rect x="870" y="297" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="885" y="306" fill="#475569" font-size="9">6 Top 20 returned &lt;200ms</text>
</svg>
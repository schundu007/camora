<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgCap" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="450" fill="url(#bgCap)" rx="16"/>

  <!-- Title -->
  <rect x="380" y="16" width="440" height="40" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="43" text-anchor="middle" fill="white" font-size="20" font-weight="700">Back-of-the-Envelope Estimates</text>

  <!-- Column 1: Traffic -->
  <rect x="20" y="75" width="270" height="350" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="20" y="75" width="270" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="155" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">Traffic Estimates</text>

  <text x="45" y="138" fill="#fbbf24" font-size="13" font-weight="700">&#x1F4F1; 500 Million DAU</text>
  <text x="155" y="158" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="182" fill="white" font-size="12">Photo uploads per day:</text>
  <text x="45" y="202" fill="#fbbf24" font-size="16" font-weight="800">100 Million photos/day</text>
  <text x="155" y="222" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="245" fill="white" font-size="11">Upload QPS (Average):</text>
  <text x="45" y="263" fill="rgba(255,255,255,0.7)" font-size="10">100M / (24h x 3600s)</text>
  <text x="45" y="285" fill="#fbbf24" font-size="16" font-weight="800">&#x2248; 1,200 QPS</text>
  <text x="155" y="305" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="328" fill="white" font-size="11">Feed Read QPS:</text>
  <text x="45" y="346" fill="rgba(255,255,255,0.7)" font-size="10">500M users x avg 10 loads/day</text>
  <text x="45" y="368" fill="#f97316" font-size="16" font-weight="800">500K - 1M QPS</text>
  <text x="45" y="390" fill="rgba(255,255,255,0.5)" font-size="10">Read-heavy: 400:1 read/write ratio</text>

  <!-- Column 2: Storage -->
  <rect x="305" y="75" width="270" height="350" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="305" y="75" width="270" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="440" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">Storage Estimates</text>

  <text x="330" y="138" fill="#fbbf24" font-size="13" font-weight="700">&#x1F4BE; Avg photo: 2 MB</text>
  <text x="440" y="158" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="330" y="182" fill="white" font-size="12">Raw storage per day:</text>
  <text x="330" y="202" fill="rgba(255,255,255,0.7)" font-size="10">100M x 2 MB = 200 TB/day</text>
  <text x="440" y="222" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="330" y="245" fill="white" font-size="11">With 4 resized versions (1.4x):</text>
  <text x="330" y="268" fill="#fbbf24" font-size="16" font-weight="800">285 TB/day</text>
  <text x="440" y="290" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="330" y="315" fill="white" font-size="11">Annual storage:</text>
  <text x="330" y="335" fill="rgba(255,255,255,0.7)" font-size="10">285 TB x 365 days</text>
  <text x="330" y="358" fill="#f97316" font-size="18" font-weight="800">&#x2248; 104 PB/year</text>

  <rect x="320" y="375" width="240" height="22" rx="6" fill="rgba(239,68,68,0.3)" stroke="rgba(239,68,68,0.5)" stroke-width="1"/>
  <text x="440" y="391" text-anchor="middle" fill="white" font-size="10" font-weight="600">&#x26A0;  S3 lifecycle + tiered storage essential</text>

  <!-- Column 3: CDN / Bandwidth -->
  <rect x="590" y="75" width="270" height="350" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="75" width="270" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="725" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">CDN &amp; Bandwidth</text>

  <text x="615" y="140" fill="#fbbf24" font-size="13" font-weight="700">&#x1F310; Feed image loads</text>
  <text x="725" y="158" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="615" y="182" fill="white" font-size="12">Avg feed load: 20 images</text>
  <text x="615" y="202" fill="rgba(255,255,255,0.7)" font-size="10">500M users x 10 loads x 20 imgs x 300KB</text>
  <text x="725" y="222" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="615" y="248" fill="white" font-size="11">Egress bandwidth:</text>
  <text x="615" y="272" fill="#fbbf24" font-size="18" font-weight="800">&#x2248; 230 GB/s</text>
  <text x="725" y="295" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="615" y="318" fill="white" font-size="11">CDN cache-hit ratio:</text>
  <text x="615" y="342" fill="#16a34a" font-size="18" font-weight="800">95%+ cache hit</text>

  <text x="615" y="375" fill="rgba(255,255,255,0.7)" font-size="10">Origin egress after CDN:</text>
  <text x="615" y="395" fill="#fbbf24" font-size="14" font-weight="700">&#x2248; 11.5 GB/s to origin</text>

  <!-- Column 4: Key Insights -->
  <rect x="880" y="75" width="300" height="350" rx="12" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="1030" y="103" text-anchor="middle" fill="white" font-size="14" font-weight="700">&#x1F4A1; Key Insights</text>
  <line x1="900" y1="113" x2="1160" y2="113" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <text x="900" y="140" fill="white" font-size="11" font-weight="600">Extremely read-heavy system</text>
  <text x="900" y="158" fill="rgba(255,255,255,0.7)" font-size="10">400:1 read/write ratio means</text>
  <text x="900" y="173" fill="rgba(255,255,255,0.7)" font-size="10">caching is the #1 priority.</text>

  <text x="900" y="205" fill="white" font-size="11" font-weight="600">Storage is the real cost driver</text>
  <text x="900" y="223" fill="rgba(255,255,255,0.7)" font-size="10">104 PB/year of photos alone.</text>
  <text x="900" y="238" fill="rgba(255,255,255,0.7)" font-size="10">S3 + lifecycle policies with</text>
  <text x="900" y="253" fill="rgba(255,255,255,0.7)" font-size="10">hot/warm/cold tiers.</text>

  <text x="900" y="285" fill="white" font-size="11" font-weight="600">CDN is non-negotiable</text>
  <text x="900" y="303" fill="rgba(255,255,255,0.7)" font-size="10">230 GB/s egress without CDN</text>
  <text x="900" y="318" fill="rgba(255,255,255,0.7)" font-size="10">is impossible. Need multi-region</text>
  <text x="900" y="333" fill="rgba(255,255,255,0.7)" font-size="10">CDN (CloudFront / Akamai).</text>

  <text x="900" y="365" fill="white" font-size="11" font-weight="600">Feed fanout is the bottleneck</text>
  <text x="900" y="383" fill="rgba(255,255,255,0.7)" font-size="10">Celebrity posts to 100M followers</text>
  <text x="900" y="398" fill="rgba(255,255,255,0.7)" font-size="10">need pull-based fanout, not push.</text>
</svg>
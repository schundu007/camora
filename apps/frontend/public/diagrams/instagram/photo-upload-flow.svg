<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="#fafbfc" rx="16"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" fill="#1e293b" font-size="22" font-weight="700">Photo Upload &amp; Feed Distribution Flow</text>
  <text x="600" y="55" text-anchor="middle" fill="#64748b" font-size="13">End-to-end flow from upload through processing, storage, and follower feed delivery</text>

  <!-- 1. Client -->
  <rect x="15" y="100" width="100" height="110" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="15" y="100" width="100" height="30" rx="12 12 0 0" fill="#f97316"/>
  <text x="65" y="120" text-anchor="middle" fill="white" font-size="11" font-weight="700">Client</text>
  <text x="65" y="152" text-anchor="middle" fill="#64748b" font-size="20">&#x1F4F1;</text>
  <text x="65" y="175" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Upload Photo</text>
  <text x="65" y="190" text-anchor="middle" fill="#94a3b8" font-size="8">+ caption, tags</text>

  <!-- Arrow 1 -->
  <line x1="115" y1="150" x2="140" y2="150" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="128" y="142" text-anchor="middle" fill="#2563eb" font-size="7" font-weight="600">&#x2460;</text>

  <!-- 2. API Gateway -->
  <rect x="150" y="100" width="110" height="110" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="150" y="100" width="110" height="30" rx="12 12 0 0" fill="#2563eb"/>
  <text x="205" y="120" text-anchor="middle" fill="white" font-size="10" font-weight="700">API Gateway</text>
  <text x="205" y="150" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Auth + Rate Limit</text>
  <text x="205" y="168" text-anchor="middle" fill="#64748b" font-size="9">Pre-signed URL</text>
  <text x="205" y="183" text-anchor="middle" fill="#64748b" font-size="9">generation</text>
  <text x="205" y="198" text-anchor="middle" fill="#94a3b8" font-size="8">Nginx / ALB</text>

  <!-- Arrow 2 -->
  <line x1="260" y1="150" x2="285" y2="150" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="273" y="142" text-anchor="middle" fill="#2563eb" font-size="7" font-weight="600">&#x2461;</text>

  <!-- 3. Media Service -->
  <rect x="295" y="100" width="115" height="110" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="295" y="100" width="115" height="30" rx="12 12 0 0" fill="#16a34a"/>
  <text x="352" y="120" text-anchor="middle" fill="white" font-size="10" font-weight="700">Media Service</text>
  <text x="352" y="150" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Upload Handler</text>
  <text x="352" y="168" text-anchor="middle" fill="#64748b" font-size="9">Validation</text>
  <text x="352" y="183" text-anchor="middle" fill="#64748b" font-size="9">EXIF stripping</text>
  <text x="352" y="198" text-anchor="middle" fill="#94a3b8" font-size="8">Go / Python</text>

  <!-- Arrow 3 -->
  <line x1="410" y1="150" x2="435" y2="150" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="423" y="142" text-anchor="middle" fill="#16a34a" font-size="7" font-weight="600">&#x2462;</text>

  <!-- 4. S3 Object Store -->
  <rect x="445" y="100" width="110" height="110" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="445" y="100" width="110" height="30" rx="12 12 0 0" fill="#7c3aed"/>
  <text x="500" y="120" text-anchor="middle" fill="white" font-size="10" font-weight="700">S3 Store</text>
  <text x="500" y="150" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Object Storage</text>
  <text x="500" y="168" text-anchor="middle" fill="#64748b" font-size="9">Original photo</text>
  <text x="500" y="183" text-anchor="middle" fill="#64748b" font-size="9">Lifecycle rules</text>
  <text x="500" y="198" text-anchor="middle" fill="#94a3b8" font-size="8">AWS S3</text>

  <!-- Arrow 4 (down to Image Processing) -->
  <line x1="500" y1="210" x2="500" y2="240" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="510" y="230" fill="#7c3aed" font-size="7" font-weight="600">&#x2463;</text>

  <!-- 5. Image Processing -->
  <rect x="425" y="250" width="150" height="90" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="425" y="250" width="150" height="28" rx="12 12 0 0" fill="#f97316"/>
  <text x="500" y="269" text-anchor="middle" fill="white" font-size="10" font-weight="700">Image Processing</text>
  <text x="500" y="296" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Resize 4 versions</text>
  <text x="500" y="312" text-anchor="middle" fill="#64748b" font-size="8">150px | 320px | 640px | 1080px</text>
  <text x="500" y="328" text-anchor="middle" fill="#94a3b8" font-size="8">Async workers (SQS)</text>

  <!-- Arrow 5 (right from Image Processing to CDN) -->
  <line x1="575" y1="290" x2="603" y2="290" stroke="#f97316" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="590" y="282" text-anchor="middle" fill="#f97316" font-size="7" font-weight="600">&#x2464;</text>

  <!-- 6. CDN -->
  <rect x="613" y="250" width="110" height="90" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="613" y="250" width="110" height="28" rx="12 12 0 0" fill="#ef4444"/>
  <text x="668" y="269" text-anchor="middle" fill="white" font-size="10" font-weight="700">CDN Warm</text>
  <text x="668" y="296" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Edge caching</text>
  <text x="668" y="312" text-anchor="middle" fill="#64748b" font-size="8">Push to PoPs</text>
  <text x="668" y="328" text-anchor="middle" fill="#94a3b8" font-size="8">CloudFront</text>

  <!-- Arrow from S3 right to Post Service -->
  <line x1="555" y1="155" x2="588" y2="155" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="572" y="147" text-anchor="middle" fill="#334155" font-size="7" font-weight="600">&#x2465;</text>

  <!-- 7. Post Service + Cassandra -->
  <rect x="598" y="100" width="120" height="110" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="598" y="100" width="120" height="30" rx="12 12 0 0" fill="#2563eb"/>
  <text x="658" y="120" text-anchor="middle" fill="white" font-size="10" font-weight="700">Post Service</text>
  <text x="658" y="150" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Write post record</text>
  <text x="658" y="168" text-anchor="middle" fill="#64748b" font-size="9">Cassandra DB</text>
  <text x="658" y="183" text-anchor="middle" fill="#64748b" font-size="9">user_id + timestamp</text>
  <text x="658" y="198" text-anchor="middle" fill="#94a3b8" font-size="8">partition key</text>

  <!-- Arrow 7 -->
  <line x1="718" y1="150" x2="753" y2="150" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="736" y="142" text-anchor="middle" fill="#2563eb" font-size="7" font-weight="600">&#x2466;</text>

  <!-- 8. Fan-out Service -->
  <rect x="763" y="100" width="130" height="110" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="763" y="100" width="130" height="30" rx="12 12 0 0" fill="#f97316"/>
  <text x="828" y="120" text-anchor="middle" fill="white" font-size="10" font-weight="700">Fan-out Service</text>
  <text x="828" y="150" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Feed generation</text>
  <text x="828" y="168" text-anchor="middle" fill="#64748b" font-size="9">Push to followers</text>
  <text x="828" y="183" text-anchor="middle" fill="#64748b" font-size="9">(Pull for celebs)</text>
  <text x="828" y="198" text-anchor="middle" fill="#94a3b8" font-size="8">Redis feed cache</text>

  <!-- Arrow 8 -->
  <line x1="893" y1="150" x2="923" y2="150" stroke="#f97316" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <text x="908" y="142" text-anchor="middle" fill="#f97316" font-size="7" font-weight="600">&#x2467;</text>

  <!-- 9. Notification -->
  <rect x="933" y="100" width="120" height="110" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="933" y="100" width="120" height="30" rx="12 12 0 0" fill="#16a34a"/>
  <text x="993" y="120" text-anchor="middle" fill="white" font-size="10" font-weight="700">Notification</text>
  <text x="993" y="150" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Push alerts</text>
  <text x="993" y="168" text-anchor="middle" fill="#64748b" font-size="9">APNs / FCM</text>
  <text x="993" y="183" text-anchor="middle" fill="#64748b" font-size="9">Activity feed</text>
  <text x="993" y="198" text-anchor="middle" fill="#94a3b8" font-size="8">Async</text>

  <!-- Arrow to followers -->
  <line x1="1053" y1="150" x2="1080" y2="150" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- Followers -->
  <rect x="1090" y="110" width="95" height="90" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <text x="1137" y="145" text-anchor="middle" fill="#64748b" font-size="20">&#x1F465;</text>
  <text x="1137" y="172" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Followers</text>
  <text x="1137" y="188" text-anchor="middle" fill="#64748b" font-size="8">see in feed</text>

  <!-- Legend -->
  <rect x="30" y="355" width="1140" height="35" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="55" y="377" fill="#1e293b" font-size="10" font-weight="700">Flow:</text>
  <text x="100" y="377" fill="#475569" font-size="9">&#x2460; Upload &#x2192; &#x2461; Auth &#x2192; &#x2462; Validate &#x2192; &#x2463; Store in S3 &#x2192; &#x2464; Resize 4 versions &#x2192; &#x2465; Warm CDN &#x2192; &#x2466; Write post record &#x2192; &#x2467; Fan-out to follower feeds &#x2192; Push notifications</text>
</svg>
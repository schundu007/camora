<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgCap" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="450" fill="url(#bgCap)" rx="16"/>

  <!-- Title -->
  <rect x="380" y="16" width="440" height="40" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="43" text-anchor="middle" fill="white" font-size="20" font-weight="700">Back-of-the-Envelope Estimates</text>

  <!-- Column 1: Traffic -->
  <rect x="20" y="75" width="275" height="350" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="20" y="75" width="275" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="157" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">Traffic Estimates</text>

  <text x="45" y="138" fill="#fbbf24" font-size="13" font-weight="700">&#x1F465; 26 Million DAU</text>
  <text x="157" y="160" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="185" fill="white" font-size="12">Avg user swipes</text>
  <text x="45" y="203" fill="#fbbf24" font-size="15" font-weight="700">62 swipes/day</text>
  <text x="157" y="225" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="250" fill="white" font-size="12">Total swipes per day:</text>
  <text x="45" y="270" fill="#fbbf24" font-size="16" font-weight="800">1.6 Billion swipes/day</text>
  <text x="157" y="292" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="317" fill="white" font-size="11">Swipe QPS (Average):</text>
  <text x="45" y="335" fill="rgba(255,255,255,0.7)" font-size="10">1.6B / 86,400s</text>
  <text x="45" y="357" fill="#fbbf24" font-size="16" font-weight="800">&#x2248; 18,519 swipes/sec</text>
  <text x="157" y="377" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>

  <text x="45" y="397" fill="white" font-size="11">Peak QPS (3x):</text>
  <text x="45" y="415" fill="#f97316" font-size="16" font-weight="800">&#x2248; 55.5K swipes/sec</text>

  <!-- Column 2: Recommendation Load -->
  <rect x="310" y="75" width="265" height="200" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="75" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">Recommendation Engine</text>

  <text x="335" y="138" fill="white" font-size="12">Rec batch per session:</text>
  <text x="335" y="158" fill="#fbbf24" font-size="15" font-weight="700">~100 profiles/batch</text>
  <text x="442" y="178" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>

  <text x="335" y="200" fill="white" font-size="12">Rec fetches/day:</text>
  <text x="335" y="220" fill="#fbbf24" font-size="15" font-weight="700">2.6M requests/day</text>

  <text x="335" y="248" fill="white" font-size="11">Recommendation QPS:</text>
  <text x="335" y="268" fill="#f97316" font-size="16" font-weight="800">&#x2248; 30K QPS peak</text>

  <!-- Column 3: Storage -->
  <rect x="310" y="290" width="265" height="135" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="290" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="314" text-anchor="middle" fill="white" font-size="14" font-weight="700">Storage Estimates</text>

  <text x="335" y="350" fill="white" font-size="11">User profiles (75M users):</text>
  <text x="335" y="370" fill="#fbbf24" font-size="15" font-weight="800">187 TB (photos + data)</text>

  <text x="335" y="395" fill="white" font-size="11">Swipe logs/day:</text>
  <text x="335" y="415" fill="#f97316" font-size="15" font-weight="800">160 GB/day (100 bytes/swipe)</text>

  <!-- Column 4: Match Detection -->
  <rect x="590" y="75" width="280" height="200" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="75" width="280" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="730" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">Match Detection</text>

  <text x="615" y="138" fill="white" font-size="12">Right-swipe rate: ~25%</text>
  <text x="615" y="161" fill="#fbbf24" font-size="15" font-weight="700">400M likes/day</text>
  <text x="730" y="183" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>

  <text x="615" y="206" fill="white" font-size="11">Each like = 1 Redis lookup</text>
  <text x="615" y="228" fill="white" font-size="11">Match rate: ~5% of likes</text>
  <text x="615" y="250" fill="#f97316" font-size="16" font-weight="800">20M matches/day</text>
  <text x="615" y="268" fill="rgba(255,255,255,0.7)" font-size="10">&#x2248; 231 matches/sec</text>

  <!-- Column 5: Location Updates -->
  <rect x="590" y="290" width="280" height="135" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="290" width="280" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="730" y="314" text-anchor="middle" fill="white" font-size="14" font-weight="700">Location Updates</text>

  <text x="615" y="350" fill="white" font-size="11">Location update frequency:</text>
  <text x="615" y="370" fill="#fbbf24" font-size="14" font-weight="700">Every 5 min while active</text>

  <text x="615" y="398" fill="white" font-size="11">Geo-index writes:</text>
  <text x="615" y="418" fill="#f97316" font-size="14" font-weight="700">&#x2248; 87K updates/sec peak</text>

  <!-- Key Insights -->
  <rect x="890" y="75" width="290" height="350" rx="12" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="1035" y="103" text-anchor="middle" fill="white" font-size="14" font-weight="700">&#x1F4A1; Key Insights</text>
  <line x1="910" y1="113" x2="1160" y2="113" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <text x="910" y="140" fill="white" font-size="11" font-weight="600">Swipes are write-heavy</text>
  <text x="910" y="158" fill="rgba(255,255,255,0.7)" font-size="10">18.5K writes/sec. Needs sharded</text>
  <text x="910" y="173" fill="rgba(255,255,255,0.7)" font-size="10">storage with async processing.</text>

  <text x="910" y="203" fill="white" font-size="11" font-weight="600">Rec engine is the bottleneck</text>
  <text x="910" y="221" fill="rgba(255,255,255,0.7)" font-size="10">30K QPS for recommendations</text>
  <text x="910" y="236" fill="rgba(255,255,255,0.7)" font-size="10">requires pre-computed candidate</text>
  <text x="910" y="251" fill="rgba(255,255,255,0.7)" font-size="10">pools + geo-sharding.</text>

  <text x="910" y="281" fill="white" font-size="11" font-weight="600">Match = Redis O(1) lookup</text>
  <text x="910" y="299" fill="rgba(255,255,255,0.7)" font-size="10">On right-swipe, check if other</text>
  <text x="910" y="314" fill="rgba(255,255,255,0.7)" font-size="10">user already liked you. Redis SET</text>
  <text x="910" y="329" fill="rgba(255,255,255,0.7)" font-size="10">with TTL for active users.</text>

  <text x="910" y="359" fill="white" font-size="11" font-weight="600">Photos dominate storage</text>
  <text x="910" y="377" fill="rgba(255,255,255,0.7)" font-size="10">187TB is 99%+ photos. Use S3</text>
  <text x="910" y="392" fill="rgba(255,255,255,0.7)" font-size="10">with CloudFront CDN. Generate</text>
  <text x="910" y="407" fill="rgba(255,255,255,0.7)" font-size="10">multiple resolutions on upload.</text>
</svg>
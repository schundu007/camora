<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="450" fill="#fafbfc" rx="16"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Tinder Swipe and Match Detection Flow</text>
  <text x="600" y="56" text-anchor="middle" fill="#64748b" font-size="12">User A swipes right, Kafka processes, Redis checks reciprocal like, match or store</text>

  <!-- User A Swipes -->
  <rect x="20" y="110" width="140" height="115" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="20" y="110" width="140" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="90" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">User A Swipes</text>
  <text x="90" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Swipe right (LIKE)</text>
  <text x="90" y="175" text-anchor="middle" fill="#64748b" font-size="9">POST /api/swipe</text>
  <text x="90" y="192" text-anchor="middle" fill="#64748b" font-size="9">targetId, action=LIKE</text>
  <text x="90" y="213" text-anchor="middle" fill="#94a3b8" font-size="9">1.6B swipes/day</text>

  <!-- Kafka -->
  <rect x="200" y="110" width="140" height="115" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="200" y="110" width="140" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="270" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Kafka Queue</text>
  <text x="270" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Swipe event</text>
  <text x="270" y="175" text-anchor="middle" fill="#64748b" font-size="9">Partition by userId</text>
  <text x="270" y="192" text-anchor="middle" fill="#64748b" font-size="9">Guaranteed delivery</text>
  <text x="270" y="213" text-anchor="middle" fill="#94a3b8" font-size="9">Async processing</text>

  <!-- Match Worker -->
  <rect x="380" y="110" width="140" height="115" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="380" y="110" width="140" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="450" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Match Worker</text>
  <text x="450" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Process swipe</text>
  <text x="450" y="175" text-anchor="middle" fill="#64748b" font-size="9">Record like in Redis</text>
  <text x="450" y="192" text-anchor="middle" fill="#64748b" font-size="9">SADD user:A:likes B</text>
  <text x="450" y="213" text-anchor="middle" fill="#94a3b8" font-size="9">Then check reverse</text>

  <!-- Check Redis -->
  <rect x="560" y="110" width="150" height="115" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="560" y="110" width="150" height="30" rx="10 10 0 0" fill="#ef4444"/>
  <text x="635" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Redis Check</text>
  <text x="635" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">SISMEMBER B:likes A</text>
  <text x="635" y="175" text-anchor="middle" fill="#64748b" font-size="9">Does B like A?</text>
  <text x="635" y="192" text-anchor="middle" fill="#64748b" font-size="9">O(1) lookup</text>
  <text x="635" y="213" text-anchor="middle" fill="#94a3b8" font-size="9">YES or NO branch</text>

  <!-- YES: Match -->
  <rect x="770" y="85" width="160" height="100" rx="10" fill="#fff" stroke="#16a34a" stroke-width="2" filter="url(#s)"/>
  <rect x="770" y="85" width="160" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="850" y="105" text-anchor="middle" fill="white" font-size="11" font-weight="700">YES = Match!</text>
  <text x="850" y="130" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Create match</text>
  <text x="850" y="147" text-anchor="middle" fill="#64748b" font-size="9">SETNX lock prevents dup</text>
  <text x="850" y="164" text-anchor="middle" fill="#64748b" font-size="9">match:{min}:{max}</text>
  <text x="850" y="178" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="600">26M matches/day</text>

  <!-- NO: Store -->
  <rect x="770" y="210" width="160" height="80" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="770" y="210" width="160" height="30" rx="10 10 0 0" fill="#94a3b8"/>
  <text x="850" y="230" text-anchor="middle" fill="white" font-size="11" font-weight="700">NO = Store</text>
  <text x="850" y="258" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Like stored in Redis</text>
  <text x="850" y="275" text-anchor="middle" fill="#64748b" font-size="9">A_B awaits reciprocal</text>

  <!-- Notify Both -->
  <rect x="985" y="85" width="160" height="100" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="985" y="85" width="160" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="1065" y="105" text-anchor="middle" fill="white" font-size="11" font-weight="700">Notify Both</text>
  <text x="1065" y="130" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Push notifications</text>
  <text x="1065" y="147" text-anchor="middle" fill="#64748b" font-size="9">APNs + FCM</text>
  <text x="1065" y="164" text-anchor="middle" fill="#64748b" font-size="9">Chat channel opened</text>
  <text x="1065" y="178" text-anchor="middle" fill="#2563eb" font-size="9" font-weight="600">Both users notified</text>

  <!-- Cassandra (async persist) -->
  <rect x="380" y="285" width="180" height="45" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="380" y="285" width="180" height="18" rx="8 8 0 0" fill="#7c3aed"/>
  <text x="470" y="298" text-anchor="middle" fill="white" font-size="9" font-weight="700">Cassandra (Async Persist)</text>
  <text x="470" y="318" text-anchor="middle" fill="#64748b" font-size="9">Swipe + match records durability</text>

  <!-- Arrows -->
  <line x1="160" y1="162" x2="196" y2="162" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="163" y="145" width="22" height="14" rx="3" fill="#f97316"/>
  <text x="174" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">1</text>

  <line x1="340" y1="162" x2="376" y2="162" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="343" y="145" width="22" height="14" rx="3" fill="#f97316"/>
  <text x="354" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">2</text>

  <line x1="520" y1="162" x2="556" y2="162" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="523" y="145" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="534" y="155" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>

  <!-- YES branch -->
  <line x1="710" y1="140" x2="766" y2="125" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="720" y="108" width="35" height="14" rx="3" fill="#16a34a"/>
  <text x="737" y="118" text-anchor="middle" fill="white" font-size="8" font-weight="600">YES</text>

  <!-- NO branch -->
  <line x1="710" y1="180" x2="766" y2="240" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="720" y="203" width="32" height="14" rx="3" fill="#94a3b8"/>
  <text x="736" y="213" text-anchor="middle" fill="white" font-size="8" font-weight="600">NO</text>

  <!-- Match → Notify -->
  <line x1="930" y1="130" x2="981" y2="130" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="940" y="113" width="22" height="14" rx="3" fill="#16a34a"/>
  <text x="951" y="123" text-anchor="middle" fill="white" font-size="8" font-weight="600">5</text>

  <!-- Async persist arrow -->
  <line x1="450" y1="225" x2="460" y2="281" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>
  <text x="490" y="260" fill="#7c3aed" font-size="9">6 Async</text>

  <!-- Legend -->
  <rect x="30" y="365" width="1140" height="65" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="55" y="387" fill="#1e293b" font-size="11" font-weight="700">Flow Steps:</text>
  <rect x="55" y="397" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="70" y="406" fill="#475569" font-size="9">1-2 User A swipes right, event published to Kafka, consumed by Match Worker</text>
  <rect x="55" y="411" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="70" y="420" fill="#475569" font-size="9">3 SADD A:likes B in Redis, then SISMEMBER B:likes A (O(1) reciprocal check)</text>
  <rect x="520" y="397" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="535" y="406" fill="#475569" font-size="9">YES: Create match with SETNX lock, notify both via APNs/FCM, open chat</text>
  <rect x="520" y="411" width="10" height="10" rx="2" fill="#94a3b8"/>
  <text x="535" y="420" fill="#475569" font-size="9">NO: Like stored in Redis, awaiting reciprocal swipe. Async persist to Cassandra.</text>
</svg>
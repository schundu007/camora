<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="450" fill="#fafbfc" rx="16"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Tinder Recommendation Stack Generation</text>
  <text x="600" y="56" text-anchor="middle" fill="#64748b" font-size="12">User opens app, S2 cell covering, ES shard query, filter, ML rank, return 50 profiles</text>

  <!-- Open App -->
  <rect x="20" y="115" width="130" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="20" y="115" width="130" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="85" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">Open App</text>
  <text x="85" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Trigger generation</text>
  <text x="85" y="180" text-anchor="middle" fill="#64748b" font-size="9">Stack empty or</text>
  <text x="85" y="195" text-anchor="middle" fill="#64748b" font-size="9">location changed</text>
  <text x="85" y="213" text-anchor="middle" fill="#94a3b8" font-size="9">GPS coordinates</text>

  <!-- S2 Cell -->
  <rect x="185" y="115" width="130" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="185" y="115" width="130" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="250" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">S2 Cell Cover</text>
  <text x="250" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Geospatial index</text>
  <text x="250" y="180" text-anchor="middle" fill="#64748b" font-size="9">Compute S2 cells</text>
  <text x="250" y="195" text-anchor="middle" fill="#64748b" font-size="9">covering 10km radius</text>
  <text x="250" y="213" text-anchor="middle" fill="#94a3b8" font-size="9">~12-20 cells</text>

  <!-- Query 3 ES Shards -->
  <rect x="350" y="115" width="140" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="350" y="115" width="140" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="420" y="135" text-anchor="middle" fill="white" font-size="10" font-weight="700">Query 3 ES Shards</text>
  <text x="420" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Candidate fetch</text>
  <text x="420" y="180" text-anchor="middle" fill="#64748b" font-size="9">Users in S2 cells</text>
  <text x="420" y="195" text-anchor="middle" fill="#64748b" font-size="9">Parallel query</text>
  <text x="420" y="213" text-anchor="middle" fill="#94a3b8" font-size="9">3 geo-shards</text>

  <!-- Filter -->
  <rect x="525" y="115" width="140" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="525" y="115" width="140" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="595" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">Filter</text>
  <text x="595" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Age + distance</text>
  <text x="595" y="180" text-anchor="middle" fill="#64748b" font-size="9">Gender preferences</text>
  <text x="595" y="195" text-anchor="middle" fill="#64748b" font-size="9">Bloom filter: swiped?</text>
  <text x="595" y="213" text-anchor="middle" fill="#94a3b8" font-size="9">Remove seen profiles</text>

  <!-- ML Rank -->
  <rect x="700" y="115" width="140" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="700" y="115" width="140" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="770" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">ML Rank</text>
  <text x="770" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">ELO + ML scoring</text>
  <text x="770" y="180" text-anchor="middle" fill="#64748b" font-size="9">ELO similarity</text>
  <text x="770" y="195" text-anchor="middle" fill="#64748b" font-size="9">Activity recency</text>
  <text x="770" y="213" text-anchor="middle" fill="#94a3b8" font-size="9">Profile completeness</text>

  <!-- Return 50 Profiles -->
  <rect x="875" y="115" width="150" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="875" y="115" width="150" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="950" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="700">Return 50 Profiles</text>
  <text x="950" y="163" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Recommendation stack</text>
  <text x="950" y="180" text-anchor="middle" fill="#64748b" font-size="9">Redis sorted set</text>
  <text x="950" y="195" text-anchor="middle" fill="#64748b" font-size="9">4-hour TTL</text>
  <text x="950" y="213" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="600">Ready to swipe</text>

  <!-- Redis Cache (below) -->
  <rect x="700" y="275" width="150" height="45" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="700" y="275" width="150" height="18" rx="8 8 0 0" fill="#ef4444"/>
  <text x="775" y="288" text-anchor="middle" fill="white" font-size="9" font-weight="700">Redis Rec Stack</text>
  <text x="775" y="307" text-anchor="middle" fill="#64748b" font-size="9">user:{id}:recs sorted set</text>

  <!-- Arrows -->
  <line x1="150" y1="165" x2="181" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="152" y="148" width="22" height="14" rx="3" fill="#f97316"/>
  <text x="163" y="158" text-anchor="middle" fill="white" font-size="8" font-weight="600">1</text>

  <line x1="315" y1="165" x2="346" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="317" y="148" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="328" y="158" text-anchor="middle" fill="white" font-size="8" font-weight="600">2</text>

  <line x1="490" y1="165" x2="521" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="492" y="148" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="503" y="158" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>

  <line x1="665" y1="165" x2="696" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="667" y="148" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="678" y="158" text-anchor="middle" fill="white" font-size="8" font-weight="600">4</text>

  <line x1="840" y1="165" x2="871" y2="165" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="842" y="148" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="853" y="158" text-anchor="middle" fill="white" font-size="8" font-weight="600">5</text>

  <!-- Redis cache arrow -->
  <line x1="950" y1="225" x2="825" y2="271" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="910" y="255" fill="#ef4444" font-size="9">Cache stack</text>

  <!-- Legend -->
  <rect x="30" y="360" width="1140" height="65" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="55" y="382" fill="#1e293b" font-size="11" font-weight="700">Flow Steps:</text>
  <rect x="55" y="392" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="70" y="401" fill="#475569" font-size="9">1 User opens app, triggers recommendation if stack empty or location changed</text>
  <rect x="55" y="406" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="70" y="415" fill="#475569" font-size="9">2 Compute S2 cell covering for 10km radius, query 3 Elasticsearch geo-shards</text>
  <text x="470" y="401" fill="#475569" font-size="9">3-4 Filter by age, distance, gender prefs, Bloom filter dedup, then ML rank</text>
  <rect x="470" y="406" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="485" y="415" fill="#475569" font-size="9">5 Top 50 profiles stored in Redis sorted set with 4-hour TTL</text>
</svg>
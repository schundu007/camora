<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="500" fill="#f7f8f9" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">ACID Properties</text>
  <text x="400" y="50" text-anchor="middle" font-size="11" fill="#64748b">Four guarantees of reliable database transactions</text>

  <!-- Grid dividers -->
  <line x1="400" y1="62" x2="400" y2="490" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="10" y1="270" x2="790" y2="270" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ==================== ATOMICITY (top-left) ==================== -->
  <rect x="20" y="68" width="365" height="190" rx="10" fill="white" stroke="#3b82f6" stroke-width="1.5" opacity="0.95"/>
  <!-- Header -->
  <rect x="30" y="78" width="110" height="26" rx="13" fill="#3b82f6"/>
  <text x="85" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="white">Atomicity</text>

  <!-- Transaction bundle -->
  <rect x="45" y="118" width="120" height="80" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="105" y="136" text-anchor="middle" font-size="9" font-weight="600" fill="#3b82f6">Transaction</text>
  <rect x="60" y="143" width="90" height="14" rx="4" fill="#bfdbfe"/>
  <text x="105" y="153" text-anchor="middle" font-size="8" fill="#1e40af">write_1</text>
  <rect x="60" y="160" width="90" height="14" rx="4" fill="#bfdbfe"/>
  <text x="105" y="170" text-anchor="middle" font-size="8" fill="#1e40af">write_2</text>
  <rect x="60" y="177" width="90" height="14" rx="4" fill="#bfdbfe"/>
  <text x="105" y="187" text-anchor="middle" font-size="8" fill="#1e40af">write_3</text>

  <!-- Arrow to decision -->
  <line x1="170" y1="158" x2="205" y2="158" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Decision diamond -->
  <polygon points="230,138 255,158 230,178 205,158" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="230" y="161" text-anchor="middle" font-size="7" font-weight="600" fill="#1e40af">ALL?</text>

  <!-- Commit path -->
  <line x1="255" y1="148" x2="290" y2="128" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <rect x="290" y="115" width="75" height="24" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="327" y="131" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">COMMIT</text>

  <!-- Rollback path -->
  <line x1="255" y1="168" x2="290" y2="183" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <rect x="290" y="172" width="75" height="24" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="327" y="188" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">ROLLBACK</text>

  <!-- Description -->
  <text x="30" y="248" font-size="9" fill="#64748b">All operations succeed together, or none are applied.</text>

  <!-- ==================== CONSISTENCY (top-right) ==================== -->
  <rect x="415" y="68" width="365" height="190" rx="10" fill="white" stroke="#10b981" stroke-width="1.5" opacity="0.95"/>
  <!-- Header -->
  <rect x="425" y="78" width="120" height="26" rx="13" fill="#10b981"/>
  <text x="485" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="white">Consistency</text>

  <!-- State A -->
  <rect x="440" y="120" width="90" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="485" y="140" text-anchor="middle" font-size="9" font-weight="600" fill="#065f46">State A</text>
  <text x="485" y="153" text-anchor="middle" font-size="8" fill="#047857">bal: $500</text>
  <text x="485" y="163" text-anchor="middle" font-size="8" fill="#047857">valid: true</text>

  <!-- Arrow with transaction label -->
  <line x1="535" y1="145" x2="595" y2="145" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen2)"/>
  <rect x="545" y="122" width="70" height="18" rx="5" fill="#d1fae5"/>
  <text x="580" y="135" text-anchor="middle" font-size="8" font-weight="600" fill="#065f46">Transaction</text>

  <!-- Constraints check -->
  <rect x="548" y="155" width="64" height="16" rx="4" fill="#f0fdf4" stroke="#10b981" stroke-width="0.8"/>
  <text x="580" y="166" text-anchor="middle" font-size="7" fill="#047857">constraints</text>

  <!-- State B -->
  <rect x="660" y="120" width="90" height="50" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="705" y="140" text-anchor="middle" font-size="9" font-weight="600" fill="#065f46">State B</text>
  <text x="705" y="153" text-anchor="middle" font-size="8" fill="#047857">bal: $400</text>
  <text x="705" y="163" text-anchor="middle" font-size="8" fill="#047857">valid: true</text>

  <!-- Invalid state crossed out -->
  <rect x="550" y="188" width="90" height="30" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="595" y="205" text-anchor="middle" font-size="8" fill="#991b1b">bal: -$50</text>
  <text x="595" y="215" text-anchor="middle" font-size="7" fill="#ef4444">REJECTED</text>
  <line x1="555" y1="192" x2="635" y2="215" stroke="#ef4444" stroke-width="1.2"/>
  <line x1="555" y1="215" x2="635" y2="192" stroke="#ef4444" stroke-width="1.2"/>

  <!-- Description -->
  <text x="425" y="248" font-size="9" fill="#64748b">Every transaction moves DB from one valid state to another.</text>

  <!-- ==================== ISOLATION (bottom-left) ==================== -->
  <rect x="20" y="280" width="365" height="200" rx="10" fill="white" stroke="#8b5cf6" stroke-width="1.5" opacity="0.95"/>
  <!-- Header -->
  <rect x="30" y="290" width="100" height="26" rx="13" fill="#8b5cf6"/>
  <text x="80" y="308" text-anchor="middle" font-size="12" font-weight="700" fill="white">Isolation</text>

  <!-- Transaction A -->
  <rect x="45" y="330" width="100" height="55" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="95" y="348" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6">Txn A</text>
  <text x="95" y="362" text-anchor="middle" font-size="8" fill="#7c3aed">UPDATE x=10</text>
  <text x="95" y="375" text-anchor="middle" font-size="8" fill="#7c3aed">UPDATE y=20</text>

  <!-- Transaction B -->
  <rect x="45" y="400" width="100" height="55" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="95" y="418" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6">Txn B</text>
  <text x="95" y="432" text-anchor="middle" font-size="8" fill="#7c3aed">UPDATE x=30</text>
  <text x="95" y="445" text-anchor="middle" font-size="8" fill="#7c3aed">READ y</text>

  <!-- Arrows from A and B toward DB -->
  <line x1="150" y1="358" x2="220" y2="370" stroke="#8b5cf6" stroke-width="1.2" marker-end="url(#arrowPurple)"/>
  <line x1="150" y1="428" x2="220" y2="415" stroke="#8b5cf6" stroke-width="1.2" marker-end="url(#arrowPurple)"/>

  <!-- Isolation barrier -->
  <line x1="185" y1="330" x2="185" y2="460" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="185" y="472" text-anchor="middle" font-size="7" fill="#8b5cf6" font-style="italic">barrier</text>

  <!-- Database -->
  <rect x="225" y="365" width="80" height="45" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="265" y="385" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">DB</text>
  <text x="265" y="400" text-anchor="middle" font-size="8" fill="#7c3aed">serialized</text>

  <!-- Result: no interference -->
  <rect x="320" y="340" width="55" height="60" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="347" y="360" text-anchor="middle" font-size="8" font-weight="600" fill="#5b21b6">Result</text>
  <text x="347" y="375" text-anchor="middle" font-size="7" fill="#7c3aed">A sees</text>
  <text x="347" y="386" text-anchor="middle" font-size="7" fill="#7c3aed">only its</text>
  <text x="347" y="397" text-anchor="middle" font-size="7" fill="#7c3aed">own data</text>
  <line x1="305" y1="380" x2="318" y2="373" stroke="#8b5cf6" stroke-width="1" marker-end="url(#arrowPurple)"/>

  <!-- Description -->
  <text x="30" y="468" font-size="9" fill="#64748b">Concurrent transactions cannot see each other's changes.</text>

  <!-- ==================== DURABILITY (bottom-right) ==================== -->
  <rect x="415" y="280" width="365" height="200" rx="10" fill="white" stroke="#f59e0b" stroke-width="1.5" opacity="0.95"/>
  <!-- Header -->
  <rect x="425" y="290" width="105" height="26" rx="13" fill="#f59e0b"/>
  <text x="477" y="308" text-anchor="middle" font-size="12" font-weight="700" fill="white">Durability</text>

  <!-- Transaction commits -->
  <rect x="440" y="330" width="75" height="35" rx="7" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="477" y="350" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">Txn</text>
  <text x="477" y="361" text-anchor="middle" font-size="8" fill="#b45309">COMMIT</text>

  <!-- Arrow to WAL -->
  <line x1="520" y1="348" x2="555" y2="348" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- WAL / Primary DB -->
  <rect x="560" y="325" width="80" height="45" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="600" y="345" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Primary</text>
  <text x="600" y="359" text-anchor="middle" font-size="8" fill="#b45309">WAL + fsync</text>

  <!-- Arrows to replicas -->
  <line x1="640" y1="340" x2="695" y2="320" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#arrowOrange)"/>
  <line x1="640" y1="356" x2="695" y2="380" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#arrowOrange)"/>

  <!-- Replica A -->
  <rect x="700" y="300" width="70" height="35" rx="7" fill="#fef9c3" stroke="#f59e0b" stroke-width="1"/>
  <text x="735" y="316" text-anchor="middle" font-size="8" font-weight="600" fill="#92400e">Replica A</text>
  <text x="735" y="328" text-anchor="middle" font-size="7" fill="#b45309">synced</text>

  <!-- Replica B -->
  <rect x="700" y="363" width="70" height="35" rx="7" fill="#fef9c3" stroke="#f59e0b" stroke-width="1"/>
  <text x="735" y="379" text-anchor="middle" font-size="8" font-weight="600" fill="#92400e">Replica B</text>
  <text x="735" y="391" text-anchor="middle" font-size="7" fill="#b45309">synced</text>

  <!-- Crash recovery icon -->
  <rect x="455" y="395" width="130" height="40" rx="7" fill="#fefce8" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="520" y="413" text-anchor="middle" font-size="8" font-weight="600" fill="#92400e">After crash:</text>
  <text x="520" y="427" text-anchor="middle" font-size="8" fill="#b45309">replay WAL to recover</text>

  <!-- Description -->
  <text x="425" y="468" font-size="9" fill="#64748b">Committed data survives crashes via WAL and replication.</text>

  <!-- ==================== Arrow markers ==================== -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
    </marker>
    <marker id="arrowGreen2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
  </defs>

  <rect width="1200" height="400" fill="white" rx="12"/>

  <text x="600" y="35" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">E-Commerce Checkout Flow</text>
  <text x="600" y="55" text-anchor="middle" fill="#64748b" font-size="12">Cart through inventory check, payment, order creation, fulfillment, and shipment tracking</text>

  <!-- 1. Cart -->
  <rect x="15" y="110" width="130" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="15" y="110" width="130" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="80" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Cart</text>
  <text x="80" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Cart Service</text>
  <text x="80" y="175" text-anchor="middle" fill="#64748b" font-size="9">Review items + qty</text>
  <text x="80" y="192" text-anchor="middle" fill="#64748b" font-size="9">Apply coupons</text>
  <text x="80" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">Redis session store</text>

  <!-- Arrow 1→2 -->
  <line x1="145" y1="170" x2="178" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="147" y="150" width="30" height="16" rx="4" fill="#f97316"/>
  <text x="162" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">1</text>

  <!-- 2. Inventory Check -->
  <rect x="188" y="110" width="140" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="188" y="110" width="140" height="30" rx="10 10 0 0" fill="#ef4444"/>
  <text x="258" y="130" text-anchor="middle" fill="white" font-size="10" font-weight="700">Inventory Check</text>
  <text x="258" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Stock Service</text>
  <text x="258" y="175" text-anchor="middle" fill="#64748b" font-size="9">Reserve quantity</text>
  <text x="258" y="192" text-anchor="middle" fill="#64748b" font-size="9">Soft lock (TTL)</text>
  <text x="258" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">Distributed counter</text>

  <!-- Arrow 2→3 -->
  <line x1="328" y1="170" x2="361" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="330" y="150" width="30" height="16" rx="4" fill="#ef4444"/>
  <text x="345" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">2</text>

  <!-- 3. Payment -->
  <rect x="371" y="110" width="130" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="371" y="110" width="130" height="30" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="436" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Payment</text>
  <text x="436" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Payment Gateway</text>
  <text x="436" y="175" text-anchor="middle" fill="#64748b" font-size="9">Auth + capture</text>
  <text x="436" y="192" text-anchor="middle" fill="#64748b" font-size="9">Idempotency key</text>
  <text x="436" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">Stripe / PayPal</text>

  <!-- Arrow 3→4 -->
  <line x1="501" y1="170" x2="534" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="503" y="150" width="30" height="16" rx="4" fill="#7c3aed"/>
  <text x="518" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>

  <!-- 4. Order Create -->
  <rect x="544" y="110" width="130" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="544" y="110" width="130" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="609" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Order Create</text>
  <text x="609" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Order Service</text>
  <text x="609" y="175" text-anchor="middle" fill="#64748b" font-size="9">Generate order ID</text>
  <text x="609" y="192" text-anchor="middle" fill="#64748b" font-size="9">Saga orchestration</text>
  <text x="609" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">Event sourced</text>

  <!-- Arrow 4→5 -->
  <line x1="674" y1="170" x2="707" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="676" y="150" width="30" height="16" rx="4" fill="#2563eb"/>
  <text x="691" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">4</text>

  <!-- 5. Fulfillment -->
  <rect x="717" y="110" width="130" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="717" y="110" width="130" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="782" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Fulfillment</text>
  <text x="782" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Warehouse</text>
  <text x="782" y="175" text-anchor="middle" fill="#64748b" font-size="9">Pick + pack items</text>
  <text x="782" y="192" text-anchor="middle" fill="#64748b" font-size="9">Generate label</text>
  <text x="782" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">Async via queue</text>

  <!-- Arrow 5→6 -->
  <line x1="847" y1="170" x2="880" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="849" y="150" width="30" height="16" rx="4" fill="#16a34a"/>
  <text x="864" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">5</text>

  <!-- 6. Ship -->
  <rect x="890" y="110" width="130" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="890" y="110" width="130" height="30" rx="10 10 0 0" fill="#ec4899"/>
  <text x="955" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Ship</text>
  <text x="955" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Shipping Service</text>
  <text x="955" y="175" text-anchor="middle" fill="#64748b" font-size="9">Carrier API call</text>
  <text x="955" y="192" text-anchor="middle" fill="#64748b" font-size="9">Tracking number</text>
  <text x="955" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">Multi-carrier</text>

  <!-- Arrow 6→7 -->
  <line x1="1020" y1="170" x2="1053" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="1022" y="150" width="30" height="16" rx="4" fill="#ec4899"/>
  <text x="1037" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">6</text>

  <!-- 7. Track -->
  <rect x="1063" y="110" width="120" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="1063" y="110" width="120" height="30" rx="10 10 0 0" fill="#0891b2"/>
  <text x="1123" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Track</text>
  <text x="1123" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Tracking UI</text>
  <text x="1123" y="175" text-anchor="middle" fill="#64748b" font-size="9">Real-time updates</text>
  <text x="1123" y="192" text-anchor="middle" fill="#64748b" font-size="9">Push notifications</text>
  <text x="1123" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">Webhook events</text>

  <!-- Legend -->
  <rect x="30" y="280" width="1140" height="100" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="305" fill="#1e293b" font-size="12" font-weight="700">Flow Steps</text>

  <rect x="60" y="318" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="76" y="328" fill="#475569" font-size="10">1. Cart reviewed with items, quantities, and coupon codes applied</text>
  <rect x="60" y="336" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="76" y="346" fill="#475569" font-size="10">2. Inventory soft-locked with TTL to prevent overselling</text>
  <rect x="60" y="354" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="76" y="364" fill="#475569" font-size="10">3. Payment authorized and captured via gateway with idempotency key</text>

  <rect x="600" y="318" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="616" y="328" fill="#475569" font-size="10">4. Order created via saga orchestration, event sourced</text>
  <rect x="600" y="336" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="616" y="346" fill="#475569" font-size="10">5. Warehouse picks and packs, shipping label generated</text>
  <rect x="600" y="354" width="10" height="10" rx="2" fill="#ec4899"/>
  <text x="616" y="364" fill="#475569" font-size="10">6-7. Carrier ships, tracking number provided with real-time updates</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgCap" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="550" fill="url(#bgCap)" rx="16"/>

  <!-- Title -->
  <rect x="380" y="16" width="440" height="40" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="43" text-anchor="middle" fill="white" font-size="20" font-weight="700">Back-of-the-Envelope Estimates</text>

  <!-- Column 1: Traffic -->
  <rect x="20" y="80" width="275" height="440" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="20" y="80" width="275" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="157" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Traffic Estimates</text>

  <text x="45" y="145" fill="#fbbf24" font-size="13" font-weight="700">&#x1F3EA; Millions of stores</text>
  <text x="157" y="170" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="200" fill="white" font-size="12">Total storefronts hosted:</text>
  <text x="45" y="218" fill="#fbbf24" font-size="15" font-weight="700">4+ Million stores</text>
  <text x="157" y="240" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="268" fill="white" font-size="12">Aggregate page views/day:</text>
  <text x="45" y="288" fill="#fbbf24" font-size="16" font-weight="800">&#x2248; 2 Billion/day</text>
  <text x="157" y="310" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="338" fill="white" font-size="11">Page view QPS:</text>
  <text x="45" y="356" fill="rgba(255,255,255,0.7)" font-size="10">2B / 86,400</text>
  <text x="45" y="378" fill="#fbbf24" font-size="16" font-weight="800">&#x2248; 23,000 QPS</text>
  <text x="157" y="400" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="425" fill="white" font-size="11">Flash sale peak (50x):</text>
  <text x="45" y="448" fill="#f97316" font-size="18" font-weight="800">&#x2248; 1.15M QPS</text>
  <text x="45" y="470" fill="rgba(255,255,255,0.6)" font-size="10">(Black Friday / Singles Day)</text>
  <text x="45" y="490" fill="rgba(255,255,255,0.6)" font-size="10">Must handle 50x burst gracefully</text>

  <!-- Column 2: Orders -->
  <rect x="310" y="80" width="265" height="250" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="80" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Order Volume</text>

  <text x="335" y="148" fill="#fbbf24" font-size="13" font-weight="700">&#x1F6D2; Conversion rate: &#x2248; 2%</text>
  <text x="442" y="170" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="335" y="198" fill="white" font-size="12">Daily orders:</text>
  <text x="335" y="218" fill="#fbbf24" font-size="15" font-weight="700">&#x2248; 5 Million orders/day</text>
  <text x="442" y="240" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="335" y="268" fill="white" font-size="11">Order QPS: 5M / 86,400</text>
  <text x="335" y="292" fill="#f97316" font-size="18" font-weight="800">&#x2248; 58 orders/sec</text>

  <rect x="325" y="302" width="235" height="22" rx="6" fill="rgba(239,68,68,0.3)" stroke="rgba(239,68,68,0.5)" stroke-width="1"/>
  <text x="442" y="318" text-anchor="middle" fill="white" font-size="10" font-weight="600">&#x26A0;️ Flash sales: 2,900 orders/sec!</text>

  <!-- Column 2b: Catalog -->
  <rect x="310" y="350" width="265" height="170" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="350" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="374" text-anchor="middle" fill="white" font-size="14" font-weight="700">Product Catalog</text>

  <text x="335" y="410" fill="white" font-size="11">Total products: <tspan fill="#fbbf24" font-weight="700">&#x2248; 500M SKUs</tspan></text>
  <text x="335" y="432" fill="white" font-size="11">Avg product data: &#x2248; 10KB</text>
  <text x="442" y="452" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>

  <text x="335" y="475" fill="#fbbf24" font-size="14" font-weight="700">&#x2248; 5 TB catalog data</text>
  <text x="335" y="500" fill="white" font-size="11">Product images:</text>
  <text x="335" y="518" fill="#f97316" font-size="14" font-weight="700">&#x2248; 200 TB (avg 5 images/SKU)</text>

  <!-- Column 3: Inventory -->
  <rect x="590" y="80" width="290" height="250" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="80" width="290" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Inventory Concurrency</text>

  <text x="615" y="148" fill="white" font-size="12">Hot products: 1000s of</text>
  <text x="615" y="168" fill="white" font-size="12">concurrent buyers</text>
  <text x="615" y="198" fill="#fbbf24" font-size="18" font-weight="800">Race condition</text>
  <text x="615" y="218" fill="#fbbf24" font-size="18" font-weight="800">on stock count</text>
  <text x="735" y="240" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>

  <text x="615" y="265" fill="white" font-size="11">Strategy: Redis atomic decrement</text>
  <text x="615" y="288" fill="#16a34a" font-size="14" font-weight="800">DECR + check &#x2265; 0</text>
  <text x="615" y="310" fill="rgba(255,255,255,0.6)" font-size="10">Async DB sync for consistency</text>

  <!-- Column 3b: Multi-currency -->
  <rect x="590" y="350" width="290" height="170" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="350" width="290" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="374" text-anchor="middle" fill="white" font-size="14" font-weight="700">Multi-Tenancy</text>

  <text x="615" y="410" fill="white" font-size="11">Stores: <tspan fill="#fbbf24" font-weight="700">4M+ tenants</tspan></text>
  <text x="615" y="432" fill="white" font-size="11">Currencies: 130+ supported</text>
  <text x="735" y="452" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>

  <text x="615" y="475" fill="white" font-size="11">Tenant isolation strategy:</text>
  <text x="615" y="495" fill="#fbbf24" font-size="14" font-weight="700">Shared DB + tenant_id column</text>
  <text x="615" y="518" fill="rgba(255,255,255,0.6)" font-size="10">RLS or app-level filtering</text>

  <!-- Key insight box -->
  <rect x="900" y="80" width="280" height="440" rx="12" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="1040" y="108" text-anchor="middle" fill="white" font-size="14" font-weight="700">&#x1F4A1; Key Insights</text>
  <line x1="920" y1="118" x2="1160" y2="118" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <text x="920" y="145" fill="white" font-size="11" font-weight="600">Flash sales = 50x spike</text>
  <text x="920" y="163" fill="rgba(255,255,255,0.7)" font-size="10">Must handle 1M+ QPS bursts.</text>
  <text x="920" y="178" fill="rgba(255,255,255,0.7)" font-size="10">Queue-based checkout essential.</text>

  <text x="920" y="210" fill="white" font-size="11" font-weight="600">Inventory = distributed lock</text>
  <text x="920" y="228" fill="rgba(255,255,255,0.7)" font-size="10">Redis DECR for hot items. DB</text>
  <text x="920" y="243" fill="rgba(255,255,255,0.7)" font-size="10">for source of truth (async sync).</text>

  <text x="920" y="275" fill="white" font-size="11" font-weight="600">Multi-tenant architecture</text>
  <text x="920" y="293" fill="rgba(255,255,255,0.7)" font-size="10">4M stores on shared infra.</text>
  <text x="920" y="308" fill="rgba(255,255,255,0.7)" font-size="10">Noisy neighbor isolation critical.</text>

  <text x="920" y="340" fill="white" font-size="11" font-weight="600">Search = Elasticsearch</text>
  <text x="920" y="358" fill="rgba(255,255,255,0.7)" font-size="10">500M SKUs with faceted search.</text>
  <text x="920" y="373" fill="rgba(255,255,255,0.7)" font-size="10">Per-store index partitioning.</text>

  <text x="920" y="405" fill="white" font-size="11" font-weight="600">Images dominate storage</text>
  <text x="920" y="423" fill="rgba(255,255,255,0.7)" font-size="10">200 TB images vs 5 TB catalog.</text>
  <text x="920" y="438" fill="rgba(255,255,255,0.7)" font-size="10">CDN + S3 with on-the-fly resize.</text>

  <text x="920" y="470" fill="white" font-size="11" font-weight="600">Cart = ephemeral + persistent</text>
  <text x="920" y="488" fill="rgba(255,255,255,0.7)" font-size="10">Redis for active carts (TTL 30d).</text>
  <text x="920" y="503" fill="rgba(255,255,255,0.7)" font-size="10">DB for abandoned cart recovery.</text>
</svg>
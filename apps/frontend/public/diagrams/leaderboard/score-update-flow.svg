<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
  </defs>

  <rect width="1200" height="400" fill="white" rx="12"/>

  <text x="600" y="35" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Leaderboard Score Update Flow</text>
  <text x="600" y="55" text-anchor="middle" fill="#64748b" font-size="12">Player scores through Redis sorted sets to real-time rank retrieval</text>

  <!-- 1. Player Scores -->
  <rect x="20" y="110" width="140" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="20" y="110" width="140" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="90" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Player Scores</text>
  <text x="90" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Game Server</text>
  <text x="90" y="175" text-anchor="middle" fill="#64748b" font-size="9">Match result event</text>
  <text x="90" y="192" text-anchor="middle" fill="#64748b" font-size="9">Score delta computed</text>
  <text x="90" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">userId + newScore</text>

  <!-- Arrow 1→2 -->
  <line x1="160" y1="170" x2="198" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="162" y="150" width="36" height="16" rx="4" fill="#f97316"/>
  <text x="180" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">1</text>

  <!-- 2. API Gateway -->
  <rect x="208" y="110" width="140" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="208" y="110" width="140" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="278" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">API Gateway</text>
  <text x="278" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Score Service</text>
  <text x="278" y="175" text-anchor="middle" fill="#64748b" font-size="9">Validate payload</text>
  <text x="278" y="192" text-anchor="middle" fill="#64748b" font-size="9">Anti-cheat check</text>
  <text x="278" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">Rate limited</text>

  <!-- Arrow 2→3 -->
  <line x1="348" y1="170" x2="386" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="350" y="150" width="36" height="16" rx="4" fill="#2563eb"/>
  <text x="368" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">2</text>

  <!-- 3. Redis ZADD -->
  <rect x="396" y="110" width="140" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="396" y="110" width="140" height="30" rx="10 10 0 0" fill="#ef4444"/>
  <text x="466" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Redis ZADD</text>
  <text x="466" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Sorted Set</text>
  <text x="466" y="175" text-anchor="middle" fill="#64748b" font-size="9">ZADD lb score user</text>
  <text x="466" y="192" text-anchor="middle" fill="#64748b" font-size="9">O(log N) insert</text>
  <text x="466" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">Auto-sorted by score</text>

  <!-- Arrow 3→4 -->
  <line x1="536" y1="170" x2="574" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="538" y="150" width="36" height="16" rx="4" fill="#ef4444"/>
  <text x="556" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>

  <!-- 4. Update Rank -->
  <rect x="584" y="110" width="140" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="584" y="110" width="140" height="30" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="654" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Update Rank</text>
  <text x="654" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">ZREVRANK</text>
  <text x="654" y="175" text-anchor="middle" fill="#64748b" font-size="9">Get player's new rank</text>
  <text x="654" y="192" text-anchor="middle" fill="#64748b" font-size="9">O(log N) lookup</text>
  <text x="654" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">Push via WebSocket</text>

  <!-- Arrow 4→5 -->
  <line x1="724" y1="170" x2="762" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="726" y="150" width="36" height="16" rx="4" fill="#7c3aed"/>
  <text x="744" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">4</text>

  <!-- 5. ZREVRANGE -->
  <rect x="772" y="110" width="150" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="772" y="110" width="150" height="30" rx="10 10 0 0" fill="#ec4899"/>
  <text x="847" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Read ZREVRANGE</text>
  <text x="847" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Top-N Query</text>
  <text x="847" y="175" text-anchor="middle" fill="#64748b" font-size="9">ZREVRANGE 0 N-1</text>
  <text x="847" y="192" text-anchor="middle" fill="#64748b" font-size="9">WITHSCORES flag</text>
  <text x="847" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">O(log N + K)</text>

  <!-- Arrow 5→6 -->
  <line x1="922" y1="170" x2="960" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="924" y="150" width="36" height="16" rx="4" fill="#ec4899"/>
  <text x="942" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">5</text>

  <!-- 6. Return Top-N -->
  <rect x="970" y="110" width="140" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="970" y="110" width="140" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="1040" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Return Top-N</text>
  <text x="1040" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">API Response</text>
  <text x="1040" y="175" text-anchor="middle" fill="#64748b" font-size="9">[{rank, user, score}]</text>
  <text x="1040" y="192" text-anchor="middle" fill="#64748b" font-size="9">Cache 1s at edge</text>
  <text x="1040" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">JSON response</text>

  <!-- Legend -->
  <rect x="30" y="280" width="1140" height="100" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="305" fill="#1e293b" font-size="12" font-weight="700">Flow Steps</text>

  <rect x="60" y="315" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="76" y="325" fill="#475569" font-size="10">1. Game server emits score event with userId and computed score</text>
  <rect x="60" y="333" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="76" y="343" fill="#475569" font-size="10">2. API validates payload and runs anti-cheat verification</text>
  <rect x="60" y="351" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="76" y="361" fill="#475569" font-size="10">3. Redis ZADD upserts score into sorted set in O(log N)</text>

  <rect x="600" y="315" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="616" y="325" fill="#475569" font-size="10">4. ZREVRANK retrieves updated rank, pushed to player via WS</text>
  <rect x="600" y="333" width="10" height="10" rx="2" fill="#ec4899"/>
  <text x="616" y="343" fill="#475569" font-size="10">5. ZREVRANGE(0, N-1) fetches top-N players with scores</text>
  <rect x="600" y="351" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="616" y="361" fill="#475569" font-size="10">6. Leaderboard JSON returned, cached 1s at CDN edge</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
  </defs>

  <rect width="1200" height="400" fill="white" rx="12"/>

  <text x="600" y="35" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">News Aggregator Article Ingestion Flow</text>
  <text x="600" y="55" text-anchor="middle" fill="#64748b" font-size="12">RSS polling through deduplication and topic classification to user feeds</text>

  <!-- 1. RSS Poll -->
  <rect x="5" y="110" width="115" height="115" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="5" y="110" width="115" height="28" rx="10 10 0 0" fill="#f97316"/>
  <text x="62" y="129" text-anchor="middle" fill="white" font-size="10" font-weight="700">RSS Poll</text>
  <text x="62" y="155" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Feed Crawler</text>
  <text x="62" y="170" text-anchor="middle" fill="#64748b" font-size="8">10K+ feeds</text>
  <text x="62" y="185" text-anchor="middle" fill="#64748b" font-size="8">5-min intervals</text>
  <text x="62" y="210" text-anchor="middle" fill="#94a3b8" font-size="7">ETag / If-Modified</text>

  <!-- Arrow 1→2 -->
  <line x1="120" y1="167" x2="148" y2="167" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="120" y="148" width="28" height="14" rx="4" fill="#f97316"/>
  <text x="134" y="159" text-anchor="middle" fill="white" font-size="7" font-weight="600">1</text>

  <!-- 2. Kafka -->
  <rect x="158" y="110" width="115" height="115" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="158" y="110" width="115" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="215" y="129" text-anchor="middle" fill="white" font-size="10" font-weight="700">Kafka</text>
  <text x="215" y="155" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Message Queue</text>
  <text x="215" y="170" text-anchor="middle" fill="#64748b" font-size="8">raw-articles topic</text>
  <text x="215" y="185" text-anchor="middle" fill="#64748b" font-size="8">Partition by source</text>
  <text x="215" y="210" text-anchor="middle" fill="#94a3b8" font-size="7">Backpressure buffer</text>

  <!-- Arrow 2→3 -->
  <line x1="273" y1="167" x2="301" y2="167" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="273" y="148" width="28" height="14" rx="4" fill="#2563eb"/>
  <text x="287" y="159" text-anchor="middle" fill="white" font-size="7" font-weight="600">2</text>

  <!-- 3. Parse HTML -->
  <rect x="311" y="110" width="115" height="115" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="311" y="110" width="115" height="28" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="368" y="129" text-anchor="middle" fill="white" font-size="10" font-weight="700">Parse HTML</text>
  <text x="368" y="155" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Content Extractor</text>
  <text x="368" y="170" text-anchor="middle" fill="#64748b" font-size="8">Strip boilerplate</text>
  <text x="368" y="185" text-anchor="middle" fill="#64748b" font-size="8">Extract metadata</text>
  <text x="368" y="210" text-anchor="middle" fill="#94a3b8" font-size="7">Readability algo</text>

  <!-- Arrow 3→4 -->
  <line x1="426" y1="167" x2="454" y2="167" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="426" y="148" width="28" height="14" rx="4" fill="#7c3aed"/>
  <text x="440" y="159" text-anchor="middle" fill="white" font-size="7" font-weight="600">3</text>

  <!-- 4. Exact Dedup -->
  <rect x="464" y="110" width="115" height="115" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="464" y="110" width="115" height="28" rx="10 10 0 0" fill="#ef4444"/>
  <text x="521" y="129" text-anchor="middle" fill="white" font-size="10" font-weight="700">Exact Dedup</text>
  <text x="521" y="155" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Redis Set</text>
  <text x="521" y="170" text-anchor="middle" fill="#64748b" font-size="8">SHA-256 of URL</text>
  <text x="521" y="185" text-anchor="middle" fill="#64748b" font-size="8">SISMEMBER check</text>
  <text x="521" y="210" text-anchor="middle" fill="#94a3b8" font-size="7">O(1) lookup</text>

  <!-- Arrow 4→5 -->
  <line x1="579" y1="167" x2="607" y2="167" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="579" y="148" width="28" height="14" rx="4" fill="#ef4444"/>
  <text x="593" y="159" text-anchor="middle" fill="white" font-size="7" font-weight="600">4</text>

  <!-- 5. SimHash Dedup -->
  <rect x="617" y="110" width="115" height="115" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="617" y="110" width="115" height="28" rx="10 10 0 0" fill="#ec4899"/>
  <text x="674" y="129" text-anchor="middle" fill="white" font-size="10" font-weight="700">SimHash Dedup</text>
  <text x="674" y="155" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Near-Duplicate</text>
  <text x="674" y="170" text-anchor="middle" fill="#64748b" font-size="8">SimHash fingerprint</text>
  <text x="674" y="185" text-anchor="middle" fill="#64748b" font-size="8">Hamming dist &lt; 3</text>
  <text x="674" y="210" text-anchor="middle" fill="#94a3b8" font-size="7">Fuzzy matching</text>

  <!-- Arrow 5→6 -->
  <line x1="732" y1="167" x2="760" y2="167" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="732" y="148" width="28" height="14" rx="4" fill="#ec4899"/>
  <text x="746" y="159" text-anchor="middle" fill="white" font-size="7" font-weight="600">5</text>

  <!-- 6. Topic Classify -->
  <rect x="770" y="110" width="115" height="115" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="770" y="110" width="115" height="28" rx="10 10 0 0" fill="#0891b2"/>
  <text x="827" y="129" text-anchor="middle" fill="white" font-size="10" font-weight="700">Topic Classify</text>
  <text x="827" y="155" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">ML Classifier</text>
  <text x="827" y="170" text-anchor="middle" fill="#64748b" font-size="8">NLP categorization</text>
  <text x="827" y="185" text-anchor="middle" fill="#64748b" font-size="8">Entity extraction</text>
  <text x="827" y="210" text-anchor="middle" fill="#94a3b8" font-size="7">BERT model</text>

  <!-- Arrow 6→7 -->
  <line x1="885" y1="167" x2="913" y2="167" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="885" y="148" width="28" height="14" rx="4" fill="#0891b2"/>
  <text x="899" y="159" text-anchor="middle" fill="white" font-size="7" font-weight="600">6</text>

  <!-- 7. Index (ES) -->
  <rect x="923" y="110" width="115" height="115" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="923" y="110" width="115" height="28" rx="10 10 0 0" fill="#16a34a"/>
  <text x="980" y="129" text-anchor="middle" fill="white" font-size="10" font-weight="700">Index (ES)</text>
  <text x="980" y="155" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Elasticsearch</text>
  <text x="980" y="170" text-anchor="middle" fill="#64748b" font-size="8">Full-text index</text>
  <text x="980" y="185" text-anchor="middle" fill="#64748b" font-size="8">Topic facets</text>
  <text x="980" y="210" text-anchor="middle" fill="#94a3b8" font-size="7">Inverted index</text>

  <!-- Arrow 7→8 -->
  <line x1="1038" y1="167" x2="1066" y2="167" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="1038" y="148" width="28" height="14" rx="4" fill="#16a34a"/>
  <text x="1052" y="159" text-anchor="middle" fill="white" font-size="7" font-weight="600">7</text>

  <!-- 8. Feed -->
  <rect x="1076" y="110" width="110" height="115" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="1076" y="110" width="110" height="28" rx="10 10 0 0" fill="#d97706"/>
  <text x="1131" y="129" text-anchor="middle" fill="white" font-size="10" font-weight="700">User Feed</text>
  <text x="1131" y="155" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Feed Builder</text>
  <text x="1131" y="170" text-anchor="middle" fill="#64748b" font-size="8">Personalized rank</text>
  <text x="1131" y="185" text-anchor="middle" fill="#64748b" font-size="8">Interest matching</text>
  <text x="1131" y="210" text-anchor="middle" fill="#94a3b8" font-size="7">Push/pull hybrid</text>

  <!-- Legend -->
  <rect x="30" y="275" width="1140" height="105" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="298" fill="#1e293b" font-size="12" font-weight="700">Flow Steps</text>

  <rect x="60" y="310" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="76" y="320" fill="#475569" font-size="10">1. RSS crawler polls 10K+ feeds every 5 minutes with ETag caching</text>
  <rect x="60" y="327" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="76" y="337" fill="#475569" font-size="10">2. Raw articles published to Kafka, partitioned by source domain</text>
  <rect x="60" y="344" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="76" y="354" fill="#475569" font-size="10">3. HTML parsed, boilerplate stripped, metadata extracted</text>
  <rect x="60" y="361" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="76" y="371" fill="#475569" font-size="10">4. Exact dedup via SHA-256 URL hash in Redis set</text>

  <rect x="600" y="310" width="10" height="10" rx="2" fill="#ec4899"/>
  <text x="616" y="320" fill="#475569" font-size="10">5. Near-duplicate detection via SimHash fingerprinting</text>
  <rect x="600" y="327" width="10" height="10" rx="2" fill="#0891b2"/>
  <text x="616" y="337" fill="#475569" font-size="10">6. ML classifier assigns topic categories and extracts entities</text>
  <rect x="600" y="344" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="616" y="354" fill="#475569" font-size="10">7. Articles indexed in Elasticsearch with full-text and facets</text>
  <rect x="600" y="361" width="10" height="10" rx="2" fill="#d97706"/>
  <text x="616" y="371" fill="#475569" font-size="10">8. Personalized feed built from user interests and ranked articles</text>
</svg>
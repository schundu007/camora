<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
  <rect width="500" height="300" fill="#f7f8f9" rx="4"/>
  <text x="250" y="28" font-family="system-ui" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">Quorum Consensus (W + R &gt; N)</text>

  <!-- N=5 circle layout, center at (170, 155), radius 70 -->
  <!-- Node positions (pentagon):
       N1: top (170, 85)
       N2: top-right (237, 119)
       N3: bottom-right (211, 198)
       N4: bottom-left (129, 198)
       N5: top-left (103, 119) -->

  <!-- Circle outline showing the cluster -->
  <circle cx="170" cy="148" r="82" fill="none" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="170" y="60" font-family="system-ui" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle">N = 5 Nodes</text>

  <!-- Write Quorum arc (nodes 1,2,3) -->
  <!-- Overlap region highlight: nodes 2 and 3 are in both W and R -->

  <!-- Node 1 - Write only -->
  <circle cx="170" cy="85" r="22" fill="white" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="170" y="83" font-family="system-ui" font-size="10" font-weight="bold" fill="#3b82f6" text-anchor="middle">N1</text>
  <text x="170" y="95" font-family="system-ui" font-size="7" fill="#3b82f6" text-anchor="middle">W</text>

  <!-- Node 2 - Both W and R (overlap) -->
  <circle cx="237" cy="119" r="22" fill="#faf5ff" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="237" y="117" font-family="system-ui" font-size="10" font-weight="bold" fill="#8b5cf6" text-anchor="middle">N2</text>
  <text x="237" y="129" font-family="system-ui" font-size="7" fill="#8b5cf6" text-anchor="middle">W+R</text>

  <!-- Node 3 - Both W and R (overlap) -->
  <circle cx="211" cy="198" r="22" fill="#faf5ff" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="211" y="196" font-family="system-ui" font-size="10" font-weight="bold" fill="#8b5cf6" text-anchor="middle">N3</text>
  <text x="211" y="208" font-family="system-ui" font-size="7" fill="#8b5cf6" text-anchor="middle">W+R</text>

  <!-- Node 4 - Read only -->
  <circle cx="129" cy="198" r="22" fill="white" stroke="#10b981" stroke-width="2.5"/>
  <text x="129" y="196" font-family="system-ui" font-size="10" font-weight="bold" fill="#10b981" text-anchor="middle">N4</text>
  <text x="129" y="208" font-family="system-ui" font-size="7" fill="#10b981" text-anchor="middle">R</text>

  <!-- Node 5 - Neither -->
  <circle cx="103" cy="119" r="22" fill="white" stroke="#94a3b8" stroke-width="2"/>
  <text x="103" y="117" font-family="system-ui" font-size="10" font-weight="bold" fill="#94a3b8" text-anchor="middle">N5</text>
  <text x="103" y="129" font-family="system-ui" font-size="7" fill="#94a3b8" text-anchor="middle">--</text>

  <!-- Legend for quorums -->
  <rect x="290" y="55" width="190" height="90" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="385" y="73" font-family="system-ui" font-size="10" font-weight="bold" fill="#1e293b" text-anchor="middle">Quorum Config</text>

  <circle cx="310" cy="90" r="5" fill="#3b82f6"/>
  <text x="320" y="94" font-family="system-ui" font-size="9" fill="#1e293b">W = 3 (write to 3 nodes)</text>

  <circle cx="310" cy="110" r="5" fill="#10b981"/>
  <text x="320" y="114" font-family="system-ui" font-size="9" fill="#1e293b">R = 3 (read from 3 nodes)</text>

  <circle cx="310" cy="130" r="5" fill="#8b5cf6"/>
  <text x="320" y="134" font-family="system-ui" font-size="9" fill="#1e293b">Overlap = W+R-N = 1+</text>

  <!-- Formula box -->
  <rect x="290" y="155" width="190" height="52" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2"/>
  <text x="385" y="174" font-family="system-ui" font-size="11" font-weight="bold" fill="#8b5cf6" text-anchor="middle">W + R &gt; N</text>
  <text x="385" y="190" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">3 + 3 = 6 &gt; 5</text>
  <text x="385" y="202" font-family="system-ui" font-size="8" fill="#64748b" text-anchor="middle">guarantees consistency</text>

  <!-- Explanation boxes at bottom -->
  <rect x="20" y="238" width="145" height="52" rx="8" fill="white" stroke="#3b82f6" stroke-width="1"/>
  <text x="92" y="255" font-family="system-ui" font-size="9" font-weight="bold" fill="#3b82f6" text-anchor="middle">Write Quorum</text>
  <text x="92" y="268" font-family="system-ui" font-size="8" fill="#64748b" text-anchor="middle">Must write to W nodes</text>
  <text x="92" y="280" font-family="system-ui" font-size="8" fill="#64748b" text-anchor="middle">before ACK to client</text>

  <rect x="178" y="238" width="145" height="52" rx="8" fill="white" stroke="#8b5cf6" stroke-width="1"/>
  <text x="250" y="255" font-family="system-ui" font-size="9" font-weight="bold" fill="#8b5cf6" text-anchor="middle">Overlap Guarantee</text>
  <text x="250" y="268" font-family="system-ui" font-size="8" fill="#64748b" text-anchor="middle">At least 1 read node</text>
  <text x="250" y="280" font-family="system-ui" font-size="8" fill="#64748b" text-anchor="middle">has latest write</text>

  <rect x="336" y="238" width="145" height="52" rx="8" fill="white" stroke="#10b981" stroke-width="1"/>
  <text x="408" y="255" font-family="system-ui" font-size="9" font-weight="bold" fill="#10b981" text-anchor="middle">Read Quorum</text>
  <text x="408" y="268" font-family="system-ui" font-size="8" fill="#64748b" text-anchor="middle">Read from R nodes,</text>
  <text x="408" y="280" font-family="system-ui" font-size="8" fill="#64748b" text-anchor="middle">pick latest version</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f1f30"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="url(#bgGrad)"/>
  <rect x="1" y="1" width="798" height="398" rx="11" fill="none" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#ccfbf1" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" filter="url(#glow)">Quorum Consensus: W + R &gt; N</text>
  <text x="400" y="48" text-anchor="middle" fill="#5eead4" font-family="system-ui, sans-serif" font-size="11" opacity="0.8">N = 5 nodes in cluster. At least one node overlaps between Write set and Read set.</text>

  <!-- ============================================ -->
  <!-- CONFIG 1: Fast Writes (W=1, R=5) - LEFT -->
  <!-- ============================================ -->
  <rect x="20" y="65" width="240" height="200" rx="10" fill="#0d1926" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="140" y="86" text-anchor="middle" fill="#5eead4" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Fast Writes</text>
  <text x="140" y="100" text-anchor="middle" fill="#99f6e4" font-family="system-ui, sans-serif" font-size="11">W=1, R=5 (1+5=6 &gt; 5)</text>

  <!-- 5 nodes arranged in arc -->
  <!-- Node 1 - WRITE (teal filled) -->
  <circle cx="70" cy="140" r="16" fill="#14b8a6" stroke="#5eead4" stroke-width="2" filter="url(#glow)"/>
  <text x="70" y="144" text-anchor="middle" fill="#042f2e" font-family="system-ui, sans-serif" font-size="10" font-weight="700">N1</text>
  <text x="70" y="168" text-anchor="middle" fill="#14b8a6" font-family="system-ui, sans-serif" font-size="8" font-weight="600">W</text>

  <!-- Node 2 - READ only (outline) -->
  <circle cx="120" cy="125" r="16" fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="120" y="129" text-anchor="middle" fill="#f97316" font-family="system-ui, sans-serif" font-size="10" font-weight="700">N2</text>

  <!-- Node 3 - READ only -->
  <circle cx="165" cy="125" r="16" fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="165" y="129" text-anchor="middle" fill="#f97316" font-family="system-ui, sans-serif" font-size="10" font-weight="700">N3</text>

  <!-- Node 4 - READ only -->
  <circle cx="210" cy="140" r="16" fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="210" y="144" text-anchor="middle" fill="#f97316" font-family="system-ui, sans-serif" font-size="10" font-weight="700">N4</text>

  <!-- Node 5 - READ only -->
  <circle cx="140" cy="165" r="16" fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="140" y="169" text-anchor="middle" fill="#f97316" font-family="system-ui, sans-serif" font-size="10" font-weight="700">N5</text>

  <!-- Overlap highlight on N1 -->
  <circle cx="70" cy="140" r="20" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.7"/>
  <text x="70" y="192" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="8" font-weight="600">OVERLAP</text>

  <!-- Legend -->
  <rect x="40" y="210" width="8" height="8" rx="2" fill="#14b8a6"/>
  <text x="54" y="218" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9">Write (1 node)</text>
  <rect x="130" y="210" width="8" height="8" rx="2" fill="none" stroke="#f97316" stroke-width="1.5"/>
  <text x="144" y="218" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9">Read (all 5)</text>

  <!-- Properties -->
  <text x="140" y="240" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Writes: FAST (1 ACK)</text>
  <text x="140" y="254" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Reads: SLOW (all nodes)</text>

  <!-- ============================================ -->
  <!-- CONFIG 2: Balanced (W=3, R=3) - CENTER -->
  <!-- ============================================ -->
  <rect x="280" y="65" width="240" height="200" rx="10" fill="#0d1926" stroke="#14b8a6" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="400" y="86" text-anchor="middle" fill="#5eead4" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Balanced (Majority)</text>
  <text x="400" y="100" text-anchor="middle" fill="#99f6e4" font-family="system-ui, sans-serif" font-size="11">W=3, R=3 (3+3=6 &gt; 5)</text>

  <!-- Node 1 - WRITE -->
  <circle cx="330" cy="135" r="16" fill="#14b8a6" stroke="#5eead4" stroke-width="2"/>
  <text x="330" y="139" text-anchor="middle" fill="#042f2e" font-family="system-ui, sans-serif" font-size="10" font-weight="700">N1</text>
  <text x="330" y="162" text-anchor="middle" fill="#14b8a6" font-family="system-ui, sans-serif" font-size="8" font-weight="600">W</text>

  <!-- Node 2 - WRITE -->
  <circle cx="375" cy="120" r="16" fill="#14b8a6" stroke="#5eead4" stroke-width="2"/>
  <text x="375" y="124" text-anchor="middle" fill="#042f2e" font-family="system-ui, sans-serif" font-size="10" font-weight="700">N2</text>
  <text x="375" y="147" text-anchor="middle" fill="#14b8a6" font-family="system-ui, sans-serif" font-size="8" font-weight="600">W</text>

  <!-- Node 3 - WRITE + READ (OVERLAP) -->
  <circle cx="400" cy="160" r="18" fill="#14b8a6" stroke="#fbbf24" stroke-width="2.5" filter="url(#softGlow)"/>
  <text x="400" y="164" text-anchor="middle" fill="#042f2e" font-family="system-ui, sans-serif" font-size="10" font-weight="700">N3</text>
  <text x="400" y="190" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="8" font-weight="700">W+R OVERLAP</text>

  <!-- Node 4 - READ -->
  <circle cx="430" cy="120" r="16" fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="430" y="124" text-anchor="middle" fill="#f97316" font-family="system-ui, sans-serif" font-size="10" font-weight="700">N4</text>
  <text x="430" y="147" text-anchor="middle" fill="#f97316" font-family="system-ui, sans-serif" font-size="8" font-weight="600">R</text>

  <!-- Node 5 - READ -->
  <circle cx="470" cy="135" r="16" fill="none" stroke="#f97316" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="470" y="139" text-anchor="middle" fill="#f97316" font-family="system-ui, sans-serif" font-size="10" font-weight="700">N5</text>
  <text x="470" y="162" text-anchor="middle" fill="#f97316" font-family="system-ui, sans-serif" font-size="8" font-weight="600">R</text>

  <!-- Legend -->
  <rect x="300" y="210" width="8" height="8" rx="2" fill="#14b8a6"/>
  <text x="314" y="218" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9">Write (3)</text>
  <rect x="370" y="210" width="8" height="8" rx="2" fill="none" stroke="#f97316" stroke-width="1.5"/>
  <text x="384" y="218" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9">Read (3)</text>
  <rect x="430" y="210" width="8" height="8" rx="2" fill="#14b8a6" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="444" y="218" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="9">Overlap</text>

  <!-- Properties -->
  <text x="400" y="240" text-anchor="middle" fill="#eab308" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Writes: MODERATE (majority)</text>
  <text x="400" y="254" text-anchor="middle" fill="#eab308" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Reads: MODERATE (majority)</text>

  <!-- ============================================ -->
  <!-- CONFIG 3: Fast Reads (W=5, R=1) - RIGHT -->
  <!-- ============================================ -->
  <rect x="540" y="65" width="240" height="200" rx="10" fill="#0d1926" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="660" y="86" text-anchor="middle" fill="#5eead4" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Fast Reads</text>
  <text x="660" y="100" text-anchor="middle" fill="#99f6e4" font-family="system-ui, sans-serif" font-size="11">W=5, R=1 (5+1=6 &gt; 5)</text>

  <!-- Node 1 - WRITE -->
  <circle cx="590" cy="140" r="16" fill="#14b8a6" stroke="#5eead4" stroke-width="2"/>
  <text x="590" y="144" text-anchor="middle" fill="#042f2e" font-family="system-ui, sans-serif" font-size="10" font-weight="700">N1</text>

  <!-- Node 2 - WRITE -->
  <circle cx="635" cy="125" r="16" fill="#14b8a6" stroke="#5eead4" stroke-width="2"/>
  <text x="635" y="129" text-anchor="middle" fill="#042f2e" font-family="system-ui, sans-serif" font-size="10" font-weight="700">N2</text>

  <!-- Node 3 - WRITE -->
  <circle cx="680" cy="125" r="16" fill="#14b8a6" stroke="#5eead4" stroke-width="2"/>
  <text x="680" y="129" text-anchor="middle" fill="#042f2e" font-family="system-ui, sans-serif" font-size="10" font-weight="700">N3</text>

  <!-- Node 4 - WRITE -->
  <circle cx="725" cy="140" r="16" fill="#14b8a6" stroke="#5eead4" stroke-width="2"/>
  <text x="725" y="144" text-anchor="middle" fill="#042f2e" font-family="system-ui, sans-serif" font-size="10" font-weight="700">N4</text>

  <!-- Node 5 - WRITE + READ (any single read) -->
  <circle cx="660" cy="168" r="16" fill="#14b8a6" stroke="#fbbf24" stroke-width="2.5" filter="url(#softGlow)"/>
  <text x="660" y="172" text-anchor="middle" fill="#042f2e" font-family="system-ui, sans-serif" font-size="10" font-weight="700">N5</text>
  <text x="660" y="197" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="8" font-weight="600">OVERLAP</text>

  <!-- All 5 have W marker -->
  <text x="590" y="163" text-anchor="middle" fill="#14b8a6" font-family="system-ui, sans-serif" font-size="8" font-weight="600">W</text>
  <text x="635" y="148" text-anchor="middle" fill="#14b8a6" font-family="system-ui, sans-serif" font-size="8" font-weight="600">W</text>
  <text x="680" y="148" text-anchor="middle" fill="#14b8a6" font-family="system-ui, sans-serif" font-size="8" font-weight="600">W</text>
  <text x="725" y="163" text-anchor="middle" fill="#14b8a6" font-family="system-ui, sans-serif" font-size="8" font-weight="600">W</text>

  <!-- Legend -->
  <rect x="570" y="210" width="8" height="8" rx="2" fill="#14b8a6"/>
  <text x="584" y="218" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9">Write (all 5)</text>
  <rect x="660" y="210" width="8" height="8" rx="2" fill="#14b8a6" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="674" y="218" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="9">Read (any 1)</text>

  <!-- Properties -->
  <text x="660" y="240" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Writes: SLOW (all nodes)</text>
  <text x="660" y="254" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Reads: FAST (1 ACK)</text>

  <!-- ============================================ -->
  <!-- BOTTOM: Venn Diagram showing W + R > N -->
  <!-- ============================================ -->
  <rect x="20" y="278" width="760" height="110" rx="10" fill="#0a1220" stroke="#14b8a6" stroke-opacity="0.2" stroke-width="1"/>

  <text x="400" y="298" text-anchor="middle" fill="#ccfbf1" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Why W + R &gt; N Guarantees Consistency</text>

  <!-- Venn: Write set -->
  <ellipse cx="310" cy="345" rx="80" ry="30" fill="#14b8a6" fill-opacity="0.2" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="270" y="342" fill="#5eead4" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Write Set (W)</text>

  <!-- Venn: Read set -->
  <ellipse cx="390" cy="345" rx="80" ry="30" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-width="1.5"/>
  <text x="430" y="342" fill="#fb923c" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Read Set (R)</text>

  <!-- Overlap area highlight -->
  <text x="350" y="358" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="9" font-weight="700">OVERLAP</text>

  <!-- Formula text on right -->
  <text x="550" y="328" fill="#5eead4" font-family="system-ui, sans-serif" font-size="11" font-weight="600">W + R &gt; N</text>
  <text x="550" y="344" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9">Write and Read sets MUST overlap</text>
  <text x="550" y="358" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9">on at least one node, so every</text>
  <text x="550" y="372" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9">read sees the latest write.</text>
</svg>
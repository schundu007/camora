<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
  <rect width="500" height="300" fill="#f7f8f9" rx="4"/>
  <text x="250" y="28" font-family="system-ui" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">Distributed Messaging System</text>

  <!-- Producers -->
  <text x="55" y="55" font-family="system-ui" font-size="11" font-weight="bold" fill="#3b82f6" text-anchor="middle">Producers</text>

  <rect x="15" y="65" width="80" height="30" rx="8" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <text x="55" y="84" font-family="system-ui" font-size="10" fill="#3b82f6" text-anchor="middle">Producer A</text>

  <rect x="15" y="102" width="80" height="30" rx="8" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <text x="55" y="121" font-family="system-ui" font-size="10" fill="#3b82f6" text-anchor="middle">Producer B</text>

  <rect x="15" y="139" width="80" height="30" rx="8" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <text x="55" y="158" font-family="system-ui" font-size="10" fill="#3b82f6" text-anchor="middle">Producer C</text>

  <!-- Broker -->
  <rect x="140" y="48" width="220" height="150" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2"/>
  <text x="250" y="68" font-family="system-ui" font-size="12" font-weight="bold" fill="#8b5cf6" text-anchor="middle">Message Broker</text>

  <!-- Topic -->
  <rect x="155" y="78" width="190" height="105" rx="6" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="250" y="95" font-family="system-ui" font-size="10" font-weight="bold" fill="#7c3aed" text-anchor="middle">Topic: orders</text>

  <!-- Partitions -->
  <rect x="165" y="103" width="170" height="22" rx="4" fill="white" stroke="#a78bfa" stroke-width="1"/>
  <text x="180" y="118" font-family="system-ui" font-size="8" fill="#64748b">P0</text>
  <rect x="196" y="107" width="16" height="14" rx="2" fill="#ddd6fe"/>
  <rect x="215" y="107" width="16" height="14" rx="2" fill="#ddd6fe"/>
  <rect x="234" y="107" width="16" height="14" rx="2" fill="#ddd6fe"/>
  <rect x="253" y="107" width="16" height="14" rx="2" fill="#c4b5fd"/>
  <text x="325" y="118" font-family="system-ui" font-size="7" fill="#64748b">offset 3</text>

  <rect x="165" y="130" width="170" height="22" rx="4" fill="white" stroke="#a78bfa" stroke-width="1"/>
  <text x="180" y="145" font-family="system-ui" font-size="8" fill="#64748b">P1</text>
  <rect x="196" y="134" width="16" height="14" rx="2" fill="#ddd6fe"/>
  <rect x="215" y="134" width="16" height="14" rx="2" fill="#c4b5fd"/>
  <text x="325" y="145" font-family="system-ui" font-size="7" fill="#64748b">offset 1</text>

  <rect x="165" y="157" width="170" height="22" rx="4" fill="white" stroke="#a78bfa" stroke-width="1"/>
  <text x="180" y="172" font-family="system-ui" font-size="8" fill="#64748b">P2</text>
  <rect x="196" y="161" width="16" height="14" rx="2" fill="#ddd6fe"/>
  <rect x="215" y="161" width="16" height="14" rx="2" fill="#ddd6fe"/>
  <rect x="234" y="161" width="16" height="14" rx="2" fill="#ddd6fe"/>
  <rect x="253" y="161" width="16" height="14" rx="2" fill="#ddd6fe"/>
  <rect x="272" y="161" width="16" height="14" rx="2" fill="#c4b5fd"/>
  <text x="325" y="172" font-family="system-ui" font-size="7" fill="#64748b">offset 4</text>

  <!-- Consumer Groups -->
  <text x="430" y="55" font-family="system-ui" font-size="11" font-weight="bold" fill="#10b981" text-anchor="middle">Consumer Group</text>

  <rect x="390" y="65" width="90" height="28" rx="8" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="435" y="83" font-family="system-ui" font-size="9" fill="#10b981" text-anchor="middle">Consumer 1</text>
  <text x="435" y="103" font-family="system-ui" font-size="7" fill="#64748b" text-anchor="middle">reads P0</text>

  <rect x="390" y="110" width="90" height="28" rx="8" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="435" y="128" font-family="system-ui" font-size="9" fill="#10b981" text-anchor="middle">Consumer 2</text>
  <text x="435" y="148" font-family="system-ui" font-size="7" fill="#64748b" text-anchor="middle">reads P1</text>

  <rect x="390" y="155" width="90" height="28" rx="8" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="435" y="173" font-family="system-ui" font-size="9" fill="#10b981" text-anchor="middle">Consumer 3</text>
  <text x="435" y="193" font-family="system-ui" font-size="7" fill="#64748b" text-anchor="middle">reads P2</text>

  <!-- Arrows: Producers to Broker -->
  <line x1="95" y1="80" x2="136" y2="100" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#aMB)"/>
  <line x1="95" y1="117" x2="136" y2="117" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#aMB)"/>
  <line x1="95" y1="154" x2="136" y2="140" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#aMB)"/>

  <!-- Arrows: Broker to Consumers -->
  <line x1="360" y1="100" x2="386" y2="82" stroke="#10b981" stroke-width="1.5" marker-end="url(#aMG)"/>
  <line x1="360" y1="125" x2="386" y2="125" stroke="#10b981" stroke-width="1.5" marker-end="url(#aMG)"/>
  <line x1="360" y1="150" x2="386" y2="166" stroke="#10b981" stroke-width="1.5" marker-end="url(#aMG)"/>

  <!-- Key Properties -->
  <rect x="20" y="215" width="145" height="72" rx="8" fill="white" stroke="#3b82f6" stroke-width="1"/>
  <text x="92" y="233" font-family="system-ui" font-size="9" font-weight="bold" fill="#3b82f6" text-anchor="middle">Ordering</text>
  <text x="92" y="248" font-family="system-ui" font-size="8" fill="#64748b" text-anchor="middle">Guaranteed within</text>
  <text x="92" y="260" font-family="system-ui" font-size="8" fill="#64748b" text-anchor="middle">each partition.</text>
  <text x="92" y="278" font-family="system-ui" font-size="8" fill="#64748b" text-anchor="middle">Key-based routing.</text>

  <rect x="178" y="215" width="145" height="72" rx="8" fill="white" stroke="#8b5cf6" stroke-width="1"/>
  <text x="250" y="233" font-family="system-ui" font-size="9" font-weight="bold" fill="#8b5cf6" text-anchor="middle">Durability</text>
  <text x="250" y="248" font-family="system-ui" font-size="8" fill="#64748b" text-anchor="middle">Replicated across</text>
  <text x="250" y="260" font-family="system-ui" font-size="8" fill="#64748b" text-anchor="middle">brokers. Configurable</text>
  <text x="250" y="278" font-family="system-ui" font-size="8" fill="#64748b" text-anchor="middle">retention (time/size).</text>

  <rect x="336" y="215" width="145" height="72" rx="8" fill="white" stroke="#10b981" stroke-width="1"/>
  <text x="408" y="233" font-family="system-ui" font-size="9" font-weight="bold" fill="#10b981" text-anchor="middle">Scaling</text>
  <text x="408" y="248" font-family="system-ui" font-size="8" fill="#64748b" text-anchor="middle">Add partitions for</text>
  <text x="408" y="260" font-family="system-ui" font-size="8" fill="#64748b" text-anchor="middle">throughput. Consumer</text>
  <text x="408" y="278" font-family="system-ui" font-size="8" fill="#64748b" text-anchor="middle">count up to partitions.</text>

  <defs>
    <marker id="aMB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker>
    <marker id="aMG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#10b981"/></marker>
  </defs>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="450" fill="#fafbfc" rx="16"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Payment Refund Processing Flow</text>
  <text x="600" y="56" text-anchor="middle" fill="#64748b" font-size="12">Merchant-initiated refund from request through card network reversal to customer credit</text>

  <!-- Merchant Request -->
  <rect x="30" y="130" width="150" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="30" y="130" width="150" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="105" y="150" text-anchor="middle" fill="white" font-size="11" font-weight="700">Merchant Request</text>
  <text x="105" y="178" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">POST /v1/refunds</text>
  <text x="105" y="195" text-anchor="middle" fill="#64748b" font-size="9">paymentId, amount</text>
  <text x="105" y="210" text-anchor="middle" fill="#64748b" font-size="9">reason, idempotency key</text>
  <text x="105" y="228" text-anchor="middle" fill="#94a3b8" font-size="9">Full or partial refund</text>

  <!-- Ledger Entry -->
  <rect x="230" y="130" width="150" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="230" y="130" width="150" height="30" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="305" y="150" text-anchor="middle" fill="white" font-size="11" font-weight="700">Ledger Entry</text>
  <text x="305" y="178" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Reversal entries</text>
  <text x="305" y="195" text-anchor="middle" fill="#64748b" font-size="9">DEBIT merchant balance</text>
  <text x="305" y="210" text-anchor="middle" fill="#64748b" font-size="9">CREDIT clearing account</text>
  <text x="305" y="228" text-anchor="middle" fill="#94a3b8" font-size="9">PostgreSQL ACID</text>

  <!-- Card Network -->
  <rect x="430" y="130" width="150" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="430" y="130" width="150" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="505" y="150" text-anchor="middle" fill="white" font-size="11" font-weight="700">Card Network</text>
  <text x="505" y="178" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Reverse transaction</text>
  <text x="505" y="195" text-anchor="middle" fill="#64748b" font-size="9">Visa / MC / Amex</text>
  <text x="505" y="210" text-anchor="middle" fill="#64748b" font-size="9">Submit refund reversal</text>
  <text x="505" y="228" text-anchor="middle" fill="#94a3b8" font-size="9">Reference number</text>

  <!-- Issuing Bank -->
  <rect x="630" y="130" width="150" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="630" y="130" width="150" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="705" y="150" text-anchor="middle" fill="white" font-size="11" font-weight="700">Issuing Bank</text>
  <text x="705" y="178" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Credit customer</text>
  <text x="705" y="195" text-anchor="middle" fill="#64748b" font-size="9">Reverse authorization</text>
  <text x="705" y="210" text-anchor="middle" fill="#64748b" font-size="9">Credit cardholder</text>
  <text x="705" y="228" text-anchor="middle" fill="#94a3b8" font-size="9">5-10 business days</text>

  <!-- Webhook -->
  <rect x="830" y="130" width="150" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="830" y="130" width="150" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="905" y="150" text-anchor="middle" fill="white" font-size="11" font-weight="700">Webhook</text>
  <text x="905" y="178" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Notify merchant</text>
  <text x="905" y="195" text-anchor="middle" fill="#64748b" font-size="9">refund.created event</text>
  <text x="905" y="210" text-anchor="middle" fill="#64748b" font-size="9">refund.succeeded later</text>
  <text x="905" y="228" text-anchor="middle" fill="#94a3b8" font-size="9">Kafka + retry queue</text>

  <!-- Status -->
  <rect x="1030" y="130" width="140" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="1030" y="130" width="140" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="1100" y="150" text-anchor="middle" fill="white" font-size="11" font-weight="700">Complete</text>
  <text x="1100" y="178" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Refund settled</text>
  <text x="1100" y="195" text-anchor="middle" fill="#64748b" font-size="9">Customer credited</text>
  <text x="1100" y="210" text-anchor="middle" fill="#64748b" font-size="9">Merchant dashboard</text>
  <text x="1100" y="228" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="600">status: SUCCEEDED</text>

  <!-- Arrows -->
  <line x1="180" y1="180" x2="226" y2="180" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <rect x="188" y="163" width="22" height="14" rx="3" fill="#f97316"/>
  <text x="199" y="173" text-anchor="middle" fill="white" font-size="8" font-weight="600">1</text>

  <line x1="380" y1="180" x2="426" y2="180" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="388" y="163" width="22" height="14" rx="3" fill="#7c3aed"/>
  <text x="399" y="173" text-anchor="middle" fill="white" font-size="8" font-weight="600">2</text>

  <line x1="580" y1="180" x2="626" y2="180" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="588" y="163" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="599" y="173" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>

  <line x1="780" y1="180" x2="826" y2="180" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="788" y="163" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="799" y="173" text-anchor="middle" fill="white" font-size="8" font-weight="600">4</text>

  <line x1="980" y1="180" x2="1026" y2="180" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="988" y="163" width="22" height="14" rx="3" fill="#f97316"/>
  <text x="999" y="173" text-anchor="middle" fill="white" font-size="8" font-weight="600">5</text>

  <!-- Legend -->
  <rect x="30" y="290" width="1140" height="65" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="55" y="312" fill="#1e293b" font-size="11" font-weight="700">Flow Steps:</text>
  <rect x="55" y="322" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="70" y="331" fill="#475569" font-size="9">1 Merchant submits refund request with paymentId, amount, idempotency key</text>
  <rect x="55" y="336" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="70" y="345" fill="#475569" font-size="9">2 Ledger reversal entries: debit merchant, credit clearing account</text>
  <rect x="500" y="322" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="515" y="331" fill="#475569" font-size="9">3 Card network processes reversal, obtains reference number</text>
  <text x="515" y="345" fill="#475569" font-size="9">4 Issuing bank credits customer (5-10 business days)</text>
  <rect x="900" y="322" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="915" y="331" fill="#475569" font-size="9">5 Webhook notifications sent to merchant</text>
</svg>
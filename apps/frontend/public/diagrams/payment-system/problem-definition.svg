<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="500" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <rect x="340" y="20" width="520" height="44" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="22" font-weight="700">Problem Definition: Designing a Payment System</text>

  <!-- Column 1: Users & Core Actions -->
  <text x="200" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Users &amp; Core Actions</text>
  <rect x="40" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <circle cx="120" cy="165" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="120" y="171" text-anchor="middle" fill="white" font-size="24">&#x1F4B3;</text>
  <text x="120" y="210" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Payer</text>

  <text x="200" y="171" text-anchor="middle" fill="white" font-size="28">&#x21C4;</text>

  <circle cx="280" cy="165" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="280" y="171" text-anchor="middle" fill="white" font-size="24">&#x1F3E6;</text>
  <text x="280" y="210" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Merchant</text>

  <!-- Core Actions Box -->
  <rect x="60" y="230" width="280" height="240" rx="12" fill="#f97316" filter="url(#shadow)"/>
  <text x="200" y="260" text-anchor="middle" fill="white" font-size="15" font-weight="700">Core Actions</text>
  <line x1="80" y1="272" x2="320" y2="272" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="85" y="300" fill="white" font-size="13">&#x1F4B3;  Authorize Payment</text>
  <text x="85" y="330" fill="white" font-size="13">&#x2705;  Capture Funds</text>
  <text x="85" y="360" fill="white" font-size="13">&#x1F3E6;  Settle to Merchant</text>
  <text x="85" y="390" fill="white" font-size="13">&#x1F6E1;&#xFE0F;  Detect Fraud</text>
  <text x="85" y="420" fill="white" font-size="13">&#x1F514;  Send Webhooks</text>
  <text x="85" y="450" fill="white" font-size="13">&#x1F4D2;  Maintain Ledger</text>

  <!-- Column 2: In Scope -->
  <text x="600" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">In Scope: Essentials</text>
  <rect x="440" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="440" y="120" width="320" height="350" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <text x="470" y="155" fill="white" font-size="13" font-weight="600">&#x1F4B3;  Authorize / Capture / Settle</text>
  <text x="490" y="175" fill="rgba(255,255,255,0.7)" font-size="11">(Full payment lifecycle)</text>
  <text x="470" y="205" fill="white" font-size="13" font-weight="600">&#x1F510;  Idempotency guarantees</text>
  <text x="490" y="225" fill="rgba(255,255,255,0.7)" font-size="11">(No duplicate charges, exactly-once)</text>
  <text x="470" y="255" fill="white" font-size="13" font-weight="600">&#x1F4D2;  Double-entry ledger</text>
  <text x="490" y="275" fill="rgba(255,255,255,0.7)" font-size="11">(Every debit has matching credit)</text>
  <text x="470" y="305" fill="white" font-size="13" font-weight="600">&#x1F6E1;&#xFE0F;  Fraud detection</text>
  <text x="490" y="325" fill="rgba(255,255,255,0.7)" font-size="11">(Rule engine + ML scoring)</text>
  <text x="470" y="355" fill="white" font-size="13" font-weight="600">&#x1F514;  Webhook notifications</text>
  <text x="490" y="375" fill="rgba(255,255,255,0.7)" font-size="11">(Reliable delivery with retries)</text>
  <text x="470" y="405" fill="white" font-size="13" font-weight="600">&#x1F512;  PCI-DSS compliance</text>
  <text x="490" y="425" fill="rgba(255,255,255,0.7)" font-size="11">(Card data encryption, tokenization)</text>

  <!-- Column 3: Out of Scope -->
  <text x="1000" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Out of Scope / Future</text>
  <rect x="840" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="840" y="120" width="320" height="280" rx="12" fill="rgba(245,158,11,0.25)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>

  <text x="870" y="155" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Cryptocurrency payments</text>
  <text x="870" y="190" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Buy Now, Pay Later (BNPL)</text>
  <text x="870" y="225" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Invoice generation</text>
  <text x="870" y="260" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Tax calculation engine</text>
  <text x="870" y="295" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Multi-currency conversion</text>
  <text x="870" y="330" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Recurring subscriptions</text>
  <text x="870" y="365" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Chargeback dispute system</text>

  <!-- Bottom -->
  <text x="600" y="492" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="12">Focus on reliable payment processing infrastructure first &#x2192; extend to advanced features later</text>
</svg>
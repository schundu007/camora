<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="450" fill="#fafbfc" rx="16"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Payment Authorization Flow</text>
  <text x="600" y="56" text-anchor="middle" fill="#64748b" font-size="12">End-to-end card authorization from merchant checkout through card network to issuing bank</text>

  <!-- Merchant -->
  <rect x="20" y="110" width="120" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="20" y="110" width="120" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="80" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Merchant</text>
  <text x="80" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Checkout page</text>
  <text x="80" y="175" text-anchor="middle" fill="#64748b" font-size="9">Stripe.js collects</text>
  <text x="80" y="190" text-anchor="middle" fill="#64748b" font-size="9">card data in iframe</text>
  <text x="80" y="205" text-anchor="middle" fill="#94a3b8" font-size="9">PCI scope: SAQ-A</text>

  <!-- Payment Gateway -->
  <rect x="175" y="110" width="130" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="175" y="110" width="130" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="240" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Payment Gateway</text>
  <text x="240" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Create PaymentIntent</text>
  <text x="240" y="175" text-anchor="middle" fill="#64748b" font-size="9">Idempotency key check</text>
  <text x="240" y="190" text-anchor="middle" fill="#64748b" font-size="9">Amount + currency</text>
  <text x="240" y="205" text-anchor="middle" fill="#94a3b8" font-size="9">Redis dedup</text>

  <!-- Tokenize -->
  <rect x="340" y="110" width="120" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="340" y="110" width="120" height="30" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="400" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Token Vault</text>
  <text x="400" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Tokenize card</text>
  <text x="400" y="175" text-anchor="middle" fill="#64748b" font-size="9">HSM-backed AES-256</text>
  <text x="400" y="190" text-anchor="middle" fill="#64748b" font-size="9">Returns pm_xxx</text>
  <text x="400" y="205" text-anchor="middle" fill="#94a3b8" font-size="9">PCI Level 1</text>

  <!-- Fraud Check -->
  <rect x="495" y="110" width="120" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="495" y="110" width="120" height="30" rx="10 10 0 0" fill="#ef4444"/>
  <text x="555" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Fraud Check</text>
  <text x="555" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">ML risk scoring</text>
  <text x="555" y="175" text-anchor="middle" fill="#64748b" font-size="9">200+ features</text>
  <text x="555" y="190" text-anchor="middle" fill="#64748b" font-size="9">&lt;100ms latency</text>
  <text x="555" y="205" text-anchor="middle" fill="#94a3b8" font-size="9">GBM model</text>

  <!-- Card Network -->
  <rect x="650" y="110" width="130" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="650" y="110" width="130" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="715" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Card Network</text>
  <text x="715" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Route to issuer</text>
  <text x="715" y="175" text-anchor="middle" fill="#64748b" font-size="9">Visa / MC / Amex</text>
  <text x="715" y="190" text-anchor="middle" fill="#64748b" font-size="9">BIN lookup</text>
  <text x="715" y="205" text-anchor="middle" fill="#94a3b8" font-size="9">ISO 8583 format</text>

  <!-- Issuing Bank -->
  <rect x="815" y="110" width="130" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="815" y="110" width="130" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="880" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Issuing Bank</text>
  <text x="880" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Approve / Decline</text>
  <text x="880" y="175" text-anchor="middle" fill="#64748b" font-size="9">Check balance/limit</text>
  <text x="880" y="190" text-anchor="middle" fill="#64748b" font-size="9">Return auth code</text>
  <text x="880" y="205" text-anchor="middle" fill="#94a3b8" font-size="9">or decline reason</text>

  <!-- Response -->
  <rect x="980" y="110" width="130" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="980" y="110" width="130" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="1045" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Response</text>
  <text x="1045" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Auth code returned</text>
  <text x="1045" y="175" text-anchor="middle" fill="#64748b" font-size="9">Ledger entries created</text>
  <text x="1045" y="190" text-anchor="middle" fill="#64748b" font-size="9">Webhook dispatched</text>
  <text x="1045" y="205" text-anchor="middle" fill="#94a3b8" font-size="9">payment.authorized</text>

  <!-- Ledger DB (below) -->
  <rect x="530" y="270" width="140" height="50" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="530" y="270" width="140" height="18" rx="8 8 0 0" fill="#7c3aed"/>
  <text x="600" y="283" text-anchor="middle" fill="white" font-size="9" font-weight="700">PostgreSQL Ledger</text>
  <text x="600" y="305" text-anchor="middle" fill="#64748b" font-size="9">Double-entry bookkeeping</text>

  <!-- Arrows -->
  <line x1="140" y1="155" x2="171" y2="155" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="141" y="138" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="152" y="148" text-anchor="middle" fill="white" font-size="8" font-weight="600">1</text>

  <line x1="305" y1="155" x2="336" y2="155" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <rect x="306" y="138" width="22" height="14" rx="3" fill="#7c3aed"/>
  <text x="317" y="148" text-anchor="middle" fill="white" font-size="8" font-weight="600">2</text>

  <line x1="460" y1="155" x2="491" y2="155" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="461" y="138" width="22" height="14" rx="3" fill="#ef4444"/>
  <text x="472" y="148" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>

  <line x1="615" y1="155" x2="646" y2="155" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="616" y="138" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="627" y="148" text-anchor="middle" fill="white" font-size="8" font-weight="600">4</text>

  <line x1="780" y1="155" x2="811" y2="155" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="781" y="138" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="792" y="148" text-anchor="middle" fill="white" font-size="8" font-weight="600">5</text>

  <line x1="945" y1="155" x2="976" y2="155" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="946" y="138" width="22" height="14" rx="3" fill="#16a34a"/>
  <text x="957" y="148" text-anchor="middle" fill="white" font-size="8" font-weight="600">6</text>

  <!-- Ledger arrow -->
  <line x1="600" y1="215" x2="600" y2="266" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>
  <text x="630" y="245" fill="#7c3aed" font-size="9">Ledger write</text>

  <!-- Legend -->
  <rect x="30" y="360" width="1140" height="65" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="55" y="382" fill="#1e293b" font-size="11" font-weight="700">Flow Steps:</text>
  <rect x="55" y="392" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="70" y="401" fill="#475569" font-size="9">1 Merchant checkout submits card via Stripe.js iframe</text>
  <rect x="55" y="406" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="70" y="415" fill="#475569" font-size="9">2 Card tokenized in HSM vault, returns pm_xxx token</text>
  <rect x="400" y="392" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="415" y="401" fill="#475569" font-size="9">3 ML fraud scoring with 200+ features in &lt;100ms</text>
  <rect x="400" y="406" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="415" y="415" fill="#475569" font-size="9">4-5 Card network routes to issuing bank for authorization</text>
  <rect x="780" y="392" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="795" y="401" fill="#475569" font-size="9">6 Auth code returned, ledger entries created, webhook sent</text>
</svg>
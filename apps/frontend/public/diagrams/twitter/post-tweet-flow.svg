<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="450" fill="#fafbfc" rx="16"/>

  <!-- Title -->
  <text x="600" y="34" text-anchor="middle" fill="#1e293b" font-size="22" font-weight="700">Post Tweet: End-to-End Flow</text>
  <text x="600" y="54" text-anchor="middle" fill="#64748b" font-size="13">From user tap to timeline delivery, search indexing, and notifications</text>

  <!-- ===== Row 1: Main synchronous path ===== -->

  <!-- User -->
  <rect x="20" y="85" width="100" height="100" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="20" y="85" width="100" height="32" rx="12 12 0 0" fill="#f97316"/>
  <text x="70" y="107" text-anchor="middle" fill="white" font-size="11" font-weight="700">User</text>
  <text x="70" y="140" text-anchor="middle" fill="#64748b" font-size="20">&#128241;</text>
  <text x="70" y="170" text-anchor="middle" fill="#64748b" font-size="9">Posts tweet</text>

  <!-- Arrow 1 -->
  <line x1="120" y1="135" x2="168" y2="135" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <rect x="125" y="118" width="42" height="14" rx="3" fill="#2563eb"/>
  <text x="146" y="129" text-anchor="middle" fill="white" font-size="7" font-weight="600">POST</text>

  <!-- Tweet Service -->
  <rect x="172" y="85" width="130" height="100" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="172" y="85" width="130" height="32" rx="12 12 0 0" fill="#2563eb"/>
  <text x="237" y="107" text-anchor="middle" fill="white" font-size="11" font-weight="700">Tweet Service</text>
  <text x="237" y="136" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Validate &amp; process</text>
  <text x="237" y="152" text-anchor="middle" fill="#64748b" font-size="9">Generate Snowflake ID</text>
  <text x="237" y="168" text-anchor="middle" fill="#64748b" font-size="9">Store media refs</text>

  <!-- Arrow 2 -->
  <line x1="302" y1="135" x2="348" y2="135" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <rect x="306" y="118" width="40" height="14" rx="3" fill="#2563eb"/>
  <text x="326" y="129" text-anchor="middle" fill="white" font-size="7" font-weight="600">WRITE</text>

  <!-- Tweet DB -->
  <rect x="352" y="85" width="120" height="100" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="352" y="85" width="120" height="32" rx="12 12 0 0" fill="#7c3aed"/>
  <text x="412" y="107" text-anchor="middle" fill="white" font-size="11" font-weight="700">Tweet DB</text>
  <text x="412" y="136" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Primary Store</text>
  <text x="412" y="152" text-anchor="middle" fill="#64748b" font-size="9">Sharded by tweet_id</text>
  <text x="412" y="168" text-anchor="middle" fill="#64748b" font-size="9">MySQL / Vitess</text>

  <!-- Arrow 3: DB to Kafka -->
  <line x1="472" y1="135" x2="518" y2="135" stroke="#f97316" stroke-width="2.5" marker-end="url(#arrowOrange)"/>
  <rect x="475" y="118" width="42" height="14" rx="3" fill="#f97316"/>
  <text x="496" y="129" text-anchor="middle" fill="white" font-size="7" font-weight="600">EVENT</text>

  <!-- Kafka -->
  <rect x="522" y="75" width="140" height="120" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="522" y="75" width="140" height="32" rx="12 12 0 0" fill="#f97316"/>
  <text x="592" y="97" text-anchor="middle" fill="white" font-size="11" font-weight="700">Kafka</text>
  <text x="592" y="126" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">tweet.created topic</text>
  <text x="592" y="142" text-anchor="middle" fill="#64748b" font-size="9">Async event bus</text>
  <text x="592" y="158" text-anchor="middle" fill="#64748b" font-size="9">Partitioned by user_id</text>
  <text x="592" y="174" text-anchor="middle" fill="#64748b" font-size="9">Guaranteed delivery</text>

  <!-- "Async Consumers" label -->
  <rect x="688" y="78" width="120" height="22" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="748" y="93" text-anchor="middle" fill="#92400e" font-size="9" font-weight="700">ASYNC CONSUMERS</text>

  <!-- ===== Row 2: Fan-out path (from Kafka) ===== -->

  <!-- Arrow: Kafka down to fan-out -->
  <line x1="592" y1="195" x2="592" y2="225" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Fan-out Service -->
  <rect x="522" y="229" width="140" height="90" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="522" y="229" width="140" height="32" rx="12 12 0 0" fill="#16a34a"/>
  <text x="592" y="251" text-anchor="middle" fill="white" font-size="11" font-weight="700">Fan-out Service</text>
  <text x="592" y="280" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Check follower count</text>
  <text x="592" y="296" text-anchor="middle" fill="#64748b" font-size="9">Apply hybrid strategy</text>
  <text x="592" y="312" text-anchor="middle" fill="#64748b" font-size="9">Read follow graph</text>

  <!-- Branch: <5K followers -->
  <line x1="522" y1="288" x2="428" y2="288" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- IF <5K label -->
  <rect x="438" y="240" width="80" height="18" rx="4" fill="#16a34a"/>
  <text x="478" y="253" text-anchor="middle" fill="white" font-size="8" font-weight="600">IF &lt; 5K</text>

  <!-- Redis Timeline Caches -->
  <rect x="310" y="258" width="116" height="70" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="310" y="258" width="116" height="28" rx="10 10 0 0" fill="#ef4444"/>
  <text x="368" y="278" text-anchor="middle" fill="white" font-size="10" font-weight="700">Redis Caches</text>
  <text x="368" y="302" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Push to follower</text>
  <text x="368" y="316" text-anchor="middle" fill="#64748b" font-size="9">timeline caches</text>

  <!-- Branch: >=5K followers (skip) -->
  <rect x="438" y="308" width="80" height="18" rx="4" fill="#7c3aed"/>
  <text x="478" y="321" text-anchor="middle" fill="white" font-size="8" font-weight="600">IF &#8805; 5K</text>

  <line x1="522" y1="306" x2="428" y2="340" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>

  <rect x="310" y="340" width="116" height="32" rx="8" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="368" y="361" text-anchor="middle" fill="#6d28d9" font-size="9" font-weight="600">Skip (fetch on read)</text>

  <!-- ===== Row 2: Search Indexing (from Kafka, right side) ===== -->

  <!-- Arrow: Kafka right to search -->
  <line x1="662" y1="115" x2="738" y2="140" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Search Indexing -->
  <rect x="740" y="115" width="140" height="80" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="740" y="115" width="140" height="32" rx="12 12 0 0" fill="#2563eb"/>
  <text x="810" y="137" text-anchor="middle" fill="white" font-size="11" font-weight="700">Search Indexer</text>
  <text x="810" y="164" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Elasticsearch</text>
  <text x="810" y="180" text-anchor="middle" fill="#64748b" font-size="9">Index tweet text, hashtags</text>

  <!-- ===== Row 2: Notification Service (from Kafka, right side) ===== -->

  <!-- Arrow: Kafka right to notifications -->
  <line x1="662" y1="150" x2="738" y2="230" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Notification Service -->
  <rect x="740" y="215" width="140" height="80" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="740" y="215" width="140" height="32" rx="12 12 0 0" fill="#ef4444"/>
  <text x="810" y="237" text-anchor="middle" fill="white" font-size="11" font-weight="700">Notifications</text>
  <text x="810" y="264" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Push notifications</text>
  <text x="810" y="280" text-anchor="middle" fill="#64748b" font-size="9">Mentions, replies</text>

  <!-- ===== Row 2: Analytics (from Kafka, right side) ===== -->

  <!-- Arrow: Kafka right to analytics -->
  <line x1="662" y1="170" x2="738" y2="330" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Analytics Service -->
  <rect x="740" y="315" width="140" height="80" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="740" y="315" width="140" height="32" rx="12 12 0 0" fill="#7c3aed"/>
  <text x="810" y="337" text-anchor="middle" fill="white" font-size="11" font-weight="700">Analytics</text>
  <text x="810" y="364" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="600">Engagement metrics</text>
  <text x="810" y="380" text-anchor="middle" fill="#64748b" font-size="9">Impressions, trending</text>

  <!-- ===== Legend ===== -->
  <rect x="920" y="80" width="260" height="340" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#s)"/>
  <text x="1050" y="108" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="700">Flow Summary</text>
  <line x1="940" y1="118" x2="1160" y2="118" stroke="#e2e8f0" stroke-width="1"/>

  <rect x="940" y="132" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="956" y="142" fill="#334155" font-size="10" font-weight="600">1. User posts tweet</text>
  <text x="956" y="156" fill="#64748b" font-size="9">HTTP POST to Tweet Service</text>

  <rect x="940" y="170" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="956" y="180" fill="#334155" font-size="10" font-weight="600">2. Persist to DB</text>
  <text x="956" y="194" fill="#64748b" font-size="9">Snowflake ID, sharded MySQL</text>

  <rect x="940" y="208" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="956" y="218" fill="#334155" font-size="10" font-weight="600">3. Publish Kafka event</text>
  <text x="956" y="232" fill="#64748b" font-size="9">Async, decoupled consumers</text>

  <rect x="940" y="246" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="956" y="256" fill="#334155" font-size="10" font-weight="600">4. Fan-out (hybrid)</text>
  <text x="956" y="270" fill="#64748b" font-size="9">&lt;5K: push to Redis caches</text>
  <text x="956" y="284" fill="#64748b" font-size="9">&#8805;5K: skip, fetch on read</text>

  <rect x="940" y="298" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="956" y="308" fill="#334155" font-size="10" font-weight="600">5. Index for search</text>
  <text x="956" y="322" fill="#64748b" font-size="9">Elasticsearch, hashtags</text>

  <rect x="940" y="336" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="956" y="346" fill="#334155" font-size="10" font-weight="600">6. Send notifications</text>
  <text x="956" y="360" fill="#64748b" font-size="9">Push for @mentions, replies</text>

  <rect x="940" y="374" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="956" y="384" fill="#334155" font-size="10" font-weight="600">7. Track analytics</text>
  <text x="956" y="398" fill="#64748b" font-size="9">Impressions, trending data</text>

  <!-- Sync/Async labels -->
  <rect x="20" y="205" width="290" height="28" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="165" y="224" text-anchor="middle" fill="#1d4ed8" font-size="10" font-weight="700">&#8593; Synchronous (user waits) &#8212; &#8595; Asynchronous (Kafka consumers)</text>
  <line x1="20" y1="236" x2="880" y2="236" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
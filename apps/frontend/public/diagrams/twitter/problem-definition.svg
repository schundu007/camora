<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <rect x="380" y="16" width="440" height="44" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="46" text-anchor="middle" fill="white" font-size="22" font-weight="700">Problem Definition: Designing Twitter</text>

  <!-- Column 1: Users & Core Actions -->
  <text x="190" y="92" text-anchor="middle" fill="white" font-size="16" font-weight="700">Users &amp; Core Actions</text>
  <rect x="30" y="100" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <!-- User icons -->
  <circle cx="110" cy="155" r="26" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="110" y="161" text-anchor="middle" fill="white" font-size="22">👤</text>
  <text x="110" y="198" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">Author</text>

  <text x="190" y="161" text-anchor="middle" fill="white" font-size="26">⇄</text>

  <circle cx="270" cy="155" r="26" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="270" y="161" text-anchor="middle" fill="white" font-size="22">👥</text>
  <text x="270" y="198" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="12">Followers</text>

  <!-- Core Actions Box -->
  <rect x="50" y="218" width="280" height="240" rx="12" fill="#f97316" filter="url(#shadow)"/>
  <text x="190" y="248" text-anchor="middle" fill="white" font-size="15" font-weight="700">Core Actions</text>
  <line x1="70" y1="258" x2="310" y2="258" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="80" y="286" fill="white" font-size="13">📝  Post a tweet (280 chars)</text>
  <text x="80" y="316" fill="white" font-size="13">📖  Read home timeline</text>
  <text x="80" y="346" fill="white" font-size="13">👥  Follow / unfollow users</text>
  <text x="80" y="376" fill="white" font-size="13">🔍  Search tweets &amp; users</text>
  <text x="80" y="406" fill="white" font-size="13">❤️  Like &amp; retweet</text>
  <text x="80" y="436" fill="white" font-size="13">👤  View user profiles</text>

  <!-- Column 2: In Scope -->
  <text x="600" y="92" text-anchor="middle" fill="white" font-size="16" font-weight="700">In Scope: Essentials</text>
  <rect x="440" y="100" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="440" y="115" width="320" height="350" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <text x="470" y="150" fill="white" font-size="13" font-weight="600">📝  Tweet creation &amp; storage</text>
  <text x="490" y="170" fill="rgba(255,255,255,0.7)" font-size="11">(Text, media attachments)</text>

  <text x="470" y="200" fill="white" font-size="13" font-weight="600">📰  Home timeline generation</text>
  <text x="490" y="220" fill="rgba(255,255,255,0.7)" font-size="11">(Hybrid fan-out approach)</text>

  <text x="470" y="250" fill="white" font-size="13" font-weight="600">🔗  Follow graph management</text>
  <text x="490" y="270" fill="rgba(255,255,255,0.7)" font-size="11">(Follower/following relationships)</text>

  <text x="470" y="300" fill="white" font-size="13" font-weight="600">❤️  Likes &amp; retweets</text>
  <text x="490" y="320" fill="rgba(255,255,255,0.7)" font-size="11">(Engagement actions)</text>

  <text x="470" y="350" fill="white" font-size="13" font-weight="600">🔍  Tweet &amp; user search</text>
  <text x="490" y="370" fill="rgba(255,255,255,0.7)" font-size="11">(Full-text search indexing)</text>

  <text x="470" y="400" fill="white" font-size="13" font-weight="600">👤  User profiles</text>
  <text x="490" y="420" fill="rgba(255,255,255,0.7)" font-size="11">(Bio, avatar, tweet history)</text>

  <text x="470" y="448" fill="white" font-size="13" font-weight="600">🆔  Unique tweet ID generation</text>

  <!-- Column 3: Out of Scope -->
  <text x="1010" y="92" text-anchor="middle" fill="white" font-size="16" font-weight="700">Out of Scope / Future</text>
  <rect x="850" y="100" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="850" y="115" width="320" height="350" rx="12" fill="rgba(245,158,11,0.25)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>

  <text x="880" y="150" fill="rgba(255,255,255,0.85)" font-size="13">&#x2716;  Direct Messages (DMs)</text>
  <text x="880" y="185" fill="rgba(255,255,255,0.85)" font-size="13">&#x2716;  Twitter Spaces (live audio)</text>
  <text x="880" y="220" fill="rgba(255,255,255,0.85)" font-size="13">&#x2716;  Premium / X Blue subscriptions</text>
  <text x="880" y="255" fill="rgba(255,255,255,0.85)" font-size="13">&#x2716;  Ad targeting &amp; serving system</text>
  <text x="880" y="290" fill="rgba(255,255,255,0.85)" font-size="13">&#x2716;  Content moderation ML</text>
  <text x="880" y="325" fill="rgba(255,255,255,0.85)" font-size="13">&#x2716;  Trending topics algorithm</text>
  <text x="880" y="360" fill="rgba(255,255,255,0.85)" font-size="13">&#x2716;  Push notifications infra</text>
  <text x="880" y="395" fill="rgba(255,255,255,0.85)" font-size="13">&#x2716;  Analytics / metrics pipeline</text>

  <!-- Bottom note -->
  <text x="600" y="488" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="12">Focus on tweet posting + timeline delivery at scale first &#8594; extend to search, trending, DMs later</text>
</svg>
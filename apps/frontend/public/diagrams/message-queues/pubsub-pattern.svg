<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #1e293b; }
      .label { font-size: 12px; font-weight: 600; fill: #fff; }
      .box-label { font-size: 11px; font-weight: 600; fill: #1e293b; }
      .desc { font-size: 10px; fill: #64748b; }
    </style>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f8f9"/>
      <stop offset="100%" stop-color="#eef0f2"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ec4899"/>
    </marker>
  </defs>

  <rect width="600" height="380" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="599" height="379" rx="12" fill="none" stroke="#e2e8f0"/>

  <text x="300" y="36" text-anchor="middle" class="title">Publish/Subscribe Pattern</text>

  <!-- Producers -->
  <g transform="translate(90, 110)">
    <rect x="-60" y="-22" width="120" height="44" rx="10" fill="url(#violet)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label">Producer A</text>
  </g>
  <g transform="translate(90, 190)">
    <rect x="-60" y="-22" width="120" height="44" rx="10" fill="url(#violet)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label">Producer B</text>
  </g>

  <!-- Arrows to queue -->
  <line x1="150" y1="110" x2="230" y2="150" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="150" y1="190" x2="230" y2="150" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Message Broker / Topic -->
  <g transform="translate(300, 150)">
    <rect x="-65" y="-35" width="130" height="70" rx="12" fill="url(#pink)" filter="url(#shadow)"/>
    <text x="0" y="-8" text-anchor="middle" class="label">Message</text>
    <text x="0" y="10" text-anchor="middle" class="label">Broker</text>
    <text x="0" y="26" text-anchor="middle" font-size="9" fill="#fce7f3">(Kafka / SNS)</text>
  </g>

  <!-- Arrows to consumers -->
  <line x1="370" y1="120" x2="440" y2="90" stroke="#ec4899" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="370" y1="150" x2="440" y2="150" stroke="#ec4899" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="370" y1="180" x2="440" y2="210" stroke="#ec4899" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Consumers -->
  <g transform="translate(510, 90)">
    <rect x="-60" y="-22" width="120" height="44" rx="10" fill="url(#blue)" filter="url(#shadow)"/>
    <text x="0" y="-2" text-anchor="middle" class="label">Email Svc</text>
    <text x="0" y="12" text-anchor="middle" font-size="9" fill="#bfdbfe">Subscriber</text>
  </g>
  <g transform="translate(510, 150)">
    <rect x="-60" y="-22" width="120" height="44" rx="10" fill="url(#blue)" filter="url(#shadow)"/>
    <text x="0" y="-2" text-anchor="middle" class="label">Analytics</text>
    <text x="0" y="12" text-anchor="middle" font-size="9" fill="#bfdbfe">Subscriber</text>
  </g>
  <g transform="translate(510, 210)">
    <rect x="-60" y="-22" width="120" height="44" rx="10" fill="url(#blue)" filter="url(#shadow)"/>
    <text x="0" y="-2" text-anchor="middle" class="label">Push Notif</text>
    <text x="0" y="12" text-anchor="middle" font-size="9" fill="#bfdbfe">Subscriber</text>
  </g>

  <!-- Key point -->
  <g transform="translate(300, 290)">
    <rect x="-250" y="-18" width="500" height="36" rx="8" fill="#fff" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="box-label">One message published → all subscribers receive it (fan-out)</text>
  </g>

  <!-- Bottom note -->
  <g transform="translate(300, 350)">
    <rect x="-250" y="-18" width="500" height="36" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="0.5"/>
    <text x="0" y="5" text-anchor="middle" class="desc" fill="#6d28d9">Decoupled: producers and consumers don't know about each other. Add subscribers without changing publishers.</text>
  </g>
</svg>
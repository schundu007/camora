<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #1e293b; }
      .label { font-size: 12px; font-weight: 600; fill: #fff; }
      .box-label { font-size: 11px; font-weight: 600; fill: #1e293b; }
      .desc { font-size: 10px; fill: #64748b; }
      .step { font-size: 10px; font-weight: 700; fill: #fff; }
    </style>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f8f9"/>
      <stop offset="100%" stop-color="#eef0f2"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="600" height="350" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="599" height="349" rx="12" fill="none" stroke="#e2e8f0"/>

  <text x="300" y="36" text-anchor="middle" class="title">Dead Letter Queue (DLQ) Pattern</text>

  <!-- Main Queue -->
  <g transform="translate(120, 120)">
    <rect x="-80" y="-25" width="160" height="50" rx="10" fill="url(#green)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label">Main Queue</text>
  </g>

  <!-- Consumer -->
  <g transform="translate(350, 120)">
    <rect x="-70" y="-25" width="140" height="50" rx="10" fill="url(#amber)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label">Consumer</text>
  </g>

  <!-- Arrow main → consumer -->
  <line x1="200" y1="120" x2="278" y2="120" stroke="#10b981" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="240" y="112" text-anchor="middle" class="desc">Process</text>

  <!-- Success path -->
  <g transform="translate(530, 120)">
    <rect x="-40" y="-18" width="80" height="36" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" class="box-label" fill="#059669">Success</text>
  </g>
  <line x1="420" y1="110" x2="488" y2="110" stroke="#10b981" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Retry arrow (loop) -->
  <path d="M 350 145 L 350 170 L 120 170 L 120 145" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="235" y="185" text-anchor="middle" class="desc" fill="#d97706">Retry (up to 3x)</text>

  <!-- Failure arrow to DLQ -->
  <line x1="350" y1="170" x2="350" y2="225" stroke="#ef4444" stroke-width="2" marker-end="url(#arr-red)"/>
  <g transform="translate(350, 195)">
    <circle r="10" fill="#ef4444"/>
    <text x="0" y="4" text-anchor="middle" class="step">!</text>
  </g>
  <text x="390" y="205" text-anchor="start" class="desc" fill="#ef4444">After 3 failures</text>

  <!-- Dead Letter Queue -->
  <g transform="translate(350, 260)">
    <rect x="-100" y="-25" width="200" height="50" rx="10" fill="url(#red)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label">Dead Letter Queue</text>
  </g>

  <!-- Alert -->
  <g transform="translate(530, 260)">
    <rect x="-45" y="-18" width="90" height="36" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" class="box-label" fill="#dc2626">Alert Team</text>
  </g>
  <line x1="450" y1="260" x2="483" y2="260" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arr-red)"/>

  <!-- Bottom note -->
  <g transform="translate(300, 330)">
    <text x="0" y="0" text-anchor="middle" class="desc">DLQ prevents poison messages from blocking the queue. Investigate and reprocess failed messages.</text>
  </g>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
  <rect width="500" height="300" fill="#f7f8f9" rx="4"/>
  <text x="250" y="28" font-family="system-ui" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">Forward Proxy vs Reverse Proxy</text>

  <!-- Forward Proxy Section -->
  <text x="250" y="55" font-family="system-ui" font-size="12" font-weight="bold" fill="#3b82f6" text-anchor="middle">Forward Proxy</text>

  <!-- Client -->
  <rect x="30" y="70" width="80" height="36" rx="8" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <text x="70" y="92" font-family="system-ui" font-size="11" font-weight="bold" fill="#3b82f6" text-anchor="middle">Client</text>

  <!-- Forward Proxy box -->
  <rect x="180" y="65" width="140" height="46" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2"/>
  <text x="250" y="85" font-family="system-ui" font-size="11" font-weight="bold" fill="#8b5cf6" text-anchor="middle">Forward Proxy</text>
  <text x="250" y="100" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">hides client identity</text>

  <!-- Server -->
  <rect x="390" y="70" width="80" height="36" rx="8" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="430" y="92" font-family="system-ui" font-size="11" font-weight="bold" fill="#10b981" text-anchor="middle">Server</text>

  <!-- Forward arrows -->
  <line x1="110" y1="88" x2="175" y2="88" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="320" y1="88" x2="385" y2="88" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Divider -->
  <line x1="30" y1="132" x2="470" y2="132" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Reverse Proxy Section -->
  <text x="250" y="155" font-family="system-ui" font-size="12" font-weight="bold" fill="#f59e0b" text-anchor="middle">Reverse Proxy</text>

  <!-- Client -->
  <rect x="30" y="170" width="80" height="36" rx="8" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <text x="70" y="192" font-family="system-ui" font-size="11" font-weight="bold" fill="#3b82f6" text-anchor="middle">Client</text>

  <!-- Reverse Proxy box -->
  <rect x="180" y="165" width="140" height="46" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="250" y="185" font-family="system-ui" font-size="11" font-weight="bold" fill="#f59e0b" text-anchor="middle">Reverse Proxy</text>
  <text x="250" y="200" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">hides server identity</text>

  <!-- Multiple Servers -->
  <rect x="390" y="162" width="80" height="24" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="430" y="178" font-family="system-ui" font-size="9" font-weight="bold" fill="#10b981" text-anchor="middle">Server 1</text>

  <rect x="390" y="190" width="80" height="24" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="430" y="206" font-family="system-ui" font-size="9" font-weight="bold" fill="#10b981" text-anchor="middle">Server 2</text>

  <rect x="390" y="218" width="80" height="24" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="430" y="234" font-family="system-ui" font-size="9" font-weight="bold" fill="#10b981" text-anchor="middle">Server 3</text>

  <!-- Reverse arrows -->
  <line x1="110" y1="188" x2="175" y2="188" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="320" y1="178" x2="385" y2="174" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="320" y1="188" x2="385" y2="202" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <line x1="320" y1="198" x2="385" y2="230" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Bottom summary -->
  <rect x="20" y="256" width="220" height="34" rx="8" fill="white" stroke="#8b5cf6" stroke-width="1"/>
  <text x="130" y="271" font-family="system-ui" font-size="9" font-weight="bold" fill="#8b5cf6" text-anchor="middle">Forward: anonymity, caching,</text>
  <text x="130" y="283" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">access control, content filtering</text>

  <rect x="260" y="256" width="220" height="34" rx="8" fill="white" stroke="#f59e0b" stroke-width="1"/>
  <text x="370" y="271" font-family="system-ui" font-size="9" font-weight="bold" fill="#f59e0b" text-anchor="middle">Reverse: load balancing, SSL,</text>
  <text x="370" y="283" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">caching, security, compression</text>

  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
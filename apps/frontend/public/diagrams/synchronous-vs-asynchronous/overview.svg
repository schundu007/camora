<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
  <rect width="500" height="300" fill="#f7f8f9" rx="4"/>
  <text x="250" y="28" font-family="system-ui" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">Synchronous vs Asynchronous</text>

  <!-- Synchronous Section -->
  <text x="250" y="52" font-family="system-ui" font-size="12" font-weight="bold" fill="#ef4444" text-anchor="middle">Synchronous (Blocking)</text>

  <!-- Timeline axis -->
  <line x1="30" y1="100" x2="470" y2="100" stroke="#cbd5e1" stroke-width="1"/>
  <text x="485" y="104" font-family="system-ui" font-size="8" fill="#94a3b8" text-anchor="middle">time</text>

  <!-- Caller bar -->
  <text x="30" y="72" font-family="system-ui" font-size="9" font-weight="bold" fill="#1e293b">Caller</text>
  <rect x="50" y="62" width="60" height="18" rx="4" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="75" font-family="system-ui" font-size="7" fill="#3b82f6" text-anchor="middle">work</text>

  <!-- Request arrow -->
  <line x1="110" y1="71" x2="140" y2="71" stroke="#ef4444" stroke-width="1.5" marker-end="url(#aRed)"/>
  <text x="125" y="65" font-family="system-ui" font-size="7" fill="#ef4444" text-anchor="middle">call</text>

  <!-- Blocked waiting -->
  <rect x="110" y="62" width="180" height="18" rx="4" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="200" y="75" font-family="system-ui" font-size="7" fill="#ef4444" text-anchor="middle">BLOCKED - waiting for response</text>

  <!-- Server processing -->
  <text x="30" y="95" font-family="system-ui" font-size="9" font-weight="bold" fill="#1e293b">Server</text>
  <rect x="140" y="85" width="140" height="18" rx="4" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="210" y="98" font-family="system-ui" font-size="7" fill="#f59e0b" text-anchor="middle">processing request</text>

  <!-- Response arrow -->
  <line x1="280" y1="93" x2="290" y2="71" stroke="#10b981" stroke-width="1.5" marker-end="url(#aGreen)"/>
  <text x="300" y="82" font-family="system-ui" font-size="7" fill="#10b981">response</text>

  <!-- Resume -->
  <rect x="290" y="62" width="80" height="18" rx="4" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="330" y="75" font-family="system-ui" font-size="7" fill="#3b82f6" text-anchor="middle">resume</text>

  <!-- Total time bracket -->
  <line x1="50" y1="108" x2="370" y2="108" stroke="#ef4444" stroke-width="1"/>
  <line x1="50" y1="104" x2="50" y2="112" stroke="#ef4444" stroke-width="1"/>
  <line x1="370" y1="104" x2="370" y2="112" stroke="#ef4444" stroke-width="1"/>
  <text x="210" y="120" font-family="system-ui" font-size="8" fill="#ef4444" text-anchor="middle">total time = work + wait + resume</text>

  <!-- Divider -->
  <line x1="20" y1="138" x2="480" y2="138" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- Asynchronous Section -->
  <text x="250" y="158" font-family="system-ui" font-size="12" font-weight="bold" fill="#10b981" text-anchor="middle">Asynchronous (Non-Blocking)</text>

  <!-- Timeline axis -->
  <line x1="30" y1="210" x2="470" y2="210" stroke="#cbd5e1" stroke-width="1"/>
  <text x="485" y="214" font-family="system-ui" font-size="8" fill="#94a3b8" text-anchor="middle">time</text>

  <!-- Caller bar -->
  <text x="30" y="180" font-family="system-ui" font-size="9" font-weight="bold" fill="#1e293b">Caller</text>
  <rect x="50" y="170" width="60" height="18" rx="4" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="183" font-family="system-ui" font-size="7" fill="#3b82f6" text-anchor="middle">work</text>

  <!-- Fire request -->
  <line x1="110" y1="179" x2="140" y2="193" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#aPurp)"/>
  <text x="115" y="173" font-family="system-ui" font-size="7" fill="#8b5cf6">fire</text>

  <!-- Continue working (not blocked!) -->
  <rect x="110" y="170" width="100" height="18" rx="4" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="160" y="183" font-family="system-ui" font-size="7" fill="#3b82f6" text-anchor="middle">other work</text>

  <rect x="215" y="170" width="80" height="18" rx="4" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="255" y="183" font-family="system-ui" font-size="7" fill="#3b82f6" text-anchor="middle">more work</text>

  <!-- Server processing (parallel) -->
  <text x="30" y="204" font-family="system-ui" font-size="9" font-weight="bold" fill="#1e293b">Server</text>
  <rect x="140" y="193" width="140" height="18" rx="4" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="210" y="206" font-family="system-ui" font-size="7" fill="#f59e0b" text-anchor="middle">processing request</text>

  <!-- Callback arrow -->
  <line x1="280" y1="202" x2="300" y2="179" stroke="#10b981" stroke-width="1.5" marker-end="url(#aGreen)"/>
  <text x="310" y="194" font-family="system-ui" font-size="7" fill="#10b981">callback</text>

  <!-- Handle callback -->
  <rect x="300" y="170" width="70" height="18" rx="4" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="335" y="183" font-family="system-ui" font-size="7" fill="#10b981" text-anchor="middle">handle</text>

  <!-- Efficiency note -->
  <line x1="50" y1="218" x2="370" y2="218" stroke="#10b981" stroke-width="1"/>
  <line x1="50" y1="214" x2="50" y2="222" stroke="#10b981" stroke-width="1"/>
  <line x1="370" y1="214" x2="370" y2="222" stroke="#10b981" stroke-width="1"/>
  <text x="210" y="230" font-family="system-ui" font-size="8" fill="#10b981" text-anchor="middle">caller stays productive - no idle time</text>

  <!-- Comparison boxes -->
  <rect x="20" y="248" width="220" height="40" rx="8" fill="white" stroke="#ef4444" stroke-width="1"/>
  <text x="130" y="264" font-family="system-ui" font-size="9" font-weight="bold" fill="#ef4444" text-anchor="middle">Sync: simple, ordered, blocking</text>
  <text x="130" y="278" font-family="system-ui" font-size="8" fill="#64748b" text-anchor="middle">HTTP request/response, DB queries</text>

  <rect x="260" y="248" width="220" height="40" rx="8" fill="white" stroke="#10b981" stroke-width="1"/>
  <text x="370" y="264" font-family="system-ui" font-size="9" font-weight="bold" fill="#10b981" text-anchor="middle">Async: scalable, concurrent, complex</text>
  <text x="370" y="278" font-family="system-ui" font-size="8" fill="#64748b" text-anchor="middle">Message queues, event-driven, I/O</text>

  <defs>
    <marker id="aRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#ef4444"/></marker>
    <marker id="aGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#10b981"/></marker>
    <marker id="aPurp" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#8b5cf6"/></marker>
  </defs>
</svg>
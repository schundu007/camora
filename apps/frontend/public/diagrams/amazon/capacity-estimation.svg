<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgCap" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="450" fill="url(#bgCap)" rx="16"/>

  <!-- Title -->
  <rect x="380" y="16" width="440" height="40" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="43" text-anchor="middle" fill="white" font-size="20" font-weight="700">Back-of-the-Envelope: Amazon</text>

  <!-- Column 1: Traffic -->
  <rect x="20" y="75" width="275" height="350" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="20" y="75" width="275" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="157" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">Traffic Estimates</text>

  <text x="45" y="140" fill="#fbbf24" font-size="13" font-weight="700">&#x1F6D2; 310M Active Customers</text>
  <text x="157" y="162" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="185" fill="white" font-size="12">Daily packages shipped:</text>
  <text x="45" y="205" fill="#fbbf24" font-size="15" font-weight="700">1.6 Million/day</text>
  <text x="157" y="227" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="250" fill="white" font-size="12">Peak order throughput:</text>
  <text x="45" y="272" fill="#fbbf24" font-size="16" font-weight="800">100K orders/sec</text>
  <text x="157" y="294" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="317" fill="white" font-size="11">Search QPS (avg ~10 searches/user):</text>
  <text x="45" y="337" fill="rgba(255,255,255,0.7)" font-size="10">310M x 10 / 86400</text>
  <text x="45" y="360" fill="#f97316" font-size="16" font-weight="800">&#x2248; 36K search QPS</text>

  <text x="45" y="395" fill="white" font-size="11">Peak search (3x):</text>
  <text x="45" y="415" fill="#f97316" font-size="14" font-weight="700">&#x2248; 108K QPS (Prime Day)</text>

  <!-- Column 2: Catalog -->
  <rect x="310" y="75" width="265" height="170" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="75" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">Product Catalog</text>

  <text x="335" y="140" fill="#fbbf24" font-size="13" font-weight="700">&#x1F4E6; 12M Amazon Products</text>
  <text x="335" y="165" fill="#fbbf24" font-size="13" font-weight="700">&#x1F3EA; 353M Marketplace Items</text>
  <text x="442" y="188" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>
  <text x="335" y="210" fill="white" font-size="11">Avg product page: ~500KB (images+data)</text>
  <text x="335" y="230" fill="#f97316" font-size="13" font-weight="700">&#x2248; 175 TB catalog storage</text>

  <!-- Column 3: Storage -->
  <rect x="310" y="260" width="265" height="165" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="260" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="284" text-anchor="middle" fill="white" font-size="14" font-weight="700">Order Storage</text>

  <text x="335" y="320" fill="white" font-size="11">1.6M orders/day x ~5KB each</text>
  <text x="335" y="342" fill="#fbbf24" font-size="14" font-weight="700">&#x2248; 8 GB/day new orders</text>
  <text x="442" y="362" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>
  <text x="335" y="385" fill="white" font-size="11">Order history (years of data):</text>
  <text x="335" y="405" fill="#f97316" font-size="14" font-weight="700">&#x2248; 30+ TB order data</text>

  <!-- Column 4: Infrastructure -->
  <rect x="590" y="75" width="290" height="170" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="75" width="290" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">Cart &amp; Session Load</text>

  <text x="615" y="140" fill="white" font-size="12">Active carts at any time:</text>
  <text x="615" y="163" fill="#fbbf24" font-size="16" font-weight="800">~50M concurrent</text>
  <text x="735" y="185" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>
  <text x="615" y="208" fill="white" font-size="11">Cart read/write at 50K ops/sec</text>
  <text x="615" y="228" fill="#f97316" font-size="14" font-weight="700">Redis Cluster required</text>

  <!-- Bandwidth -->
  <rect x="590" y="260" width="290" height="165" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="260" width="290" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="284" text-anchor="middle" fill="white" font-size="14" font-weight="700">Bandwidth</text>

  <text x="615" y="320" fill="white" font-size="11">Product images dominate traffic</text>
  <text x="615" y="342" fill="#fbbf24" font-size="14" font-weight="700">~500 Gb/s peak CDN egress</text>
  <text x="615" y="372" fill="white" font-size="11">API traffic (search, cart, orders):</text>
  <text x="615" y="392" fill="#f97316" font-size="14" font-weight="700">~50 Gb/s backend</text>

  <!-- Key Insights -->
  <rect x="900" y="75" width="280" height="350" rx="12" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="1040" y="103" text-anchor="middle" fill="white" font-size="14" font-weight="700">&#x1F4A1; Key Insights</text>
  <line x1="920" y1="113" x2="1160" y2="113" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <text x="920" y="140" fill="white" font-size="11" font-weight="600">Search is the bottleneck</text>
  <text x="920" y="158" fill="rgba(255,255,255,0.7)" font-size="10">108K QPS on Prime Day across</text>
  <text x="920" y="173" fill="rgba(255,255,255,0.7)" font-size="10">353M+ items needs Elasticsearch</text>
  <text x="920" y="188" fill="rgba(255,255,255,0.7)" font-size="10">with heavy caching.</text>

  <text x="920" y="218" fill="white" font-size="11" font-weight="600">Cart needs sub-10ms latency</text>
  <text x="920" y="236" fill="rgba(255,255,255,0.7)" font-size="10">50M concurrent carts, must be</text>
  <text x="920" y="251" fill="rgba(255,255,255,0.7)" font-size="10">in-memory (Redis/DynamoDB).</text>

  <text x="920" y="281" fill="white" font-size="11" font-weight="600">Order pipeline is event-driven</text>
  <text x="920" y="299" fill="rgba(255,255,255,0.7)" font-size="10">100K orders/sec peak requires</text>
  <text x="920" y="314" fill="rgba(255,255,255,0.7)" font-size="10">async processing with Kafka/SQS.</text>

  <text x="920" y="344" fill="white" font-size="11" font-weight="600">CDN is non-negotiable</text>
  <text x="920" y="362" fill="rgba(255,255,255,0.7)" font-size="10">500 Gb/s image traffic, CloudFront</text>
  <text x="920" y="377" fill="rgba(255,255,255,0.7)" font-size="10">caches 90%+ of product pages.</text>

  <text x="920" y="407" fill="white" font-size="11" font-weight="600">Multi-region is mandatory</text>
  <text x="920" y="425" fill="rgba(255,255,255,0.7)" font-size="10">310M global customers require</text>
  <text x="920" y="440" fill="rgba(255,255,255,0.7)" font-size="10">region-local fulfillment centers.</text>
</svg>
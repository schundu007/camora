<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgUP" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#dc2626"/><stop offset="100%" stop-color="#991b1b"/></linearGradient>
    <marker id="aU" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="white"/></marker>
  </defs>

  <rect width="1200" height="500" fill="url(#bgUP)" rx="16"/>
  <text x="600" y="35" text-anchor="middle" fill="white" font-size="20" font-weight="800">Video Upload → Transcode → Deliver Pipeline</text>
  <text x="600" y="55" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">500+ hours uploaded every minute through GPU transcoding to global CDN delivery</text>

  <!-- Step 1: Creator Upload -->
  <rect x="30" y="80" width="150" height="130" rx="12" fill="#f97316" stroke="white" stroke-width="2"/>
  <text x="105" y="108" text-anchor="middle" fill="white" font-size="24">🎬</text>
  <text x="105" y="132" text-anchor="middle" fill="white" font-size="12" font-weight="800">Creator Upload</text>
  <text x="105" y="150" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Chunked (8MB)</text>
  <text x="105" y="165" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">CRC32 checksums</text>
  <text x="105" y="180" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Resumable on failure</text>
  <text x="105" y="198" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">Up to 256 GB</text>

  <line x1="180" y1="145" x2="220" y2="145" stroke="#fbbf24" stroke-width="2" marker-end="url(#aU)"/>

  <!-- Step 2: Object Storage -->
  <rect x="225" y="95" width="140" height="100" rx="12" fill="#3b82f6" stroke="white" stroke-width="1.5"/>
  <text x="295" y="122" text-anchor="middle" fill="white" font-size="22">☁️</text>
  <text x="295" y="145" text-anchor="middle" fill="white" font-size="11" font-weight="700">Raw Storage</text>
  <text x="295" y="162" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">GCS / S3</text>
  <text x="295" y="178" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">720 TB/day raw</text>

  <line x1="365" y1="145" x2="405" y2="145" stroke="#fbbf24" stroke-width="2" marker-end="url(#aU)"/>

  <!-- Step 3: Content ID -->
  <rect x="410" y="80" width="150" height="130" rx="12" fill="#7c3aed" stroke="white" stroke-width="1.5"/>
  <text x="485" y="108" text-anchor="middle" fill="white" font-size="22">©️</text>
  <text x="485" y="132" text-anchor="middle" fill="white" font-size="11" font-weight="700">Content ID Scan</text>
  <text x="485" y="150" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Audio fingerprint</text>
  <text x="485" y="165" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Visual fingerprint</text>
  <text x="485" y="180" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">100M+ reference files</text>
  <text x="485" y="198" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">Block / Monetize / Allow</text>

  <line x1="560" y1="145" x2="600" y2="145" stroke="#fbbf24" stroke-width="2" marker-end="url(#aU)"/>

  <!-- Step 4: Transcoding -->
  <rect x="605" y="75" width="200" height="140" rx="12" fill="#ec4899" stroke="white" stroke-width="2"/>
  <text x="705" y="102" text-anchor="middle" fill="white" font-size="22">🔄</text>
  <text x="705" y="126" text-anchor="middle" fill="white" font-size="13" font-weight="800">GPU Transcoding</text>
  <text x="705" y="148" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">6 resolutions × 3 codecs</text>
  <text x="705" y="163" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">360p → 4K parallel encode</text>
  <text x="705" y="178" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Per-title bitrate optimization</text>
  <text x="705" y="195" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">1.4M GPU-hours/day</text>

  <!-- Resolution boxes under transcoding -->
  <rect x="610" y="240" width="55" height="25" rx="4" fill="#22c55e"/>
  <text x="637" y="257" text-anchor="middle" fill="white" font-size="8" font-weight="700">360p</text>
  <rect x="670" y="240" width="55" height="25" rx="4" fill="#22c55e"/>
  <text x="697" y="257" text-anchor="middle" fill="white" font-size="8" font-weight="700">720p</text>
  <rect x="730" y="240" width="55" height="25" rx="4" fill="#3b82f6"/>
  <text x="757" y="257" text-anchor="middle" fill="white" font-size="8" font-weight="700">1080p</text>
  <rect x="610" y="270" width="55" height="25" rx="4" fill="#3b82f6"/>
  <text x="637" y="287" text-anchor="middle" fill="white" font-size="8" font-weight="700">1440p</text>
  <rect x="670" y="270" width="55" height="25" rx="4" fill="#a855f7"/>
  <text x="697" y="287" text-anchor="middle" fill="white" font-size="8" font-weight="700">4K</text>

  <text x="630" y="315" fill="#22c55e" font-size="9" font-weight="600">✓ 360p ready first</text>
  <text x="630" y="330" fill="rgba(255,255,255,0.5)" font-size="8">Higher res continue...</text>

  <line x1="805" y1="145" x2="850" y2="145" stroke="#fbbf24" stroke-width="2" marker-end="url(#aU)"/>

  <!-- Step 5: Segment + Manifest -->
  <rect x="855" y="80" width="150" height="130" rx="12" fill="#14b8a6" stroke="white" stroke-width="1.5"/>
  <text x="930" y="108" text-anchor="middle" fill="white" font-size="22">📋</text>
  <text x="930" y="132" text-anchor="middle" fill="white" font-size="11" font-weight="700">Segment &amp; Package</text>
  <text x="930" y="150" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">4-second segments</text>
  <text x="930" y="165" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">HLS manifest (M3U8)</text>
  <text x="930" y="180" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">DASH manifest (MPD)</text>
  <text x="930" y="198" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">Auto thumbnails</text>

  <line x1="1005" y1="145" x2="1040" y2="145" stroke="#fbbf24" stroke-width="2" marker-end="url(#aU)"/>

  <!-- Step 6: CDN -->
  <rect x="1045" y="80" width="130" height="130" rx="12" fill="#22c55e" stroke="white" stroke-width="2"/>
  <text x="1110" y="108" text-anchor="middle" fill="white" font-size="22">🌐</text>
  <text x="1110" y="132" text-anchor="middle" fill="white" font-size="12" font-weight="800">Global CDN</text>
  <text x="1110" y="150" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">100+ PoPs</text>
  <text x="1110" y="165" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Pre-warm popular</text>
  <text x="1110" y="180" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Status → READY</text>
  <text x="1110" y="198" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">175 Tbps peak</text>

  <!-- CDN Tiers -->
  <rect x="30" y="370" width="1140" height="110" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)"/>
  <text x="600" y="395" text-anchor="middle" fill="white" font-size="14" font-weight="700">🗼 Multi-Tier CDN Architecture</text>

  <rect x="60" y="410" width="200" height="55" rx="8" fill="rgba(34,197,94,0.3)" stroke="#22c55e"/>
  <text x="160" y="432" text-anchor="middle" fill="white" font-size="11" font-weight="700">Edge PoPs (100+)</text>
  <text x="160" y="450" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Top 1% • SSD • 95% hit rate</text>

  <text x="280" y="440" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="14">→</text>

  <rect x="310" y="410" width="200" height="55" rx="8" fill="rgba(59,130,246,0.3)" stroke="#3b82f6"/>
  <text x="410" y="432" text-anchor="middle" fill="white" font-size="11" font-weight="700">Regional PoPs (~20)</text>
  <text x="410" y="450" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Top 10% • HDD+SSD</text>

  <text x="530" y="440" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="14">→</text>

  <rect x="560" y="410" width="200" height="55" rx="8" fill="rgba(168,85,247,0.3)" stroke="#a855f7"/>
  <text x="660" y="432" text-anchor="middle" fill="white" font-size="11" font-weight="700">Origin Shield</text>
  <text x="660" y="450" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Collapse duplicate fetches</text>

  <text x="780" y="440" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="14">→</text>

  <rect x="810" y="410" width="200" height="55" rx="8" fill="rgba(100,116,139,0.3)" stroke="#64748b"/>
  <text x="910" y="432" text-anchor="middle" fill="white" font-size="11" font-weight="700">Origin (3-5 DCs)</text>
  <text x="910" y="450" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="9">Full catalog • Hot/Cold tier</text>

  <rect x="1040" y="416" width="110" height="42" rx="6" fill="rgba(251,191,36,0.15)" stroke="#fbbf24"/>
  <text x="1095" y="435" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="700">Long-tail: 80%</text>
  <text x="1095" y="449" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="8">of videos &lt;1% views</text>
</svg>
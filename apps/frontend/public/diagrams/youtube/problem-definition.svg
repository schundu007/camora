<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#dc2626"/><stop offset="100%" stop-color="#991b1b"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)" rx="16"/>

  <rect x="340" y="20" width="520" height="44" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="22" font-weight="700">Problem Definition: Designing YouTube</text>

  <!-- Users & Core Actions -->
  <text x="200" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Users &amp; Core Actions</text>
  <rect x="40" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <circle cx="120" cy="170" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="120" y="176" text-anchor="middle" fill="white" font-size="24">🎬</text>
  <text x="120" y="215" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Creator</text>

  <text x="200" y="176" text-anchor="middle" fill="white" font-size="28">→</text>

  <circle cx="280" cy="170" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="280" y="176" text-anchor="middle" fill="white" font-size="24">👁</text>
  <text x="280" y="215" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Viewer</text>

  <rect x="70" y="240" width="260" height="200" rx="12" fill="#f97316" filter="url(#shadow)"/>
  <text x="200" y="270" text-anchor="middle" fill="white" font-size="15" font-weight="700">Core Actions</text>
  <line x1="90" y1="282" x2="310" y2="282" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="100" y="310" fill="white" font-size="13">📤  Upload videos (up to 256GB)</text>
  <text x="100" y="340" fill="white" font-size="13">🔄  Transcode to 6 resolutions</text>
  <text x="100" y="370" fill="white" font-size="13">▶️  Stream with adaptive bitrate</text>
  <text x="100" y="400" fill="white" font-size="13">🔍  Search 800M+ videos</text>
  <text x="100" y="430" fill="white" font-size="13">🤖  Personalized recommendations</text>

  <!-- In Scope -->
  <text x="600" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">In Scope: Essentials</text>
  <rect x="440" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="440" y="125" width="320" height="320" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)"/>
  <text x="470" y="160" fill="white" font-size="13" font-weight="600">📤  Resumable chunked upload</text>
  <text x="470" y="195" fill="white" font-size="13" font-weight="600">🎞  Multi-resolution transcoding</text>
  <text x="490" y="215" fill="rgba(255,255,255,0.7)" font-size="11">(360p → 4K, H.264/VP9/AV1)</text>
  <text x="470" y="245" fill="white" font-size="13" font-weight="600">📡  Adaptive bitrate streaming</text>
  <text x="490" y="265" fill="rgba(255,255,255,0.7)" font-size="11">(HLS + DASH manifests)</text>
  <text x="470" y="295" fill="white" font-size="13" font-weight="600">🌐  Global CDN delivery</text>
  <text x="490" y="315" fill="rgba(255,255,255,0.7)" font-size="11">(100+ PoPs, 175 Tbps peak)</text>
  <text x="470" y="345" fill="white" font-size="13" font-weight="600">🤖  Two-stage recommendation</text>
  <text x="470" y="375" fill="white" font-size="13" font-weight="600">🔢  View counting (5B/day)</text>
  <text x="470" y="405" fill="white" font-size="13" font-weight="600">©️  Content ID copyright scan</text>
  <text x="470" y="435" fill="white" font-size="13" font-weight="600">🔍  Full-text + caption search</text>

  <!-- Out of Scope -->
  <text x="1000" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Out of Scope / Future</text>
  <rect x="840" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="840" y="125" width="320" height="320" rx="12" fill="rgba(245,158,11,0.25)" stroke="rgba(245,158,11,0.5)"/>
  <text x="870" y="160" fill="rgba(255,255,255,0.85)" font-size="13">❌  Live streaming infrastructure</text>
  <text x="870" y="195" fill="rgba(255,255,255,0.85)" font-size="13">❌  YouTube Music service</text>
  <text x="870" y="230" fill="rgba(255,255,255,0.85)" font-size="13">❌  YouTube TV / movies</text>
  <text x="870" y="265" fill="rgba(255,255,255,0.85)" font-size="13">❌  Content moderation ML</text>
  <text x="870" y="300" fill="rgba(255,255,255,0.85)" font-size="13">❌  Ad serving / auction system</text>
  <text x="870" y="335" fill="rgba(255,255,255,0.85)" font-size="13">❌  YouTube Shorts algorithm</text>
  <text x="870" y="370" fill="rgba(255,255,255,0.85)" font-size="13">❌  Creator monetization</text>
  <text x="870" y="405" fill="rgba(255,255,255,0.85)" font-size="13">❌  Community posts / playlists</text>

  <!-- Key Stats -->
  <rect x="40" y="470" width="1120" height="90" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)"/>
  <text x="600" y="498" text-anchor="middle" fill="white" font-size="14" font-weight="700">Key Scale Metrics</text>

  <text x="120" y="535" text-anchor="middle" fill="#fbbf24" font-size="22" font-weight="800">2.7B</text>
  <text x="120" y="550" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">MAU</text>

  <text x="320" y="535" text-anchor="middle" fill="#fbbf24" font-size="22" font-weight="800">500+</text>
  <text x="320" y="550" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">hrs uploaded/min</text>

  <text x="520" y="535" text-anchor="middle" fill="#fbbf24" font-size="22" font-weight="800">1B</text>
  <text x="520" y="550" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">hrs watched/day</text>

  <text x="720" y="535" text-anchor="middle" fill="#fbbf24" font-size="22" font-weight="800">175 Tbps</text>
  <text x="720" y="550" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">peak bandwidth</text>

  <text x="920" y="535" text-anchor="middle" fill="#fbbf24" font-size="22" font-weight="800">3.6 PB</text>
  <text x="920" y="550" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">new storage/day</text>

  <text x="1080" y="535" text-anchor="middle" fill="#fbbf24" font-size="22" font-weight="800">800M+</text>
  <text x="1080" y="550" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="10">total videos</text>

  <text x="600" y="585" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12">Focus on the upload → transcode → deliver pipeline + recommendation engine</text>
</svg>
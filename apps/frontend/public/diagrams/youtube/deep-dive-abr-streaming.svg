<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="350" fill="#fafbfc" rx="12"/>
  <text x="400" y="28" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="700">Adaptive Bitrate Streaming — Quality Selection Algorithm</text>

  <!-- Buffer-based visualization -->
  <rect x="20" y="50" width="370" height="270" rx="10" fill="#fff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="20" y="50" width="370" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="205" y="69" text-anchor="middle" fill="white" font-size="12" font-weight="700">Buffer-Based ABR Decision Logic</text>

  <!-- Buffer diagram -->
  <rect x="40" y="95" width="330" height="30" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="75" y="115" text-anchor="middle" fill="#dc2626" font-size="9" font-weight="700">DANGER</text>
  <text x="160" y="115" fill="#dc2626" font-size="8">&lt;5s buffer → drop quality NOW</text>

  <rect x="40" y="130" width="330" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="75" y="150" text-anchor="middle" fill="#d97706" font-size="9" font-weight="700">CAUTION</text>
  <text x="160" y="150" fill="#d97706" font-size="8">5-15s buffer → maintain current quality</text>

  <rect x="40" y="165" width="330" height="30" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="75" y="185" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="700">HEALTHY</text>
  <text x="160" y="185" fill="#16a34a" font-size="8">15-30s buffer → try higher quality</text>

  <rect x="40" y="200" width="330" height="30" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="75" y="220" text-anchor="middle" fill="#2563eb" font-size="9" font-weight="700">FULL</text>
  <text x="160" y="220" fill="#2563eb" font-size="8">&gt;30s buffer → max quality possible</text>

  <!-- Hysteresis note -->
  <rect x="40" y="245" width="330" height="55" rx="6" fill="rgba(124,58,237,0.08)" stroke="#7c3aed"/>
  <text x="55" y="265" fill="#7c3aed" font-size="10" font-weight="700">⚡ Hysteresis Prevention</text>
  <text x="55" y="282" fill="#475569" font-size="9">Require 3 consecutive probes of higher BW before upgrading</text>
  <text x="55" y="296" fill="#475569" font-size="9">Drop quality immediately on single low probe (safety first)</text>

  <!-- Quality ladder -->
  <rect x="410" y="50" width="370" height="270" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="410" y="50" width="370" height="28" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="595" y="69" text-anchor="middle" fill="white" font-size="12" font-weight="700">Quality Ladder &amp; Bandwidth Requirements</text>

  <!-- Quality bars -->
  <text x="430" y="105" fill="#1e293b" font-size="10" font-weight="600">360p</text>
  <rect x="490" y="92" width="50" height="18" rx="3" fill="#22c55e"/>
  <text x="550" y="105" fill="#475569" font-size="9">0.5 Mbps</text>

  <text x="430" y="135" fill="#1e293b" font-size="10" font-weight="600">480p</text>
  <rect x="490" y="122" width="80" height="18" rx="3" fill="#22c55e"/>
  <text x="580" y="135" fill="#475569" font-size="9">1.0 Mbps</text>

  <text x="430" y="165" fill="#1e293b" font-size="10" font-weight="600">720p</text>
  <rect x="490" y="152" width="120" height="18" rx="3" fill="#3b82f6"/>
  <text x="620" y="165" fill="#475569" font-size="9">2.5 Mbps</text>

  <text x="430" y="195" fill="#1e293b" font-size="10" font-weight="600">1080p</text>
  <rect x="490" y="182" width="170" height="18" rx="3" fill="#3b82f6"/>
  <text x="670" y="195" fill="#475569" font-size="9">5.0 Mbps</text>

  <text x="430" y="225" fill="#1e293b" font-size="10" font-weight="600">1440p</text>
  <rect x="490" y="212" width="210" height="18" rx="3" fill="#a855f7"/>
  <text x="710" y="225" fill="#475569" font-size="9">8.0 Mbps</text>

  <text x="430" y="255" fill="#1e293b" font-size="10" font-weight="600">4K</text>
  <rect x="490" y="242" width="270" height="18" rx="3" fill="#ec4899"/>
  <text x="765" y="255" fill="#475569" font-size="9">20 Mbps</text>

  <rect x="430" y="275" width="330" height="30" rx="5" fill="rgba(239,68,68,0.08)" stroke="#ef4444"/>
  <text x="595" y="295" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="600">Target: Rebuffer rate &lt;1% — users abandon after 3-5s buffering</text>

  <!-- Bottom key metrics -->
  <rect x="20" y="330" width="760" height="15" rx="4" fill="rgba(30,41,59,0.05)"/>
  <text x="400" y="342" text-anchor="middle" fill="#64748b" font-size="9">Segment size: 2-10 seconds • Seamless quality switch at segment boundary • Start low, ramp up • Prefetch next video</text>
</svg>
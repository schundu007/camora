<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="system-ui, -apple-system, sans-serif">
  <defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#334155"/></marker></defs>
  <rect width="800" height="380" fill="#fafbfc" rx="12"/>
  <text x="400" y="28" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="700">Two-Stage Recommendation Engine — Drives 70%+ of Watch Time</text>

  <!-- Stage 1 -->
  <rect x="20" y="50" width="370" height="300" rx="10" fill="#fff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="20" y="50" width="370" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="205" y="69" text-anchor="middle" fill="white" font-size="12" font-weight="700">Stage 1: Candidate Generation</text>

  <text x="205" y="98" text-anchor="middle" fill="#64748b" font-size="10">800M+ videos → ~1000 candidates per user</text>

  <!-- Sources -->
  <rect x="40" y="110" width="140" height="35" rx="6" fill="#f97316"/>
  <text x="110" y="132" text-anchor="middle" fill="white" font-size="9" font-weight="600">📺 Watch History</text>

  <rect x="40" y="150" width="140" height="35" rx="6" fill="#22c55e"/>
  <text x="110" y="172" text-anchor="middle" fill="white" font-size="9" font-weight="600">🔔 Subscriptions</text>

  <rect x="40" y="190" width="140" height="35" rx="6" fill="#3b82f6"/>
  <text x="110" y="212" text-anchor="middle" fill="white" font-size="9" font-weight="600">🔍 Search History</text>

  <rect x="40" y="230" width="140" height="35" rx="6" fill="#a855f7"/>
  <text x="110" y="252" text-anchor="middle" fill="white" font-size="9" font-weight="600">🔥 Trending</text>

  <line x1="180" y1="145" x2="220" y2="195" stroke="#334155" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="180" y1="167" x2="220" y2="195" stroke="#334155" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="180" y1="207" x2="220" y2="205" stroke="#334155" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="180" y1="247" x2="220" y2="210" stroke="#334155" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- DNN -->
  <rect x="225" y="170" width="140" height="60" rx="8" fill="#1e293b"/>
  <text x="295" y="195" text-anchor="middle" fill="white" font-size="10" font-weight="700">🧠 Deep Neural Net</text>
  <text x="295" y="213" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="8">User embedding lookup</text>

  <!-- Output -->
  <rect x="225" y="250" width="140" height="30" rx="6" fill="rgba(37,99,235,0.1)" stroke="#2563eb"/>
  <text x="295" y="270" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="600">~1000 candidates</text>

  <text x="40" y="310" fill="#16a34a" font-size="10" font-weight="700">✓ Fast</text>
  <text x="40" y="328" fill="#475569" font-size="9">• Runs in &lt;100ms per request</text>
  <text x="40" y="343" fill="#475569" font-size="9">• Pre-computed user embeddings in Redis</text>

  <!-- Stage 2 -->
  <rect x="410" y="50" width="370" height="300" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="410" y="50" width="370" height="28" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="595" y="69" text-anchor="middle" fill="white" font-size="12" font-weight="700">Stage 2: Ranking &amp; Scoring</text>

  <text x="595" y="98" text-anchor="middle" fill="#64748b" font-size="10">~1000 candidates → 50 videos for home feed</text>

  <!-- Features -->
  <rect x="430" y="110" width="140" height="25" rx="5" fill="#f97316"/>
  <text x="500" y="127" text-anchor="middle" fill="white" font-size="8" font-weight="600">👤 User engagement history</text>

  <rect x="430" y="140" width="140" height="25" rx="5" fill="#22c55e"/>
  <text x="500" y="157" text-anchor="middle" fill="white" font-size="8" font-weight="600">🕐 Video freshness</text>

  <rect x="430" y="170" width="140" height="25" rx="5" fill="#3b82f6"/>
  <text x="500" y="187" text-anchor="middle" fill="white" font-size="8" font-weight="600">⭐ Creator authority</text>

  <rect x="430" y="200" width="140" height="25" rx="5" fill="#a855f7"/>
  <text x="500" y="217" text-anchor="middle" fill="white" font-size="8" font-weight="600">📱 Device + context</text>

  <rect x="580" y="110" width="180" height="115" rx="8" fill="#1e293b"/>
  <text x="670" y="140" text-anchor="middle" fill="white" font-size="11" font-weight="700">🧠 Ranking DNN</text>
  <text x="670" y="162" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">Optimized for WATCH TIME</text>
  <text x="670" y="180" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="8">(NOT clicks — prevents</text>
  <text x="670" y="195" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="8">clickbait dominance)</text>
  <text x="670" y="215" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="8">100s of features</text>

  <line x1="570" y1="160" x2="576" y2="160" stroke="#334155" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Multi-objective -->
  <rect x="430" y="245" width="330" height="80" rx="8" fill="rgba(124,58,237,0.08)" stroke="#7c3aed"/>
  <text x="595" y="268" text-anchor="middle" fill="#7c3aed" font-size="10" font-weight="700">Multi-Objective Optimization</text>
  <text x="450" y="288" fill="#475569" font-size="9">📊  Watch time (primary signal)</text>
  <text x="450" y="305" fill="#475569" font-size="9">😊  User satisfaction (from surveys)</text>
  <text x="450" y="322" fill="#475569" font-size="9">🌈  Diversity (avoid filter bubbles)</text>

  <!-- Arrow between stages -->
  <text x="400" y="365" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">Total latency budget: &lt;200ms | 1.4M requests/sec | Drives 70%+ of all watch time</text>
</svg>
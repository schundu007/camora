<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="500" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <rect x="360" y="20" width="480" height="44" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="22" font-weight="700">Problem Definition: Designing Google Docs</text>

  <!-- Column 1: Users & Core Actions -->
  <text x="200" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Users &amp; Core Actions</text>
  <rect x="40" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <circle cx="120" cy="165" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="120" y="171" text-anchor="middle" fill="white" font-size="24">&#x1F4DD;</text>
  <text x="120" y="210" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Editor</text>

  <text x="200" y="171" text-anchor="middle" fill="white" font-size="28">&#x21C4;</text>

  <circle cx="280" cy="165" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="280" y="171" text-anchor="middle" fill="white" font-size="24">&#x1F465;</text>
  <text x="280" y="210" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Collaborator</text>

  <!-- Core Actions Box -->
  <rect x="60" y="230" width="280" height="240" rx="12" fill="#f97316" filter="url(#shadow)"/>
  <text x="200" y="260" text-anchor="middle" fill="white" font-size="15" font-weight="700">Core Actions</text>
  <line x1="80" y1="272" x2="320" y2="272" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="85" y="300" fill="white" font-size="13">&#x270F;&#xFE0F;  Edit Document in Real-Time</text>
  <text x="85" y="330" fill="white" font-size="13">&#x1F440;  See Others' Cursors Live</text>
  <text x="85" y="360" fill="white" font-size="13">&#x1F504;  Resolve Conflicts (OT/CRDT)</text>
  <text x="85" y="390" fill="white" font-size="13">&#x1F4C3;  View Version History</text>
  <text x="85" y="420" fill="white" font-size="13">&#x1F512;  Manage Permissions</text>
  <text x="85" y="450" fill="white" font-size="13">&#x1F4F4;  Edit Offline &amp; Sync</text>

  <!-- Column 2: In Scope -->
  <text x="600" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">In Scope: Essentials</text>
  <rect x="440" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="440" y="120" width="320" height="350" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <text x="470" y="155" fill="white" font-size="13" font-weight="600">&#x270F;&#xFE0F;  Real-time collaborative editing</text>
  <text x="490" y="175" fill="rgba(255,255,255,0.7)" font-size="11">(Multiple users, same document)</text>
  <text x="470" y="205" fill="white" font-size="13" font-weight="600">&#x1F504;  OT/CRDT conflict resolution</text>
  <text x="490" y="225" fill="rgba(255,255,255,0.7)" font-size="11">(Operational Transform or CRDT merge)</text>
  <text x="470" y="255" fill="white" font-size="13" font-weight="600">&#x1F5B1;&#xFE0F;  Cursor &amp; selection sync</text>
  <text x="490" y="275" fill="rgba(255,255,255,0.7)" font-size="11">(See collaborator positions live)</text>
  <text x="470" y="305" fill="white" font-size="13" font-weight="600">&#x1F4DC;  Version history &amp; restore</text>
  <text x="490" y="325" fill="rgba(255,255,255,0.7)" font-size="11">(Browse, compare, revert changes)</text>
  <text x="470" y="355" fill="white" font-size="13" font-weight="600">&#x1F512;  Permission management</text>
  <text x="490" y="375" fill="rgba(255,255,255,0.7)" font-size="11">(Owner, Editor, Viewer, Link sharing)</text>
  <text x="470" y="405" fill="white" font-size="13" font-weight="600">&#x1F4F4;  Offline editing &amp; sync</text>
  <text x="490" y="425" fill="rgba(255,255,255,0.7)" font-size="11">(Queue changes, merge on reconnect)</text>

  <!-- Column 3: Out of Scope -->
  <text x="1000" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Out of Scope / Future</text>
  <rect x="840" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="840" y="120" width="320" height="280" rx="12" fill="rgba(245,158,11,0.25)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>

  <text x="870" y="155" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Google Slides</text>
  <text x="870" y="190" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Google Sheets</text>
  <text x="870" y="225" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Google Forms</text>
  <text x="870" y="260" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Voice Typing / Dictation</text>
  <text x="870" y="295" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Add-ons / Extensions</text>
  <text x="870" y="330" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Template Gallery</text>
  <text x="870" y="365" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  AI Writing Assistance</text>

  <!-- Bottom -->
  <text x="600" y="492" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="12">Focus on real-time collaboration infrastructure first &#x2192; extend to rich media later</text>
</svg>
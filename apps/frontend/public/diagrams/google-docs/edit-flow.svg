<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="450" fill="#fafbfc" rx="16"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Google Docs Real-Time Edit Flow (OT)</text>
  <text x="600" y="56" text-anchor="middle" fill="#64748b" font-size="12">User types a character, operation propagates to all collaborators via Operational Transformation</text>

  <!-- User A (typing) -->
  <rect x="30" y="100" width="130" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="30" y="100" width="130" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="95" y="120" text-anchor="middle" fill="white" font-size="11" font-weight="700">User A (Typing)</text>
  <text x="95" y="148" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Keystroke captured</text>
  <text x="95" y="165" text-anchor="middle" fill="#64748b" font-size="9">INSERT op created</text>
  <text x="95" y="180" text-anchor="middle" fill="#64748b" font-size="9">position + character</text>
  <text x="95" y="195" text-anchor="middle" fill="#64748b" font-size="9">baseRevision = 42</text>

  <!-- Local Apply -->
  <rect x="200" y="100" width="130" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="200" y="100" width="130" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="265" y="120" text-anchor="middle" fill="white" font-size="11" font-weight="700">Local Apply</text>
  <text x="265" y="148" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Optimistic UI</text>
  <text x="265" y="165" text-anchor="middle" fill="#64748b" font-size="9">Apply immediately</text>
  <text x="265" y="180" text-anchor="middle" fill="#64748b" font-size="9">No server wait</text>
  <text x="265" y="195" text-anchor="middle" fill="#64748b" font-size="9">User sees change</text>

  <!-- WebSocket Send -->
  <rect x="370" y="100" width="130" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="370" y="100" width="130" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="435" y="120" text-anchor="middle" fill="white" font-size="11" font-weight="700">WebSocket Send</text>
  <text x="435" y="148" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Send to server</text>
  <text x="435" y="165" text-anchor="middle" fill="#64748b" font-size="9">op + baseRevision</text>
  <text x="435" y="180" text-anchor="middle" fill="#64748b" font-size="9">Queue pending ops</text>
  <text x="435" y="195" text-anchor="middle" fill="#64748b" font-size="9">Await ACK</text>

  <!-- OT Server -->
  <rect x="540" y="100" width="140" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="540" y="100" width="140" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="610" y="120" text-anchor="middle" fill="white" font-size="11" font-weight="700">OT Server</text>
  <text x="610" y="148" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Transform op</text>
  <text x="610" y="165" text-anchor="middle" fill="#64748b" font-size="9">If behind: transform</text>
  <text x="610" y="180" text-anchor="middle" fill="#64748b" font-size="9">against missed ops</text>
  <text x="610" y="195" text-anchor="middle" fill="#64748b" font-size="9">Assign rev 43</text>

  <!-- Broadcast -->
  <rect x="720" y="100" width="130" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="720" y="100" width="130" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="785" y="120" text-anchor="middle" fill="white" font-size="11" font-weight="700">Broadcast</text>
  <text x="785" y="148" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Fan-out to clients</text>
  <text x="785" y="165" text-anchor="middle" fill="#64748b" font-size="9">Send transformed op</text>
  <text x="785" y="180" text-anchor="middle" fill="#64748b" font-size="9">to all other editors</text>
  <text x="785" y="195" text-anchor="middle" fill="#64748b" font-size="9">via WebSocket</text>

  <!-- User B -->
  <rect x="890" y="100" width="130" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="890" y="100" width="130" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="955" y="120" text-anchor="middle" fill="white" font-size="11" font-weight="700">User B</text>
  <text x="955" y="148" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Remote apply</text>
  <text x="955" y="165" text-anchor="middle" fill="#64748b" font-size="9">Transform pending</text>
  <text x="955" y="180" text-anchor="middle" fill="#64748b" font-size="9">ops against received</text>
  <text x="955" y="195" text-anchor="middle" fill="#64748b" font-size="9">Apply to document</text>

  <!-- Converge -->
  <rect x="1050" y="100" width="120" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="1050" y="100" width="120" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="1110" y="120" text-anchor="middle" fill="white" font-size="10" font-weight="700">Converge</text>
  <text x="1110" y="148" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Same state</text>
  <text x="1110" y="165" text-anchor="middle" fill="#64748b" font-size="9">All clients see</text>
  <text x="1110" y="180" text-anchor="middle" fill="#64748b" font-size="9">identical document</text>
  <text x="1110" y="195" text-anchor="middle" fill="#64748b" font-size="9">OT guarantee</text>

  <!-- Op Log (Cassandra) -->
  <rect x="540" y="265" width="140" height="50" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="540" y="265" width="140" height="18" rx="8 8 0 0" fill="#7c3aed"/>
  <text x="610" y="278" text-anchor="middle" fill="white" font-size="9" font-weight="700">Cassandra Op Log</text>
  <text x="610" y="300" text-anchor="middle" fill="#64748b" font-size="9">Persist all operations</text>

  <!-- Arrows -->
  <line x1="160" y1="150" x2="196" y2="150" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="163" y="133" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="174" y="143" text-anchor="middle" fill="white" font-size="8" font-weight="600">1</text>

  <line x1="330" y1="150" x2="366" y2="150" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="333" y="133" width="22" height="14" rx="3" fill="#16a34a"/>
  <text x="344" y="143" text-anchor="middle" fill="white" font-size="8" font-weight="600">2</text>

  <line x1="500" y1="150" x2="536" y2="150" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="503" y="133" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="514" y="143" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>

  <line x1="680" y1="150" x2="716" y2="150" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="683" y="133" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="694" y="143" text-anchor="middle" fill="white" font-size="8" font-weight="600">4</text>

  <line x1="850" y1="150" x2="886" y2="150" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="853" y="133" width="22" height="14" rx="3" fill="#2563eb"/>
  <text x="864" y="143" text-anchor="middle" fill="white" font-size="8" font-weight="600">5</text>

  <line x1="1020" y1="150" x2="1046" y2="150" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="1023" y="133" width="22" height="14" rx="3" fill="#16a34a"/>
  <text x="1034" y="143" text-anchor="middle" fill="white" font-size="8" font-weight="600">6</text>

  <!-- Persist arrow -->
  <line x1="610" y1="210" x2="610" y2="261" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>
  <text x="640" y="240" fill="#7c3aed" font-size="9">Persist</text>

  <!-- Legend -->
  <rect x="30" y="355" width="1140" height="65" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="55" y="377" fill="#1e293b" font-size="11" font-weight="700">Flow Steps:</text>
  <rect x="55" y="387" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="70" y="396" fill="#475569" font-size="9">1 User types character, INSERT operation created with position + baseRevision</text>
  <rect x="55" y="401" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="70" y="410" fill="#475569" font-size="9">2 Apply optimistically to local document (no server wait)</text>
  <rect x="500" y="387" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="515" y="396" fill="#475569" font-size="9">3-4 Server transforms op, assigns revision, broadcasts to all other clients</text>
  <text x="515" y="410" fill="#475569" font-size="9">5-6 Remote clients transform pending ops, apply, converge to identical state</text>
</svg>
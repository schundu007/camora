<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="system-ui, -apple-system, sans-serif">
  <rect width="600" height="350" fill="#f7f8f9" rx="12"/>

  <!-- Title -->
  <text x="300" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Heartbeat Mechanism</text>

  <!-- Node A -->
  <rect x="40" y="70" width="140" height="60" rx="8" fill="white" stroke="#10b981" stroke-width="2.5"/>
  <circle cx="65" cy="100" r="10" fill="#10b981"/>
  <text x="80" y="96" font-size="13" font-weight="700" fill="#10b981">Node A</text>
  <text x="80" y="112" font-size="10" fill="#64748b">Healthy</text>

  <!-- Node B -->
  <rect x="420" y="70" width="140" height="60" rx="8" fill="white" stroke="#10b981" stroke-width="2.5"/>
  <circle cx="445" cy="100" r="10" fill="#10b981"/>
  <text x="460" y="96" font-size="13" font-weight="700" fill="#10b981">Node B</text>
  <text x="460" y="112" font-size="10" fill="#64748b">Healthy</text>

  <!-- Heartbeat pulses A -> B -->
  <line x1="180" y1="85" x2="420" y2="85" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="300" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#10b981">Heartbeat (every 2s)</text>

  <!-- Pulse visualization -->
  <circle cx="230" cy="85" r="4" fill="#10b981" opacity="0.3"/>
  <circle cx="270" cy="85" r="4" fill="#10b981" opacity="0.5"/>
  <circle cx="310" cy="85" r="4" fill="#10b981" opacity="0.7"/>
  <circle cx="350" cy="85" r="4" fill="#10b981" opacity="0.9"/>
  <circle cx="390" cy="85" r="4" fill="#10b981"/>

  <!-- ACK B -> A -->
  <line x1="420" y1="115" x2="180" y2="115" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrowBlue)"/>
  <text x="300" y="130" text-anchor="middle" font-size="10" fill="#3b82f6">ACK</text>

  <!-- Divider -->
  <line x1="30" y1="160" x2="570" y2="160" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="300" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#64748b">Failure Detection</text>

  <!-- Node A (monitor) -->
  <rect x="40" y="200" width="140" height="60" rx="8" fill="white" stroke="#10b981" stroke-width="2.5"/>
  <circle cx="65" cy="230" r="10" fill="#10b981"/>
  <text x="80" y="226" font-size="13" font-weight="700" fill="#10b981">Node A</text>
  <text x="80" y="242" font-size="10" fill="#64748b">Monitoring</text>

  <!-- Node C (dead) -->
  <rect x="420" y="200" width="140" height="60" rx="8" fill="white" stroke="#ef4444" stroke-width="2.5"/>
  <text x="445" y="222" font-size="18" fill="#ef4444">&#215;</text>
  <text x="462" y="226" font-size="13" font-weight="700" fill="#ef4444">Node C</text>
  <text x="462" y="242" font-size="10" fill="#64748b">No response</text>

  <!-- Failed heartbeats -->
  <line x1="180" y1="215" x2="380" y2="215" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="300" y="208" text-anchor="middle" font-size="10" fill="#ef4444">Heartbeat &#8594; No ACK</text>

  <line x1="180" y1="235" x2="380" y2="235" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="300" y="252" text-anchor="middle" font-size="10" fill="#ef4444">Retry &#8594; No ACK</text>

  <!-- Timeout box -->
  <rect x="155" y="280" width="290" height="50" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="170" y="300" font-size="11" fill="#f59e0b" font-weight="700">&#9888; Timeout exceeded (3 missed beats)</text>
  <text x="170" y="318" font-size="11" fill="#ef4444" font-weight="600">Node C marked DEAD &#8594; trigger failover</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#10b981"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#3b82f6"/>
    </marker>
  </defs>
</svg>
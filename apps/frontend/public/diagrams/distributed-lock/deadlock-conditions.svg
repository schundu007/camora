<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ef4444" />
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#a855f7" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" rx="12" />

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700">Deadlock Conditions &amp; Prevention</text>

  <!-- ===== 1. Mutual Exclusion (top-left) ===== -->
  <g transform="translate(15, 50)">
    <rect width="185" height="155" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="1.5" opacity="0.9" />
    <text x="92" y="22" text-anchor="middle" fill="#ef4444" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">1. Mutual Exclusion</text>

    <!-- Lock icon -->
    <rect x="72" y="38" width="40" height="30" rx="4" fill="none" stroke="#f87171" stroke-width="2" />
    <path d="M82,38 L82,30 Q82,22 92,22 Q102,22 102,30 L102,38" fill="none" stroke="#f87171" stroke-width="2" />

    <!-- One process allowed -->
    <circle cx="60" cy="90" r="10" fill="#a855f7" opacity="0.8" />
    <text x="60" y="94" text-anchor="middle" fill="white" font-size="8" font-weight="700" font-family="Inter, sans-serif">P1</text>
    <line x1="70" y1="90" x2="82" y2="60" stroke="#10b981" stroke-width="1.5" />
    <text x="85" y="88" fill="#10b981" font-size="7" font-family="Inter, sans-serif">holds</text>

    <!-- Blocked process -->
    <circle cx="125" cy="90" r="10" fill="#64748b" opacity="0.6" />
    <text x="125" y="94" text-anchor="middle" fill="white" font-size="8" font-weight="700" font-family="Inter, sans-serif">P2</text>
    <line x1="115" y1="90" x2="103" y2="60" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2" />
    <text x="120" y="110" fill="#ef4444" font-size="7" font-family="Inter, sans-serif">blocked</text>

    <!-- Prevention -->
    <rect x="10" y="118" width="165" height="28" rx="4" fill="#10b981" opacity="0.1" />
    <text x="92" y="130" text-anchor="middle" fill="#10b981" font-size="8" font-family="Inter, system-ui, sans-serif">Fix: Read/write locks</text>
    <text x="92" y="141" text-anchor="middle" fill="#10b981" font-size="7" font-family="Inter, system-ui, sans-serif">(share when possible)</text>
  </g>

  <!-- ===== 2. Hold and Wait (top-right) ===== -->
  <g transform="translate(210, 50)">
    <rect width="185" height="155" rx="10" fill="#1e293b" stroke="#c084fc" stroke-width="1.5" opacity="0.9" />
    <text x="92" y="22" text-anchor="middle" fill="#c084fc" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">2. Hold and Wait</text>

    <!-- Process holding R1, waiting for R2 -->
    <circle cx="50" cy="70" r="12" fill="#a855f7" opacity="0.8" />
    <text x="50" y="74" text-anchor="middle" fill="white" font-size="8" font-weight="700" font-family="Inter, sans-serif">P1</text>

    <rect x="90" y="45" width="30" height="18" rx="3" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="1" />
    <text x="105" y="57" text-anchor="middle" fill="#f87171" font-size="7" font-weight="600" font-family="Inter, sans-serif">R1</text>

    <rect x="90" y="80" width="30" height="18" rx="3" fill="#fbbf24" opacity="0.3" stroke="#fbbf24" stroke-width="1" />
    <text x="105" y="92" text-anchor="middle" fill="#fbbf24" font-size="7" font-weight="600" font-family="Inter, sans-serif">R2</text>

    <!-- Holding arrow -->
    <line x1="62" y1="65" x2="88" y2="55" stroke="#10b981" stroke-width="1.5" />
    <text x="72" y="55" fill="#10b981" font-size="7" font-family="Inter, sans-serif">holds</text>

    <!-- Waiting arrow -->
    <line x1="62" y1="75" x2="88" y2="85" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2" />
    <text x="72" y="90" fill="#ef4444" font-size="7" font-family="Inter, sans-serif">waits</text>

    <!-- Prevention -->
    <rect x="10" y="118" width="165" height="28" rx="4" fill="#10b981" opacity="0.1" />
    <text x="92" y="130" text-anchor="middle" fill="#10b981" font-size="8" font-family="Inter, system-ui, sans-serif">Fix: Atomic acquisition</text>
    <text x="92" y="141" text-anchor="middle" fill="#10b981" font-size="7" font-family="Inter, system-ui, sans-serif">(request all at once)</text>
  </g>

  <!-- ===== 3. No Preemption (bottom-left) ===== -->
  <g transform="translate(405, 50)">
    <rect width="185" height="155" rx="10" fill="#1e293b" stroke="#f87171" stroke-width="1.5" opacity="0.9" />
    <text x="92" y="22" text-anchor="middle" fill="#f87171" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">3. No Preemption</text>

    <!-- Process gripping resource -->
    <circle cx="55" cy="70" r="12" fill="#a855f7" opacity="0.8" />
    <text x="55" y="74" text-anchor="middle" fill="white" font-size="8" font-weight="700" font-family="Inter, sans-serif">P1</text>

    <rect x="90" y="60" width="35" height="20" rx="3" fill="#ef4444" opacity="0.3" stroke="#ef4444" stroke-width="1" />
    <text x="107" y="74" text-anchor="middle" fill="#f87171" font-size="7" font-weight="600" font-family="Inter, sans-serif">R1</text>

    <!-- Grip lines -->
    <line x1="67" y1="68" x2="88" y2="68" stroke="#f87171" stroke-width="2" />
    <line x1="67" y1="72" x2="88" y2="72" stroke="#f87171" stroke-width="2" />

    <!-- Can't take away (X mark) -->
    <text x="145" y="55" fill="#ef4444" font-size="9" font-family="Inter, sans-serif">cannot</text>
    <text x="145" y="66" fill="#ef4444" font-size="9" font-family="Inter, sans-serif">force</text>
    <text x="145" y="77" fill="#ef4444" font-size="9" font-family="Inter, sans-serif">release</text>
    <line x1="135" y1="82" x2="165" y2="82" stroke="#ef4444" stroke-width="1.5" />

    <!-- Prevention -->
    <rect x="10" y="118" width="165" height="28" rx="4" fill="#10b981" opacity="0.1" />
    <text x="92" y="130" text-anchor="middle" fill="#10b981" font-size="8" font-family="Inter, system-ui, sans-serif">Fix: Allow preemption</text>
    <text x="92" y="141" text-anchor="middle" fill="#10b981" font-size="7" font-family="Inter, system-ui, sans-serif">(release if can't get all)</text>
  </g>

  <!-- ===== 4. Circular Wait (bottom-right) ===== -->
  <g transform="translate(600, 50)">
    <rect width="185" height="155" rx="10" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" opacity="0.9" />
    <text x="92" y="22" text-anchor="middle" fill="#a855f7" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">4. Circular Wait</text>

    <!-- Circular dependency -->
    <circle cx="60" cy="55" r="10" fill="#ef4444" opacity="0.8" />
    <text x="60" y="59" text-anchor="middle" fill="white" font-size="7" font-weight="700" font-family="Inter, sans-serif">P1</text>

    <circle cx="130" cy="55" r="10" fill="#a855f7" opacity="0.8" />
    <text x="130" y="59" text-anchor="middle" fill="white" font-size="7" font-weight="700" font-family="Inter, sans-serif">P2</text>

    <circle cx="130" cy="105" r="10" fill="#3b82f6" opacity="0.8" />
    <text x="130" y="109" text-anchor="middle" fill="white" font-size="7" font-weight="700" font-family="Inter, sans-serif">P3</text>

    <circle cx="60" cy="105" r="10" fill="#f59e0b" opacity="0.8" />
    <text x="60" y="109" text-anchor="middle" fill="white" font-size="7" font-weight="700" font-family="Inter, sans-serif">P4</text>

    <!-- Circular arrows -->
    <line x1="72" y1="52" x2="118" y2="52" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)" />
    <line x1="133" y1="67" x2="133" y2="93" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)" />
    <line x1="118" y1="108" x2="72" y2="108" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)" />
    <line x1="57" y1="93" x2="57" y2="67" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)" />

    <text x="95" y="84" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="600" font-family="Inter, sans-serif">waits</text>

    <!-- Prevention -->
    <rect x="10" y="118" width="165" height="28" rx="4" fill="#10b981" opacity="0.1" />
    <text x="92" y="130" text-anchor="middle" fill="#10b981" font-size="8" font-family="Inter, system-ui, sans-serif">Fix: Total ordering</text>
    <text x="92" y="141" text-anchor="middle" fill="#10b981" font-size="7" font-family="Inter, system-ui, sans-serif">(always lock R1 before R2)</text>
  </g>

  <!-- ===== Center: Circular Wait Diagram ===== -->
  <g transform="translate(200, 220)">
    <rect width="400" height="170" rx="10" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5" opacity="0.95" />
    <text x="200" y="22" text-anchor="middle" fill="#c084fc" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700">Circular Wait Deadlock Example</text>

    <!-- Process A -->
    <circle cx="80" cy="80" r="22" fill="#a855f7" opacity="0.8" />
    <text x="80" y="76" text-anchor="middle" fill="white" font-size="10" font-weight="700" font-family="Inter, sans-serif">Process</text>
    <text x="80" y="88" text-anchor="middle" fill="white" font-size="10" font-weight="700" font-family="Inter, sans-serif">A</text>

    <!-- Resource 1 -->
    <rect x="160" y="40" width="80" height="30" rx="6" fill="#ef4444" opacity="0.25" stroke="#ef4444" stroke-width="1.5" />
    <text x="200" y="60" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600" font-family="Inter, sans-serif">Resource 1</text>

    <!-- Process B -->
    <circle cx="320" cy="80" r="22" fill="#7c3aed" opacity="0.8" />
    <text x="320" y="76" text-anchor="middle" fill="white" font-size="10" font-weight="700" font-family="Inter, sans-serif">Process</text>
    <text x="320" y="88" text-anchor="middle" fill="white" font-size="10" font-weight="700" font-family="Inter, sans-serif">B</text>

    <!-- Resource 2 -->
    <rect x="160" y="110" width="80" height="30" rx="6" fill="#fbbf24" opacity="0.25" stroke="#fbbf24" stroke-width="1.5" />
    <text x="200" y="130" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600" font-family="Inter, sans-serif">Resource 2</text>

    <!-- A holds R1 -->
    <line x1="102" y1="72" x2="158" y2="58" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)" />
    <text x="125" y="58" fill="#10b981" font-size="8" font-weight="600" font-family="Inter, sans-serif">holds</text>

    <!-- A waits R2 -->
    <line x1="95" y1="95" x2="158" y2="120" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowRed)" />
    <text x="115" y="118" fill="#ef4444" font-size="8" font-weight="600" font-family="Inter, sans-serif">waits</text>

    <!-- B holds R2 -->
    <line x1="298" y1="92" x2="242" y2="118" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)" />
    <text x="278" y="118" fill="#10b981" font-size="8" font-weight="600" font-family="Inter, sans-serif">holds</text>

    <!-- B waits R1 -->
    <line x1="305" y1="62" x2="242" y2="52" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowRed)" />
    <text x="280" y="50" fill="#ef4444" font-size="8" font-weight="600" font-family="Inter, sans-serif">waits</text>

    <!-- DEADLOCK label -->
    <text x="200" y="95" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="700" font-family="Inter, system-ui, sans-serif" opacity="0.9">DEADLOCK</text>

    <!-- Bottom note -->
    <text x="200" y="160" text-anchor="middle" fill="#64748b" font-size="8" font-family="Inter, system-ui, sans-serif">All 4 conditions must hold simultaneously for deadlock to occur</text>
  </g>

  <!-- Green arrow marker -->
  <defs>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#10b981" />
    </marker>
  </defs>
</svg>
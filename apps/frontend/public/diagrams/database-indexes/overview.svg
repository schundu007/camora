<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
  <rect width="500" height="300" fill="#f7f8f9" rx="4"/>
  <text x="250" y="28" font-family="system-ui" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">B-Tree Index Structure</text>

  <!-- Root Node -->
  <rect x="185" y="42" width="130" height="32" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2"/>
  <text x="250" y="62" font-family="system-ui" font-size="11" font-weight="bold" fill="#8b5cf6" text-anchor="middle">Root [30 | 60]</text>

  <!-- Internal Nodes -->
  <rect x="40" y="110" width="120" height="30" rx="8" fill="white" stroke="#6366f1" stroke-width="2"/>
  <text x="100" y="129" font-family="system-ui" font-size="10" font-weight="bold" fill="#6366f1" text-anchor="middle">Internal [10 | 20]</text>

  <rect x="190" y="110" width="120" height="30" rx="8" fill="white" stroke="#6366f1" stroke-width="2"/>
  <text x="250" y="129" font-family="system-ui" font-size="10" font-weight="bold" fill="#6366f1" text-anchor="middle">Internal [40 | 50]</text>

  <rect x="340" y="110" width="120" height="30" rx="8" fill="white" stroke="#6366f1" stroke-width="2"/>
  <text x="400" y="129" font-family="system-ui" font-size="10" font-weight="bold" fill="#6366f1" text-anchor="middle">Internal [70 | 80]</text>

  <!-- Lines: Root to Internal -->
  <line x1="215" y1="74" x2="100" y2="110" stroke="#a5b4fc" stroke-width="1.5"/>
  <line x1="250" y1="74" x2="250" y2="110" stroke="#a5b4fc" stroke-width="1.5"/>
  <line x1="285" y1="74" x2="400" y2="110" stroke="#a5b4fc" stroke-width="1.5"/>

  <!-- Leaf Nodes -->
  <rect x="10" y="175" width="55" height="26" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="37" y="192" font-family="system-ui" font-size="9" fill="#10b981" text-anchor="middle">5, 8</text>

  <rect x="72" y="175" width="55" height="26" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="99" y="192" font-family="system-ui" font-size="9" fill="#10b981" text-anchor="middle">12, 18</text>

  <rect x="134" y="175" width="55" height="26" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="161" y="192" font-family="system-ui" font-size="9" fill="#10b981" text-anchor="middle">22, 28</text>

  <rect x="196" y="175" width="55" height="26" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="223" y="192" font-family="system-ui" font-size="9" fill="#10b981" text-anchor="middle">35, 42</text>

  <rect x="258" y="175" width="55" height="26" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="285" y="192" font-family="system-ui" font-size="9" fill="#10b981" text-anchor="middle">48, 55</text>

  <rect x="320" y="175" width="55" height="26" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="347" y="192" font-family="system-ui" font-size="9" fill="#10b981" text-anchor="middle">65, 72</text>

  <rect x="382" y="175" width="55" height="26" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="409" y="192" font-family="system-ui" font-size="9" fill="#10b981" text-anchor="middle">75, 78</text>

  <rect x="444" y="175" width="46" height="26" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="467" y="192" font-family="system-ui" font-size="9" fill="#10b981" text-anchor="middle">85, 90</text>

  <!-- Lines: Internal to Leaf -->
  <line x1="70" y1="140" x2="37" y2="175" stroke="#a7f3d0" stroke-width="1"/>
  <line x1="100" y1="140" x2="99" y2="175" stroke="#a7f3d0" stroke-width="1"/>
  <line x1="130" y1="140" x2="161" y2="175" stroke="#a7f3d0" stroke-width="1"/>

  <line x1="220" y1="140" x2="223" y2="175" stroke="#a7f3d0" stroke-width="1"/>
  <line x1="250" y1="140" x2="285" y2="175" stroke="#a7f3d0" stroke-width="1"/>

  <line x1="370" y1="140" x2="347" y2="175" stroke="#a7f3d0" stroke-width="1"/>
  <line x1="400" y1="140" x2="409" y2="175" stroke="#a7f3d0" stroke-width="1"/>
  <line x1="430" y1="140" x2="467" y2="175" stroke="#a7f3d0" stroke-width="1"/>

  <!-- Leaf linked list arrows -->
  <line x1="65" y1="188" x2="72" y2="188" stroke="#10b981" stroke-width="1" marker-end="url(#arrowG)"/>
  <line x1="127" y1="188" x2="134" y2="188" stroke="#10b981" stroke-width="1" marker-end="url(#arrowG)"/>
  <line x1="189" y1="188" x2="196" y2="188" stroke="#10b981" stroke-width="1" marker-end="url(#arrowG)"/>
  <line x1="251" y1="188" x2="258" y2="188" stroke="#10b981" stroke-width="1" marker-end="url(#arrowG)"/>
  <line x1="313" y1="188" x2="320" y2="188" stroke="#10b981" stroke-width="1" marker-end="url(#arrowG)"/>
  <line x1="375" y1="188" x2="382" y2="188" stroke="#10b981" stroke-width="1" marker-end="url(#arrowG)"/>
  <line x1="437" y1="188" x2="444" y2="188" stroke="#10b981" stroke-width="1" marker-end="url(#arrowG)"/>

  <!-- Data pointers -->
  <rect x="50" y="220" width="400" height="24" rx="6" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="250" y="236" font-family="system-ui" font-size="10" font-weight="bold" fill="#f59e0b" text-anchor="middle">Data Records (Disk Pages)</text>
  <line x1="100" y1="201" x2="100" y2="220" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="250" y1="201" x2="250" y2="220" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="400" y1="201" x2="400" y2="220" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Legend -->
  <rect x="20" y="256" width="460" height="34" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="55" cy="273" r="5" fill="#8b5cf6"/>
  <text x="66" y="277" font-family="system-ui" font-size="9" fill="#64748b">Root</text>
  <circle cx="115" cy="273" r="5" fill="#6366f1"/>
  <text x="126" y="277" font-family="system-ui" font-size="9" fill="#64748b">Internal</text>
  <circle cx="195" cy="273" r="5" fill="#10b981"/>
  <text x="206" y="277" font-family="system-ui" font-size="9" fill="#64748b">Leaf (linked)</text>
  <circle cx="290" cy="273" r="5" fill="#f59e0b"/>
  <text x="301" y="277" font-family="system-ui" font-size="9" fill="#64748b">Data</text>
  <text x="370" y="277" font-family="system-ui" font-size="9" fill="#64748b">O(log n) lookup</text>

  <defs>
    <marker id="arrowG" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#10b981"/>
    </marker>
  </defs>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      text { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }
    </style>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a78bfa"/>
    </marker>
    <marker id="arrowViolet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="#111827"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#f9fafb" font-size="18" font-weight="700">Replication Patterns</text>

  <!-- ===== Column 1: Single-Leader ===== -->
  <rect x="16" y="52" width="248" height="338" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="140" y="76" text-anchor="middle" fill="#60a5fa" font-size="14" font-weight="700">Single-Leader</text>
  <text x="140" y="92" text-anchor="middle" fill="#9ca3af" font-size="10">(Master-Slave)</text>

  <!-- Client -->
  <rect x="100" y="104" width="80" height="24" rx="5" fill="#1e293b" stroke="#6b7280" stroke-width="1"/>
  <text x="140" y="120" text-anchor="middle" fill="#d1d5db" font-size="10">Client</text>

  <!-- Write arrow to Leader -->
  <line x1="140" y1="128" x2="140" y2="148" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="156" y="142" fill="#60a5fa" font-size="8">writes</text>

  <!-- Leader node -->
  <rect x="90" y="152" width="100" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="172" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">LEADER</text>
  <text x="140" y="182" text-anchor="middle" fill="#60a5fa" font-size="8">R/W</text>

  <!-- Replication arrows to followers -->
  <line x1="110" y1="184" x2="68" y2="214" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#arrowPurple)"/>
  <line x1="140" y1="184" x2="140" y2="214" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#arrowPurple)"/>
  <line x1="170" y1="184" x2="212" y2="214" stroke="#a78bfa" stroke-width="1.2" marker-end="url(#arrowPurple)"/>
  <text x="82" y="200" fill="#a78bfa" font-size="7">replicate</text>

  <!-- Follower 1 -->
  <rect x="30" y="218" width="76" height="28" rx="6" fill="#2e1065" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="68" y="236" text-anchor="middle" fill="#c4b5fd" font-size="10">Follower 1</text>

  <!-- Follower 2 -->
  <rect x="112" y="218" width="56" height="28" rx="6" fill="#2e1065" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="140" y="236" text-anchor="middle" fill="#c4b5fd" font-size="10">F2</text>

  <!-- Follower 3 -->
  <rect x="174" y="218" width="76" height="28" rx="6" fill="#2e1065" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="212" y="236" text-anchor="middle" fill="#c4b5fd" font-size="10">Follower 3</text>

  <!-- Read arrows from client to followers -->
  <rect x="100" y="260" width="80" height="22" rx="5" fill="#1e293b" stroke="#6b7280" stroke-width="1"/>
  <text x="140" y="275" text-anchor="middle" fill="#d1d5db" font-size="9">Read Clients</text>
  <line x1="110" y1="260" x2="78" y2="250" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowGray)"/>
  <line x1="140" y1="260" x2="140" y2="250" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowGray)"/>
  <line x1="170" y1="260" x2="202" y2="250" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowGray)"/>
  <text x="190" y="262" fill="#9ca3af" font-size="7">reads</text>

  <!-- Pros/Cons -->
  <rect x="36" y="292" width="208" height="88" rx="6" fill="#0f172a" stroke="#374151" stroke-width="1"/>
  <text x="140" y="308" text-anchor="middle" fill="#10b981" font-size="9">+ Simple, no conflicts</text>
  <text x="140" y="322" text-anchor="middle" fill="#10b981" font-size="9">+ Strong consistency from leader</text>
  <text x="140" y="340" text-anchor="middle" fill="#ef4444" font-size="9">- Leader is SPOF</text>
  <text x="140" y="354" text-anchor="middle" fill="#ef4444" font-size="9">- Write bottleneck</text>
  <text x="140" y="372" text-anchor="middle" fill="#9ca3af" font-size="8">MySQL, PostgreSQL, MongoDB</text>

  <!-- ===== Column 2: Multi-Leader ===== -->
  <rect x="276" y="52" width="248" height="338" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="400" y="76" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="700">Multi-Leader</text>
  <text x="400" y="92" text-anchor="middle" fill="#9ca3af" font-size="10">(Master-Master)</text>

  <!-- Client 1 -->
  <rect x="300" y="104" width="66" height="22" rx="5" fill="#1e293b" stroke="#6b7280" stroke-width="1"/>
  <text x="333" y="119" text-anchor="middle" fill="#d1d5db" font-size="9">Client 1</text>
  <line x1="333" y1="126" x2="333" y2="148" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <text x="342" y="140" fill="#60a5fa" font-size="7">write</text>

  <!-- Client 2 -->
  <rect x="434" y="104" width="66" height="22" rx="5" fill="#1e293b" stroke="#6b7280" stroke-width="1"/>
  <text x="467" y="119" text-anchor="middle" fill="#d1d5db" font-size="9">Client 2</text>
  <line x1="467" y1="126" x2="467" y2="148" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <text x="476" y="140" fill="#60a5fa" font-size="7">write</text>

  <!-- Leader A (DC1) -->
  <rect x="296" y="152" width="82" height="38" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="337" y="170" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">Leader A</text>
  <text x="337" y="184" text-anchor="middle" fill="#60a5fa" font-size="8">DC 1 (R/W)</text>

  <!-- Leader B (DC2) -->
  <rect x="422" y="152" width="82" height="38" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="463" y="170" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">Leader B</text>
  <text x="463" y="184" text-anchor="middle" fill="#60a5fa" font-size="8">DC 2 (R/W)</text>

  <!-- Sync arrows between leaders (bidirectional) -->
  <line x1="378" y1="165" x2="422" y2="165" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <line x1="422" y1="175" x2="378" y2="175" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <text x="400" y="158" text-anchor="middle" fill="#c4b5fd" font-size="7">sync</text>

  <!-- Followers under each leader -->
  <rect x="296" y="204" width="82" height="24" rx="5" fill="#2e1065" stroke="#8b5cf6" stroke-width="1"/>
  <text x="337" y="220" text-anchor="middle" fill="#c4b5fd" font-size="9">Follower A1</text>
  <line x1="337" y1="190" x2="337" y2="204" stroke="#a78bfa" stroke-width="1" marker-end="url(#arrowPurple)"/>

  <rect x="422" y="204" width="82" height="24" rx="5" fill="#2e1065" stroke="#8b5cf6" stroke-width="1"/>
  <text x="463" y="220" text-anchor="middle" fill="#c4b5fd" font-size="9">Follower B1</text>
  <line x1="463" y1="190" x2="463" y2="204" stroke="#a78bfa" stroke-width="1" marker-end="url(#arrowPurple)"/>

  <!-- Conflict resolution box -->
  <rect x="310" y="242" width="180" height="42" rx="6" fill="#451a03" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="400" y="258" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">Conflict Resolution Required</text>
  <text x="400" y="274" text-anchor="middle" fill="#fde68a" font-size="8">LWW / Merge / CRDTs</text>

  <!-- Pros/Cons -->
  <rect x="296" y="296" width="208" height="84" rx="6" fill="#0f172a" stroke="#374151" stroke-width="1"/>
  <text x="400" y="312" text-anchor="middle" fill="#10b981" font-size="9">+ Low latency (local DC writes)</text>
  <text x="400" y="326" text-anchor="middle" fill="#10b981" font-size="9">+ High write availability</text>
  <text x="400" y="344" text-anchor="middle" fill="#ef4444" font-size="9">- Write conflicts inevitable</text>
  <text x="400" y="358" text-anchor="middle" fill="#ef4444" font-size="9">- Complex conflict resolution</text>
  <text x="400" y="372" text-anchor="middle" fill="#9ca3af" font-size="8">CouchDB, cross-DC replication</text>

  <!-- ===== Column 3: Leaderless ===== -->
  <rect x="536" y="52" width="248" height="338" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="660" y="76" text-anchor="middle" fill="#818cf8" font-size="14" font-weight="700">Leaderless</text>
  <text x="660" y="92" text-anchor="middle" fill="#9ca3af" font-size="10">(Quorum-Based)</text>

  <!-- Client writing to multiple nodes -->
  <rect x="620" y="104" width="80" height="22" rx="5" fill="#1e293b" stroke="#6b7280" stroke-width="1"/>
  <text x="660" y="119" text-anchor="middle" fill="#d1d5db" font-size="9">Client</text>

  <!-- Write arrows fanning out -->
  <line x1="636" y1="126" x2="594" y2="152" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <line x1="660" y1="126" x2="660" y2="152" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <line x1="684" y1="126" x2="726" y2="152" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrowBlue)"/>
  <text x="610" y="142" fill="#60a5fa" font-size="7">write</text>
  <text x="710" y="142" fill="#60a5fa" font-size="7">write</text>

  <!-- Three equal nodes -->
  <circle cx="586" cy="172" r="20" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
  <text x="586" y="176" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="600">N1</text>

  <circle cx="660" cy="172" r="20" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
  <text x="660" y="176" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="600">N2</text>

  <circle cx="734" cy="172" r="20" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
  <text x="734" y="176" text-anchor="middle" fill="#c7d2fe" font-size="11" font-weight="600">N3</text>

  <!-- ACK arrows back -->
  <line x1="592" y1="155" x2="638" y2="130" stroke="#10b981" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="660" y1="155" x2="660" y2="130" stroke="#10b981" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="728" y1="155" x2="682" y2="130" stroke="#10b981" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="660" y="148" text-anchor="middle" fill="#10b981" font-size="7">ACK</text>

  <!-- Equal signs / arrows between nodes showing peer status -->
  <line x1="606" y1="172" x2="640" y2="172" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="680" y1="172" x2="714" y2="172" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Quorum box -->
  <rect x="576" y="204" width="168" height="48" rx="6" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="660" y="222" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="700">Quorum: W + R &gt; N</text>
  <text x="660" y="238" text-anchor="middle" fill="#c7d2fe" font-size="9">W=2, R=2, N=3</text>
  <text x="660" y="248" text-anchor="middle" fill="#818cf8" font-size="8">Guarantees overlap</text>

  <!-- Read repair hint -->
  <rect x="576" y="262" width="168" height="24" rx="5" fill="#1e293b" stroke="#374151" stroke-width="1"/>
  <text x="660" y="278" text-anchor="middle" fill="#fbbf24" font-size="9">Read Repair + Anti-Entropy</text>

  <!-- Pros/Cons -->
  <rect x="556" y="296" width="208" height="84" rx="6" fill="#0f172a" stroke="#374151" stroke-width="1"/>
  <text x="660" y="312" text-anchor="middle" fill="#10b981" font-size="9">+ No SPOF, any node serves</text>
  <text x="660" y="326" text-anchor="middle" fill="#10b981" font-size="9">+ High availability + partition tolerance</text>
  <text x="660" y="344" text-anchor="middle" fill="#ef4444" font-size="9">- Eventual consistency</text>
  <text x="660" y="358" text-anchor="middle" fill="#ef4444" font-size="9">- Read repair overhead</text>
  <text x="660" y="372" text-anchor="middle" fill="#9ca3af" font-size="8">Cassandra, DynamoDB, Riak</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #1e293b; }
      .label { font-size: 12px; font-weight: 600; fill: #fff; }
      .box-label { font-size: 11px; font-weight: 600; fill: #1e293b; }
      .desc { font-size: 10px; fill: #64748b; }
      .feat { font-size: 10px; fill: #1e293b; }
    </style>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f8f9"/>
      <stop offset="100%" stop-color="#eef0f2"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="599" height="399" rx="12" fill="none" stroke="#e2e8f0"/>

  <text x="300" y="36" text-anchor="middle" class="title">REST vs GraphQL vs gRPC</text>

  <!-- REST -->
  <g transform="translate(105, 85)">
    <rect x="-75" y="-25" width="150" height="50" rx="12" fill="url(#blue)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label">REST</text>
  </g>
  <g transform="translate(105, 135)">
    <rect x="-80" y="-10" width="160" height="175" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
    <rect x="-80" y="-10" width="160" height="4" rx="2" fill="#3b82f6"/>
    <text x="0" y="14" text-anchor="middle" class="feat">JSON over HTTP/1.1</text>
    <text x="0" y="34" text-anchor="middle" class="feat">Resource-oriented URLs</text>
    <text x="0" y="54" text-anchor="middle" class="feat">GET/POST/PUT/DELETE</text>
    <text x="0" y="74" text-anchor="middle" class="feat">Cacheable (HTTP cache)</text>
    <text x="0" y="94" text-anchor="middle" class="feat">Widely adopted</text>
    <text x="0" y="114" text-anchor="middle" class="feat">Over/under-fetching</text>
    <text x="0" y="144" text-anchor="middle" class="box-label" fill="#3b82f6">Public APIs</text>
    <text x="0" y="160" text-anchor="middle" class="desc">Stripe, GitHub, Twilio</text>
  </g>

  <!-- GraphQL -->
  <g transform="translate(300, 85)">
    <rect x="-75" y="-25" width="150" height="50" rx="12" fill="url(#pink)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label">GraphQL</text>
  </g>
  <g transform="translate(300, 135)">
    <rect x="-80" y="-10" width="160" height="175" rx="8" fill="#fff" stroke="#ec4899" stroke-width="1" filter="url(#shadow)"/>
    <rect x="-80" y="-10" width="160" height="4" rx="2" fill="#ec4899"/>
    <text x="0" y="14" text-anchor="middle" class="feat">JSON over HTTP POST</text>
    <text x="0" y="34" text-anchor="middle" class="feat">Single endpoint</text>
    <text x="0" y="54" text-anchor="middle" class="feat">Client specifies fields</text>
    <text x="0" y="74" text-anchor="middle" class="feat">No over/under-fetching</text>
    <text x="0" y="94" text-anchor="middle" class="feat">Strong type system</text>
    <text x="0" y="114" text-anchor="middle" class="feat">Complex caching</text>
    <text x="0" y="144" text-anchor="middle" class="box-label" fill="#ec4899">Flexible Clients</text>
    <text x="0" y="160" text-anchor="middle" class="desc">GitHub v4, Shopify</text>
  </g>

  <!-- gRPC -->
  <g transform="translate(495, 85)">
    <rect x="-75" y="-25" width="150" height="50" rx="12" fill="url(#green)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label">gRPC</text>
  </g>
  <g transform="translate(495, 135)">
    <rect x="-80" y="-10" width="160" height="175" rx="8" fill="#fff" stroke="#10b981" stroke-width="1" filter="url(#shadow)"/>
    <rect x="-80" y="-10" width="160" height="4" rx="2" fill="#10b981"/>
    <text x="0" y="14" text-anchor="middle" class="feat">Protobuf over HTTP/2</text>
    <text x="0" y="34" text-anchor="middle" class="feat">Service definitions</text>
    <text x="0" y="54" text-anchor="middle" class="feat">Bi-directional streaming</text>
    <text x="0" y="74" text-anchor="middle" class="feat">10x faster than REST</text>
    <text x="0" y="94" text-anchor="middle" class="feat">Strict contracts (.proto)</text>
    <text x="0" y="114" text-anchor="middle" class="feat">Not browser-friendly</text>
    <text x="0" y="144" text-anchor="middle" class="box-label" fill="#10b981">Microservices</text>
    <text x="0" y="160" text-anchor="middle" class="desc">Google Cloud, Netflix</text>
  </g>

  <!-- Bottom recommendation -->
  <g transform="translate(300, 370)">
    <rect x="-270" y="-22" width="540" height="44" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="0.5"/>
    <text x="0" y="-4" text-anchor="middle" class="box-label" fill="#065f46">Pick based on use case: REST for simplicity, GraphQL for flexibility, gRPC for speed</text>
    <text x="0" y="14" text-anchor="middle" class="desc" fill="#065f46">Many systems use REST externally + gRPC internally between microservices</text>
  </g>
</svg>
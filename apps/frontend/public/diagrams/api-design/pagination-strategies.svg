<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #1e293b; }
      .label { font-size: 12px; font-weight: 600; fill: #fff; }
      .box-label { font-size: 11px; font-weight: 600; fill: #1e293b; }
      .desc { font-size: 10px; fill: #64748b; }
      .code { font-size: 10px; font-family: 'JetBrains Mono', monospace; fill: #1e293b; }
    </style>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f8f9"/>
      <stop offset="100%" stop-color="#eef0f2"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <rect width="600" height="380" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="599" height="379" rx="12" fill="none" stroke="#e2e8f0"/>

  <text x="300" y="36" text-anchor="middle" class="title">Pagination Strategies</text>

  <!-- Offset-based -->
  <g transform="translate(170, 80)">
    <rect x="-130" y="-22" width="260" height="44" rx="10" fill="url(#blue)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label">Offset-Based Pagination</text>
  </g>
  <g transform="translate(170, 145)">
    <rect x="-130" y="-20" width="260" height="110" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
    <text x="0" y="0" text-anchor="middle" class="code">GET /api/users?page=2&amp;size=20</text>
    <text x="0" y="24" text-anchor="middle" class="desc">SQL: OFFSET 20 LIMIT 20</text>
    <text x="-110" y="50" text-anchor="start" class="desc">+ Simple to implement</text>
    <text x="-110" y="66" text-anchor="start" class="desc">+ Random page access</text>
    <text x="-110" y="82" text-anchor="start" class="desc" fill="#ef4444">- Slow on large offsets</text>
  </g>

  <!-- Cursor-based -->
  <g transform="translate(430, 80)">
    <rect x="-130" y="-22" width="260" height="44" rx="10" fill="url(#violet)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" class="label">Cursor-Based Pagination</text>
  </g>
  <g transform="translate(430, 145)">
    <rect x="-130" y="-20" width="260" height="110" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="1" filter="url(#shadow)"/>
    <text x="0" y="0" text-anchor="middle" class="code">GET /api/users?cursor=abc&amp;limit=20</text>
    <text x="0" y="24" text-anchor="middle" class="desc">SQL: WHERE id > cursor LIMIT 20</text>
    <text x="-110" y="50" text-anchor="start" class="desc">+ Consistent performance</text>
    <text x="-110" y="66" text-anchor="start" class="desc">+ Handles real-time data</text>
    <text x="-110" y="82" text-anchor="start" class="desc" fill="#ef4444">- No random page access</text>
  </g>

  <!-- Comparison chart -->
  <g transform="translate(300, 295)">
    <rect x="-260" y="-22" width="520" height="80" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
    <text x="-240" y="0" text-anchor="start" class="box-label">Use offset for: </text>
    <text x="-100" y="0" text-anchor="start" class="desc">Admin dashboards, simple lists, search results</text>
    <text x="-240" y="22" text-anchor="start" class="box-label">Use cursor for: </text>
    <text x="-100" y="22" text-anchor="start" class="desc">Social feeds, infinite scroll, real-time data, large datasets</text>
    <text x="-240" y="44" text-anchor="start" class="box-label">Recommended: </text>
    <text x="-100" y="44" text-anchor="start" class="desc" fill="#8b5cf6">Cursor-based is preferred for most APIs (Stripe, Slack, GitHub)</text>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700">Latency Numbers Every Developer Should Know</text>
  <line x1="200" y1="48" x2="600" y2="48" stroke="#334155" stroke-width="1"/>

  <!-- Pyramid bars - each row: y position, width, color, latency label, description, real-world example -->
  <!-- Row 1: 1 ns - L1 Cache -->
  <rect x="340" y="62" width="120" height="36" rx="4" fill="#22c55e" opacity="0.9" filter="url(#shadow)"/>
  <text x="400" y="84" text-anchor="middle" fill="#052e16" font-size="11" font-weight="700">1 ns</text>
  <text x="236" y="84" text-anchor="end" fill="#86efac" font-size="11" font-weight="600">L1 Cache</text>
  <text x="564" y="84" text-anchor="start" fill="#64748b" font-size="10">CPU register-adjacent</text>

  <!-- Row 2: 10 ns - L2 Cache -->
  <rect x="318" y="104" width="164" height="36" rx="4" fill="#4ade80" opacity="0.9" filter="url(#shadow)"/>
  <text x="400" y="126" text-anchor="middle" fill="#052e16" font-size="11" font-weight="700">10 ns</text>
  <text x="214" y="126" text-anchor="end" fill="#86efac" font-size="11" font-weight="600">L2 Cache</text>
  <text x="586" y="126" text-anchor="start" fill="#64748b" font-size="10">Still on-chip memory</text>

  <!-- Row 3: 100 ns - RAM Access -->
  <rect x="290" y="146" width="220" height="36" rx="4" fill="#a3e635" opacity="0.9" filter="url(#shadow)"/>
  <text x="400" y="168" text-anchor="middle" fill="#1a2e05" font-size="11" font-weight="700">100 ns</text>
  <text x="186" y="168" text-anchor="end" fill="#bef264" font-size="11" font-weight="600">RAM Access</text>
  <text x="614" y="168" text-anchor="start" fill="#64748b" font-size="10">Redis read (~100 ns)</text>

  <!-- Row 4: 10 us - Send 1KB over network -->
  <rect x="262" y="188" width="276" height="36" rx="4" fill="#facc15" opacity="0.9" filter="url(#shadow)"/>
  <text x="400" y="210" text-anchor="middle" fill="#422006" font-size="11" font-weight="700">10 us</text>
  <text x="158" y="210" text-anchor="end" fill="#fde047" font-size="11" font-weight="600">Network 1KB</text>
  <text x="642" y="210" text-anchor="start" fill="#64748b" font-size="10">Memcached get</text>

  <!-- Row 5: 100 us - Read from SSD -->
  <rect x="234" y="230" width="332" height="36" rx="4" fill="#fb923c" opacity="0.9" filter="url(#shadow)"/>
  <text x="400" y="252" text-anchor="middle" fill="#431407" font-size="11" font-weight="700">100 us</text>
  <text x="130" y="252" text-anchor="end" fill="#fdba74" font-size="11" font-weight="600">SSD Read</text>
  <text x="670" y="252" text-anchor="start" fill="#64748b" font-size="10">RocksDB read</text>

  <!-- Row 6: 1 ms - Database insert -->
  <rect x="206" y="272" width="388" height="36" rx="4" fill="#f97316" opacity="0.9" filter="url(#shadow)"/>
  <text x="400" y="294" text-anchor="middle" fill="#431407" font-size="11" font-weight="700">1 ms</text>
  <text x="102" y="294" text-anchor="end" fill="#fdba74" font-size="11" font-weight="600">DB Insert</text>
  <text x="698" y="294" text-anchor="start" fill="#64748b" font-size="10">PostgreSQL commit</text>

  <!-- Row 7: 10 ms - HDD disk seek -->
  <rect x="178" y="314" width="444" height="36" rx="4" fill="#ef4444" opacity="0.85" filter="url(#shadow)"/>
  <text x="400" y="336" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">10 ms</text>
  <text x="74" y="336" text-anchor="end" fill="#fca5a5" font-size="11" font-weight="600">HDD Seek</text>
  <text x="726" y="336" text-anchor="start" fill="#64748b" font-size="10">Mechanical disk</text>

  <!-- Row 8: 100 ms - Cross-continent packet -->
  <rect x="150" y="356" width="500" height="36" rx="4" fill="#dc2626" opacity="0.85" filter="url(#shadow)"/>
  <text x="400" y="378" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">100 ms</text>
  <text x="46" y="378" text-anchor="end" fill="#fca5a5" font-size="11" font-weight="600">Cross-Continent</text>
  <text x="754" y="378" text-anchor="start" fill="#64748b" font-size="10">Zoom call RTT</text>

  <!-- Row 9: 1-10 s - Retry/refresh interval -->
  <rect x="122" y="398" width="556" height="36" rx="4" fill="#991b1b" opacity="0.85" filter="url(#shadow)"/>
  <text x="400" y="420" text-anchor="middle" fill="#fecaca" font-size="11" font-weight="700">1 - 10 s</text>
  <text x="18" y="420" text-anchor="end" fill="#fca5a5" font-size="11" font-weight="600">Retry/Refresh</text>
  <text x="782" y="420" text-anchor="start" fill="#64748b" font-size="10">Dashboard poll</text>

  <!-- Scale indicator -->
  <text x="400" y="458" text-anchor="middle" fill="#475569" font-size="10">Each level is ~10x slower than the one above</text>

  <!-- Left label -->
  <text x="14" y="240" fill="#22c55e" font-size="10" font-weight="600" transform="rotate(-90, 14, 240)">FAST</text>
  <!-- Right arrow down -->
  <text x="14" y="400" fill="#ef4444" font-size="10" font-weight="600" transform="rotate(-90, 14, 400)">SLOW</text>

  <!-- Arrow on left -->
  <line x1="24" y1="75" x2="24" y2="425" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
  </defs>

  <!-- Magnitude labels on bottom -->
  <text x="130" y="478" text-anchor="middle" fill="#334155" font-size="9">ns</text>
  <text x="260" y="478" text-anchor="middle" fill="#334155" font-size="9">us</text>
  <text x="400" y="478" text-anchor="middle" fill="#334155" font-size="9">ms</text>
  <text x="540" y="478" text-anchor="middle" fill="#334155" font-size="9">seconds</text>
  <line x1="80" y1="470" x2="590" y2="470" stroke="#334155" stroke-width="0.5" stroke-dasharray="3,3"/>
</svg>
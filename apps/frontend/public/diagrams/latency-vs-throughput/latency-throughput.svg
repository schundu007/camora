<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="system-ui, -apple-system, sans-serif">
  <rect width="600" height="350" fill="#f7f8f9" rx="12"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Latency vs Throughput Tradeoff</text>

  <!-- Axes -->
  <!-- Y-axis -->
  <line x1="80" y1="60" x2="80" y2="280" stroke="#1e293b" stroke-width="2"/>
  <polygon points="80,55 76,65 84,65" fill="#1e293b"/>
  <text x="40" y="170" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b" transform="rotate(-90, 40, 170)">Latency (ms)</text>

  <!-- X-axis -->
  <line x1="80" y1="280" x2="540" y2="280" stroke="#1e293b" stroke-width="2"/>
  <polygon points="545,280 535,276 535,284" fill="#1e293b"/>
  <text x="310" y="310" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Throughput (req/s)</text>

  <!-- Grid lines -->
  <line x1="80" y1="220" x2="540" y2="220" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="80" y1="160" x2="540" y2="160" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="80" y1="100" x2="540" y2="100" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>

  <line x1="200" y1="60" x2="200" y2="280" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="320" y1="60" x2="320" y2="280" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="440" y1="60" x2="440" y2="280" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Y-axis labels -->
  <text x="72" y="224" text-anchor="end" font-size="9" fill="#64748b">50</text>
  <text x="72" y="164" text-anchor="end" font-size="9" fill="#64748b">200</text>
  <text x="72" y="104" text-anchor="end" font-size="9" fill="#64748b">500</text>

  <!-- X-axis labels -->
  <text x="200" y="296" text-anchor="middle" font-size="9" fill="#64748b">1K</text>
  <text x="320" y="296" text-anchor="middle" font-size="9" fill="#64748b">5K</text>
  <text x="440" y="296" text-anchor="middle" font-size="9" fill="#64748b">10K</text>

  <!-- The curve: starts low-left, curves up exponentially -->
  <path d="M 100 260 Q 180 255 240 245 Q 300 230 340 200 Q 380 165 410 120 Q 440 80 480 68" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>

  <!-- Shaded area under curve (optimal zone) -->
  <path d="M 200 252 Q 260 245 300 235 Q 340 218 350 200 L 350 280 L 200 280 Z" fill="#10b981" opacity="0.1"/>

  <!-- Optimal point -->
  <circle cx="300" cy="230" r="8" fill="white" stroke="#10b981" stroke-width="2.5"/>
  <circle cx="300" cy="230" r="3" fill="#10b981"/>

  <!-- Optimal point label -->
  <line x1="308" y1="224" x2="360" y2="195" stroke="#10b981" stroke-width="1.5"/>
  <rect x="340" y="178" width="110" height="28" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="395" y="192" text-anchor="middle" font-size="10" font-weight="700" fill="#10b981">Optimal Point</text>
  <text x="395" y="202" text-anchor="middle" font-size="8" fill="#64748b">Best balance</text>

  <!-- Low throughput zone -->
  <rect x="95" y="238" width="80" height="28" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="135" y="250" text-anchor="middle" font-size="9" font-weight="600" fill="#3b82f6">Low load</text>
  <text x="135" y="261" text-anchor="middle" font-size="8" fill="#64748b">Low latency</text>

  <!-- High throughput zone (saturation) -->
  <circle cx="460" cy="78" r="6" fill="white" stroke="#ef4444" stroke-width="2"/>
  <circle cx="460" cy="78" r="2" fill="#ef4444"/>
  <line x1="460" y1="84" x2="460" y2="110" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="420" y="110" width="105" height="28" rx="6" fill="white" stroke="#ef4444" stroke-width="1.5"/>
  <text x="472" y="123" text-anchor="middle" font-size="9" font-weight="600" fill="#ef4444">Saturation zone</text>
  <text x="472" y="133" text-anchor="middle" font-size="8" fill="#64748b">Latency spikes</text>

  <!-- Key insights box -->
  <rect x="80" y="322" width="460" height="22" rx="6" fill="white" stroke="#64748b" stroke-width="1"/>
  <text x="310" y="337" text-anchor="middle" font-size="10" fill="#64748b">As throughput increases past the optimal point, latency grows exponentially (queuing effect)</text>
</svg>
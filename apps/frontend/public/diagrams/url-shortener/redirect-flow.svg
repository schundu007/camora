<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 350" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="350" fill="#fafbfc" rx="16"/>

  <!-- Title -->
  <text x="600" y="32" text-anchor="middle" fill="#1e293b" font-size="22" font-weight="700">URL Redirect Flow (Read Path)</text>
  <text x="600" y="52" text-anchor="middle" fill="#64748b" font-size="13">User clicks short URL &#x2192; system resolves and redirects to the original URL</text>

  <!-- User -->
  <rect x="20" y="80" width="100" height="110" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="20" y="80" width="100" height="32" rx="12 12 0 0" fill="#f97316"/>
  <text x="70" y="102" text-anchor="middle" fill="white" font-size="11" font-weight="700">User</text>
  <text x="70" y="130" text-anchor="middle" fill="#1e293b" font-size="18">&#x1F5B1;&#xFE0F;</text>
  <text x="70" y="152" text-anchor="middle" fill="#64748b" font-size="9">Clicks</text>
  <text x="70" y="165" text-anchor="middle" fill="#2563eb" font-size="8" font-weight="600">sho.rt/a8Xk2B9</text>
  <text x="70" y="180" text-anchor="middle" fill="#64748b" font-size="8">GET /{code}</text>

  <!-- CDN -->
  <rect x="165" y="80" width="110" height="110" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="165" y="80" width="110" height="32" rx="12 12 0 0" fill="#2563eb"/>
  <text x="220" y="102" text-anchor="middle" fill="white" font-size="11" font-weight="700">CDN Edge</text>
  <text x="220" y="130" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">CloudFront</text>
  <text x="220" y="148" text-anchor="middle" fill="#64748b" font-size="9">Edge cache</text>
  <text x="220" y="164" text-anchor="middle" fill="#64748b" font-size="9">Global PoPs</text>
  <text x="220" y="178" text-anchor="middle" fill="#94a3b8" font-size="8">TTL: 5 min</text>

  <!-- Decision diamond: Cache HIT? -->
  <polygon points="365,135 410,100 455,135 410,170" fill="#fff" stroke="#f97316" stroke-width="2" filter="url(#s)"/>
  <text x="410" y="132" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="700">Cache</text>
  <text x="410" y="145" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="700">HIT?</text>

  <!-- Redis Cache -->
  <rect x="500" y="80" width="120" height="110" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="500" y="80" width="120" height="32" rx="12 12 0 0" fill="#ef4444"/>
  <text x="560" y="102" text-anchor="middle" fill="white" font-size="11" font-weight="700">Redis Cache</text>
  <text x="560" y="130" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Application Cache</text>
  <text x="560" y="148" text-anchor="middle" fill="#64748b" font-size="9">code &#x2192; long URL</text>
  <text x="560" y="164" text-anchor="middle" fill="#64748b" font-size="9">LRU eviction</text>
  <text x="560" y="178" text-anchor="middle" fill="#94a3b8" font-size="8">170 GB cluster</text>

  <!-- Decision diamond: Redis HIT? -->
  <polygon points="660,135 705,100 750,135 705,170" fill="#fff" stroke="#ef4444" stroke-width="2" filter="url(#s)"/>
  <text x="705" y="132" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="700">Redis</text>
  <text x="705" y="145" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="700">HIT?</text>

  <!-- Database -->
  <rect x="790" y="80" width="120" height="110" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="790" y="80" width="120" height="32" rx="12 12 0 0" fill="#7c3aed"/>
  <text x="850" y="102" text-anchor="middle" fill="white" font-size="11" font-weight="700">Database</text>
  <text x="850" y="130" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">PostgreSQL</text>
  <text x="850" y="148" text-anchor="middle" fill="#64748b" font-size="9">SELECT long_url</text>
  <text x="850" y="164" text-anchor="middle" fill="#64748b" font-size="9">WHERE code = ?</text>
  <text x="850" y="178" text-anchor="middle" fill="#94a3b8" font-size="8">Source of truth</text>

  <!-- 301 Redirect Response -->
  <rect x="960" y="80" width="120" height="110" rx="12" fill="#fff" stroke="#16a34a" stroke-width="2" filter="url(#s)"/>
  <rect x="960" y="80" width="120" height="32" rx="12 12 0 0" fill="#16a34a"/>
  <text x="1020" y="102" text-anchor="middle" fill="white" font-size="11" font-weight="700">Redirect</text>
  <text x="1020" y="130" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">HTTP 301</text>
  <text x="1020" y="148" text-anchor="middle" fill="#64748b" font-size="9">Location:</text>
  <text x="1020" y="164" text-anchor="middle" fill="#2563eb" font-size="8" font-weight="600">https://orig.com/</text>
  <text x="1020" y="178" text-anchor="middle" fill="#64748b" font-size="8">long-url-path</text>

  <!-- Analytics (below) -->
  <rect x="790" y="220" width="120" height="60" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="790" y="220" width="120" height="24" rx="12 12 0 0" fill="#f97316"/>
  <text x="850" y="238" text-anchor="middle" fill="white" font-size="9" font-weight="700">Analytics Queue</text>
  <text x="850" y="262" text-anchor="middle" fill="#64748b" font-size="9">Log click event</text>
  <text x="850" y="274" text-anchor="middle" fill="#64748b" font-size="8">{code, IP, referer, ts}</text>

  <!-- FLOW ARROWS -->

  <!-- 1. User -> CDN -->
  <line x1="120" y1="130" x2="161" y2="130" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <rect x="122" y="112" width="36" height="14" rx="3" fill="#2563eb"/>
  <text x="140" y="122" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2460;</text>

  <!-- 2. CDN -> Decision -->
  <line x1="275" y1="130" x2="362" y2="135" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="292" y="112" width="36" height="14" rx="3" fill="#334155"/>
  <text x="310" y="122" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2461;</text>

  <!-- HIT path: Decision -> straight to Redirect (curve above) -->
  <path d="M410,100 Q410,72 600,72 Q790,72 960,100" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="580" y="62" width="60" height="16" rx="4" fill="#16a34a"/>
  <text x="610" y="74" text-anchor="middle" fill="white" font-size="8" font-weight="600">HIT &#x2192; 301</text>

  <!-- MISS path: Decision -> Redis -->
  <line x1="455" y1="135" x2="496" y2="135" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="476" y="128" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="600">MISS</text>

  <!-- Redis -> Decision 2 -->
  <line x1="620" y1="135" x2="657" y2="135" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="622" y="117" width="36" height="14" rx="3" fill="#334155"/>
  <text x="640" y="127" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2463;</text>

  <!-- Redis HIT path: -> Redirect -->
  <path d="M705,100 Q705,80 850,75 Q920,72 960,100" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="800" y="66" width="46" height="14" rx="3" fill="#16a34a"/>
  <text x="823" y="76" text-anchor="middle" fill="white" font-size="7" font-weight="600">HIT</text>

  <!-- Redis MISS path: -> Database -->
  <line x1="750" y1="135" x2="786" y2="135" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="768" y="128" text-anchor="middle" fill="#7c3aed" font-size="8" font-weight="600">MISS</text>

  <!-- Database -> Redirect -->
  <line x1="910" y1="130" x2="956" y2="130" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <rect x="914" y="113" width="36" height="14" rx="3" fill="#16a34a"/>
  <text x="932" y="123" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2465;</text>

  <!-- Redirect -> Analytics (async) -->
  <line x1="1020" y1="190" x2="910" y2="230" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <text x="980" y="215" fill="#f97316" font-size="8" font-weight="600">&#x2466; Log (async)</text>

  <!-- Backfill: Database -> Redis (cache result) -->
  <line x1="830" y1="190" x2="590" y2="190" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <text x="710" y="205" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="600">Backfill cache</text>

  <!-- 301 vs 302 decision callout -->
  <rect x="960" y="220" width="220" height="80" rx="10" fill="rgba(37,99,235,0.06)" stroke="rgba(37,99,235,0.2)" stroke-width="1"/>
  <text x="980" y="242" fill="#2563eb" font-size="10" font-weight="700">301 vs 302 Decision</text>
  <text x="980" y="260" fill="#475569" font-size="9" font-weight="600">301 Permanent: Browser caches,</text>
  <text x="980" y="274" fill="#475569" font-size="9">better SEO, fewer server hits</text>
  <text x="980" y="292" fill="#475569" font-size="9" font-weight="600">302 Temporary: Allows analytics,</text>
  <text x="980" y="306" fill="#475569" font-size="9">every click hits the server</text>

  <!-- Legend -->
  <rect x="20" y="310" width="920" height="32" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="40" y="330" fill="#1e293b" font-size="10" font-weight="700">Flow:</text>
  <text x="78" y="330" fill="#475569" font-size="9">&#x2460; GET /{code} &#x2192; &#x2461; CDN check &#x2192; HIT: instant 301 | MISS: &#x2462; Redis lookup &#x2192; HIT: 301 | MISS: &#x2464; DB query &#x2192; &#x2465; 301 redirect + backfill cache &#x2192; &#x2466; Log analytics</text>
</svg>
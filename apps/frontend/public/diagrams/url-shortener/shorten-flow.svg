<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="#fafbfc" rx="16"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" fill="#1e293b" font-size="22" font-weight="700">URL Shortening Flow (Write Path)</text>
  <text x="600" y="55" text-anchor="middle" fill="#64748b" font-size="13">Client submits a long URL and receives a unique short code</text>

  <!-- Client -->
  <rect x="25" y="110" width="110" height="120" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="25" y="110" width="110" height="34" rx="12 12 0 0" fill="#f97316"/>
  <text x="80" y="132" text-anchor="middle" fill="white" font-size="12" font-weight="700">Client</text>
  <text x="80" y="162" text-anchor="middle" fill="#1e293b" font-size="20">&#x1F4F1;</text>
  <text x="80" y="185" text-anchor="middle" fill="#64748b" font-size="9">POST /api/shorten</text>
  <text x="80" y="200" text-anchor="middle" fill="#64748b" font-size="9">{longUrl, alias?}</text>

  <!-- API Gateway -->
  <rect x="185" y="110" width="120" height="120" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="185" y="110" width="120" height="34" rx="12 12 0 0" fill="#2563eb"/>
  <text x="245" y="132" text-anchor="middle" fill="white" font-size="11" font-weight="700">API Gateway</text>
  <text x="245" y="162" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Rate Limiter</text>
  <text x="245" y="180" text-anchor="middle" fill="#64748b" font-size="9">Validate input</text>
  <text x="245" y="196" text-anchor="middle" fill="#64748b" font-size="9">Auth check</text>
  <text x="245" y="212" text-anchor="middle" fill="#94a3b8" font-size="8">Nginx / Kong</text>

  <!-- URL Service -->
  <rect x="355" y="100" width="140" height="140" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="355" y="100" width="140" height="34" rx="12 12 0 0" fill="#16a34a"/>
  <text x="425" y="122" text-anchor="middle" fill="white" font-size="11" font-weight="700">URL Service</text>
  <text x="425" y="152" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Core Logic</text>
  <text x="425" y="170" text-anchor="middle" fill="#64748b" font-size="9">Check custom alias</text>
  <text x="425" y="186" text-anchor="middle" fill="#64748b" font-size="9">Generate Base62 code</text>
  <text x="425" y="202" text-anchor="middle" fill="#64748b" font-size="9">Handle collisions</text>
  <text x="425" y="218" text-anchor="middle" fill="#64748b" font-size="9">Set TTL if provided</text>

  <!-- Database -->
  <rect x="555" y="110" width="130" height="120" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="555" y="110" width="130" height="34" rx="12 12 0 0" fill="#7c3aed"/>
  <text x="620" y="132" text-anchor="middle" fill="white" font-size="11" font-weight="700">Database</text>
  <text x="620" y="162" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">PostgreSQL</text>
  <text x="620" y="180" text-anchor="middle" fill="#64748b" font-size="9">urls table</text>
  <text x="620" y="196" text-anchor="middle" fill="#64748b" font-size="9">UNIQUE on short_code</text>
  <text x="620" y="212" text-anchor="middle" fill="#94a3b8" font-size="8">Primary storage</text>

  <!-- Redis Cache -->
  <rect x="555" y="265" width="130" height="70" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="555" y="265" width="130" height="28" rx="12 12 0 0" fill="#ef4444"/>
  <text x="620" y="285" text-anchor="middle" fill="white" font-size="10" font-weight="700">Redis Cache</text>
  <text x="620" y="310" text-anchor="middle" fill="#64748b" font-size="9">Warm cache on write</text>
  <text x="620" y="325" text-anchor="middle" fill="#64748b" font-size="8">short_code &#x2192; long_url</text>

  <!-- Analytics Queue -->
  <rect x="745" y="265" width="130" height="70" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="745" y="265" width="130" height="28" rx="12 12 0 0" fill="#f97316"/>
  <text x="810" y="285" text-anchor="middle" fill="white" font-size="10" font-weight="700">Kafka / SQS</text>
  <text x="810" y="310" text-anchor="middle" fill="#64748b" font-size="9">Analytics event</text>
  <text x="810" y="325" text-anchor="middle" fill="#64748b" font-size="8">{created, userId, url}</text>

  <!-- Response -->
  <rect x="745" y="110" width="140" height="120" rx="12" fill="#fff" stroke="#16a34a" stroke-width="2" filter="url(#s)"/>
  <rect x="745" y="110" width="140" height="34" rx="12 12 0 0" fill="#16a34a"/>
  <text x="815" y="132" text-anchor="middle" fill="white" font-size="11" font-weight="700">Response</text>
  <text x="815" y="162" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">201 Created</text>
  <text x="815" y="182" text-anchor="middle" fill="#64748b" font-size="9">{shortUrl:</text>
  <text x="815" y="198" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="600">"sho.rt/a8Xk2B9"</text>
  <text x="815" y="215" text-anchor="middle" fill="#64748b" font-size="9">expiresAt: ...}</text>

  <!-- FLOW ARROWS -->

  <!-- 1. Client -> API Gateway -->
  <line x1="135" y1="160" x2="181" y2="160" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <rect x="137" y="140" width="42" height="16" rx="4" fill="#2563eb"/>
  <text x="158" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2460;</text>

  <!-- 2. API Gateway -> URL Service -->
  <line x1="305" y1="165" x2="351" y2="165" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <rect x="307" y="145" width="42" height="16" rx="4" fill="#2563eb"/>
  <text x="328" y="156" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2461;</text>

  <!-- 3. URL Service -> Database (check + write) -->
  <line x1="495" y1="160" x2="551" y2="160" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrowPurple)"/>
  <rect x="497" y="140" width="50" height="16" rx="4" fill="#7c3aed"/>
  <text x="522" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2462; R/W</text>

  <!-- 4. URL Service -> Redis (cache warming) -->
  <line x1="460" y1="240" x2="553" y2="290" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="475" y="275" fill="#ef4444" font-size="8" font-weight="600">&#x2463; Cache</text>

  <!-- 5. URL Service -> Analytics -->
  <line x1="470" y1="240" x2="743" y2="295" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <text x="600" y="262" fill="#f97316" font-size="8" font-weight="600">&#x2464; Emit event (async)</text>

  <!-- 6. Return short URL -->
  <line x1="685" y1="155" x2="741" y2="160" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <rect x="687" y="137" width="50" height="16" rx="4" fill="#16a34a"/>
  <text x="712" y="148" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2465; OK</text>

  <!-- Legend -->
  <rect x="25" y="350" width="1150" height="40" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="370" fill="#1e293b" font-size="11" font-weight="700">Flow:</text>
  <text x="95" y="370" fill="#475569" font-size="10">&#x2460; POST request &#x2192; &#x2461; Validate &amp; rate-limit &#x2192; &#x2462; Check collision + store in DB &#x2192; &#x2463; Warm Redis cache &#x2192; &#x2464; Emit analytics event &#x2192; &#x2465; Return short URL</text>
  <text x="50" y="385" fill="#64748b" font-size="9">Base62 encoding: MD5/SHA256 hash of longUrl, take first 7 chars of Base62-encoded hash. On collision, append counter and retry.</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="browserGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="osGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="resolverGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="rootGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="tldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="authGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2dd4bf"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#38bdf8"/>
    </marker>
    <marker id="arrowReturn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="0.5">DNS Resolution Flow</text>
  <text x="400" y="48" text-anchor="middle" fill="#64748b" font-size="11">6-step journey from browser to authoritative nameserver</text>

  <!-- Step 1: Browser Cache -->
  <g filter="url(#shadow)">
    <rect x="20" y="80" width="105" height="75" rx="10" fill="url(#browserGrad)"/>
    <circle cx="38" cy="97" r="11" fill="#fff" opacity="0.2"/>
    <text x="38" y="101" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">1</text>
    <text x="72" y="100" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Browser</text>
    <text x="72" y="113" text-anchor="middle" fill="#d1fae5" font-size="8">Cache</text>
    <line x1="30" y1="122" x2="115" y2="122" stroke="#fff" stroke-width="0.5" opacity="0.2"/>
    <text x="72" y="137" text-anchor="middle" fill="#d1fae5" font-size="7">TTL-based</text>
    <text x="72" y="148" text-anchor="middle" fill="#d1fae5" font-size="7">local lookup</text>
  </g>
  <!-- Cache check badge -->
  <rect x="35" y="158" width="55" height="18" rx="9" fill="#065f46" stroke="#10b981" stroke-width="1"/>
  <text x="62" y="170" text-anchor="middle" fill="#6ee7b7" font-size="7" font-weight="600">CACHE?</text>

  <!-- Step 2: OS Cache -->
  <g filter="url(#shadow)">
    <rect x="155" y="80" width="105" height="75" rx="10" fill="url(#osGrad)"/>
    <circle cx="173" cy="97" r="11" fill="#fff" opacity="0.2"/>
    <text x="173" y="101" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">2</text>
    <text x="207" y="100" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">OS</text>
    <text x="207" y="113" text-anchor="middle" fill="#ccfbf1" font-size="8">Resolver</text>
    <line x1="165" y1="122" x2="250" y2="122" stroke="#fff" stroke-width="0.5" opacity="0.2"/>
    <text x="207" y="137" text-anchor="middle" fill="#ccfbf1" font-size="7">/etc/hosts</text>
    <text x="207" y="148" text-anchor="middle" fill="#ccfbf1" font-size="7">OS DNS cache</text>
  </g>
  <!-- Cache check badge -->
  <rect x="170" y="158" width="55" height="18" rx="9" fill="#134e4a" stroke="#14b8a6" stroke-width="1"/>
  <text x="197" y="170" text-anchor="middle" fill="#5eead4" font-size="7" font-weight="600">CACHE?</text>

  <!-- Step 3: Recursive Resolver -->
  <g filter="url(#shadow)">
    <rect x="290" y="80" width="105" height="75" rx="10" fill="url(#resolverGrad)"/>
    <circle cx="308" cy="97" r="11" fill="#fff" opacity="0.2"/>
    <text x="308" y="101" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">3</text>
    <text x="342" y="97" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Recursive</text>
    <text x="342" y="110" text-anchor="middle" fill="#e0f2fe" font-size="8">Resolver</text>
    <line x1="300" y1="119" x2="385" y2="119" stroke="#fff" stroke-width="0.5" opacity="0.2"/>
    <text x="342" y="133" text-anchor="middle" fill="#e0f2fe" font-size="7">ISP or 8.8.8.8</text>
    <text x="342" y="144" text-anchor="middle" fill="#e0f2fe" font-size="7">Has own cache</text>
  </g>

  <!-- Step 4: Root Nameserver -->
  <g filter="url(#shadow)">
    <rect x="425" y="80" width="105" height="75" rx="10" fill="url(#rootGrad)"/>
    <circle cx="443" cy="97" r="11" fill="#fff" opacity="0.2"/>
    <text x="443" y="101" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">4</text>
    <text x="477" y="97" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Root</text>
    <text x="477" y="110" text-anchor="middle" fill="#e0e7ff" font-size="8">Nameserver</text>
    <line x1="435" y1="119" x2="520" y2="119" stroke="#fff" stroke-width="0.5" opacity="0.2"/>
    <text x="477" y="133" text-anchor="middle" fill="#e0e7ff" font-size="7">13 root clusters</text>
    <text x="477" y="144" text-anchor="middle" fill="#e0e7ff" font-size="7">worldwide</text>
  </g>

  <!-- Step 5: TLD Nameserver -->
  <g filter="url(#shadow)">
    <rect x="560" y="80" width="105" height="75" rx="10" fill="url(#tldGrad)"/>
    <circle cx="578" cy="97" r="11" fill="#fff" opacity="0.2"/>
    <text x="578" y="101" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">5</text>
    <text x="612" y="97" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">TLD</text>
    <text x="612" y="110" text-anchor="middle" fill="#ede9fe" font-size="8">Nameserver</text>
    <line x1="570" y1="119" x2="655" y2="119" stroke="#fff" stroke-width="0.5" opacity="0.2"/>
    <text x="612" y="133" text-anchor="middle" fill="#ede9fe" font-size="7">.com .org .io</text>
    <text x="612" y="144" text-anchor="middle" fill="#ede9fe" font-size="7">TLD servers</text>
  </g>

  <!-- Step 6: Authoritative Nameserver -->
  <g filter="url(#shadow)">
    <rect x="695" y="80" width="90" height="75" rx="10" fill="url(#authGrad)"/>
    <circle cx="713" cy="97" r="11" fill="#fff" opacity="0.2"/>
    <text x="713" y="101" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">6</text>
    <text x="740" y="97" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Authoritative</text>
    <text x="740" y="110" text-anchor="middle" fill="#fef3c7" font-size="8">Nameserver</text>
    <line x1="705" y1="119" x2="775" y2="119" stroke="#fff" stroke-width="0.5" opacity="0.2"/>
    <text x="740" y="133" text-anchor="middle" fill="#fef3c7" font-size="7">Returns actual</text>
    <text x="740" y="144" text-anchor="middle" fill="#fef3c7" font-size="7">IP address</text>
  </g>

  <!-- Arrows between steps (forward flow) -->
  <line x1="125" y1="115" x2="152" y2="115" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <line x1="260" y1="115" x2="287" y2="115" stroke="#2dd4bf" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <line x1="395" y1="115" x2="422" y2="115" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="530" y1="115" x2="557" y2="115" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="665" y1="115" x2="692" y2="115" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Return path (bottom) -->
  <path d="M740,160 L740,210 Q740,220 730,220 L80,220 Q70,220 70,210 L70,180" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowReturn)"/>
  <rect x="340" y="208" width="120" height="22" rx="11" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="400" y="223" text-anchor="middle" fill="#e2e8f0" font-size="9" font-weight="600">IP Address Returned</text>

  <!-- Description boxes below -->
  <!-- Step descriptions row -->
  <g transform="translate(20, 250)">
    <rect x="0" y="0" width="240" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="12" y="18" fill="#10b981" font-size="9" font-weight="700">Steps 1-2: Local Cache Lookups</text>
    <text x="12" y="32" fill="#94a3b8" font-size="8">Browser and OS check their DNS caches first.</text>
    <text x="12" y="44" fill="#94a3b8" font-size="8">If found and TTL valid, IP returned instantly.</text>
    <text x="12" y="54" fill="#6ee7b7" font-size="7" font-weight="600">Latency: &lt; 1ms (cached)</text>
  </g>

  <g transform="translate(280, 250)">
    <rect x="0" y="0" width="240" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="12" y="18" fill="#0ea5e9" font-size="9" font-weight="700">Step 3: Recursive Resolver</text>
    <text x="12" y="32" fill="#94a3b8" font-size="8">ISP or public resolver (8.8.8.8, 1.1.1.1)</text>
    <text x="12" y="44" fill="#94a3b8" font-size="8">checks its cache, then begins recursive lookup.</text>
    <text x="12" y="54" fill="#7dd3fc" font-size="7" font-weight="600">Handles the heavy lifting of resolution</text>
  </g>

  <g transform="translate(540, 250)">
    <rect x="0" y="0" width="240" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="12" y="18" fill="#a78bfa" font-size="9" font-weight="700">Steps 4-6: Hierarchical Lookup</text>
    <text x="12" y="32" fill="#94a3b8" font-size="8">Root directs to TLD, TLD directs to</text>
    <text x="12" y="44" fill="#94a3b8" font-size="8">authoritative NS which returns the IP.</text>
    <text x="12" y="54" fill="#c4b5fd" font-size="7" font-weight="600">Latency: 50-200ms (uncached, 4 hops)</text>
  </g>

  <!-- Timing bar at bottom -->
  <g transform="translate(20, 330)">
    <rect x="0" y="0" width="760" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="380" y="17" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">Resolution Time Comparison</text>

    <!-- Cached bar -->
    <rect x="15" y="25" width="50" height="14" rx="4" fill="#10b981" opacity="0.8"/>
    <text x="72" y="35" fill="#6ee7b7" font-size="8" font-weight="600">&lt; 1ms</text>
    <text x="115" y="35" fill="#94a3b8" font-size="8">Cached (browser/OS hit)</text>

    <!-- Resolver cached bar -->
    <rect x="280" y="25" width="100" height="14" rx="4" fill="#0ea5e9" opacity="0.8"/>
    <text x="387" y="35" fill="#7dd3fc" font-size="8" font-weight="600">~10ms</text>
    <text x="430" y="35" fill="#94a3b8" font-size="8">Resolver cache hit</text>

    <!-- Full resolution bar -->
    <rect x="560" y="25" width="175" height="14" rx="4" fill="#f59e0b" opacity="0.8"/>
    <text x="580" y="35" fill="#fff" font-size="8" font-weight="600">50-200ms full resolution</text>
  </g>
</svg>
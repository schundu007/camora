<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowLeft" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="600" height="350" fill="#f7f8f9" rx="12"/>
  <text x="300" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">DNS Resolution Flow</text>
  <text x="300" y="44" text-anchor="middle" font-size="10" fill="#64748b">Resolving www.example.com &#8594; 93.184.216.34</text>

  <!-- Browser -->
  <rect x="20" y="65" width="100" height="55" rx="8" fill="white" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
  <text x="70" y="87" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Browser</text>
  <text x="70" y="104" text-anchor="middle" font-size="8" fill="#64748b">Local Cache</text>
  <text x="70" y="115" text-anchor="middle" font-size="8" fill="#64748b">OS Cache</text>

  <!-- Recursive Resolver -->
  <rect x="20" y="155" width="100" height="65" rx="8" fill="white" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="70" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#3b82f6">Recursive</text>
  <text x="70" y="190" text-anchor="middle" font-size="10" font-weight="600" fill="#3b82f6">Resolver</text>
  <text x="70" y="208" text-anchor="middle" font-size="7" fill="#64748b">ISP / 8.8.8.8</text>

  <!-- Step 1 arrow -->
  <rect x="5" y="128" width="16" height="16" rx="8" fill="#3b82f6"/>
  <text x="13" y="140" text-anchor="middle" font-size="9" font-weight="700" fill="white">1</text>
  <line x1="70" y1="120" x2="70" y2="150" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowRight)"/>
  <text x="95" y="140" font-size="8" fill="#3b82f6">Query</text>

  <!-- Root DNS Server -->
  <rect x="180" y="155" width="110" height="55" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="235" y="177" text-anchor="middle" font-size="10" font-weight="600" fill="#8b5cf6">Root DNS</text>
  <text x="235" y="193" text-anchor="middle" font-size="10" font-weight="600" fill="#8b5cf6">Server</text>
  <text x="235" y="205" text-anchor="middle" font-size="7" fill="#64748b">13 root servers (a-m)</text>

  <!-- Step 2 arrow -->
  <rect x="132" y="160" width="16" height="16" rx="8" fill="#8b5cf6"/>
  <text x="140" y="172" text-anchor="middle" font-size="9" font-weight="700" fill="white">2</text>
  <line x1="120" y1="175" x2="175" y2="175" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowRight)"/>
  <text x="148" y="188" font-size="7" fill="#3b82f6">"Where is .com?"</text>

  <!-- Step 3 arrow (response) -->
  <rect x="132" y="195" width="16" height="16" rx="8" fill="#8b5cf6"/>
  <text x="140" y="207" text-anchor="middle" font-size="9" font-weight="700" fill="white">3</text>
  <line x1="175" y1="200" x2="125" y2="200" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowLeft)"/>
  <text x="148" y="217" font-size="7" fill="#10b981">"Ask TLD .com"</text>

  <!-- TLD DNS Server -->
  <rect x="340" y="155" width="110" height="55" rx="8" fill="white" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="395" y="177" text-anchor="middle" font-size="10" font-weight="600" fill="#f59e0b">TLD DNS</text>
  <text x="395" y="193" text-anchor="middle" font-size="10" font-weight="600" fill="#f59e0b">Server (.com)</text>
  <text x="395" y="205" text-anchor="middle" font-size="7" fill="#64748b">Verisign manages .com</text>

  <!-- Steps 4-5: to TLD and back via curved paths -->
  <rect x="255" y="140" width="16" height="16" rx="8" fill="#f59e0b"/>
  <text x="263" y="152" text-anchor="middle" font-size="9" font-weight="700" fill="white">4</text>
  <path d="M 120 170 Q 230 130 335 170" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowRight)"/>
  <text x="230" y="138" font-size="7" fill="#3b82f6">"Where is example.com?"</text>

  <rect x="255" y="215" width="16" height="16" rx="8" fill="#f59e0b"/>
  <text x="263" y="227" text-anchor="middle" font-size="9" font-weight="700" fill="white">5</text>
  <path d="M 335 195 Q 230 230 125 195" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowLeft)"/>
  <text x="230" y="237" font-size="7" fill="#10b981">"Ask authoritative NS"</text>

  <!-- Authoritative DNS -->
  <rect x="480" y="155" width="110" height="55" rx="8" fill="white" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="535" y="177" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">Authoritative</text>
  <text x="535" y="193" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">DNS Server</text>
  <text x="535" y="205" text-anchor="middle" font-size="7" fill="#64748b">example.com zone</text>

  <!-- Steps 6-7: to Auth and back -->
  <rect x="420" y="120" width="16" height="16" rx="8" fill="#10b981"/>
  <text x="428" y="132" text-anchor="middle" font-size="9" font-weight="700" fill="white">6</text>
  <path d="M 120 165 Q 300 100 475 165" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowRight)"/>
  <text x="300" y="108" font-size="7" fill="#3b82f6">"What is www.example.com?"</text>

  <rect x="420" y="245" width="16" height="16" rx="8" fill="#10b981"/>
  <text x="428" y="257" text-anchor="middle" font-size="9" font-weight="700" fill="white">7</text>
  <path d="M 475 200 Q 300 260 125 200" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowLeft)"/>
  <text x="300" y="262" font-size="7" fill="#10b981">"IP: 93.184.216.34" (A record)</text>

  <!-- Step 8: resolver to browser -->
  <rect x="5" y="230" width="16" height="16" rx="8" fill="#10b981"/>
  <text x="13" y="242" text-anchor="middle" font-size="9" font-weight="700" fill="white">8</text>
  <line x1="70" y1="220" x2="70" y2="250" stroke="#10b981" stroke-width="1.5"/>
  <text x="95" y="245" font-size="8" fill="#10b981">IP returned</text>

  <!-- Result box -->
  <rect x="20" y="255" width="100" height="30" rx="6" fill="#10b981" filter="url(#shadow)"/>
  <text x="70" y="274" text-anchor="middle" font-size="9" font-weight="600" fill="white">93.184.216.34</text>

  <!-- DNS Record Types -->
  <rect x="140" y="290" width="440" height="48" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="160" y="310" font-size="10" font-weight="600" fill="#1e293b">DNS Record Types:</text>
  <circle cx="260" cy="306" r="4" fill="#3b82f6"/>
  <text x="272" y="310" font-size="8" fill="#64748b">A: IPv4</text>
  <circle cx="320" cy="306" r="4" fill="#8b5cf6"/>
  <text x="332" y="310" font-size="8" fill="#64748b">AAAA: IPv6</text>
  <circle cx="400" cy="306" r="4" fill="#10b981"/>
  <text x="412" y="310" font-size="8" fill="#64748b">CNAME: Alias</text>
  <circle cx="490" cy="306" r="4" fill="#f59e0b"/>
  <text x="502" y="310" font-size="8" fill="#64748b">MX: Mail</text>
  <text x="160" y="328" font-size="8" fill="#64748b">TTL caching at each level | DNSSEC adds authentication | Anycast routes to nearest root</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
  </defs>

  <rect width="1200" height="450" fill="#ffffff" rx="16"/>

  <text x="600" y="32" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Facebook News Feed Generation Flow</text>
  <text x="600" y="52" text-anchor="middle" fill="#64748b" font-size="12">Pre-computed cache + celebrity pull + merge + two-phase ML ranking + diversity injection</text>

  <!-- User Opens -->
  <rect x="15" y="105" width="110" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="15" y="105" width="110" height="28" rx="10 10 0 0" fill="#1877f2"/>
  <text x="70" y="124" text-anchor="middle" fill="white" font-size="11" font-weight="700">User Opens</text>
  <text x="70" y="152" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">GET /api/feed</text>
  <text x="70" y="170" text-anchor="middle" fill="#64748b" font-size="9">cursor + limit</text>
  <text x="70" y="186" text-anchor="middle" fill="#64748b" font-size="9">2.1B DAU</text>
  <text x="70" y="202" text-anchor="middle" fill="#64748b" font-size="14">&#x1F4F1;</text>

  <!-- Redis Cache -->
  <rect x="170" y="90" width="120" height="135" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="170" y="90" width="120" height="28" rx="10 10 0 0" fill="#ef4444"/>
  <text x="230" y="109" text-anchor="middle" fill="white" font-size="11" font-weight="700">Redis Cache</text>
  <text x="230" y="136" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Pre-Computed</text>
  <text x="230" y="154" text-anchor="middle" fill="#64748b" font-size="9">feed:{userId}</text>
  <text x="230" y="170" text-anchor="middle" fill="#64748b" font-size="9">Top 200 post IDs</text>
  <text x="230" y="186" text-anchor="middle" fill="#64748b" font-size="9">Sorted set (ZREV)</text>
  <text x="230" y="212" text-anchor="middle" fill="#94a3b8" font-size="8">~21 TB active feeds</text>

  <!-- Celebrity Pull -->
  <rect x="335" y="90" width="120" height="135" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="335" y="90" width="120" height="28" rx="10 10 0 0" fill="#f97316"/>
  <text x="395" y="109" text-anchor="middle" fill="white" font-size="11" font-weight="700">Celebrity Pull</text>
  <text x="395" y="136" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">On-Read Fetch</text>
  <text x="395" y="154" text-anchor="middle" fill="#64748b" font-size="9">Followed pages</text>
  <text x="395" y="170" text-anchor="middle" fill="#64748b" font-size="9">&gt;10K followers</text>
  <text x="395" y="186" text-anchor="middle" fill="#64748b" font-size="9">Last 24h posts</text>
  <text x="395" y="212" text-anchor="middle" fill="#94a3b8" font-size="8">celebrity_posts table</text>

  <!-- Merge -->
  <rect x="500" y="105" width="100" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="500" y="105" width="100" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="550" y="124" text-anchor="middle" fill="white" font-size="11" font-weight="700">Merge</text>
  <text x="550" y="152" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">~1000 Items</text>
  <text x="550" y="170" text-anchor="middle" fill="#64748b" font-size="9">Cached + pulled</text>
  <text x="550" y="186" text-anchor="middle" fill="#64748b" font-size="9">+ suggested</text>
  <text x="550" y="202" text-anchor="middle" fill="#94a3b8" font-size="8">Deduplicate</text>

  <!-- ML Ranking -->
  <rect x="645" y="80" width="140" height="160" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="645" y="80" width="140" height="28" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="715" y="99" text-anchor="middle" fill="white" font-size="11" font-weight="700">ML Ranking</text>
  <text x="715" y="126" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Two-Phase Pipeline</text>
  <text x="715" y="144" text-anchor="middle" fill="#64748b" font-size="9">Light: 1000 to 200</text>
  <text x="715" y="160" text-anchor="middle" fill="#64748b" font-size="9">(logistic, 50 feats)</text>
  <text x="715" y="178" text-anchor="middle" fill="#64748b" font-size="9">Heavy: 200 to 20</text>
  <text x="715" y="194" text-anchor="middle" fill="#64748b" font-size="9">(neural, 500+ feats)</text>
  <text x="715" y="210" text-anchor="middle" fill="#64748b" font-size="9">P(like,comment,share)</text>
  <text x="715" y="228" text-anchor="middle" fill="#94a3b8" font-size="8">1.5M inferences/sec</text>

  <!-- Diversity Inject -->
  <rect x="830" y="95" width="120" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="830" y="95" width="120" height="28" rx="10 10 0 0" fill="#16a34a"/>
  <text x="890" y="114" text-anchor="middle" fill="white" font-size="11" font-weight="700">Diversity Inject</text>
  <text x="890" y="142" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Business Rules</text>
  <text x="890" y="160" text-anchor="middle" fill="#64748b" font-size="9">Max 2 per creator</text>
  <text x="890" y="176" text-anchor="middle" fill="#64748b" font-size="9">Recency boost</text>
  <text x="890" y="192" text-anchor="middle" fill="#64748b" font-size="9">Demote clickbait</text>
  <text x="890" y="208" text-anchor="middle" fill="#64748b" font-size="9">Integrity filter</text>

  <!-- Return -->
  <rect x="995" y="105" width="110" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="995" y="105" width="110" height="28" rx="10 10 0 0" fill="#1877f2"/>
  <text x="1050" y="124" text-anchor="middle" fill="white" font-size="11" font-weight="700">Return Feed</text>
  <text x="1050" y="152" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Top 20 Posts</text>
  <text x="1050" y="170" text-anchor="middle" fill="#64748b" font-size="9">With cursor</text>
  <text x="1050" y="186" text-anchor="middle" fill="#64748b" font-size="9">&lt;200ms total</text>
  <text x="1050" y="202" text-anchor="middle" fill="#64748b" font-size="9">Infinite scroll</text>

  <!-- Arrows -->
  <line x1="125" y1="155" x2="167" y2="155" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="127" y="141" width="38" height="14" rx="3" fill="#ef4444"/>
  <text x="146" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2460;</text>

  <line x1="290" y1="155" x2="332" y2="155" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="292" y="141" width="38" height="14" rx="3" fill="#f97316"/>
  <text x="311" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2461;</text>

  <line x1="455" y1="155" x2="497" y2="155" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="457" y="141" width="38" height="14" rx="3" fill="#2563eb"/>
  <text x="476" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2462;</text>

  <line x1="600" y1="155" x2="642" y2="155" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <rect x="602" y="141" width="38" height="14" rx="3" fill="#7c3aed"/>
  <text x="621" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2463;</text>

  <line x1="785" y1="155" x2="827" y2="155" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="787" y="141" width="38" height="14" rx="3" fill="#16a34a"/>
  <text x="806" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2464;</text>

  <line x1="950" y1="155" x2="992" y2="155" stroke="#1877f2" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="952" y="141" width="38" height="14" rx="3" fill="#1877f2"/>
  <text x="971" y="151" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2465;</text>

  <!-- Legend -->
  <rect x="20" y="340" width="1160" height="95" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="362" fill="#1e293b" font-size="12" font-weight="700">Flow Steps:</text>
  <rect x="50" y="372" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="66" y="381" fill="#475569" font-size="9">&#x2460; User opens app, fetch pre-computed feed from Redis (~21 TB active cache, ZREVRANGE top 200)</text>
  <rect x="50" y="388" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="66" y="397" fill="#475569" font-size="9">&#x2461; Pull recent posts from followed celebrities/pages (&gt;10K followers, fan-out-on-read)</text>
  <rect x="50" y="404" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="66" y="413" fill="#475569" font-size="9">&#x2462; Merge cached + pulled + suggested posts, deduplicate (~1000 candidates)</text>
  <text x="430" y="381" fill="#475569" font-size="9">&#x2463; Two-phase ML ranking: light ranker (1000 to 200) then heavy neural net (200 to 20)</text>
  <text x="430" y="397" fill="#475569" font-size="9">&#x2464; Apply diversity rules: max 2/creator, demote clickbait, integrity filter, recency boost</text>
  <text x="430" y="413" fill="#475569" font-size="9">&#x2465; Return top 20 posts with pagination cursor (&lt;200ms end-to-end latency)</text>
</svg>
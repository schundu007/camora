<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgCap" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="550" fill="url(#bgCap)" rx="16"/>

  <!-- Title -->
  <rect x="380" y="16" width="440" height="40" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="43" text-anchor="middle" fill="white" font-size="20" font-weight="700">Back-of-the-Envelope Estimates</text>

  <!-- Column 1: Traffic -->
  <rect x="20" y="80" width="275" height="440" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="20" y="80" width="275" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="157" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Traffic Estimates (QPS)</text>

  <text x="45" y="145" fill="#fbbf24" font-size="13" font-weight="700">👥 2 Billion DAU</text>
  <text x="157" y="170" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">↓</text>

  <text x="45" y="200" fill="white" font-size="12">Avg feed refreshes per user:</text>
  <text x="45" y="218" fill="#fbbf24" font-size="15" font-weight="700">10 requests/day</text>
  <text x="157" y="240" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">↓</text>

  <text x="45" y="268" fill="white" font-size="12">Feed read QPS:</text>
  <text x="45" y="288" fill="#fbbf24" font-size="16" font-weight="800">≈ 230,000 QPS</text>
  <text x="157" y="310" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">↓</text>

  <text x="45" y="338" fill="white" font-size="11">Post creation (5% of users):</text>
  <text x="45" y="356" fill="rgba(255,255,255,0.7)" font-size="10">100M posts/day</text>
  <text x="45" y="378" fill="#fbbf24" font-size="16" font-weight="800">≈ 1,200 writes/sec</text>
  <text x="157" y="400" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">↓</text>

  <text x="45" y="425" fill="white" font-size="11">Likes per second:</text>
  <text x="45" y="448" fill="#f97316" font-size="18" font-weight="800">≈ 100,000 likes/sec</text>
  <text x="45" y="475" fill="rgba(255,255,255,0.7)" font-size="10">8.6B likes/day at peak</text>

  <!-- Column 2: Fan-out -->
  <rect x="310" y="80" width="265" height="250" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="80" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Fan-out Problem</text>

  <text x="335" y="145" fill="#fbbf24" font-size="13" font-weight="700">📝 1 post by celebrity</text>
  <text x="442" y="170" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">↓</text>

  <text x="335" y="195" fill="white" font-size="12">Followers of top accounts:</text>
  <text x="335" y="215" fill="#fbbf24" font-size="15" font-weight="700">100M+ followers</text>
  <text x="442" y="240" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">↓</text>

  <text x="335" y="268" fill="white" font-size="11">Fan-out on write is impossible!</text>
  <text x="335" y="292" fill="#f97316" font-size="16" font-weight="800">Hybrid fan-out needed</text>

  <rect x="325" y="302" width="235" height="22" rx="6" fill="rgba(239,68,68,0.3)" stroke="rgba(239,68,68,0.5)" stroke-width="1"/>
  <text x="442" y="318" text-anchor="middle" fill="white" font-size="10" font-weight="600">⚠️ Push for normal, pull for celebrities!</text>

  <!-- Column 3: Storage -->
  <rect x="310" y="350" width="265" height="170" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="350" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="374" text-anchor="middle" fill="white" font-size="14" font-weight="700">Storage Estimates</text>

  <text x="335" y="410" fill="white" font-size="11">Post metadata: <tspan fill="#fbbf24" font-weight="700">~1 KB each</tspan></text>
  <text x="442" y="430" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">↓</text>

  <text x="335" y="450" fill="white" font-size="11">100M posts/day x 1KB:</text>
  <text x="335" y="472" fill="#fbbf24" font-size="15" font-weight="800">= 100 GB/day (text)</text>

  <text x="335" y="500" fill="white" font-size="11">Photos (350M/day x 2MB avg):</text>
  <text x="335" y="520" fill="#f97316" font-size="15" font-weight="800">≈ 700 TB/day (media)</text>

  <!-- Column 4: Feed Cache -->
  <rect x="590" y="80" width="290" height="250" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="80" width="290" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Feed Cache Requirements</text>

  <text x="615" y="148" fill="white" font-size="12">Pre-computed feed per user:</text>
  <text x="615" y="175" fill="#fbbf24" font-size="20" font-weight="800">2 Billion</text>
  <text x="615" y="198" fill="white" font-size="12">cached feed lists</text>

  <text x="615" y="230" fill="white" font-size="12">500 post IDs per feed x 8 bytes:</text>
  <text x="615" y="252" fill="#fbbf24" font-size="15" font-weight="700">~4 KB per user feed</text>

  <text x="735" y="280" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">↓</text>
  <text x="615" y="304" fill="white" font-size="11">Total feed cache:</text>
  <text x="615" y="322" fill="#f97316" font-size="16" font-weight="800">≈ 8 TB in Redis/Memcached</text>

  <!-- Column 5: Social Graph -->
  <rect x="590" y="350" width="290" height="170" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="350" width="290" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="374" text-anchor="middle" fill="white" font-size="14" font-weight="700">Social Graph</text>

  <text x="615" y="410" fill="white" font-size="11">Total users:</text>
  <text x="615" y="432" fill="#fbbf24" font-size="14" font-weight="700">3 Billion accounts</text>

  <text x="615" y="462" fill="white" font-size="11">Avg friends/followers: 300</text>
  <text x="615" y="484" fill="#f97316" font-size="14" font-weight="700">900 Billion edges</text>

  <text x="615" y="510" fill="rgba(255,255,255,0.6)" font-size="10">TAO graph database for O(1) edge lookups</text>

  <!-- Key Insights -->
  <rect x="900" y="80" width="280" height="440" rx="12" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="1040" y="108" text-anchor="middle" fill="white" font-size="14" font-weight="700">💡 Key Insights</text>
  <line x1="920" y1="118" x2="1160" y2="118" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <text x="920" y="145" fill="white" font-size="11" font-weight="600">Hybrid fan-out is essential</text>
  <text x="920" y="163" fill="rgba(255,255,255,0.7)" font-size="10">Push-on-write for normal users</text>
  <text x="920" y="178" fill="rgba(255,255,255,0.7)" font-size="10">(avg 300 followers). Pull-on-read</text>
  <text x="920" y="193" fill="rgba(255,255,255,0.7)" font-size="10">for celebrities (100M+ followers).</text>

  <text x="920" y="225" fill="white" font-size="11" font-weight="600">Media dominates storage</text>
  <text x="920" y="243" fill="rgba(255,255,255,0.7)" font-size="10">700 TB/day in photos alone.</text>
  <text x="920" y="258" fill="rgba(255,255,255,0.7)" font-size="10">Blob storage + CDN is critical.</text>
  <text x="920" y="273" fill="rgba(255,255,255,0.7)" font-size="10">Text is negligible by comparison.</text>

  <text x="920" y="305" fill="white" font-size="11" font-weight="600">ML ranking is the core value</text>
  <text x="920" y="323" fill="rgba(255,255,255,0.7)" font-size="10">Engagement prediction model</text>
  <text x="920" y="338" fill="rgba(255,255,255,0.7)" font-size="10">scores ~1000 candidate posts</text>
  <text x="920" y="353" fill="rgba(255,255,255,0.7)" font-size="10">per feed refresh in ~200ms.</text>

  <text x="920" y="385" fill="white" font-size="11" font-weight="600">Likes are extremely high QPS</text>
  <text x="920" y="403" fill="rgba(255,255,255,0.7)" font-size="10">100K likes/sec needs counter</text>
  <text x="920" y="418" fill="rgba(255,255,255,0.7)" font-size="10">aggregation, not per-row updates.</text>

  <text x="920" y="450" fill="white" font-size="11" font-weight="600">Feed cache prevents DB reads</text>
  <text x="920" y="468" fill="rgba(255,255,255,0.7)" font-size="10">8TB Redis cluster caches all</text>
  <text x="920" y="483" fill="rgba(255,255,255,0.7)" font-size="10">active user feeds. Without it,</text>
  <text x="920" y="498" fill="rgba(255,255,255,0.7)" font-size="10">230K QPS would crush the DB.</text>
</svg>
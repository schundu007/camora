<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="5" refY="7" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="600" height="350" fill="#f7f8f9" rx="12"/>
  <text x="300" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Observability Stack - Three Pillars</text>

  <!-- Application layer -->
  <rect x="120" y="45" width="360" height="40" rx="8" fill="white" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="63" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Application Services</text>
  <text x="300" y="78" text-anchor="middle" font-size="9" fill="#64748b">Instrumented with OpenTelemetry SDK</text>

  <!-- Arrows down -->
  <line x1="170" y1="85" x2="170" y2="115" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="300" y1="85" x2="300" y2="115" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="430" y1="85" x2="430" y2="115" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Pillar 1: Metrics -->
  <rect x="30" y="120" width="160" height="100" rx="8" fill="white" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="120" width="160" height="28" rx="8" fill="#3b82f6"/>
  <rect x="30" y="140" width="160" height="8" fill="#3b82f6"/>
  <text x="110" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="white">Metrics</text>
  <text x="110" y="165" text-anchor="middle" font-size="10" font-weight="600" fill="#3b82f6">Prometheus</text>
  <text x="110" y="182" text-anchor="middle" font-size="9" fill="#64748b">CPU, Memory, Latency</text>
  <text x="110" y="196" text-anchor="middle" font-size="9" fill="#64748b">Request rates, Error %</text>
  <text x="110" y="210" text-anchor="middle" font-size="9" fill="#64748b">PromQL queries</text>

  <!-- Pillar 2: Logs -->
  <rect x="220" y="120" width="160" height="100" rx="8" fill="white" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <rect x="220" y="120" width="160" height="28" rx="8" fill="#10b981"/>
  <rect x="220" y="140" width="160" height="8" fill="#10b981"/>
  <text x="300" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="white">Logs</text>
  <text x="300" y="165" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">ELK Stack / Loki</text>
  <text x="300" y="182" text-anchor="middle" font-size="9" fill="#64748b">Structured JSON logs</text>
  <text x="300" y="196" text-anchor="middle" font-size="9" fill="#64748b">Error stack traces</text>
  <text x="300" y="210" text-anchor="middle" font-size="9" fill="#64748b">Correlation IDs</text>

  <!-- Pillar 3: Traces -->
  <rect x="410" y="120" width="160" height="100" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="410" y="120" width="160" height="28" rx="8" fill="#8b5cf6"/>
  <rect x="410" y="140" width="160" height="8" fill="#8b5cf6"/>
  <text x="490" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="white">Traces</text>
  <text x="490" y="165" text-anchor="middle" font-size="10" font-weight="600" fill="#8b5cf6">Jaeger / Tempo</text>
  <text x="490" y="182" text-anchor="middle" font-size="9" fill="#64748b">Distributed tracing</text>
  <text x="490" y="196" text-anchor="middle" font-size="9" fill="#64748b">Span waterfall view</text>
  <text x="490" y="210" text-anchor="middle" font-size="9" fill="#64748b">Service dependency map</text>

  <!-- Arrows to dashboard -->
  <line x1="110" y1="220" x2="110" y2="250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="300" y1="220" x2="300" y2="250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="490" y1="220" x2="490" y2="250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- Dashboard / Visualization -->
  <rect x="60" y="255" width="240" height="50" rx="8" fill="white" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="180" y="278" text-anchor="middle" font-size="11" font-weight="600" fill="#f59e0b">Grafana Dashboards</text>
  <text x="180" y="295" text-anchor="middle" font-size="9" fill="#64748b">Unified view across all pillars</text>

  <!-- Alerting -->
  <rect x="340" y="255" width="220" height="50" rx="8" fill="white" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="278" text-anchor="middle" font-size="11" font-weight="600" fill="#ef4444">Alerting (PagerDuty/Slack)</text>
  <text x="450" y="295" text-anchor="middle" font-size="9" fill="#64748b">SLO-based alerts, on-call routing</text>

  <!-- Arrow between dashboard and alerts -->
  <line x1="300" y1="280" x2="335" y2="280" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Footer -->
  <text x="300" y="335" text-anchor="middle" font-size="9" fill="#64748b">OpenTelemetry provides vendor-neutral instrumentation | Correlate metrics, logs, and traces via trace_id</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="800" height="350">
  <defs>
    <linearGradient id="spectrumGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="25%" stop-color="#6d5ade"/>
      <stop offset="50%" stop-color="#5b7bd0"/>
      <stop offset="75%" stop-color="#4a9bc2"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1e"/>
      <stop offset="100%" stop-color="#1a1333"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" rx="12" fill="url(#bgGrad)"/>
  <rect x="1" y="1" width="798" height="348" rx="11" fill="none" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e2d9f3" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">Consistency Models Spectrum</text>

  <!-- Spectrum bar -->
  <rect x="60" y="55" width="680" height="10" rx="5" fill="url(#spectrumGrad)" filter="url(#glow)"/>

  <!-- Arrow indicators -->
  <text x="60" y="80" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="10" font-weight="600">STRONG</text>
  <text x="740" y="80" text-anchor="end" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="10" font-weight="600">EVENTUAL</text>

  <!-- 5 columns: Strong, Sequential, Causal, Read-Your-Writes, Eventual -->
  <!-- Column positions: 110, 250, 400, 550, 690 -->

  <!-- Column 1: Strong -->
  <circle cx="110" cy="60" r="6" fill="#7c3aed" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="110" y1="66" x2="110" y2="92" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="35" y="92" width="150" height="150" rx="8" fill="#1e1535" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1"/>
  <text x="110" y="112" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Strong</text>
  <text x="110" y="126" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="10" font-weight="700">(Linearizable)</text>
  <text x="110" y="148" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9">Every read returns</text>
  <text x="110" y="160" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9">the most recent write</text>
  <text x="110" y="180" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Latency: HIGH</text>
  <text x="110" y="194" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Availability: LOW</text>
  <line x1="50" y1="206" x2="170" y2="206" stroke="#7c3aed" stroke-opacity="0.2" stroke-width="1"/>
  <text x="110" y="222" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="9" font-style="italic">Spanner</text>
  <text x="110" y="234" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="9" font-style="italic">CockroachDB, etcd</text>

  <!-- Column 2: Sequential -->
  <circle cx="250" cy="60" r="6" fill="#6d5ade" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="250" y1="66" x2="250" y2="92" stroke="#6d5ade" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="175" y="92" width="150" height="150" rx="8" fill="#1e1535" stroke="#6d5ade" stroke-opacity="0.4" stroke-width="1"/>
  <text x="250" y="112" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Sequential</text>
  <text x="250" y="148" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9">All ops appear in some</text>
  <text x="250" y="160" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9">sequential order per client</text>
  <text x="250" y="180" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Latency: MED-HIGH</text>
  <text x="250" y="194" text-anchor="middle" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Availability: MED-LOW</text>
  <line x1="190" y1="206" x2="310" y2="206" stroke="#6d5ade" stroke-opacity="0.2" stroke-width="1"/>
  <text x="250" y="222" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="9" font-style="italic">ZooKeeper</text>
  <text x="250" y="234" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="9" font-style="italic">(sequential writes)</text>

  <!-- Column 3: Causal -->
  <circle cx="400" cy="60" r="6" fill="#5b7bd0" stroke="#93c5fd" stroke-width="1.5"/>
  <line x1="400" y1="66" x2="400" y2="92" stroke="#5b7bd0" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="325" y="92" width="150" height="150" rx="8" fill="#1a1a35" stroke="#5b7bd0" stroke-opacity="0.4" stroke-width="1"/>
  <text x="400" y="112" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Causal</text>
  <text x="400" y="148" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9">Causally related ops</text>
  <text x="400" y="160" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9">seen in same order</text>
  <text x="400" y="180" text-anchor="middle" fill="#eab308" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Latency: MEDIUM</text>
  <text x="400" y="194" text-anchor="middle" fill="#eab308" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Availability: MEDIUM</text>
  <line x1="340" y1="206" x2="460" y2="206" stroke="#5b7bd0" stroke-opacity="0.2" stroke-width="1"/>
  <text x="400" y="222" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="9" font-style="italic">MongoDB</text>
  <text x="400" y="234" text-anchor="middle" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="9" font-style="italic">(causal sessions)</text>

  <!-- Column 4: Read-Your-Writes -->
  <circle cx="550" cy="60" r="6" fill="#4a9bc2" stroke="#67e8f9" stroke-width="1.5"/>
  <line x1="550" y1="66" x2="550" y2="92" stroke="#4a9bc2" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="475" y="92" width="150" height="150" rx="8" fill="#151a30" stroke="#4a9bc2" stroke-opacity="0.4" stroke-width="1"/>
  <text x="550" y="112" text-anchor="middle" fill="#67e8f9" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Read-Your-Writes</text>
  <text x="550" y="148" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9">User always sees own</text>
  <text x="550" y="160" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9">writes immediately</text>
  <text x="550" y="180" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Latency: MED-LOW</text>
  <text x="550" y="194" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Availability: MED-HIGH</text>
  <line x1="490" y1="206" x2="610" y2="206" stroke="#4a9bc2" stroke-opacity="0.2" stroke-width="1"/>
  <text x="550" y="222" text-anchor="middle" fill="#67e8f9" font-family="system-ui, sans-serif" font-size="9" font-style="italic">Facebook TAO</text>
  <text x="550" y="234" text-anchor="middle" fill="#67e8f9" font-family="system-ui, sans-serif" font-size="9" font-style="italic">Session-based caches</text>

  <!-- Column 5: Eventual -->
  <circle cx="690" cy="60" r="6" fill="#38bdf8" stroke="#7dd3fc" stroke-width="1.5"/>
  <line x1="690" y1="66" x2="690" y2="92" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="615" y="92" width="150" height="150" rx="8" fill="#101a2e" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1"/>
  <text x="690" y="112" text-anchor="middle" fill="#7dd3fc" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Eventual</text>
  <text x="690" y="148" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9">Replicas converge if</text>
  <text x="690" y="160" text-anchor="middle" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="9">no new writes occur</text>
  <text x="690" y="180" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Latency: LOW</text>
  <text x="690" y="194" text-anchor="middle" fill="#22c55e" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Availability: HIGH</text>
  <line x1="630" y1="206" x2="750" y2="206" stroke="#38bdf8" stroke-opacity="0.2" stroke-width="1"/>
  <text x="690" y="222" text-anchor="middle" fill="#7dd3fc" font-family="system-ui, sans-serif" font-size="9" font-style="italic">DynamoDB, Cassandra</text>
  <text x="690" y="234" text-anchor="middle" fill="#7dd3fc" font-family="system-ui, sans-serif" font-size="9" font-style="italic">DNS</text>

  <!-- Bottom legend bars -->
  <text x="60" y="270" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Latency</text>
  <rect x="120" y="260" width="620" height="8" rx="4" fill="#1e1535"/>
  <rect x="120" y="260" width="620" height="8" rx="4" fill="url(#spectrumGrad)" opacity="0.6"/>
  <text x="130" y="282" fill="#ef4444" font-family="system-ui, sans-serif" font-size="9">HIGH</text>
  <text x="720" y="282" text-anchor="end" fill="#22c55e" font-family="system-ui, sans-serif" font-size="9">LOW</text>

  <text x="60" y="308" fill="#9ca3af" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Availability</text>
  <rect x="120" y="298" width="620" height="8" rx="4" fill="#1e1535"/>
  <rect x="120" y="298" width="620" height="8" rx="4" fill="url(#spectrumGrad)" opacity="0.6"/>
  <text x="130" y="320" fill="#ef4444" font-family="system-ui, sans-serif" font-size="9">LOW</text>
  <text x="720" y="320" text-anchor="end" fill="#22c55e" font-family="system-ui, sans-serif" font-size="9">HIGH</text>

  <!-- Directional arrows on bars -->
  <polygon points="735,264 745,264 740,258" fill="#22c55e" opacity="0.7"/>
  <polygon points="125,264 115,264 120,258" fill="#ef4444" opacity="0.7"/>
  <polygon points="735,302 745,302 740,296" fill="#22c55e" opacity="0.7"/>
  <polygon points="125,302 115,302 120,296" fill="#ef4444" opacity="0.7"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="system-ui, -apple-system, sans-serif">
  <rect width="600" height="350" fill="#f7f8f9" rx="12"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Strong vs Eventual Consistency</text>

  <!-- Strong Consistency Section -->
  <text x="150" y="58" text-anchor="middle" font-size="13" font-weight="700" fill="#10b981">Strong Consistency</text>

  <!-- Timeline bar -->
  <line x1="30" y1="80" x2="280" y2="80" stroke="#e2e8f0" stroke-width="2"/>
  <text x="30" y="95" font-size="9" fill="#64748b">t0</text>
  <text x="130" y="95" font-size="9" fill="#64748b">t1 (write)</text>
  <text x="240" y="95" font-size="9" fill="#64748b">t2 (read)</text>

  <!-- Write event -->
  <circle cx="140" cy="80" r="5" fill="#8b5cf6"/>
  <line x1="140" y1="85" x2="140" y2="105" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="140" y="116" text-anchor="middle" font-size="9" fill="#8b5cf6" font-weight="600">Write X=5</text>

  <!-- Nodes at t1 - all blocked until consistent -->
  <rect x="45" y="125" width="70" height="32" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="80" y="140" text-anchor="middle" font-size="9" font-weight="600" fill="#1e293b">Node A</text>
  <text x="80" y="150" text-anchor="middle" font-size="8" fill="#10b981">X=5</text>

  <rect x="120" y="125" width="70" height="32" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="155" y="140" text-anchor="middle" font-size="9" font-weight="600" fill="#1e293b">Node B</text>
  <text x="155" y="150" text-anchor="middle" font-size="8" fill="#10b981">X=5</text>

  <rect x="195" y="125" width="70" height="32" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="230" y="140" text-anchor="middle" font-size="9" font-weight="600" fill="#1e293b">Node C</text>
  <text x="230" y="150" text-anchor="middle" font-size="8" fill="#10b981">X=5</text>

  <!-- All same indicator -->
  <rect x="55" y="165" width="200" height="22" rx="6" fill="#10b981" opacity="0.1"/>
  <text x="155" y="180" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">&#10003; All nodes return X=5 immediately</text>

  <!-- Read at t2 -->
  <circle cx="250" cy="80" r="5" fill="#3b82f6"/>

  <!-- Divider -->
  <line x1="295" y1="48" x2="295" y2="330" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Eventual Consistency Section -->
  <text x="445" y="58" text-anchor="middle" font-size="13" font-weight="700" fill="#f59e0b">Eventual Consistency</text>

  <!-- Timeline bar -->
  <line x1="320" y1="80" x2="570" y2="80" stroke="#e2e8f0" stroke-width="2"/>
  <text x="320" y="95" font-size="9" fill="#64748b">t0</text>
  <text x="400" y="95" font-size="9" fill="#64748b">t1 (write)</text>
  <text x="530" y="95" font-size="9" fill="#64748b">t3</text>

  <!-- Write event -->
  <circle cx="410" cy="80" r="5" fill="#8b5cf6"/>
  <line x1="410" y1="85" x2="410" y2="105" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="410" y="116" text-anchor="middle" font-size="9" fill="#8b5cf6" font-weight="600">Write X=5</text>

  <!-- Nodes at t1 - inconsistent -->
  <rect x="335" y="125" width="70" height="32" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="370" y="140" text-anchor="middle" font-size="9" font-weight="600" fill="#1e293b">Node A</text>
  <text x="370" y="150" text-anchor="middle" font-size="8" fill="#10b981">X=5</text>

  <rect x="410" y="125" width="70" height="32" rx="6" fill="white" stroke="#ef4444" stroke-width="1.5"/>
  <text x="445" y="140" text-anchor="middle" font-size="9" font-weight="600" fill="#1e293b">Node B</text>
  <text x="445" y="150" text-anchor="middle" font-size="8" fill="#ef4444">X=3 (stale)</text>

  <rect x="485" y="125" width="70" height="32" rx="6" fill="white" stroke="#ef4444" stroke-width="1.5"/>
  <text x="520" y="140" text-anchor="middle" font-size="9" font-weight="600" fill="#1e293b">Node C</text>
  <text x="520" y="150" text-anchor="middle" font-size="8" fill="#ef4444">X=3 (stale)</text>

  <!-- Inconsistent indicator -->
  <rect x="345" y="165" width="200" height="22" rx="6" fill="#ef4444" opacity="0.1"/>
  <text x="445" y="180" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">&#10007; Nodes may return stale data</text>

  <!-- Convergence arrows -->
  <path d="M 370 157 Q 390 200 420 210" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <path d="M 445 157 Q 445 200 445 210" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3"/>
  <path d="M 520 157 Q 500 200 470 210" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3"/>

  <text x="445" y="210" text-anchor="middle" font-size="9" fill="#f59e0b" font-weight="600">Propagating...</text>

  <!-- Eventually consistent nodes -->
  <rect x="335" y="225" width="70" height="32" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="370" y="240" text-anchor="middle" font-size="9" font-weight="600" fill="#1e293b">Node A</text>
  <text x="370" y="250" text-anchor="middle" font-size="8" fill="#10b981">X=5</text>

  <rect x="410" y="225" width="70" height="32" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="445" y="240" text-anchor="middle" font-size="9" font-weight="600" fill="#1e293b">Node B</text>
  <text x="445" y="250" text-anchor="middle" font-size="8" fill="#10b981">X=5</text>

  <rect x="485" y="225" width="70" height="32" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="520" y="240" text-anchor="middle" font-size="9" font-weight="600" fill="#1e293b">Node C</text>
  <text x="520" y="250" text-anchor="middle" font-size="8" fill="#10b981">X=5</text>

  <rect x="345" y="265" width="200" height="22" rx="6" fill="#10b981" opacity="0.1"/>
  <text x="445" y="280" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">&#10003; Eventually all nodes converge</text>

  <!-- Bottom comparison -->
  <rect x="30" y="205" width="250" height="55" rx="8" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="155" y="224" text-anchor="middle" font-size="11" font-weight="700" fill="#10b981">Strong Guarantees</text>
  <text x="155" y="240" text-anchor="middle" font-size="9" fill="#64748b">&#8226; Higher latency (wait for all nodes)</text>
  <text x="155" y="252" text-anchor="middle" font-size="9" fill="#64748b">&#8226; Lower throughput, more coordination</text>

  <rect x="320" y="295" width="250" height="48" rx="8" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="445" y="314" text-anchor="middle" font-size="11" font-weight="700" fill="#f59e0b">Eventual Guarantees</text>
  <text x="445" y="328" text-anchor="middle" font-size="9" fill="#64748b">&#8226; Lower latency &#8226; Higher availability &#8226; Scales better</text>

  <rect x="30" y="270" width="250" height="48" rx="8" fill="white" stroke="#64748b" stroke-width="1"/>
  <text x="155" y="289" text-anchor="middle" font-size="10" fill="#1e293b" font-weight="600">Use cases: Banking, Inventory</text>
  <text x="155" y="305" text-anchor="middle" font-size="9" fill="#64748b">Where correctness &gt; performance</text>
</svg>
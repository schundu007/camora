<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <marker id="arrow3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
  </defs>

  <rect width="400" height="250" rx="8" fill="#f7f8f9"/>

  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Stage 3: Load Balanced</text>
  <text x="200" y="44" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Horizontal scaling with redundancy</text>

  <!-- Users -->
  <rect x="10" y="100" width="64" height="50" rx="8" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <text x="42" y="122" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Users</text>
  <text x="42" y="137" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b">Browsers</text>

  <!-- Arrow to LB -->
  <line x1="74" y1="125" x2="102" y2="125" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow3)"/>

  <!-- Load Balancer -->
  <rect x="104" y="100" width="56" height="50" rx="8" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <text x="132" y="122" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#1e293b">Load</text>
  <text x="132" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#1e293b">Balancer</text>

  <!-- Fan-out arrows -->
  <line x1="160" y1="115" x2="198" y2="80" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <line x1="160" y1="125" x2="198" y2="125" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <line x1="160" y1="135" x2="198" y2="170" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <!-- Server 1 -->
  <rect x="200" y="60" width="72" height="38" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="236" y="83" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#1e293b">Server 1</text>

  <!-- Server 2 -->
  <rect x="200" y="106" width="72" height="38" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="236" y="129" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#1e293b">Server 2</text>

  <!-- Server 3 -->
  <rect x="200" y="152" width="72" height="38" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="236" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#1e293b">Server 3</text>

  <!-- Converge arrows to DB -->
  <line x1="272" y1="79" x2="318" y2="118" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <line x1="272" y1="125" x2="318" y2="125" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <line x1="272" y1="171" x2="318" y2="132" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <!-- Database -->
  <rect x="320" y="95" width="68" height="60" rx="8" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <ellipse cx="354" cy="112" rx="16" ry="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
  <rect x="338" y="112" width="32" height="14" fill="#eff6ff"/>
  <line x1="338" y1="112" x2="338" y2="126" stroke="#3b82f6" stroke-width="1.2"/>
  <line x1="370" y1="112" x2="370" y2="126" stroke="#3b82f6" stroke-width="1.2"/>
  <ellipse cx="354" cy="126" rx="16" ry="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="354" y="146" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#1e293b">Database</text>

  <!-- Footer -->
  <text x="200" y="218" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">No single point of failure for compute</text>
  <rect x="160" y="226" width="80" height="16" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="200" y="237" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#3b82f6">~10K users</text>
</svg>
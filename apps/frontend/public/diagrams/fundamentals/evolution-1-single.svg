<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <marker id="arrow1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="400" height="250" rx="8" fill="#f7f8f9"/>

  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Stage 1: Single Server</text>
  <text x="200" y="44" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Everything on one machine</text>

  <!-- Users -->
  <rect x="30" y="95" width="90" height="60" rx="8" fill="white" stroke="#ef4444" stroke-width="2"/>
  <text x="75" y="121" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Users</text>
  <text x="75" y="137" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">Browsers</text>

  <!-- Arrow -->
  <line x1="120" y1="125" x2="178" y2="125" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow1)"/>

  <!-- Server box (monolith) -->
  <rect x="180" y="70" width="190" height="110" rx="8" fill="white" stroke="#ef4444" stroke-width="2"/>
  <text x="275" y="93" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Single Server</text>

  <!-- Inner sections -->
  <rect x="195" y="102" width="76" height="34" rx="5" fill="#fef2f2" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="233" y="123" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#ef4444">Web App</text>

  <rect x="281" y="102" width="76" height="34" rx="5" fill="#fef2f2" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="319" y="123" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#ef4444">Database</text>

  <rect x="195" y="144" width="162" height="26" rx="5" fill="#fef2f2" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="276" y="161" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#ef4444">File Storage</text>

  <!-- Footer label -->
  <text x="200" y="218" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Simple but single point of failure</text>
  <rect x="160" y="226" width="80" height="16" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="200" y="237" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#ef4444">~100 users</text>
</svg>
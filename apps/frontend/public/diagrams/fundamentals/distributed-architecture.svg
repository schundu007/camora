<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .title { font-size: 16px; font-weight: 700; fill: #1e293b; }
      .component-label { font-size: 10px; font-weight: 600; fill: #fff; }
      .component-sublabel { font-size: 8px; fill: #fff; opacity: 0.85; }
      .arrow-label { font-size: 8px; fill: #64748b; font-weight: 500; }
      .section-label { font-size: 8px; fill: #94a3b8; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
    </style>
    <filter id="shadow" x="-6%" y="-6%" width="112%" height="116%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f8f9"/>
      <stop offset="100%" stop-color="#eef1f5"/>
    </linearGradient>
    <linearGradient id="blue-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="emerald-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="violet-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="amber-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="red-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="slate-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <!-- Arrow markers -->
    <marker id="arr-slate" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,3 L0,6 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="url(#bg-grad)"/>
  <rect x="0.5" y="0.5" width="799" height="399" rx="12" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Distributed System Architecture</text>

  <!-- ===== USERS ===== -->
  <g transform="translate(48, 145)" filter="url(#shadow)">
    <rect x="-28" y="-28" width="56" height="56" rx="28" fill="url(#slate-grad)"/>
    <!-- User icon -->
    <circle cx="0" cy="-8" r="8" fill="#fff" opacity="0.9"/>
    <path d="M-14,18 Q-14,4 0,4 Q14,4 14,18" fill="#fff" opacity="0.9"/>
    <text x="0" y="42" text-anchor="middle" class="section-label" fill="#64748b">Users</text>
  </g>

  <!-- ===== CDN ===== -->
  <g transform="translate(152, 145)" filter="url(#shadow)">
    <rect x="-36" y="-24" width="72" height="48" rx="8" fill="url(#cyan-grad)"/>
    <text x="0" y="-4" text-anchor="middle" class="component-label">CDN</text>
    <text x="0" y="9" text-anchor="middle" class="component-sublabel">Static Assets</text>
  </g>

  <!-- Arrow: Users -> CDN -->
  <line x1="76" y1="145" x2="112" y2="145" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-slate)"/>
  <text x="94" y="138" text-anchor="middle" class="arrow-label">HTTPS</text>

  <!-- ===== LOAD BALANCER ===== -->
  <g transform="translate(266, 145)" filter="url(#shadow)">
    <rect x="-40" y="-28" width="80" height="56" rx="8" fill="url(#violet-grad)"/>
    <!-- LB icon: three horizontal lines -->
    <line x1="-16" y1="-12" x2="16" y2="-12" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <line x1="-16" y1="-4" x2="16" y2="-4" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="-16" y1="4" x2="16" y2="4" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <text x="0" y="20" text-anchor="middle" class="component-label" font-size="9">Load Balancer</text>
  </g>

  <!-- Arrow: CDN -> LB -->
  <line x1="188" y1="145" x2="222" y2="145" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr-slate)"/>

  <!-- ===== APP SERVERS ===== -->
  <!-- Server group background -->
  <rect x="338" y="62" width="120" height="188" rx="10" fill="#3b82f6" opacity="0.05" stroke="#3b82f6" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="398" y="78" text-anchor="middle" class="section-label" fill="#3b82f6">App Servers</text>

  <!-- Server 1 -->
  <g transform="translate(398, 105)" filter="url(#shadow)">
    <rect x="-32" y="-16" width="64" height="32" rx="6" fill="url(#blue-grad)"/>
    <text x="0" y="1" text-anchor="middle" class="component-label" font-size="9">Server 1</text>
    <text x="0" y="11" text-anchor="middle" class="component-sublabel">Node.js</text>
  </g>

  <!-- Server 2 -->
  <g transform="translate(398, 150)" filter="url(#shadow)">
    <rect x="-32" y="-16" width="64" height="32" rx="6" fill="url(#blue-grad)"/>
    <text x="0" y="1" text-anchor="middle" class="component-label" font-size="9">Server 2</text>
    <text x="0" y="11" text-anchor="middle" class="component-sublabel">Node.js</text>
  </g>

  <!-- Server 3 -->
  <g transform="translate(398, 195)" filter="url(#shadow)">
    <rect x="-32" y="-16" width="64" height="32" rx="6" fill="url(#blue-grad)"/>
    <text x="0" y="1" text-anchor="middle" class="component-label" font-size="9">Server 3</text>
    <text x="0" y="11" text-anchor="middle" class="component-sublabel">Node.js</text>
  </g>

  <!-- Arrows: LB -> Servers -->
  <line x1="306" y1="130" x2="362" y2="105" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr-slate)"/>
  <line x1="306" y1="145" x2="362" y2="150" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr-slate)"/>
  <line x1="306" y1="160" x2="362" y2="195" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr-slate)"/>

  <!-- ===== CACHE (Redis) ===== -->
  <g transform="translate(540, 110)" filter="url(#shadow)">
    <rect x="-38" y="-24" width="76" height="48" rx="8" fill="url(#red-grad)"/>
    <!-- Cache icon -->
    <path d="M-12,-10 L12,-10 L12,4 L-12,4 Z" fill="#fff" opacity="0.2" rx="2"/>
    <text x="0" y="-2" text-anchor="middle" class="component-label">Cache</text>
    <text x="0" y="12" text-anchor="middle" class="component-sublabel">Redis</text>
  </g>

  <!-- Arrow: Servers -> Cache -->
  <line x1="434" y1="115" x2="498" y2="110" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr-slate)"/>
  <text x="466" y="104" text-anchor="middle" class="arrow-label">Read</text>

  <!-- ===== DATABASE ===== -->
  <!-- DB group background -->
  <rect x="622" y="58" width="156" height="196" rx="10" fill="#10b981" opacity="0.05" stroke="#10b981" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="700" y="74" text-anchor="middle" class="section-label" fill="#10b981">Database Cluster</text>

  <!-- Primary DB -->
  <g transform="translate(700, 110)" filter="url(#shadow)">
    <rect x="-42" y="-24" width="84" height="48" rx="8" fill="url(#emerald-grad)"/>
    <!-- DB icon -->
    <ellipse cx="0" cy="-10" rx="14" ry="5" fill="#fff" opacity="0.25"/>
    <text x="0" y="2" text-anchor="middle" class="component-label">Primary</text>
    <text x="0" y="14" text-anchor="middle" class="component-sublabel">PostgreSQL</text>
  </g>

  <!-- Read Replica 1 -->
  <g transform="translate(670, 195)" filter="url(#shadow)">
    <rect x="-34" y="-18" width="68" height="36" rx="6" fill="#10b981" opacity="0.7"/>
    <text x="0" y="-2" text-anchor="middle" class="component-label" font-size="8.5">Replica 1</text>
    <text x="0" y="10" text-anchor="middle" class="component-sublabel">Read-only</text>
  </g>

  <!-- Read Replica 2 -->
  <g transform="translate(740, 195)" filter="url(#shadow)">
    <rect x="-34" y="-18" width="68" height="36" rx="6" fill="#10b981" opacity="0.7"/>
    <text x="0" y="-2" text-anchor="middle" class="component-label" font-size="8.5">Replica 2</text>
    <text x="0" y="10" text-anchor="middle" class="component-sublabel">Read-only</text>
  </g>

  <!-- Arrow: Primary -> Replicas -->
  <line x1="685" y1="134" x2="670" y2="173" stroke="#10b981" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="715" y1="134" x2="740" y2="173" stroke="#10b981" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="700" y="160" text-anchor="middle" class="arrow-label" fill="#10b981">Replication</text>

  <!-- Arrow: Cache -> Primary DB -->
  <line x1="578" y1="110" x2="654" y2="110" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arr-slate)"/>
  <text x="616" y="104" text-anchor="middle" class="arrow-label">Miss</text>

  <!-- Arrow: Servers -> DB (direct write) -->
  <path d="M434,150 Q480,170 580,145 Q620,138 654,120" fill="none" stroke="#10b981" stroke-width="1.2" marker-end="url(#arr-slate)" stroke-dasharray="4,2"/>
  <text x="530" y="166" text-anchor="middle" class="arrow-label" fill="#10b981">Write</text>

  <!-- ===== MESSAGE QUEUE ===== -->
  <g transform="translate(500, 310)" filter="url(#shadow)">
    <rect x="-56" y="-24" width="112" height="48" rx="8" fill="url(#amber-grad)"/>
    <!-- Queue icon: three stacked bars -->
    <rect x="-24" y="-14" width="48" height="6" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="-24" y="-5" width="48" height="6" rx="2" fill="#fff" opacity="0.25"/>
    <rect x="-24" y="4" width="36" height="6" rx="2" fill="#fff" opacity="0.2"/>
    <text x="16" y="0" text-anchor="middle" class="component-label" font-size="9" dx="6">Message</text>
    <text x="16" y="12" text-anchor="middle" class="component-sublabel" dx="6">Queue</text>
  </g>

  <!-- Arrow: Servers -> Message Queue -->
  <path d="M420,211 L420,280 Q420,300 440,305" fill="none" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <text x="408" y="258" text-anchor="middle" class="arrow-label" fill="#d97706">Async</text>
  <text x="408" y="268" text-anchor="middle" class="arrow-label" fill="#d97706">Events</text>

  <!-- Workers consuming from queue -->
  <g transform="translate(650, 310)" filter="url(#shadow)">
    <rect x="-34" y="-20" width="68" height="40" rx="6" fill="url(#amber-grad)" opacity="0.85"/>
    <text x="0" y="-2" text-anchor="middle" class="component-label" font-size="9">Workers</text>
    <text x="0" y="10" text-anchor="middle" class="component-sublabel">Background</text>
  </g>

  <!-- Arrow: Queue -> Workers -->
  <line x1="556" y1="310" x2="612" y2="310" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#arr-amber)"/>
  <text x="584" y="304" text-anchor="middle" class="arrow-label" fill="#d97706">Consume</text>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(30, 310)">
    <rect x="-10" y="-12" width="120" height="82" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="0.5"/>
    <text x="50" y="2" text-anchor="middle" font-size="8" font-weight="700" fill="#1e293b">Legend</text>
    <circle cx="8" cy="16" r="4" fill="#06b6d4"/>
    <text x="20" y="19" font-size="7.5" fill="#64748b">CDN / Edge</text>
    <circle cx="8" cy="29" r="4" fill="#8b5cf6"/>
    <text x="20" y="32" font-size="7.5" fill="#64748b">Load Balancer</text>
    <circle cx="8" cy="42" r="4" fill="#3b82f6"/>
    <text x="20" y="45" font-size="7.5" fill="#64748b">Application</text>
    <circle cx="8" cy="55" r="4" fill="#ef4444"/>
    <text x="20" y="58" font-size="7.5" fill="#64748b">Cache Layer</text>
    <circle cx="8" cy="68" r="4" fill="#10b981"/>
    <text x="20" y="71" font-size="7.5" fill="#64748b">Database</text>
  </g>

  <!-- Data flow note -->
  <g transform="translate(200, 370)">
    <rect x="-60" y="-12" width="240" height="24" rx="6" fill="#eef2ff" stroke="#c7d2fe" stroke-width="0.5"/>
    <text x="60" y="3" text-anchor="middle" font-size="9" fill="#4f46e5" font-weight="500">Request flow: Users -> CDN -> LB -> App -> Cache -> DB</text>
  </g>
</svg>
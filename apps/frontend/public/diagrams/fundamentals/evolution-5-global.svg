<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <marker id="arrow5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#10b981"/>
    </marker>
    <marker id="arrow5light" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#10b981" opacity="0.6"/>
    </marker>
  </defs>

  <rect width="400" height="250" rx="8" fill="#f7f8f9"/>

  <!-- Title -->
  <text x="200" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Stage 5: Globally Distributed</text>
  <text x="200" y="34" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">CDN, queues, workers, sharded databases</text>

  <!-- CDN -->
  <rect x="8" y="50" width="48" height="34" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
  <text x="32" y="66" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#10b981">CDN</text>
  <text x="32" y="77" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#64748b">Static</text>

  <!-- Users -->
  <rect x="68" y="50" width="48" height="34" rx="6" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="92" y="66" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#1e293b">Users</text>
  <text x="92" y="77" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#64748b">Global</text>

  <!-- CDN to Users -->
  <line x1="56" y1="67" x2="66" y2="67" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow5)"/>

  <!-- Arrow Users to LB -->
  <line x1="116" y1="67" x2="132" y2="67" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow5)"/>

  <!-- Load Balancer -->
  <rect x="134" y="50" width="40" height="34" rx="6" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="154" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#1e293b">LB</text>

  <!-- Arrow LB to Servers -->
  <line x1="174" y1="67" x2="192" y2="67" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow5)"/>

  <!-- Servers group -->
  <rect x="194" y="44" width="60" height="46" rx="6" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="224" y="62" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#1e293b">Servers</text>
  <text x="224" y="78" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#64748b">Auto-scale</text>

  <!-- Arrow Servers to Cache -->
  <line x1="254" y1="67" x2="272" y2="67" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow5)"/>

  <!-- Cache -->
  <rect x="274" y="50" width="50" height="34" rx="6" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="299" y="66" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#10b981">Cache</text>
  <text x="299" y="77" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#64748b">Redis</text>

  <!-- Arrow Cache to Sharded DBs -->
  <line x1="324" y1="67" x2="338" y2="67" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow5)"/>

  <!-- Sharded DBs group -->
  <rect x="340" y="44" width="52" height="46" rx="6" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="366" y="60" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#1e293b">Sharded</text>
  <text x="366" y="72" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#1e293b">DBs</text>
  <text x="366" y="84" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#64748b">Partitioned</text>

  <!-- Arrow Servers down to Message Queue -->
  <line x1="224" y1="90" x2="224" y2="114" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow5)"/>

  <!-- Message Queue -->
  <rect x="178" y="116" width="92" height="34" rx="6" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="224" y="132" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#10b981">Message Queue</text>
  <text x="224" y="144" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#64748b">Kafka / SQS</text>

  <!-- Arrow Queue down to Workers -->
  <line x1="224" y1="150" x2="224" y2="170" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow5)"/>

  <!-- Workers -->
  <rect x="178" y="172" width="92" height="34" rx="6" fill="white" stroke="#10b981" stroke-width="2"/>
  <text x="224" y="188" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#1e293b">Workers</text>
  <text x="224" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#64748b">Async Processing</text>

  <!-- Workers to DB (dashed) -->
  <path d="M270,189 Q310,189 366,90" stroke="#10b981" stroke-width="1" stroke-dasharray="4,2" fill="none" marker-end="url(#arrow5light)"/>

  <!-- Footer -->
  <rect x="136" y="224" width="128" height="18" rx="9" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="200" y="237" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#10b981">Millions of users worldwide</text>
</svg>
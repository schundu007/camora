<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #1e293b; }
      .node-label { font-size: 14px; font-weight: 600; fill: #fff; }
      .node-sublabel { font-size: 10px; fill: #fff; opacity: 0.9; }
      .edge-label { font-size: 11px; font-weight: 600; }
      .edge-sublabel { font-size: 9.5px; fill: #64748b; }
      .center-text { font-size: 14px; font-weight: 700; fill: #1e293b; }
      .note-text { font-size: 11px; fill: #64748b; }
      .note-bold { font-size: 11px; font-weight: 600; fill: #1e293b; }
    </style>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <filter id="glow-emerald">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#10b981" flood-opacity="0.25"/>
    </filter>
    <filter id="glow-blue">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#3b82f6" flood-opacity="0.25"/>
    </filter>
    <filter id="glow-violet">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#8b5cf6" flood-opacity="0.25"/>
    </filter>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f8f9"/>
      <stop offset="100%" stop-color="#eef0f2"/>
    </linearGradient>
    <linearGradient id="emerald-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="blue-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="violet-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="450" rx="12" fill="url(#bg-grad)"/>
  <rect x="0.5" y="0.5" width="599" height="449" rx="12" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="300" y="36" text-anchor="middle" class="title">CAP Theorem</text>

  <!-- Triangle edges (drawn behind nodes) -->
  <!-- C to A edge -->
  <line x1="300" y1="95" x2="145" y2="300" stroke="#e2e8f0" stroke-width="2.5" stroke-dasharray="6,4"/>
  <!-- C to P edge -->
  <line x1="300" y1="95" x2="455" y2="300" stroke="#e2e8f0" stroke-width="2.5" stroke-dasharray="6,4"/>
  <!-- A to P edge -->
  <line x1="145" y1="300" x2="455" y2="300" stroke="#e2e8f0" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- Triangle fill (subtle) -->
  <polygon points="300,95 145,300 455,300" fill="#10b981" opacity="0.04"/>

  <!-- Edge labels -->
  <!-- CA: top-left edge -->
  <g transform="translate(192, 180)">
    <rect x="-72" y="-22" width="144" height="44" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="-72" y="-22" width="144" height="4" rx="2" fill="#f59e0b"/>
    <text x="0" y="-2" text-anchor="middle" class="edge-label" fill="#f59e0b">CA Systems</text>
    <text x="0" y="14" text-anchor="middle" class="edge-sublabel">Single-node RDBMS</text>
  </g>

  <!-- CP: top-right edge -->
  <g transform="translate(408, 180)">
    <rect x="-82" y="-22" width="164" height="44" rx="8" fill="#fff" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="-82" y="-22" width="164" height="4" rx="2" fill="#ef4444"/>
    <text x="0" y="-2" text-anchor="middle" class="edge-label" fill="#ef4444">CP Systems</text>
    <text x="0" y="14" text-anchor="middle" class="edge-sublabel">HBase, MongoDB, Redis</text>
  </g>

  <!-- AP: bottom edge -->
  <g transform="translate(300, 355)">
    <rect x="-105" y="-22" width="210" height="44" rx="8" fill="#fff" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="-105" y="-22" width="210" height="4" rx="2" fill="#10b981"/>
    <text x="0" y="-2" text-anchor="middle" class="edge-label" fill="#10b981">AP Systems</text>
    <text x="0" y="14" text-anchor="middle" class="edge-sublabel">Cassandra, DynamoDB, CouchDB</text>
  </g>

  <!-- Center text -->
  <g transform="translate(300, 248)">
    <rect x="-44" y="-16" width="88" height="32" rx="16" fill="#1e293b"/>
    <text x="0" y="5" text-anchor="middle" class="center-text" fill="#fff" font-size="12">Pick 2 of 3</text>
  </g>

  <!-- Node: Consistency (top) -->
  <g transform="translate(300, 82)" filter="url(#glow-blue)">
    <circle r="40" fill="url(#blue-grad)"/>
    <text x="0" y="-4" text-anchor="middle" class="node-label">C</text>
    <text x="0" y="10" text-anchor="middle" class="node-sublabel">Consistency</text>
  </g>

  <!-- Node: Availability (bottom-left) -->
  <g transform="translate(145, 300)" filter="url(#glow-emerald)">
    <circle r="40" fill="url(#emerald-grad)"/>
    <text x="0" y="-4" text-anchor="middle" class="node-label">A</text>
    <text x="0" y="10" text-anchor="middle" class="node-sublabel">Availability</text>
  </g>

  <!-- Node: Partition Tolerance (bottom-right) -->
  <g transform="translate(455, 300)" filter="url(#glow-violet)">
    <circle r="40" fill="url(#violet-grad)"/>
    <text x="0" y="-4" text-anchor="middle" class="node-label">P</text>
    <text x="0" y="10" text-anchor="middle" class="node-sublabel" font-size="8.5">Partition Tol.</text>
  </g>

  <!-- Bottom note -->
  <g transform="translate(300, 428)">
    <rect x="-220" y="-14" width="440" height="28" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="0.5"/>
    <text x="-4" y="4" text-anchor="middle">
      <tspan class="note-bold" fill="#92400e">Note: </tspan>
      <tspan class="note-text" fill="#92400e">Network partitions WILL happen</tspan>
      <tspan class="note-text" fill="#92400e"> -- choose CP or AP</tspan>
    </text>
  </g>
</svg>
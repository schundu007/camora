<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <marker id="arrow2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="400" height="250" rx="8" fill="#f7f8f9"/>

  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Stage 2: Separate Database</text>
  <text x="200" y="44" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Decouple compute from storage</text>

  <!-- Users -->
  <rect x="20" y="95" width="80" height="60" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="60" y="121" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Users</text>
  <text x="60" y="137" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">Browsers</text>

  <!-- Arrow 1 -->
  <line x1="100" y1="125" x2="148" y2="125" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Web Server -->
  <rect x="150" y="85" width="100" height="80" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="200" y="117" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Web</text>
  <text x="200" y="133" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Server</text>
  <text x="200" y="152" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">Application</text>

  <!-- Arrow 2 -->
  <line x1="250" y1="125" x2="298" y2="125" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Database -->
  <rect x="300" y="85" width="80" height="80" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <!-- DB cylinder icon -->
  <ellipse cx="340" cy="108" rx="20" ry="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="320" y="108" width="40" height="20" fill="#fffbeb"/>
  <line x1="320" y1="108" x2="320" y2="128" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="360" y1="108" x2="360" y2="128" stroke="#f59e0b" stroke-width="1.5"/>
  <ellipse cx="340" cy="128" rx="20" ry="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="340" y="152" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#1e293b">Database</text>

  <!-- Benefits -->
  <text x="200" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748b">Scale compute and storage independently</text>
  <rect x="160" y="210" width="80" height="16" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="200" y="221" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" fill="#f59e0b">~1K users</text>
</svg>
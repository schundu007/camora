<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/></marker>
  </defs>

  <rect width="1200" height="450" fill="#ffffff" rx="16"/>

  <text x="600" y="32" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Notification Preference Flow</text>
  <text x="600" y="52" text-anchor="middle" fill="#64748b" font-size="12">User sets preferences, events are checked against prefs, filtered, rate-limited, then delivered or suppressed</text>

  <!-- User Settings -->
  <rect x="20" y="100" width="120" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="20" y="100" width="120" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="80" y="119" text-anchor="middle" fill="white" font-size="11" font-weight="700">User Sets Prefs</text>
  <text x="80" y="147" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Notification Settings</text>
  <text x="80" y="165" text-anchor="middle" fill="#64748b" font-size="9">Channel toggle</text>
  <text x="80" y="181" text-anchor="middle" fill="#64748b" font-size="9">Category subscribe</text>
  <text x="80" y="197" text-anchor="middle" fill="#64748b" font-size="9">Quiet hours</text>
  <text x="80" y="218" text-anchor="middle" fill="#64748b" font-size="16">&#x2699;&#xFE0F;</text>

  <!-- Store Prefs -->
  <rect x="190" y="100" width="120" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="190" y="100" width="120" height="28" rx="10 10 0 0" fill="#ef4444"/>
  <text x="250" y="119" text-anchor="middle" fill="white" font-size="11" font-weight="700">Store in Redis</text>
  <text x="250" y="147" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Preference Cache</text>
  <text x="250" y="165" text-anchor="middle" fill="#64748b" font-size="9">prefs:{userId}</text>
  <text x="250" y="181" text-anchor="middle" fill="#64748b" font-size="9">Sub-ms lookup</text>
  <text x="250" y="197" text-anchor="middle" fill="#64748b" font-size="9">+ PostgreSQL backup</text>
  <text x="250" y="218" text-anchor="middle" fill="#94a3b8" font-size="8">Redis + DB</text>

  <!-- On Event -->
  <rect x="360" y="100" width="110" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="360" y="100" width="110" height="28" rx="10 10 0 0" fill="#f97316"/>
  <text x="415" y="119" text-anchor="middle" fill="white" font-size="11" font-weight="700">On Event</text>
  <text x="415" y="147" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Check Prefs</text>
  <text x="415" y="165" text-anchor="middle" fill="#64748b" font-size="9">Channel enabled?</text>
  <text x="415" y="181" text-anchor="middle" fill="#64748b" font-size="9">Category subscribed?</text>
  <text x="415" y="197" text-anchor="middle" fill="#64748b" font-size="9">In quiet hours?</text>
  <text x="415" y="218" text-anchor="middle" fill="#94a3b8" font-size="8">Redis lookup</text>

  <!-- Filter -->
  <rect x="520" y="100" width="110" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="520" y="100" width="110" height="28" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="575" y="119" text-anchor="middle" fill="white" font-size="11" font-weight="700">Filter</text>
  <text x="575" y="147" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Apply Rules</text>
  <text x="575" y="165" text-anchor="middle" fill="#64748b" font-size="9">Frequency caps</text>
  <text x="575" y="181" text-anchor="middle" fill="#64748b" font-size="9">Dedup (same event)</text>
  <text x="575" y="197" text-anchor="middle" fill="#64748b" font-size="9">Content safety</text>
  <text x="575" y="218" text-anchor="middle" fill="#94a3b8" font-size="8">Rule engine</text>

  <!-- Rate Limit -->
  <rect x="680" y="100" width="120" height="130" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="680" y="100" width="120" height="28" rx="10 10 0 0" fill="#ef4444"/>
  <text x="740" y="119" text-anchor="middle" fill="white" font-size="11" font-weight="700">Rate Limit</text>
  <text x="740" y="147" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Per-User Throttle</text>
  <text x="740" y="165" text-anchor="middle" fill="#64748b" font-size="9">Max 5 push/hour</text>
  <text x="740" y="181" text-anchor="middle" fill="#64748b" font-size="9">Max 3 email/day</text>
  <text x="740" y="197" text-anchor="middle" fill="#64748b" font-size="9">Max 1 SMS/hour</text>
  <text x="740" y="218" text-anchor="middle" fill="#94a3b8" font-size="8">Token bucket</text>

  <!-- Deliver -->
  <rect x="855" y="85" width="110" height="100" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="855" y="85" width="110" height="28" rx="10 10 0 0" fill="#16a34a"/>
  <text x="910" y="104" text-anchor="middle" fill="white" font-size="11" font-weight="700">Deliver</text>
  <text x="910" y="130" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Send Notification</text>
  <text x="910" y="148" text-anchor="middle" fill="#64748b" font-size="9">Push / Email / SMS</text>
  <text x="910" y="164" text-anchor="middle" fill="#64748b" font-size="9">Track delivery</text>
  <text x="910" y="176" text-anchor="middle" fill="#16a34a" font-size="14">&#x2713;</text>

  <!-- Suppress -->
  <rect x="855" y="205" width="110" height="80" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="855" y="205" width="110" height="28" rx="10 10 0 0" fill="#ef4444"/>
  <text x="910" y="224" text-anchor="middle" fill="white" font-size="11" font-weight="700">Suppress</text>
  <text x="910" y="252" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Log + Skip</text>
  <text x="910" y="270" text-anchor="middle" fill="#64748b" font-size="9">Analytics tracked</text>
  <text x="910" y="282" text-anchor="middle" fill="#ef4444" font-size="14">&#x2717;</text>

  <!-- Arrows -->
  <line x1="140" y1="160" x2="187" y2="160" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <rect x="142" y="146" width="42" height="14" rx="3" fill="#2563eb"/>
  <text x="163" y="156" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2460;</text>

  <line x1="310" y1="160" x2="357" y2="160" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="312" y="146" width="42" height="14" rx="3" fill="#f97316"/>
  <text x="333" y="156" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2461;</text>

  <line x1="470" y1="160" x2="517" y2="160" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="472" y="146" width="42" height="14" rx="3" fill="#7c3aed"/>
  <text x="493" y="156" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2462;</text>

  <line x1="630" y1="160" x2="677" y2="160" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <rect x="632" y="146" width="42" height="14" rx="3" fill="#ef4444"/>
  <text x="653" y="156" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2463;</text>

  <!-- Rate limit to Deliver (allowed) -->
  <line x1="800" y1="135" x2="852" y2="130" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="802" y="115" width="48" height="14" rx="3" fill="#16a34a"/>
  <text x="826" y="125" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2464; Allow</text>

  <!-- Rate limit to Suppress (denied) -->
  <line x1="800" y1="190" x2="852" y2="230" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowRed)"/>
  <rect x="800" y="215" width="52" height="14" rx="3" fill="#ef4444"/>
  <text x="826" y="225" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2465; Suppress</text>

  <!-- Legend -->
  <rect x="20" y="340" width="1160" height="95" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="362" fill="#1e293b" font-size="12" font-weight="700">Flow Steps:</text>
  <rect x="50" y="372" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="66" y="381" fill="#475569" font-size="9">&#x2460; User configures notification preferences (channels, categories, quiet hours)</text>
  <rect x="50" y="388" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="66" y="397" fill="#475569" font-size="9">&#x2461; On notification event: check stored preferences in Redis (sub-ms lookup)</text>
  <rect x="50" y="404" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="66" y="413" fill="#475569" font-size="9">&#x2462; Apply filter rules: frequency caps, dedup, content safety checks</text>
  <text x="430" y="381" fill="#475569" font-size="9">&#x2463; Per-user rate limit check: max push/email/SMS per time window</text>
  <rect x="430" y="388" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="446" y="397" fill="#475569" font-size="9">&#x2464; If allowed: deliver via selected channel, track delivery status</text>
  <rect x="430" y="404" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="446" y="413" fill="#475569" font-size="9">&#x2465; If suppressed: log for analytics but do not deliver (quiet hours, rate limit, unsubscribed)</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgCap" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="450" fill="url(#bgCap)" rx="16"/>

  <!-- Title -->
  <rect x="340" y="16" width="520" height="40" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="43" text-anchor="middle" fill="white" font-size="20" font-weight="700">Back-of-the-Envelope: Notification System</text>

  <!-- Column 1: Volume -->
  <rect x="20" y="75" width="275" height="350" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="20" y="75" width="275" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="157" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">Notification Volume</text>

  <text x="45" y="140" fill="#fbbf24" font-size="13" font-weight="700">&#x1F514; Billions of notifications/day</text>
  <text x="157" y="162" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="185" fill="white" font-size="12">Assume 10B notifications/day:</text>
  <text x="45" y="205" fill="rgba(255,255,255,0.7)" font-size="10">10B / 86400</text>
  <text x="45" y="228" fill="#fbbf24" font-size="16" font-weight="800">&#x2248; 115K notif/sec avg</text>
  <text x="157" y="250" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="275" fill="white" font-size="11">Peak (5x during events):</text>
  <text x="45" y="298" fill="#f97316" font-size="16" font-weight="800">&#x2248; 575K notif/sec</text>
  <text x="157" y="320" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="345" fill="white" font-size="11">Delivery SLA:</text>
  <text x="45" y="368" fill="#f97316" font-size="16" font-weight="800">&lt;1 second for push</text>
  <text x="45" y="395" fill="white" font-size="11">&lt;30 seconds for email/SMS</text>

  <!-- Column 2: Channel Breakdown -->
  <rect x="310" y="75" width="265" height="195" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="75" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">Channel Breakdown</text>

  <text x="335" y="140" fill="#fbbf24" font-size="12" font-weight="700">&#x1F514; Push: ~60% (6B/day)</text>
  <text x="335" y="165" fill="#fbbf24" font-size="12" font-weight="700">&#x1F4E7; Email: ~25% (2.5B/day)</text>
  <text x="335" y="190" fill="#fbbf24" font-size="12" font-weight="700">&#x1F4AC; SMS: ~5% (500M/day)</text>
  <text x="335" y="215" fill="#fbbf24" font-size="12" font-weight="700">&#x1F4E5; In-App: ~10% (1B/day)</text>

  <rect x="325" y="235" width="235" height="22" rx="6" fill="rgba(239,68,68,0.3)" stroke="rgba(239,68,68,0.5)" stroke-width="1"/>
  <text x="442" y="251" text-anchor="middle" fill="white" font-size="10" font-weight="600">&#x26A0;&#xFE0F; SMS is 100x more expensive per unit!</text>

  <!-- Column 3: Storage -->
  <rect x="310" y="285" width="265" height="140" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="285" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="309" text-anchor="middle" fill="white" font-size="14" font-weight="700">Storage</text>

  <text x="335" y="345" fill="white" font-size="11">10B notif/day x ~1KB each:</text>
  <text x="335" y="367" fill="#fbbf24" font-size="14" font-weight="700">&#x2248; 10 TB/day</text>
  <text x="335" y="395" fill="white" font-size="11">90-day retention:</text>
  <text x="335" y="415" fill="#f97316" font-size="14" font-weight="700">&#x2248; 900 TB notification log</text>

  <!-- Column 4: Queue Depth -->
  <rect x="590" y="75" width="290" height="170" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="75" width="290" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">Message Queue</text>

  <text x="615" y="140" fill="white" font-size="12">Peak ingestion rate:</text>
  <text x="615" y="163" fill="#fbbf24" font-size="16" font-weight="800">575K msgs/sec enqueue</text>
  <text x="735" y="185" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>
  <text x="615" y="208" fill="white" font-size="11">Per-channel worker pools:</text>
  <text x="615" y="228" fill="#f97316" font-size="14" font-weight="700">Kafka partitioned by channel</text>

  <!-- Device Registry -->
  <rect x="590" y="260" width="290" height="165" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="260" width="290" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="284" text-anchor="middle" fill="white" font-size="14" font-weight="700">Device &amp; Preference Store</text>

  <text x="615" y="320" fill="white" font-size="11">User devices (avg 2.5 per user):</text>
  <text x="615" y="342" fill="#fbbf24" font-size="13" font-weight="700">Billions of device tokens</text>
  <text x="615" y="370" fill="white" font-size="11">Preference lookups per notif:</text>
  <text x="615" y="392" fill="#f97316" font-size="14" font-weight="700">575K reads/sec from cache</text>
  <text x="615" y="415" fill="rgba(255,255,255,0.7)" font-size="10">Redis for hot preferences</text>

  <!-- Key Insights -->
  <rect x="900" y="75" width="280" height="350" rx="12" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="1040" y="103" text-anchor="middle" fill="white" font-size="14" font-weight="700">&#x1F4A1; Key Insights</text>
  <line x1="920" y1="113" x2="1160" y2="113" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <text x="920" y="140" fill="white" font-size="11" font-weight="600">Queue is the heart</text>
  <text x="920" y="158" fill="rgba(255,255,255,0.7)" font-size="10">575K msgs/sec needs partitioned</text>
  <text x="920" y="173" fill="rgba(255,255,255,0.7)" font-size="10">Kafka with per-channel consumer</text>
  <text x="920" y="188" fill="rgba(255,255,255,0.7)" font-size="10">groups for isolation.</text>

  <text x="920" y="218" fill="white" font-size="11" font-weight="600">Rate limiting prevents abuse</text>
  <text x="920" y="236" fill="rgba(255,255,255,0.7)" font-size="10">Per-user limits (e.g., max 5 push</text>
  <text x="920" y="251" fill="rgba(255,255,255,0.7)" font-size="10">per hour) prevent churn from</text>
  <text x="920" y="266" fill="rgba(255,255,255,0.7)" font-size="10">notification fatigue.</text>

  <text x="920" y="296" fill="white" font-size="11" font-weight="600">APNs/FCM have their own limits</text>
  <text x="920" y="314" fill="rgba(255,255,255,0.7)" font-size="10">Provider rate limits and token</text>
  <text x="920" y="329" fill="rgba(255,255,255,0.7)" font-size="10">expiry handling add complexity.</text>
  <text x="920" y="344" fill="rgba(255,255,255,0.7)" font-size="10">Need retry with backoff.</text>

  <text x="920" y="374" fill="white" font-size="11" font-weight="600">Dedup across channels</text>
  <text x="920" y="392" fill="rgba(255,255,255,0.7)" font-size="10">If user sees in-app, skip push.</text>
  <text x="920" y="407" fill="rgba(255,255,255,0.7)" font-size="10">Channel priority + online status</text>
  <text x="920" y="422" fill="rgba(255,255,255,0.7)" font-size="10">determines optimal delivery.</text>
</svg>
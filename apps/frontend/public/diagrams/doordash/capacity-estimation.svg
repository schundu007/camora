<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgCap" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="550" fill="url(#bgCap)" rx="16"/>

  <!-- Title -->
  <rect x="380" y="16" width="440" height="40" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="43" text-anchor="middle" fill="white" font-size="20" font-weight="700">Back-of-the-Envelope Estimates</text>

  <!-- Column 1: Traffic -->
  <rect x="20" y="80" width="275" height="440" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="20" y="80" width="275" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="157" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Traffic Estimates (QPS)</text>

  <text x="45" y="145" fill="#fbbf24" font-size="13" font-weight="700">👥 32M active customers</text>
  <text x="157" y="170" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">↓</text>

  <text x="45" y="200" fill="white" font-size="12">Orders per day:</text>
  <text x="45" y="218" fill="#fbbf24" font-size="15" font-weight="700">6M+ orders/day</text>
  <text x="157" y="240" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">↓</text>

  <text x="45" y="268" fill="white" font-size="12">Order Write QPS (avg):</text>
  <text x="45" y="288" fill="#fbbf24" font-size="16" font-weight="800">≈ 70 orders/sec</text>
  <text x="157" y="310" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">↓</text>

  <text x="45" y="338" fill="white" font-size="11">Peak (lunch/dinner 2h window):</text>
  <text x="45" y="356" fill="rgba(255,255,255,0.7)" font-size="10">60% of orders in 4 hours</text>
  <text x="45" y="378" fill="#f97316" font-size="18" font-weight="800">≈ 250 orders/sec</text>

  <text x="45" y="410" fill="white" font-size="11">Browse/search QPS:</text>
  <text x="45" y="432" fill="#fbbf24" font-size="15" font-weight="800">≈ 50K QPS (read-heavy)</text>
  <text x="45" y="460" fill="rgba(255,255,255,0.7)" font-size="10">100:1 browse-to-order ratio</text>

  <text x="45" y="490" fill="white" font-size="11">Location pings (dashers):</text>
  <text x="45" y="510" fill="#f97316" font-size="15" font-weight="800">≈ 200K GPS updates/sec</text>

  <!-- Column 2: Dispatch -->
  <rect x="310" y="80" width="265" height="250" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="80" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Driver Dispatch</text>

  <text x="335" y="145" fill="#fbbf24" font-size="13" font-weight="700">🚗 2M+ active dashers</text>
  <text x="442" y="170" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">↓</text>

  <text x="335" y="195" fill="white" font-size="12">Concurrent active dashers:</text>
  <text x="335" y="215" fill="#fbbf24" font-size="15" font-weight="700">~300K at peak</text>
  <text x="442" y="240" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">↓</text>

  <text x="335" y="268" fill="white" font-size="11">Dispatch decisions per second:</text>
  <text x="335" y="292" fill="#f97316" font-size="18" font-weight="800">≈ 250 matches/sec</text>

  <rect x="325" y="302" width="235" height="22" rx="6" fill="rgba(239,68,68,0.3)" stroke="rgba(239,68,68,0.5)" stroke-width="1"/>
  <text x="442" y="318" text-anchor="middle" fill="white" font-size="10" font-weight="600">⚠️ Real-time geospatial matching!</text>

  <!-- Column 3: Storage -->
  <rect x="310" y="350" width="265" height="170" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="350" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="374" text-anchor="middle" fill="white" font-size="14" font-weight="700">Storage Estimates</text>

  <text x="335" y="410" fill="white" font-size="11">Order record size: <tspan fill="#fbbf24" font-weight="700">~5 KB</tspan></text>
  <text x="442" y="430" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">↓</text>

  <text x="335" y="450" fill="white" font-size="11">Orders: 6M/day x 5KB</text>
  <text x="335" y="472" fill="#fbbf24" font-size="15" font-weight="800">= 30 GB/day (orders)</text>

  <text x="335" y="500" fill="white" font-size="11">+ GPS traces + menus + images:</text>
  <text x="335" y="520" fill="#f97316" font-size="15" font-weight="800">≈ 500 GB/day total</text>

  <!-- Column 4: ETA -->
  <rect x="590" y="80" width="290" height="250" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="80" width="290" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">ETA Computation</text>

  <text x="615" y="148" fill="white" font-size="12">ETA factors per order:</text>
  <text x="615" y="175" fill="#fbbf24" font-size="14" font-weight="700">Prep time (restaurant ML)</text>
  <text x="615" y="198" fill="#fbbf24" font-size="14" font-weight="700">+ Drive time (routing)</text>
  <text x="615" y="221" fill="#fbbf24" font-size="14" font-weight="700">+ Traffic conditions</text>
  <text x="615" y="244" fill="#fbbf24" font-size="14" font-weight="700">+ Batching opportunity</text>

  <text x="735" y="272" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">↓</text>
  <text x="615" y="296" fill="white" font-size="11">ETA recalculated every:</text>
  <text x="615" y="316" fill="#f97316" font-size="16" font-weight="800">30 seconds per order</text>

  <!-- Column 5: Merchants -->
  <rect x="590" y="350" width="290" height="170" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="350" width="290" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="374" text-anchor="middle" fill="white" font-size="14" font-weight="700">Merchant Scale</text>

  <text x="615" y="410" fill="white" font-size="11">Active merchants:</text>
  <text x="615" y="432" fill="#fbbf24" font-size="14" font-weight="700">390,000+ restaurants</text>

  <text x="615" y="462" fill="white" font-size="11">Avg menu items per restaurant:</text>
  <text x="615" y="484" fill="#fbbf24" font-size="14" font-weight="700">~80 items</text>

  <text x="615" y="510" fill="rgba(255,255,255,0.6)" font-size="10">31M+ menu items to index and search</text>

  <!-- Key Insights -->
  <rect x="900" y="80" width="280" height="440" rx="12" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="1040" y="108" text-anchor="middle" fill="white" font-size="14" font-weight="700">💡 Key Insights</text>
  <line x1="920" y1="118" x2="1160" y2="118" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <text x="920" y="145" fill="white" font-size="11" font-weight="600">Three-sided marketplace</text>
  <text x="920" y="163" fill="rgba(255,255,255,0.7)" font-size="10">Customer + Restaurant + Dasher</text>
  <text x="920" y="178" fill="rgba(255,255,255,0.7)" font-size="10">each with different real-time</text>
  <text x="920" y="193" fill="rgba(255,255,255,0.7)" font-size="10">data requirements.</text>

  <text x="920" y="225" fill="white" font-size="11" font-weight="600">Location data is the bottleneck</text>
  <text x="920" y="243" fill="rgba(255,255,255,0.7)" font-size="10">200K GPS pings/sec from dashers.</text>
  <text x="920" y="258" fill="rgba(255,255,255,0.7)" font-size="10">Geospatial index (H3/S2) for</text>
  <text x="920" y="273" fill="rgba(255,255,255,0.7)" font-size="10">nearest-driver matching.</text>

  <text x="920" y="305" fill="white" font-size="11" font-weight="600">Peak is mealtime-driven</text>
  <text x="920" y="323" fill="rgba(255,255,255,0.7)" font-size="10">60% of traffic in 4 hours.</text>
  <text x="920" y="338" fill="rgba(255,255,255,0.7)" font-size="10">Must handle 4x average load</text>
  <text x="920" y="353" fill="rgba(255,255,255,0.7)" font-size="10">during lunch/dinner.</text>

  <text x="920" y="385" fill="white" font-size="11" font-weight="600">ETA is an ML problem</text>
  <text x="920" y="403" fill="rgba(255,255,255,0.7)" font-size="10">Prep time prediction, route</text>
  <text x="920" y="418" fill="rgba(255,255,255,0.7)" font-size="10">optimization, traffic modeling.</text>
  <text x="920" y="433" fill="rgba(255,255,255,0.7)" font-size="10">Continuously recalculated.</text>

  <text x="920" y="465" fill="white" font-size="11" font-weight="600">Order batching saves cost</text>
  <text x="920" y="483" fill="rgba(255,255,255,0.7)" font-size="10">Combining 2-3 nearby orders</text>
  <text x="920" y="498" fill="rgba(255,255,255,0.7)" font-size="10">per dasher increases margin</text>
  <text x="920" y="513" fill="rgba(255,255,255,0.7)" font-size="10">but complicates dispatch logic.</text>
</svg>
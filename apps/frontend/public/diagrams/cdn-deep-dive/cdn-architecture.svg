<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="originGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="userGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="dnsGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#10b981"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f59e0b"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f87171"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="0.5">CDN Architecture</text>

  <!-- Globe representation (center) -->
  <ellipse cx="400" cy="235" rx="145" ry="105" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="6,4"/>
  <ellipse cx="400" cy="235" rx="145" ry="50" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="255" y1="235" x2="545" y2="235" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="400" y1="130" x2="400" y2="340" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="400" y="360" text-anchor="middle" fill="#64748b" font-size="10">Global Network</text>

  <!-- Origin Server (center) -->
  <g filter="url(#shadow)">
    <rect x="360" y="205" width="80" height="60" rx="8" fill="url(#originGrad)" opacity="0.95"/>
    <rect x="375" y="215" width="50" height="8" rx="2" fill="#fff" opacity="0.3"/>
    <rect x="375" y="227" width="50" height="8" rx="2" fill="#fff" opacity="0.2"/>
    <rect x="375" y="239" width="50" height="8" rx="2" fill="#fff" opacity="0.15"/>
    <text x="400" y="257" text-anchor="middle" fill="#e2e8f0" font-size="8" font-weight="600">STORAGE</text>
  </g>
  <text x="400" y="283" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Origin Server</text>
  <text x="400" y="296" text-anchor="middle" fill="#94a3b8" font-size="8">(Source of Truth)</text>

  <!-- Edge Server - North America (top-left) -->
  <g filter="url(#shadow)">
    <rect x="100" y="85" width="90" height="50" rx="8" fill="url(#edgeGrad)" opacity="0.9"/>
    <text x="145" y="107" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Edge PoP</text>
    <text x="145" y="121" text-anchor="middle" fill="#e0f2fe" font-size="8">N. America</text>
  </g>

  <!-- Edge Server - Europe (top-right) -->
  <g filter="url(#shadow)">
    <rect x="610" y="85" width="90" height="50" rx="8" fill="url(#edgeGrad)" opacity="0.9"/>
    <text x="655" y="107" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Edge PoP</text>
    <text x="655" y="121" text-anchor="middle" fill="#e0f2fe" font-size="8">Europe</text>
  </g>

  <!-- Edge Server - Asia (right) -->
  <g filter="url(#shadow)">
    <rect x="620" y="265" width="90" height="50" rx="8" fill="url(#edgeGrad)" opacity="0.9"/>
    <text x="665" y="287" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Edge PoP</text>
    <text x="665" y="301" text-anchor="middle" fill="#e0f2fe" font-size="8">Asia</text>
  </g>

  <!-- Edge Server - S. America (bottom-left) -->
  <g filter="url(#shadow)">
    <rect x="90" y="265" width="90" height="50" rx="8" fill="url(#edgeGrad)" opacity="0.9"/>
    <text x="135" y="287" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Edge PoP</text>
    <text x="135" y="301" text-anchor="middle" fill="#e0f2fe" font-size="8">S. America</text>
  </g>

  <!-- Edge Server - Africa (bottom-center) -->
  <g filter="url(#shadow)">
    <rect x="310" y="370" width="90" height="50" rx="8" fill="url(#edgeGrad)" opacity="0.9"/>
    <text x="355" y="392" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Edge PoP</text>
    <text x="355" y="406" text-anchor="middle" fill="#e0f2fe" font-size="8">Africa</text>
  </g>

  <!-- Edge Server - Oceania (bottom-right) -->
  <g filter="url(#shadow)">
    <rect x="500" y="370" width="90" height="50" rx="8" fill="url(#edgeGrad)" opacity="0.9"/>
    <text x="545" y="392" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Edge PoP</text>
    <text x="545" y="406" text-anchor="middle" fill="#e0f2fe" font-size="8">Oceania</text>
  </g>

  <!-- User (top-left corner) -->
  <g filter="url(#shadow)">
    <rect x="15" y="55" width="60" height="40" rx="8" fill="url(#userGrad)"/>
    <text x="45" y="72" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">User</text>
    <text x="45" y="84" text-anchor="middle" fill="#d1fae5" font-size="7">Request</text>
  </g>

  <!-- DNS (top-center) -->
  <g filter="url(#shadow)">
    <rect x="260" y="50" width="60" height="40" rx="8" fill="url(#dnsGrad)"/>
    <text x="290" y="67" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">DNS</text>
    <text x="290" y="79" text-anchor="middle" fill="#fef3c7" font-size="7">Routing</text>
  </g>

  <!-- Arrows: User -> DNS -->
  <line x1="75" y1="70" x2="257" y2="70" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowYellow)" opacity="0.8"/>
  <text x="166" y="64" text-anchor="middle" fill="#fbbf24" font-size="8">1. DNS Lookup</text>

  <!-- Arrow: DNS -> Nearest Edge -->
  <line x1="290" y1="93" x2="155" y2="85" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowYellow)" opacity="0.8"/>
  <text x="210" y="99" text-anchor="middle" fill="#fbbf24" font-size="8">2. Nearest Edge</text>

  <!-- Cache Hit flow: Edge -> User (green) -->
  <path d="M100,100 Q50,100 50,87" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.8"/>
  <text x="55" y="110" fill="#34d399" font-size="7" font-weight="600">Cache HIT</text>
  <text x="55" y="120" fill="#6ee7b7" font-size="7">Serve directly</text>

  <!-- Cache Miss flow: Edge -> Origin (red dashed) -->
  <line x1="190" y1="120" x2="360" y2="210" stroke="#f87171" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowRed)" opacity="0.7"/>
  <text x="258" y="155" fill="#fca5a5" font-size="7" font-weight="600">Cache MISS</text>
  <text x="258" y="165" fill="#fca5a5" font-size="7">Fetch from Origin</text>

  <!-- Pull CDN flow: Origin -> Edges (purple dashed) -->
  <line x1="440" y1="225" x2="610" y2="110" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowPurple)" opacity="0.6"/>
  <line x1="440" y1="250" x2="620" y2="280" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowPurple)" opacity="0.6"/>
  <line x1="360" y1="255" x2="180" y2="275" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowPurple)" opacity="0.6"/>
  <line x1="400" y1="265" x2="355" y2="370" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowPurple)" opacity="0.6"/>
  <line x1="420" y1="265" x2="520" y2="370" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowPurple)" opacity="0.6"/>

  <!-- Legend -->
  <g transform="translate(620, 160)">
    <rect x="0" y="0" width="160" height="110" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="80" y="18" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">Legend</text>
    <line x1="15" y1="32" x2="40" y2="32" stroke="#10b981" stroke-width="2"/>
    <text x="48" y="35" fill="#94a3b8" font-size="8">Cache Hit (fast)</text>
    <line x1="15" y1="50" x2="40" y2="50" stroke="#f87171" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="48" y="53" fill="#94a3b8" font-size="8">Cache Miss (fetch)</text>
    <line x1="15" y1="68" x2="40" y2="68" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="48" y="71" fill="#94a3b8" font-size="8">Pull: Origin to Edge</text>
    <line x1="15" y1="86" x2="40" y2="86" stroke="#0ea5e9" stroke-width="2"/>
    <text x="48" y="89" fill="#94a3b8" font-size="8">Push: Pre-distribute</text>
    <line x1="15" y1="101" x2="40" y2="101" stroke="#f59e0b" stroke-width="2"/>
    <text x="48" y="104" fill="#94a3b8" font-size="8">DNS Routing</text>
  </g>

  <!-- Push CDN label -->
  <g transform="translate(15, 160)">
    <rect x="0" y="0" width="110" height="55" rx="6" fill="#1e293b" stroke="#0ea5e9" stroke-width="1" opacity="0.9"/>
    <text x="55" y="18" text-anchor="middle" fill="#7dd3fc" font-size="9" font-weight="600">Push CDN</text>
    <text x="55" y="32" text-anchor="middle" fill="#94a3b8" font-size="7">Upload content to</text>
    <text x="55" y="43" text-anchor="middle" fill="#94a3b8" font-size="7">edges proactively</text>
  </g>

  <!-- Pull CDN label -->
  <g transform="translate(15, 225)">
    <rect x="0" y="0" width="110" height="55" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1" opacity="0.9"/>
    <text x="55" y="18" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">Pull CDN</text>
    <text x="55" y="32" text-anchor="middle" fill="#94a3b8" font-size="7">Fetch from origin</text>
    <text x="55" y="43" text-anchor="middle" fill="#94a3b8" font-size="7">on first request</text>
  </g>

  <!-- 300+ PoPs annotation -->
  <text x="400" y="440" text-anchor="middle" fill="#475569" font-size="9">300+ Points of Presence globally | Cache Hit: ~20ms | Cache Miss: ~200ms (origin fetch)</text>
</svg>
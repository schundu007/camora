<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="600" height="350" fill="#f7f8f9" rx="4"/>
  <text x="300" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">CDN Architecture &#8212; Cache Hit / Miss Flow</text>

  <!-- Origin Server -->
  <rect x="240" y="50" width="120" height="50" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="72" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Origin Server</text>
  <text x="300" y="86" text-anchor="middle" font-size="9" fill="#64748b">Source of truth</text>

  <!-- CDN Edge Servers -->
  <rect x="30" y="150" width="110" height="50" rx="8" fill="white" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="85" y="172" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Edge &#8212; US West</text>
  <text x="85" y="185" text-anchor="middle" font-size="9" fill="#64748b">San Francisco</text>

  <rect x="170" y="150" width="110" height="50" rx="8" fill="white" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="225" y="172" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Edge &#8212; EU</text>
  <text x="225" y="185" text-anchor="middle" font-size="9" fill="#64748b">Frankfurt</text>

  <rect x="320" y="150" width="110" height="50" rx="8" fill="white" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="375" y="172" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Edge &#8212; Asia</text>
  <text x="375" y="185" text-anchor="middle" font-size="9" fill="#64748b">Tokyo</text>

  <rect x="460" y="150" width="110" height="50" rx="8" fill="white" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="515" y="172" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Edge &#8212; SA</text>
  <text x="515" y="185" text-anchor="middle" font-size="9" fill="#64748b">S&#227;o Paulo</text>

  <!-- Arrows: Origin to Edge -->
  <line x1="270" y1="100" x2="110" y2="150" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="290" y1="100" x2="225" y2="150" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="310" y1="100" x2="375" y2="150" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="330" y1="100" x2="490" y2="150" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="160" y="120" font-size="8" fill="#8b5cf6" transform="rotate(-20,160,120)">cache miss &#8594; fetch</text>

  <!-- Users -->
  <rect x="20" y="260" width="90" height="40" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="65" y="284" text-anchor="middle" font-size="10" fill="#1e293b">User (US)</text>

  <rect x="165" y="260" width="90" height="40" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="284" text-anchor="middle" font-size="10" fill="#1e293b">User (EU)</text>

  <rect x="320" y="260" width="90" height="40" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="365" y="284" text-anchor="middle" font-size="10" fill="#1e293b">User (Asia)</text>

  <rect x="470" y="260" width="90" height="40" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="515" y="284" text-anchor="middle" font-size="10" fill="#1e293b">User (SA)</text>

  <!-- Arrows: Users to Edge -->
  <line x1="65" y1="260" x2="80" y2="200" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <line x1="210" y1="260" x2="225" y2="200" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <line x1="365" y1="260" x2="375" y2="200" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <line x1="515" y1="260" x2="515" y2="200" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowG)"/>

  <!-- Legend -->
  <rect x="30" y="315" width="540" height="28" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="50" y1="329" x2="80" y2="329" stroke="#10b981" stroke-width="2"/>
  <text x="85" y="333" font-size="9" fill="#64748b">Cache HIT (fast, nearby)</text>
  <line x1="230" y1="329" x2="260" y2="329" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="265" y="333" font-size="9" fill="#64748b">Cache MISS (fetch from origin)</text>
  <circle cx="440" cy="329" r="4" fill="#3b82f6"/>
  <text x="450" y="333" font-size="9" fill="#64748b">End users in different regions</text>
</svg>
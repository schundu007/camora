<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="500" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <rect x="370" y="20" width="460" height="44" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="22" font-weight="700">Problem Definition: Designing Spotify</text>

  <!-- Column 1: Users & Core Actions -->
  <text x="200" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Users &amp; Core Actions</text>
  <rect x="40" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <circle cx="120" cy="165" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="120" y="171" text-anchor="middle" fill="white" font-size="24">&#x1F3A7;</text>
  <text x="120" y="210" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Listener</text>

  <text x="200" y="171" text-anchor="middle" fill="white" font-size="28">&#x21C4;</text>

  <circle cx="280" cy="165" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="280" y="171" text-anchor="middle" fill="white" font-size="24">&#x1F3B5;</text>
  <text x="280" y="210" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Artist</text>

  <!-- Core Actions Box -->
  <rect x="60" y="230" width="280" height="240" rx="12" fill="#f97316" filter="url(#shadow)"/>
  <text x="200" y="260" text-anchor="middle" fill="white" font-size="15" font-weight="700">Core Actions</text>
  <line x1="80" y1="272" x2="320" y2="272" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="85" y="300" fill="white" font-size="13">&#x25B6;&#xFE0F;  Stream Audio Tracks</text>
  <text x="85" y="330" fill="white" font-size="13">&#x1F50D;  Search Songs &amp; Artists</text>
  <text x="85" y="360" fill="white" font-size="13">&#x1F4CB;  Create &amp; Manage Playlists</text>
  <text x="85" y="390" fill="white" font-size="13">&#x1F4E5;  Download for Offline</text>
  <text x="85" y="420" fill="white" font-size="13">&#x2764;&#xFE0F;  Like &amp; Save Tracks</text>
  <text x="85" y="450" fill="white" font-size="13">&#x1F3AF;  Get Recommendations</text>

  <!-- Column 2: In Scope -->
  <text x="600" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">In Scope: Essentials</text>
  <rect x="440" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="440" y="120" width="320" height="350" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <text x="470" y="155" fill="white" font-size="13" font-weight="600">&#x25B6;&#xFE0F;  Audio streaming</text>
  <text x="490" y="175" fill="rgba(255,255,255,0.7)" font-size="11">(Adaptive bitrate, CDN delivery)</text>
  <text x="470" y="205" fill="white" font-size="13" font-weight="600">&#x1F50D;  Search (songs, artists, albums)</text>
  <text x="490" y="225" fill="rgba(255,255,255,0.7)" font-size="11">(Full-text search across catalog)</text>
  <text x="470" y="255" fill="white" font-size="13" font-weight="600">&#x1F4CB;  Playlists</text>
  <text x="490" y="275" fill="rgba(255,255,255,0.7)" font-size="11">(Create, edit, follow, collaborative)</text>
  <text x="470" y="305" fill="white" font-size="13" font-weight="600">&#x1F3AF;  Recommendations</text>
  <text x="490" y="325" fill="rgba(255,255,255,0.7)" font-size="11">(Collaborative filtering + content-based)</text>
  <text x="470" y="355" fill="white" font-size="13" font-weight="600">&#x1F4E5;  Offline download</text>
  <text x="490" y="375" fill="rgba(255,255,255,0.7)" font-size="11">(DRM-protected, premium only)</text>
  <text x="470" y="405" fill="white" font-size="13" font-weight="600">&#x1F4CA;  Play history &amp; analytics</text>
  <text x="490" y="425" fill="rgba(255,255,255,0.7)" font-size="11">(Recently played, top tracks)</text>

  <!-- Column 3: Out of Scope -->
  <text x="1000" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Out of Scope / Future</text>
  <rect x="840" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="840" y="120" width="320" height="250" rx="12" fill="rgba(245,158,11,0.25)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>

  <text x="870" y="155" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Podcast Hosting Platform</text>
  <text x="870" y="190" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Social Features (friends, activity)</text>
  <text x="870" y="225" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Artist Upload Tools</text>
  <text x="870" y="260" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Lyrics Display</text>
  <text x="870" y="295" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Live Concert Streaming</text>
  <text x="870" y="330" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Audiobook Marketplace</text>

  <!-- Bottom -->
  <text x="600" y="492" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="12">Focus on core music streaming &amp; discovery first &#x2192; extend to podcasts &amp; social later</text>
</svg>
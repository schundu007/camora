<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgCap" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="450" fill="url(#bgCap)" rx="16"/>

  <!-- Title -->
  <rect x="380" y="16" width="440" height="40" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="43" text-anchor="middle" fill="white" font-size="20" font-weight="700">Back-of-the-Envelope: Spotify</text>

  <!-- Column 1: User Traffic -->
  <rect x="20" y="75" width="275" height="350" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="20" y="75" width="275" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="157" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">User Base &amp; Streams</text>

  <text x="45" y="140" fill="#fbbf24" font-size="13" font-weight="700">&#x1F3A7; 640M MAU</text>
  <text x="45" y="162" fill="#fbbf24" font-size="13" font-weight="700">&#x2B50; 252M Premium subscribers</text>
  <text x="157" y="184" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="207" fill="white" font-size="12">Avg listening: 30 min/day</text>
  <text x="45" y="227" fill="white" font-size="11">Avg song length: 3.5 min</text>
  <text x="45" y="247" fill="rgba(255,255,255,0.7)" font-size="10">640M x 8.5 songs/day</text>
  <text x="45" y="270" fill="#fbbf24" font-size="16" font-weight="800">&#x2248; 5.4B streams/day</text>
  <text x="157" y="292" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="315" fill="white" font-size="11">Average stream QPS:</text>
  <text x="45" y="335" fill="rgba(255,255,255,0.7)" font-size="10">5.4B / 86400</text>
  <text x="45" y="358" fill="#fbbf24" font-size="16" font-weight="800">&#x2248; 63K streams/sec</text>

  <text x="45" y="393" fill="white" font-size="11">Peak (3x):</text>
  <text x="45" y="413" fill="#f97316" font-size="16" font-weight="800">&#x2248; 190K streams/sec</text>

  <!-- Column 2: Catalog -->
  <rect x="310" y="75" width="265" height="170" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="75" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">Music Catalog</text>

  <text x="335" y="140" fill="#fbbf24" font-size="13" font-weight="700">&#x1F3B5; 100M+ tracks</text>
  <text x="335" y="165" fill="white" font-size="11">Avg track: ~10MB (320kbps OGG)</text>
  <text x="442" y="188" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>
  <text x="335" y="210" fill="white" font-size="11">Total audio storage:</text>
  <text x="335" y="230" fill="#f97316" font-size="15" font-weight="800">&#x2248; 1 Petabyte raw audio</text>

  <!-- Column 3: Playlists -->
  <rect x="310" y="260" width="265" height="165" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="260" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="284" text-anchor="middle" fill="white" font-size="14" font-weight="700">Playlist Data</text>

  <text x="335" y="320" fill="#fbbf24" font-size="13" font-weight="700">&#x1F4CB; 5 Billion playlists</text>
  <text x="335" y="345" fill="white" font-size="11">Avg 50 tracks per playlist</text>
  <text x="335" y="365" fill="white" font-size="11">250B track references:</text>
  <text x="335" y="388" fill="#fbbf24" font-size="14" font-weight="700">&#x2248; 5 TB playlist metadata</text>
  <text x="335" y="415" fill="white" font-size="11">Playlist reads/writes:</text>
  <text x="335" y="435" fill="#f97316" font-size="13" font-weight="700">&#x2248; 100K ops/sec</text>

  <!-- Column 4: Bandwidth -->
  <rect x="590" y="75" width="290" height="170" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="75" width="290" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="700">Streaming Bandwidth</text>

  <text x="615" y="140" fill="white" font-size="12">190K concurrent streams</text>
  <text x="615" y="160" fill="white" font-size="11">at 320kbps (premium):</text>
  <text x="615" y="183" fill="#fbbf24" font-size="16" font-weight="800">&#x2248; 61 Gb/s peak egress</text>
  <text x="735" y="205" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>
  <text x="615" y="228" fill="#f97316" font-size="13" font-weight="700">CDN caches top 1% of tracks</text>

  <!-- Recommendations -->
  <rect x="590" y="260" width="290" height="165" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="260" width="290" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="284" text-anchor="middle" fill="white" font-size="14" font-weight="700">Recommendation Engine</text>

  <text x="615" y="320" fill="white" font-size="11">640M user taste profiles</text>
  <text x="615" y="342" fill="white" font-size="11">100M+ track embeddings</text>
  <text x="615" y="365" fill="#fbbf24" font-size="13" font-weight="700">640M x 100M matrix</text>
  <text x="615" y="392" fill="white" font-size="11">Pre-computed daily, served from:</text>
  <text x="615" y="412" fill="#f97316" font-size="14" font-weight="700">In-memory feature store</text>

  <!-- Key Insights -->
  <rect x="900" y="75" width="280" height="350" rx="12" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="1040" y="103" text-anchor="middle" fill="white" font-size="14" font-weight="700">&#x1F4A1; Key Insights</text>
  <line x1="920" y1="113" x2="1160" y2="113" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <text x="920" y="140" fill="white" font-size="11" font-weight="600">CDN is the backbone</text>
  <text x="920" y="158" fill="rgba(255,255,255,0.7)" font-size="10">61 Gb/s peak streaming. Top 1%</text>
  <text x="920" y="173" fill="rgba(255,255,255,0.7)" font-size="10">of tracks serve 80% of requests.</text>
  <text x="920" y="188" fill="rgba(255,255,255,0.7)" font-size="10">CDN + prefetch is critical.</text>

  <text x="920" y="218" fill="white" font-size="11" font-weight="600">Adaptive bitrate saves bandwidth</text>
  <text x="920" y="236" fill="rgba(255,255,255,0.7)" font-size="10">96kbps to 320kbps based on</text>
  <text x="920" y="251" fill="rgba(255,255,255,0.7)" font-size="10">network conditions and plan tier.</text>

  <text x="920" y="281" fill="white" font-size="11" font-weight="600">Recs are batch + real-time</text>
  <text x="920" y="299" fill="rgba(255,255,255,0.7)" font-size="10">Daily batch computes user vectors.</text>
  <text x="920" y="314" fill="rgba(255,255,255,0.7)" font-size="10">Real-time layer adjusts based on</text>
  <text x="920" y="329" fill="rgba(255,255,255,0.7)" font-size="10">current session behavior.</text>

  <text x="920" y="359" fill="white" font-size="11" font-weight="600">Playlist fan-out is heavy</text>
  <text x="920" y="377" fill="rgba(255,255,255,0.7)" font-size="10">5B playlists with frequent reads.</text>
  <text x="920" y="392" fill="rgba(255,255,255,0.7)" font-size="10">Cassandra/DynamoDB for wide</text>
  <text x="920" y="407" fill="rgba(255,255,255,0.7)" font-size="10">column playlist storage.</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="system-ui, -apple-system, sans-serif">
  <defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#334155"/></marker></defs>
  <rect width="800" height="350" fill="#fafbfc" rx="12"/>
  <text x="400" y="28" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="700">Audio Streaming Pipeline — HTTP Range Requests + CDN</text>

  <!-- Client audio pipeline -->
  <rect x="20" y="50" width="370" height="130" rx="10" fill="#fff" stroke="#1db954" stroke-width="1.5"/>
  <rect x="20" y="50" width="370" height="28" rx="10 10 0 0" fill="#1db954"/>
  <text x="205" y="69" text-anchor="middle" fill="white" font-size="12" font-weight="700">Client Audio Pipeline</text>

  <rect x="35" y="90" width="80" height="35" rx="6" fill="#3b82f6"/>
  <text x="75" y="112" text-anchor="middle" fill="white" font-size="8" font-weight="600">HTTP Fetch</text>
  <text x="75" y="122" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="7">byte-range</text>

  <line x1="115" y1="107" x2="130" y2="107" stroke="#334155" stroke-width="1" marker-end="url(#a)"/>

  <rect x="135" y="90" width="70" height="35" rx="6" fill="#f97316"/>
  <text x="170" y="112" text-anchor="middle" fill="white" font-size="8" font-weight="600">Decrypt</text>
  <text x="170" y="122" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="7">Widevine</text>

  <line x1="205" y1="107" x2="220" y2="107" stroke="#334155" stroke-width="1" marker-end="url(#a)"/>

  <rect x="225" y="90" width="70" height="35" rx="6" fill="#7c3aed"/>
  <text x="260" y="112" text-anchor="middle" fill="white" font-size="8" font-weight="600">Decode</text>
  <text x="260" y="122" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="7">Ogg Vorbis</text>

  <line x1="295" y1="107" x2="310" y2="107" stroke="#334155" stroke-width="1" marker-end="url(#a)"/>

  <rect x="315" y="90" width="60" height="35" rx="6" fill="#1db954"/>
  <text x="345" y="112" text-anchor="middle" fill="white" font-size="9" font-weight="700">🔊</text>
  <text x="345" y="122" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="7">Output</text>

  <text x="35" y="158" fill="#64748b" font-size="9">Buffer: 10-15 seconds ahead • Quality selected at track start</text>
  <text x="35" y="173" fill="#64748b" font-size="9">No mid-track switching (unlike video ABR) — audio is simpler</text>

  <!-- CDN Architecture -->
  <rect x="410" y="50" width="370" height="130" rx="10" fill="#fff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="410" y="50" width="370" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="595" y="69" text-anchor="middle" fill="white" font-size="12" font-weight="700">CDN Architecture for Audio</text>

  <text x="430" y="100" fill="#1e293b" font-size="10" font-weight="600">Audio vs Video CDN:</text>

  <text x="430" y="122" fill="#22c55e" font-size="10" font-weight="700">✓ Audio files are small (~3-10 MB/track)</text>
  <text x="430" y="140" fill="#22c55e" font-size="10" font-weight="700">✓ Higher cache hit rate (fewer unique items)</text>
  <text x="430" y="158" fill="#22c55e" font-size="10" font-weight="700">✓ Total bandwidth: 4.8 Tbps (vs 175 Tbps YouTube)</text>
  <text x="430" y="176" fill="#64748b" font-size="9">Top 1% tracks = 80% of streams → edge-cached on SSD</text>

  <!-- vs Video comparison -->
  <rect x="20" y="200" width="370" height="130" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <rect x="20" y="200" width="370" height="28" rx="10 10 0 0" fill="#1e293b"/>
  <text x="205" y="219" text-anchor="middle" fill="white" font-size="11" font-weight="700">Audio vs Video Streaming Differences</text>

  <text x="40" y="248" fill="#ef4444" font-size="9" font-weight="600">❌ Video: adaptive bitrate, segment-based, mid-stream switching</text>
  <text x="40" y="268" fill="#22c55e" font-size="9" font-weight="600">✓ Audio: quality locked at start, full-file with byte-range</text>

  <text x="40" y="295" fill="#ef4444" font-size="9" font-weight="600">❌ Video: 100ms buffer gap invisible to viewer</text>
  <text x="40" y="315" fill="#22c55e" font-size="9" font-weight="600">✓ Audio: ANY gap is jarring — gapless is mandatory</text>

  <!-- Bandwidth comparison -->
  <rect x="410" y="200" width="370" height="130" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <rect x="410" y="200" width="370" height="28" rx="10 10 0 0" fill="#1db954"/>
  <text x="595" y="219" text-anchor="middle" fill="white" font-size="11" font-weight="700">Bandwidth Comparison</text>

  <text x="430" y="250" fill="#1e293b" font-size="10">Spotify: 30M streams × 160 kbps</text>
  <rect x="430" y="258" width="80" height="14" rx="3" fill="#1db954"/>
  <text x="520" y="270" fill="#1db954" font-size="10" font-weight="700">= 4.8 Tbps</text>

  <text x="430" y="295" fill="#1e293b" font-size="10">YouTube: 42M streams × 5 Mbps</text>
  <rect x="430" y="303" width="340" height="14" rx="3" fill="#ef4444"/>
  <text x="520" y="315" fill="#ef4444" font-size="10" font-weight="700">= 175 Tbps (36x more!)</text>

  <!-- Bottom -->
  <rect x="20" y="337" width="760" height="10" rx="3" fill="rgba(29,185,84,0.08)"/>
  <text x="400" y="346" text-anchor="middle" fill="#1db954" font-size="8" font-weight="600">Audio streaming is simpler than video but demands zero-gap playback — different engineering trade-offs</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="system-ui, -apple-system, sans-serif">
  <defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#334155"/></marker></defs>
  <rect width="800" height="380" fill="#fafbfc" rx="12"/>
  <text x="400" y="28" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="700">Discover Weekly Pipeline — 30 Personalized Tracks Every Monday</text>

  <!-- Stage 1 -->
  <rect x="20" y="50" width="180" height="130" rx="10" fill="#fff" stroke="#f97316" stroke-width="1.5"/>
  <rect x="20" y="50" width="180" height="28" rx="10 10 0 0" fill="#f97316"/>
  <text x="110" y="69" text-anchor="middle" fill="white" font-size="10" font-weight="700">📊 Listening History</text>

  <text x="35" y="95" fill="#1e293b" font-size="9">Collect last 4 weeks</text>
  <text x="35" y="113" fill="#1e293b" font-size="9">of listening data from</text>
  <text x="35" y="131" fill="#f97316" font-size="10" font-weight="700">751M users</text>
  <text x="35" y="149" fill="#64748b" font-size="8">Source: Cassandra</text>
  <text x="35" y="165" fill="#64748b" font-size="8">~3B events/day × 28 days</text>

  <line x1="200" y1="115" x2="225" y2="115" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Stage 2 -->
  <rect x="230" y="50" width="170" height="130" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="230" y="50" width="170" height="28" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="315" y="69" text-anchor="middle" fill="white" font-size="10" font-weight="700">🤝 Collaborative Filter</text>

  <text x="245" y="95" fill="#1e293b" font-size="9">Find taste neighbors:</text>
  <text x="245" y="113" fill="#7c3aed" font-size="9" font-weight="600">"Users like you loved..."</text>
  <text x="245" y="133" fill="#1e293b" font-size="9">Matrix factorization on</text>
  <text x="245" y="149" fill="#1e293b" font-size="9">user-track interactions</text>
  <text x="245" y="167" fill="#64748b" font-size="8">Output: ~5000 candidates</text>

  <line x1="400" y1="115" x2="425" y2="115" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Stage 3 -->
  <rect x="430" y="50" width="170" height="130" rx="10" fill="#fff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="430" y="50" width="170" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="515" y="69" text-anchor="middle" fill="white" font-size="10" font-weight="700">🎵 Content-Based Filter</text>

  <text x="445" y="95" fill="#1e293b" font-size="9">Audio feature analysis:</text>
  <text x="445" y="113" fill="#64748b" font-size="9">tempo, energy, danceability</text>
  <text x="445" y="131" fill="#64748b" font-size="9">key, loudness, valence</text>
  <text x="445" y="151" fill="#2563eb" font-size="9" font-weight="600">Ensure variety + coherence</text>
  <text x="445" y="167" fill="#64748b" font-size="8">Output: ~1000 refined</text>

  <line x1="600" y1="115" x2="625" y2="115" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Stage 4 -->
  <rect x="630" y="50" width="150" height="130" rx="10" fill="#fff" stroke="#1db954" stroke-width="2"/>
  <rect x="630" y="50" width="150" height="28" rx="10 10 0 0" fill="#1db954"/>
  <text x="705" y="69" text-anchor="middle" fill="white" font-size="10" font-weight="700">✨ Final Playlist</text>

  <text x="645" y="95" fill="#ef4444" font-size="9" font-weight="600">Remove already-heard</text>
  <text x="645" y="113" fill="#f97316" font-size="9" font-weight="600">Inject diversity</text>
  <text x="645" y="131" fill="#22c55e" font-size="9" font-weight="600">Mix genres/artists</text>
  <text x="645" y="153" fill="#1db954" font-size="11" font-weight="800">30 tracks</text>
  <text x="645" y="170" fill="#64748b" font-size="8">Published every Monday</text>

  <!-- Bottom: How it works for one user -->
  <rect x="20" y="200" width="760" height="160" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <rect x="20" y="200" width="760" height="28" rx="10 10 0 0" fill="#1e293b"/>
  <text x="400" y="219" text-anchor="middle" fill="white" font-size="12" font-weight="700">Example: How Alice Gets Her Discover Weekly</text>

  <text x="40" y="248" fill="#1e293b" font-size="10" font-weight="600">Alice listens to: Indie rock, shoegaze, dream pop (last 4 weeks)</text>

  <rect x="40" y="260" width="220" height="30" rx="6" fill="rgba(124,58,237,0.1)" stroke="#7c3aed"/>
  <text x="150" y="280" text-anchor="middle" fill="#7c3aed" font-size="9" font-weight="600">Bob (87% taste match) loved:</text>

  <rect x="270" y="260" width="120" height="30" rx="6" fill="rgba(124,58,237,0.08)"/>
  <text x="330" y="280" text-anchor="middle" fill="#64748b" font-size="9">Beach House - PPP</text>

  <rect x="395" y="260" width="130" height="30" rx="6" fill="rgba(124,58,237,0.08)"/>
  <text x="460" y="280" text-anchor="middle" fill="#64748b" font-size="9">Slowdive - Star Roving</text>

  <rect x="530" y="260" width="110" height="30" rx="6" fill="rgba(124,58,237,0.08)"/>
  <text x="585" y="280" text-anchor="middle" fill="#64748b" font-size="9">Cocteau Twins - ...</text>

  <text x="40" y="315" fill="#22c55e" font-size="10" font-weight="600">✓ Alice hasn't heard these → Added to Discover Weekly</text>
  <text x="40" y="335" fill="#2563eb" font-size="10" font-weight="600">✓ Audio features (dreamy, reverb-heavy) match Alice's taste</text>
  <text x="40" y="355" fill="#f97316" font-size="10" font-weight="600">✓ Mixed with jazz and electronic picks for diversity</text>
</svg>
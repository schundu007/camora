  <text x="430" y="232" fill="#22c55e" font-size="10" font-weight="600">✓ Played ≥30 seconds: 1 stream counted</text>
  <text x="445" y="250" fill="#64748b" font-size="9">Triggers royalty payment to rights holder</text>

  <text x="430" y="275" fill="#64748b" font-size="9" font-weight="600">Audit trail: 7+ year retention (legal requirement)</text>

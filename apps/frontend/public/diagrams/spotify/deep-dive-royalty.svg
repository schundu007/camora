  <text x="330" y="86" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="7">30s minimum watch</text>
  <text x="330" y="100" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="7">Dedup same session</text>
  <text x="330" y="114" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="7">Reject bot streams</text>

  <line x1="390" y1="82" x2="415" y2="82" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="420" y="50" width="120" height="65" rx="8" fill="#3b82f6"/>
  <text x="480" y="73" text-anchor="middle" fill="white" font-size="9" font-weight="700">📊 Aggregator</text>
  <text x="480" y="90" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="7">Group by track/label</text>
  <text x="480" y="105" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="7">Per-country rates</text>

  <line x1="540" y1="82" x2="565" y2="82" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="570" y="50" width="100" height="65" rx="8" fill="#7c3aed"/>
  <text x="620" y="73" text-anchor="middle" fill="white" font-size="9" font-weight="700">💰 Royalty DB</text>
  <text x="620" y="90" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="7">Rights holder</text>
  <text x="620" y="105" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="7">payments</text>

  <line x1="670" y1="82" x2="695" y2="82" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="700" y="55" width="80" height="55" rx="8" fill="#1db954"/>
  <text x="740" y="78" text-anchor="middle" fill="white" font-size="9" font-weight="700">💵 Payout</text>
  <text x="740" y="96" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="7">$9B+/year</text>

  <!-- Stream record details -->
  <rect x="20" y="140" width="370" height="140" rx="10" fill="#fff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="20" y="140" width="370" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="205" y="159" text-anchor="middle" fill="white" font-size="11" font-weight="700">📋 Stream Record Fields</text>

  <text x="40" y="188" fill="#1e293b" font-size="10">track_id: <tspan fill="#64748b">"4cOdK2wGLETKBW3PvgPWqT"</tspan></text>
  <text x="40" y="208" fill="#1e293b" font-size="10">user_country: <tspan fill="#64748b">"US"</tspan></text>
  <text x="40" y="228" fill="#1e293b" font-size="10">subscription: <tspan fill="#64748b">"premium"</tspan></text>
  <text x="40" y="248" fill="#1e293b" font-size="10">play_duration_ms: <tspan fill="#64748b">213400</tspan></text>
  <text x="40" y="268" fill="#1e293b" font-size="10">timestamp: <tspan fill="#64748b">"2026-04-19T14:23:..."</tspan></text>

  <!-- 30-second rule -->
  <rect x="410" y="140" width="370" height="140" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="410" y="140" width="370" height="28" rx="10 10 0 0" fill="#f59e0b"/>
  <text x="595" y="159" text-anchor="middle" fill="white" font-size="11" font-weight="700">⏱ The 30-Second Rule</text>

  <text x="430" y="188" fill="#ef4444" font-size="10" font-weight="600">❌ Played &lt;30 seconds: NO royalty counted</text>

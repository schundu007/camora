  <text x="65" y="96" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="7">3B/day</text>

  <line x1="110" y1="82" x2="135" y2="82" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="140" y="50" width="100" height="65" rx="8" fill="#f97316"/>

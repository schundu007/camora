  <text x="190" y="90" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="7">play-events topic</text>
  <text x="190" y="105" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="7">Immutable log</text>

  <line x1="240" y1="82" x2="265" y2="82" stroke="#334155" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="270" y="45" width="120" height="75" rx="8" fill="#ef4444"/>

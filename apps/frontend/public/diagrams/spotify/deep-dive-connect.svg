<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="system-ui, -apple-system, sans-serif">
  <defs><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#334155"/></marker></defs>
  <rect width="800" height="320" fill="#fafbfc" rx="12"/>
  <text x="400" y="28" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="700">Spotify Connect — Control Any Device from Any Device</text>

  <!-- Devices -->
  <rect x="20" y="55" width="100" height="70" rx="8" fill="#3b82f6"/>
  <text x="70" y="80" text-anchor="middle" fill="white" font-size="18">📱</text>
  <text x="70" y="100" text-anchor="middle" fill="white" font-size="9" font-weight="600">Phone</text>
  <text x="70" y="115" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="7">Control</text>

  <rect x="20" y="140" width="100" height="70" rx="8" fill="#7c3aed"/>
  <text x="70" y="165" text-anchor="middle" fill="white" font-size="18">💻</text>
  <text x="70" y="185" text-anchor="middle" fill="white" font-size="9" font-weight="600">Desktop</text>
  <text x="70" y="200" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="7">Control/Play</text>

  <rect x="20" y="225" width="100" height="70" rx="8" fill="#f97316"/>
  <text x="70" y="250" text-anchor="middle" fill="white" font-size="18">🔊</text>
  <text x="70" y="270" text-anchor="middle" fill="white" font-size="9" font-weight="600">Speaker</text>
  <text x="70" y="285" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="7">Playback</text>

  <!-- WebSocket connections -->
  <line x1="120" y1="90" x2="240" y2="150" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="120" y1="175" x2="240" y2="165" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="120" y1="260" x2="240" y2="180" stroke="#f97316" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="180" y="135" fill="#64748b" font-size="7">WebSocket</text>

  <!-- Connect Service -->
  <rect x="245" y="100" width="200" height="130" rx="12" fill="#fff" stroke="#1db954" stroke-width="2"/>
  <rect x="245" y="100" width="200" height="28" rx="12 12 0 0" fill="#1db954"/>
  <text x="345" y="118" text-anchor="middle" fill="white" font-size="12" font-weight="700">🔗 Connect Service</text>

  <text x="260" y="148" fill="#1e293b" font-size="9" font-weight="600">Player State (Redis):</text>
  <rect x="260" y="155" width="170" height="55" rx="4" fill="rgba(29,185,84,0.08)" stroke="#1db954"/>
  <text x="270" y="172" fill="#64748b" font-size="8">current_track: "Bohemian..."</text>
  <text x="270" y="186" fill="#64748b" font-size="8">position_ms: 142000</text>
  <text x="270" y="200" fill="#64748b" font-size="8">device_id: "speaker_123"</text>

  <text x="260" y="225" fill="#1db954" font-size="9" font-weight="600">Latency target: &lt;500ms</text>

  <!-- Flow description -->
  <rect x="480" y="55" width="300" height="250" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <rect x="480" y="55" width="300" height="28" rx="10 10 0 0" fill="#1e293b"/>
  <text x="630" y="74" text-anchor="middle" fill="white" font-size="11" font-weight="700">How It Works</text>

  <text x="495" y="102" fill="#3b82f6" font-size="10" font-weight="700">1. Phone sends command</text>
  <text x="510" y="118" fill="#64748b" font-size="9">"Play Bohemian Rhapsody on Speaker"</text>

  <text x="495" y="145" fill="#1db954" font-size="10" font-weight="700">2. Connect Service updates state</text>
  <text x="510" y="161" fill="#64748b" font-size="9">Set device_id=speaker, track, position</text>

  <text x="495" y="188" fill="#f97316" font-size="10" font-weight="700">3. Speaker receives state push</text>
  <text x="510" y="204" fill="#64748b" font-size="9">Via WebSocket — starts streaming</text>
  <text x="510" y="220" fill="#64748b" font-size="9">from CDN directly</text>

  <text x="495" y="247" fill="#7c3aed" font-size="10" font-weight="700">4. All devices see same state</text>
  <text x="510" y="263" fill="#64748b" font-size="9">Phone shows now-playing bar</text>
  <text x="510" y="279" fill="#64748b" font-size="9">Desktop shows playback controls</text>
  <text x="510" y="295" fill="#64748b" font-size="9">Speaker outputs audio</text>

  <!-- Bottom note -->
  <rect x="20" y="303" width="760" height="12" rx="4" fill="rgba(29,185,84,0.08)"/>
  <text x="400" y="313" text-anchor="middle" fill="#1db954" font-size="8" font-weight="600">Any device controls any device • State synced via centralized Redis • Speaker streams directly from CDN (not via phone)</text>
</svg>
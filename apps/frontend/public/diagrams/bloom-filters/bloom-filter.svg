<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowViolet" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
  </defs>
  <rect width="600" height="350" fill="#f7f8f9" rx="12"/>
  <text x="300" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Bloom Filter - Probabilistic Data Structure</text>

  <!-- Input element -->
  <rect x="20" y="55" width="100" height="45" rx="8" fill="white" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="70" y="75" text-anchor="middle" font-size="11" font-weight="600" fill="#f59e0b">Element</text>
  <text x="70" y="91" text-anchor="middle" font-size="9" fill="#64748b">"apple"</text>

  <!-- Hash functions -->
  <rect x="170" y="45" width="90" height="30" rx="8" fill="white" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="215" y="65" text-anchor="middle" font-size="10" font-weight="600" fill="#3b82f6">h1(x)</text>

  <rect x="170" y="82" width="90" height="30" rx="8" fill="white" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="215" y="102" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">h2(x)</text>

  <rect x="170" y="119" width="90" height="30" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="215" y="139" text-anchor="middle" font-size="10" font-weight="600" fill="#8b5cf6">h3(x)</text>

  <!-- Arrows from element to hash functions -->
  <line x1="120" y1="70" x2="165" y2="60" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="120" y1="78" x2="165" y2="97" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <line x1="120" y1="85" x2="165" y2="134" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrowViolet)"/>

  <!-- Bit Array -->
  <text x="430" y="50" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Bit Array (m bits)</text>

  <!-- Bit array cells -->
  <g transform="translate(310, 60)">
    <!-- Index labels -->
    <text x="12" y="-5" text-anchor="middle" font-size="7" fill="#94a3b8">0</text>
    <text x="36" y="-5" text-anchor="middle" font-size="7" fill="#94a3b8">1</text>
    <text x="60" y="-5" text-anchor="middle" font-size="7" fill="#94a3b8">2</text>
    <text x="84" y="-5" text-anchor="middle" font-size="7" fill="#94a3b8">3</text>
    <text x="108" y="-5" text-anchor="middle" font-size="7" fill="#94a3b8">4</text>
    <text x="132" y="-5" text-anchor="middle" font-size="7" fill="#94a3b8">5</text>
    <text x="156" y="-5" text-anchor="middle" font-size="7" fill="#94a3b8">6</text>
    <text x="180" y="-5" text-anchor="middle" font-size="7" fill="#94a3b8">7</text>
    <text x="204" y="-5" text-anchor="middle" font-size="7" fill="#94a3b8">8</text>
    <text x="228" y="-5" text-anchor="middle" font-size="7" fill="#94a3b8">9</text>
    <text x="252" y="-5" text-anchor="middle" font-size="7" fill="#94a3b8">10</text>

    <!-- Cells: 0=white, 1=colored -->
    <rect x="0" y="0" width="24" height="30" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="12" y="20" text-anchor="middle" font-size="11" fill="#94a3b8">0</text>

    <rect x="24" y="0" width="24" height="30" rx="4" fill="#3b82f6" stroke="#3b82f6" stroke-width="1"/>
    <text x="36" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="white">1</text>

    <rect x="48" y="0" width="24" height="30" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" font-size="11" fill="#94a3b8">0</text>

    <rect x="72" y="0" width="24" height="30" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="84" y="20" text-anchor="middle" font-size="11" fill="#94a3b8">0</text>

    <rect x="96" y="0" width="24" height="30" rx="4" fill="#10b981" stroke="#10b981" stroke-width="1"/>
    <text x="108" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="white">1</text>

    <rect x="120" y="0" width="24" height="30" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="132" y="20" text-anchor="middle" font-size="11" fill="#94a3b8">0</text>

    <rect x="144" y="0" width="24" height="30" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="156" y="20" text-anchor="middle" font-size="11" fill="#94a3b8">0</text>

    <rect x="168" y="0" width="24" height="30" rx="4" fill="#8b5cf6" stroke="#8b5cf6" stroke-width="1"/>
    <text x="180" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="white">1</text>

    <rect x="192" y="0" width="24" height="30" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="204" y="20" text-anchor="middle" font-size="11" fill="#94a3b8">0</text>

    <rect x="216" y="0" width="24" height="30" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="228" y="20" text-anchor="middle" font-size="11" fill="#94a3b8">0</text>

    <rect x="240" y="0" width="24" height="30" rx="4" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="252" y="20" text-anchor="middle" font-size="11" fill="#94a3b8">0</text>
  </g>

  <!-- Arrows from hash functions to bit positions -->
  <path d="M 260 60 Q 290 45 345 60" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="290" y="42" font-size="8" fill="#3b82f6">pos 1</text>

  <path d="M 260 97 Q 330 100 414 60" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="340" y="108" font-size="8" fill="#10b981">pos 4</text>

  <path d="M 260 134 Q 370 140 486 95" fill="none" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrowViolet)"/>
  <text x="380" y="148" font-size="8" fill="#8b5cf6">pos 7</text>

  <!-- Lookup section -->
  <rect x="20" y="175" width="560" height="70" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="40" y="197" font-size="12" font-weight="600" fill="#1e293b">Membership Query: "Is X in the set?"</text>
  <text x="40" y="217" font-size="10" fill="#10b981" font-weight="600">If all k bits = 1 &#8594; "Probably yes" (may be false positive)</text>
  <text x="40" y="235" font-size="10" fill="#ef4444" font-weight="600">If any bit = 0 &#8594; "Definitely no" (no false negatives)</text>

  <!-- Properties -->
  <rect x="20" y="260" width="270" height="75" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="40" y="282" font-size="11" font-weight="600" fill="#1e293b">Properties</text>
  <circle cx="40" cy="300" r="4" fill="#10b981"/>
  <text x="52" y="304" font-size="9" fill="#64748b">Space: O(m) bits, much less than storing items</text>
  <circle cx="40" cy="318" r="4" fill="#3b82f6"/>
  <text x="52" y="322" font-size="9" fill="#64748b">Lookup: O(k) hash computations</text>

  <!-- Use cases -->
  <rect x="310" y="260" width="270" height="75" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  <text x="330" y="282" font-size="11" font-weight="600" fill="#1e293b">Use Cases</text>
  <circle cx="330" cy="300" r="4" fill="#8b5cf6"/>
  <text x="342" y="304" font-size="9" fill="#64748b">Cache: avoid unnecessary DB lookups</text>
  <circle cx="330" cy="318" r="4" fill="#f59e0b"/>
  <text x="342" y="322" font-size="9" fill="#64748b">Spam filters, weak password detection</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="fuchsiaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="700">How Bloom Filters Work</text>

  <!-- ==================== INSERT FLOW (Top) ==================== -->
  <g transform="translate(0, 38)">
    <text x="25" y="15" fill="#c4b5fd" font-size="11" font-weight="700">INSERT</text>

    <!-- Input element -->
    <rect x="25" y="24" width="72" height="30" rx="6" fill="url(#purpleGrad)" filter="url(#shadow)"/>
    <text x="61" y="43" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">"hello"</text>

    <!-- Arrow to hash functions -->
    <line x1="97" y1="39" x2="118" y2="39" stroke="#a78bfa" stroke-width="1.5"/>
    <polygon points="118,35 125,39 118,43" fill="#a78bfa"/>

    <!-- Hash functions -->
    <rect x="126" y="20" width="62" height="16" rx="4" fill="#6d28d9" opacity="0.8"/>
    <text x="157" y="31" text-anchor="middle" fill="#ddd6fe" font-size="8">h1 → pos 2</text>
    <rect x="126" y="38" width="62" height="16" rx="4" fill="#6d28d9" opacity="0.8"/>
    <text x="157" y="49" text-anchor="middle" fill="#ddd6fe" font-size="8">h2 → pos 5</text>
    <rect x="126" y="56" width="62" height="16" rx="4" fill="#6d28d9" opacity="0.8"/>
    <text x="157" y="67" text-anchor="middle" fill="#ddd6fe" font-size="8">h3 → pos 9</text>

    <!-- Arrow to bit array -->
    <line x1="188" y1="47" x2="210" y2="47" stroke="#a78bfa" stroke-width="1.5"/>
    <polygon points="210,43 217,47 210,51" fill="#a78bfa"/>
    <text x="203" y="40" fill="#c4b5fd" font-size="7">set bits</text>

    <!-- Bit array -->
    <g transform="translate(220, 28)">
      <text x="0" y="-5" fill="#94a3b8" font-size="7">0</text>
      <text x="24" y="-5" fill="#94a3b8" font-size="7">1</text>
      <text x="48" y="-5" fill="#a78bfa" font-size="7" font-weight="700">2</text>
      <text x="72" y="-5" fill="#94a3b8" font-size="7">3</text>
      <text x="96" y="-5" fill="#94a3b8" font-size="7">4</text>
      <text x="120" y="-5" fill="#a78bfa" font-size="7" font-weight="700">5</text>
      <text x="144" y="-5" fill="#94a3b8" font-size="7">6</text>
      <text x="168" y="-5" fill="#94a3b8" font-size="7">7</text>
      <text x="192" y="-5" fill="#94a3b8" font-size="7">8</text>
      <text x="216" y="-5" fill="#a78bfa" font-size="7" font-weight="700">9</text>
      <text x="236" y="-5" fill="#94a3b8" font-size="7">10</text>
      <text x="258" y="-5" fill="#94a3b8" font-size="7">11</text>

      <!-- Bit cells -->
      <rect x="0" y="0" width="22" height="22" rx="3" fill="#334155" stroke="#475569" stroke-width="0.5"/>
      <text x="11" y="15" text-anchor="middle" fill="#64748b" font-size="10">0</text>
      <rect x="24" y="0" width="22" height="22" rx="3" fill="#334155" stroke="#475569" stroke-width="0.5"/>
      <text x="35" y="15" text-anchor="middle" fill="#64748b" font-size="10">0</text>
      <!-- pos 2 - SET -->
      <rect x="48" y="0" width="22" height="22" rx="3" fill="#7c3aed" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="59" y="15" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">1</text>
      <rect x="72" y="0" width="22" height="22" rx="3" fill="#334155" stroke="#475569" stroke-width="0.5"/>
      <text x="83" y="15" text-anchor="middle" fill="#64748b" font-size="10">0</text>
      <rect x="96" y="0" width="22" height="22" rx="3" fill="#334155" stroke="#475569" stroke-width="0.5"/>
      <text x="107" y="15" text-anchor="middle" fill="#64748b" font-size="10">0</text>
      <!-- pos 5 - SET -->
      <rect x="120" y="0" width="22" height="22" rx="3" fill="#7c3aed" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="131" y="15" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">1</text>
      <rect x="144" y="0" width="22" height="22" rx="3" fill="#334155" stroke="#475569" stroke-width="0.5"/>
      <text x="155" y="15" text-anchor="middle" fill="#64748b" font-size="10">0</text>
      <rect x="168" y="0" width="22" height="22" rx="3" fill="#334155" stroke="#475569" stroke-width="0.5"/>
      <text x="179" y="15" text-anchor="middle" fill="#64748b" font-size="10">0</text>
      <rect x="192" y="0" width="22" height="22" rx="3" fill="#334155" stroke="#475569" stroke-width="0.5"/>
      <text x="203" y="15" text-anchor="middle" fill="#64748b" font-size="10">0</text>
      <!-- pos 9 - SET -->
      <rect x="216" y="0" width="22" height="22" rx="3" fill="#7c3aed" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="227" y="15" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">1</text>
      <rect x="240" y="0" width="22" height="22" rx="3" fill="#334155" stroke="#475569" stroke-width="0.5"/>
      <text x="251" y="15" text-anchor="middle" fill="#64748b" font-size="10">0</text>
      <rect x="264" y="0" width="22" height="22" rx="3" fill="#334155" stroke="#475569" stroke-width="0.5"/>
      <text x="275" y="15" text-anchor="middle" fill="#64748b" font-size="10">0</text>
    </g>
  </g>

  <!-- ==================== LOOKUP FLOW (Middle) ==================== -->
  <g transform="translate(0, 140)">
    <text x="25" y="15" fill="#86efac" font-size="11" font-weight="700">LOOKUP</text>

    <!-- Query "hello" -->
    <rect x="25" y="24" width="72" height="28" rx="6" fill="#166534" opacity="0.8" filter="url(#shadow)"/>
    <text x="61" y="42" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">"hello"</text>

    <!-- Arrow -->
    <line x1="97" y1="38" x2="118" y2="38" stroke="#4ade80" stroke-width="1.2"/>
    <polygon points="118,35 124,38 118,41" fill="#4ade80"/>

    <!-- Check bits -->
    <text x="130" y="32" fill="#86efac" font-size="8">check pos 2, 5, 9</text>
    <text x="130" y="45" fill="#4ade80" font-size="9" font-weight="700">All 1?</text>

    <!-- Yes branch -->
    <line x1="175" y1="48" x2="175" y2="60" stroke="#4ade80" stroke-width="1"/>
    <rect x="130" y="62" width="130" height="22" rx="5" fill="#166534" opacity="0.7"/>
    <text x="195" y="77" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="600">YES → "Probably in set"</text>

    <!-- Query "xyz" -->
    <rect x="295" y="24" width="72" height="28" rx="6" fill="#7f1d1d" opacity="0.8" filter="url(#shadow)"/>
    <text x="331" y="42" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">"xyz"</text>

    <!-- Arrow -->
    <line x1="367" y1="38" x2="388" y2="38" stroke="#f87171" stroke-width="1.2"/>
    <polygon points="388,35 394,38 388,41" fill="#f87171"/>

    <!-- Check bits -->
    <text x="400" y="32" fill="#fca5a5" font-size="8">check pos 1, 5, 11</text>
    <text x="400" y="45" fill="#f87171" font-size="9" font-weight="700">Any 0?</text>

    <!-- No branch -->
    <line x1="440" y1="48" x2="440" y2="60" stroke="#f87171" stroke-width="1"/>
    <rect x="380" y="62" width="148" height="22" rx="5" fill="#7f1d1d" opacity="0.7"/>
    <text x="454" y="77" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="600">ANY 0 → "Definitely NOT in set"</text>
  </g>

  <!-- ==================== Formula ==================== -->
  <g transform="translate(20, 242)">
    <rect x="0" y="0" width="230" height="55" rx="8" fill="#1e293b" stroke="#4c1d95" stroke-width="1"/>
    <text x="115" y="17" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">False Positive Rate</text>
    <text x="115" y="35" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="500" font-style="italic">p = (1 - e^(-kn/m))^k</text>
    <text x="115" y="50" text-anchor="middle" fill="#94a3b8" font-size="8">1% FP ≈ 10 bits/element, k=7</text>
  </g>

  <!-- ==================== Real-World Examples (Right side) ==================== -->
  <g transform="translate(530, 137)">
    <text x="130" y="0" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">Real-World Applications</text>

    <!-- Cache -->
    <rect x="0" y="12" width="260" height="62" rx="8" fill="#1e293b" stroke="#6d28d9" stroke-width="1" filter="url(#shadow)"/>
    <rect x="0" y="12" width="5" height="62" rx="3" fill="#8b5cf6"/>
    <text x="18" y="32" fill="#c4b5fd" font-size="10" font-weight="700">Cache Penetration Guard</text>
    <text x="18" y="46" fill="#94a3b8" font-size="8">Request → Bloom filter → "not in DB"?</text>
    <text x="18" y="58" fill="#94a3b8" font-size="8">→ Skip DB entirely. Blocks cache attacks.</text>
    <text x="18" y="70" fill="#7c3aed" font-size="8" font-weight="500">Redis, CDN edge nodes</text>

    <!-- Database -->
    <rect x="0" y="82" width="260" height="62" rx="8" fill="#1e293b" stroke="#6d28d9" stroke-width="1" filter="url(#shadow)"/>
    <rect x="0" y="82" width="5" height="62" rx="3" fill="#a78bfa"/>
    <text x="18" y="102" fill="#c4b5fd" font-size="10" font-weight="700">Database SSTable Skip</text>
    <text x="18" y="116" fill="#94a3b8" font-size="8">Each SSTable has a Bloom filter in memory.</text>
    <text x="18" y="128" fill="#94a3b8" font-size="8">Skip disk read if key "definitely not" in SSTable.</text>
    <text x="18" y="140" fill="#7c3aed" font-size="8" font-weight="500">Cassandra, HBase, LevelDB, RocksDB</text>

    <!-- Web crawler -->
    <rect x="0" y="152" width="260" height="62" rx="8" fill="#1e293b" stroke="#6d28d9" stroke-width="1" filter="url(#shadow)"/>
    <rect x="0" y="152" width="5" height="62" rx="3" fill="#c084fc"/>
    <text x="18" y="172" fill="#c4b5fd" font-size="10" font-weight="700">Web Crawler URL Dedup</text>
    <text x="18" y="186" fill="#94a3b8" font-size="8">Track billions of visited URLs in ~1 GB.</text>
    <text x="18" y="198" fill="#94a3b8" font-size="8">"Definitely not visited" → crawl it. Saves memory.</text>
    <text x="18" y="210" fill="#7c3aed" font-size="8" font-weight="500">Googlebot, Bingbot, Scrapy</text>
  </g>

  <!-- ==================== Key Properties ==================== -->
  <g transform="translate(20, 310)">
    <rect x="0" y="0" width="500" height="75" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="250" y="18" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="700">Key Properties</text>

    <circle cx="30" cy="36" r="5" fill="#4ade80"/>
    <text x="42" y="40" fill="#86efac" font-size="9" font-weight="600">No false negatives</text>
    <text x="42" y="52" fill="#94a3b8" font-size="8">"Definitely not" is always correct</text>

    <circle cx="195" cy="36" r="5" fill="#facc15"/>
    <text x="207" y="40" fill="#fde68a" font-size="9" font-weight="600">Possible false positives</text>
    <text x="207" y="52" fill="#94a3b8" font-size="8">"Probably yes" may be wrong</text>

    <circle cx="380" cy="36" r="5" fill="#f87171"/>
    <text x="392" y="40" fill="#fca5a5" font-size="9" font-weight="600">No deletion</text>
    <text x="392" y="52" fill="#94a3b8" font-size="8">Use counting BF for deletes</text>

    <text x="250" y="70" text-anchor="middle" fill="#a78bfa" font-size="8">Space: ~1.2 MB for 1M elements at 1% FP  |  Lookup: O(k) where k = number of hash functions</text>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
  </defs>

  <rect width="1200" height="400" fill="white" rx="12"/>

  <text x="600" y="35" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Twitter Trends Detection Flow</text>
  <text x="600" y="55" text-anchor="middle" fill="#64748b" font-size="12">Tweet stream through Count-Min Sketch, sliding window, baseline comparison, and trend serving</text>

  <!-- 1. Tweet Stream -->
  <rect x="15" y="110" width="130" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="15" y="110" width="130" height="30" rx="10 10 0 0" fill="#1DA1F2"/>
  <text x="80" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Tweet Stream</text>
  <text x="80" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Firehose</text>
  <text x="80" y="175" text-anchor="middle" fill="#64748b" font-size="9">500K tweets/min</text>
  <text x="80" y="192" text-anchor="middle" fill="#64748b" font-size="9">Extract hashtags</text>
  <text x="80" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">NLP entity extract</text>

  <!-- Arrow 1→2 -->
  <line x1="145" y1="170" x2="178" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="147" y="150" width="30" height="16" rx="4" fill="#1DA1F2"/>
  <text x="162" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">1</text>

  <!-- 2. Kafka -->
  <rect x="188" y="110" width="120" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="188" y="110" width="120" height="30" rx="10 10 0 0" fill="#2563eb"/>
  <text x="248" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Kafka</text>
  <text x="248" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Topic Stream</text>
  <text x="248" y="175" text-anchor="middle" fill="#64748b" font-size="9">Partitioned</text>
  <text x="248" y="192" text-anchor="middle" fill="#64748b" font-size="9">7-day retention</text>
  <text x="248" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">High throughput</text>

  <!-- Arrow 2→3 -->
  <line x1="308" y1="170" x2="341" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="310" y="150" width="30" height="16" rx="4" fill="#2563eb"/>
  <text x="325" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">2</text>

  <!-- 3. Count-Min Sketch -->
  <rect x="351" y="110" width="150" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="351" y="110" width="150" height="30" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="426" y="130" text-anchor="middle" fill="white" font-size="10" font-weight="700">Count-Min Sketch</text>
  <text x="426" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Frequency Estimator</text>
  <text x="426" y="175" text-anchor="middle" fill="#64748b" font-size="9">Probabilistic counter</text>
  <text x="426" y="192" text-anchor="middle" fill="#64748b" font-size="9">O(1) space per topic</text>
  <text x="426" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">d hash functions</text>

  <!-- Arrow 3→4 -->
  <line x1="501" y1="170" x2="534" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="503" y="150" width="30" height="16" rx="4" fill="#7c3aed"/>
  <text x="518" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">3</text>

  <!-- 4. Sliding Window -->
  <rect x="544" y="110" width="140" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="544" y="110" width="140" height="30" rx="10 10 0 0" fill="#f97316"/>
  <text x="614" y="130" text-anchor="middle" fill="white" font-size="10" font-weight="700">Sliding Window</text>
  <text x="614" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Time Buckets</text>
  <text x="614" y="175" text-anchor="middle" fill="#64748b" font-size="9">5-min tumbling</text>
  <text x="614" y="192" text-anchor="middle" fill="#64748b" font-size="9">Rolling 1h / 24h</text>
  <text x="614" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">Flink windows</text>

  <!-- Arrow 4→5 -->
  <line x1="684" y1="170" x2="717" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="686" y="150" width="30" height="16" rx="4" fill="#f97316"/>
  <text x="701" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">4</text>

  <!-- 5. Compare Baseline -->
  <rect x="727" y="110" width="150" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="727" y="110" width="150" height="30" rx="10 10 0 0" fill="#ef4444"/>
  <text x="802" y="130" text-anchor="middle" fill="white" font-size="10" font-weight="700">Compare Baseline</text>
  <text x="802" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Anomaly Detector</text>
  <text x="802" y="175" text-anchor="middle" fill="#64748b" font-size="9">Current vs 7-day avg</text>
  <text x="802" y="192" text-anchor="middle" fill="#64748b" font-size="9">Z-score threshold</text>
  <text x="802" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">Spike detection</text>

  <!-- Arrow 5→6 -->
  <line x1="877" y1="170" x2="910" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="879" y="150" width="30" height="16" rx="4" fill="#ef4444"/>
  <text x="894" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">5</text>

  <!-- 6. Flag Trending -->
  <rect x="920" y="110" width="130" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="920" y="110" width="130" height="30" rx="10 10 0 0" fill="#ec4899"/>
  <text x="985" y="130" text-anchor="middle" fill="white" font-size="10" font-weight="700">Flag Trending</text>
  <text x="985" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Trend Ranker</text>
  <text x="985" y="175" text-anchor="middle" fill="#64748b" font-size="9">Rank by velocity</text>
  <text x="985" y="192" text-anchor="middle" fill="#64748b" font-size="9">Geo-localize</text>
  <text x="985" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">Content filter</text>

  <!-- Arrow 6→7 -->
  <line x1="1050" y1="170" x2="1073" y2="170" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="1050" y="150" width="24" height="16" rx="4" fill="#ec4899"/>
  <text x="1062" y="161" text-anchor="middle" fill="white" font-size="7" font-weight="600">6</text>

  <!-- 7. Serve -->
  <rect x="1083" y="110" width="100" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="1083" y="110" width="100" height="30" rx="10 10 0 0" fill="#16a34a"/>
  <text x="1133" y="130" text-anchor="middle" fill="white" font-size="11" font-weight="700">Serve</text>
  <text x="1133" y="158" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Trends API</text>
  <text x="1133" y="175" text-anchor="middle" fill="#64748b" font-size="9">Top 30 trends</text>
  <text x="1133" y="192" text-anchor="middle" fill="#64748b" font-size="9">Cached 30s</text>
  <text x="1133" y="215" text-anchor="middle" fill="#94a3b8" font-size="8">By region</text>

  <!-- Legend -->
  <rect x="30" y="280" width="1140" height="100" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="305" fill="#1e293b" font-size="12" font-weight="700">Flow Steps</text>

  <rect x="60" y="318" width="10" height="10" rx="2" fill="#1DA1F2"/>
  <text x="76" y="328" fill="#475569" font-size="10">1. Tweet firehose: 500K tweets/min, hashtags and entities extracted</text>
  <rect x="60" y="336" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="76" y="346" fill="#475569" font-size="10">2. Kafka streams topic tokens, partitioned for parallel processing</text>
  <rect x="60" y="354" width="10" height="10" rx="2" fill="#7c3aed"/>
  <text x="76" y="364" fill="#475569" font-size="10">3. Count-Min Sketch estimates frequency in O(1) space per topic</text>

  <rect x="600" y="318" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="616" y="328" fill="#475569" font-size="10">4. Sliding window aggregates counts in 5-min tumbling windows</text>
  <rect x="600" y="336" width="10" height="10" rx="2" fill="#ef4444"/>
  <text x="616" y="346" fill="#475569" font-size="10">5. Z-score anomaly detection compares current vs 7-day baseline</text>
  <rect x="600" y="354" width="10" height="10" rx="2" fill="#ec4899"/>
  <text x="616" y="364" fill="#475569" font-size="10">6-7. Trends ranked by velocity, geo-localized, served via API (top 30)</text>
</svg>
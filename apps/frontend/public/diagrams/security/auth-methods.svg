<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <!-- Arrow markers for each method color -->
    <marker id="arrRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
    </marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="arrViolet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
    <marker id="arrEmerald" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f7f8f9" rx="12"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">Authentication Methods Compared</text>

  <!-- ============================== -->
  <!-- 1. SESSION-COOKIE (Red) y=45 -->
  <!-- ============================== -->
  <rect x="15" y="45" width="770" height="95" rx="10" fill="white" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="30" y="64" font-size="13" font-weight="700" fill="#ef4444">1. Session-Cookie</text>
  <rect x="170" y="53" width="60" height="16" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="200" y="64" text-anchor="middle" font-size="9" font-weight="600" fill="#ef4444">Stateful</text>

  <!-- Browser -->
  <rect x="30" y="75" width="90" height="36" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="75" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">Browser</text>
  <text x="75" y="102" text-anchor="middle" font-size="8" fill="#64748b">user + pass</text>

  <!-- Arrow 1 -->
  <line x1="122" y1="93" x2="178" y2="93" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrRed)"/>
  <text x="150" y="87" text-anchor="middle" font-size="7.5" fill="#ef4444">POST /login</text>

  <!-- Server -->
  <rect x="180" y="75" width="105" height="36" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="232" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">Server</text>
  <text x="232" y="102" text-anchor="middle" font-size="8" fill="#64748b">creates session</text>

  <!-- Arrow 2 -->
  <line x1="287" y1="93" x2="343" y2="93" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrRed)"/>
  <text x="315" y="87" text-anchor="middle" font-size="7.5" fill="#ef4444">stores in DB</text>

  <!-- Session Store -->
  <rect x="345" y="75" width="100" height="36" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="395" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">Session Store</text>
  <text x="395" y="102" text-anchor="middle" font-size="8" fill="#64748b">sid → user data</text>

  <!-- Arrow 3 -->
  <line x1="447" y1="93" x2="503" y2="93" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrRed)"/>
  <text x="475" y="87" text-anchor="middle" font-size="7.5" fill="#ef4444">Set-Cookie</text>

  <!-- Browser with cookie -->
  <rect x="505" y="75" width="105" height="36" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="557" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">Browser</text>
  <text x="557" y="102" text-anchor="middle" font-size="8" fill="#64748b">sends cookie</text>

  <!-- Arrow 4 -->
  <line x1="612" y1="93" x2="668" y2="93" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrRed)"/>
  <text x="640" y="87" text-anchor="middle" font-size="7.5" fill="#ef4444">Cookie: sid</text>

  <!-- Server validates -->
  <rect x="670" y="75" width="100" height="36" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="720" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">Server</text>
  <text x="720" y="102" text-anchor="middle" font-size="8" fill="#64748b">looks up session</text>

  <!-- ============================== -->
  <!-- 2. TOKEN-BASED (Blue) y=150 -->
  <!-- ============================== -->
  <rect x="15" y="150" width="770" height="95" rx="10" fill="white" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="30" y="169" font-size="13" font-weight="700" fill="#3b82f6">2. Token-Based</text>
  <rect x="155" y="158" width="65" height="16" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="187" y="169" text-anchor="middle" font-size="9" font-weight="600" fill="#3b82f6">Stateless</text>

  <!-- Client -->
  <rect x="30" y="180" width="90" height="36" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="75" y="195" text-anchor="middle" font-size="10" font-weight="600" fill="#3b82f6">Client</text>
  <text x="75" y="207" text-anchor="middle" font-size="8" fill="#64748b">authenticates</text>

  <!-- Arrow 1 -->
  <line x1="122" y1="198" x2="193" y2="198" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <text x="157" y="192" text-anchor="middle" font-size="7.5" fill="#3b82f6">credentials</text>

  <!-- Server -->
  <rect x="195" y="180" width="110" height="36" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="250" y="195" text-anchor="middle" font-size="10" font-weight="600" fill="#3b82f6">Auth Server</text>
  <text x="250" y="207" text-anchor="middle" font-size="8" fill="#64748b">validates, issues token</text>

  <!-- Arrow 2 -->
  <line x1="307" y1="198" x2="378" y2="198" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <text x="342" y="192" text-anchor="middle" font-size="7.5" fill="#3b82f6">returns token</text>

  <!-- Client stores -->
  <rect x="380" y="180" width="110" height="36" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="435" y="195" text-anchor="middle" font-size="10" font-weight="600" fill="#3b82f6">Client</text>
  <text x="435" y="207" text-anchor="middle" font-size="8" fill="#64748b">stores token locally</text>

  <!-- Arrow 3 -->
  <line x1="492" y1="198" x2="563" y2="198" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <text x="527" y="192" text-anchor="middle" font-size="7.5" fill="#3b82f6">Authorization: Bearer</text>

  <!-- API Server -->
  <rect x="565" y="180" width="110" height="36" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="620" y="195" text-anchor="middle" font-size="10" font-weight="600" fill="#3b82f6">API Server</text>
  <text x="620" y="207" text-anchor="middle" font-size="8" fill="#64748b">verifies token</text>

  <!-- ============================== -->
  <!-- 3. JWT (Amber) y=255 -->
  <!-- ============================== -->
  <rect x="15" y="255" width="770" height="95" rx="10" fill="white" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="30" y="274" font-size="13" font-weight="700" fill="#f59e0b">3. JSON Web Token (JWT)</text>
  <rect x="220" y="263" width="115" height="16" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="277" y="274" text-anchor="middle" font-size="9" font-weight="600" fill="#f59e0b">Self-Contained, No Lookup</text>

  <!-- Header segment -->
  <rect x="40" y="290" width="140" height="45" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="110" y="306" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">Header</text>
  <text x="110" y="320" text-anchor="middle" font-size="8" fill="#92400e">{"alg":"HS256"</text>
  <text x="110" y="330" text-anchor="middle" font-size="8" fill="#92400e"> "typ":"JWT"}</text>

  <!-- Dot separator -->
  <text x="190" y="316" text-anchor="middle" font-size="24" font-weight="900" fill="#f59e0b">.</text>

  <!-- Payload segment -->
  <rect x="200" y="290" width="185" height="45" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="292" y="306" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">Payload (Claims)</text>
  <text x="292" y="320" text-anchor="middle" font-size="8" fill="#92400e">{"sub":"123","name":"John"</text>
  <text x="292" y="330" text-anchor="middle" font-size="8" fill="#92400e"> "role":"admin","exp":...}</text>

  <!-- Dot separator -->
  <text x="395" y="316" text-anchor="middle" font-size="24" font-weight="900" fill="#f59e0b">.</text>

  <!-- Signature segment -->
  <rect x="405" y="290" width="170" height="45" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="490" y="306" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">Signature</text>
  <text x="490" y="320" text-anchor="middle" font-size="8" fill="#92400e">HMACSHA256(</text>
  <text x="490" y="330" text-anchor="middle" font-size="8" fill="#92400e">header + payload, secret)</text>

  <!-- Verify box -->
  <rect x="600" y="290" width="170" height="45" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="685" y="308" text-anchor="middle" font-size="10" font-weight="600" fill="#d97706">Server verifies signature</text>
  <text x="685" y="323" text-anchor="middle" font-size="8.5" fill="#92400e">No DB lookup needed</text>

  <!-- Arrow to verify -->
  <line x1="577" y1="312" x2="598" y2="312" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrAmber)"/>

  <!-- ============================== -->
  <!-- 4. SSO (Violet) y=360 -->
  <!-- ============================== -->
  <rect x="15" y="360" width="770" height="95" rx="10" fill="white" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="30" y="379" font-size="13" font-weight="700" fill="#8b5cf6">4. Single Sign-On (SSO)</text>
  <rect x="215" y="368" width="120" height="16" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="275" y="379" text-anchor="middle" font-size="9" font-weight="600" fill="#8b5cf6">Login Once, Access Many</text>

  <!-- Browser -->
  <rect x="30" y="392" width="80" height="44" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="70" y="410" text-anchor="middle" font-size="10" font-weight="600" fill="#8b5cf6">Browser</text>
  <text x="70" y="425" text-anchor="middle" font-size="8" fill="#64748b">User</text>

  <!-- Arrow to a.com -->
  <line x1="112" y1="404" x2="158" y2="395" stroke="#8b5cf6" stroke-width="1.2" marker-end="url(#arrViolet)"/>

  <!-- a.com -->
  <rect x="160" y="385" width="80" height="30" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="200" y="405" text-anchor="middle" font-size="10" font-weight="600" fill="#8b5cf6">a.com</text>

  <!-- Arrow to b.com -->
  <line x1="112" y1="424" x2="158" y2="430" stroke="#8b5cf6" stroke-width="1.2" marker-end="url(#arrViolet)"/>

  <!-- b.com -->
  <rect x="160" y="420" width="80" height="30" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="200" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#8b5cf6">b.com</text>

  <!-- Arrow a.com to CAS -->
  <line x1="242" y1="400" x2="318" y2="407" stroke="#8b5cf6" stroke-width="1.2" marker-end="url(#arrViolet)"/>
  <text x="280" y="396" text-anchor="middle" font-size="7.5" fill="#8b5cf6">redirect</text>

  <!-- Arrow b.com to CAS -->
  <line x1="242" y1="435" x2="318" y2="420" stroke="#8b5cf6" stroke-width="1.2" marker-end="url(#arrViolet)"/>
  <text x="280" y="440" text-anchor="middle" font-size="7.5" fill="#8b5cf6">redirect</text>

  <!-- CAS -->
  <rect x="320" y="390" width="145" height="44" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="392" y="408" text-anchor="middle" font-size="11" font-weight="700" fill="#7c3aed">CAS (sso.com)</text>
  <text x="392" y="423" text-anchor="middle" font-size="8.5" fill="#6d28d9">Central Auth Service</text>

  <!-- Arrow CAS issues ticket -->
  <line x1="467" y1="412" x2="523" y2="412" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrViolet)"/>
  <text x="495" y="405" text-anchor="middle" font-size="7.5" fill="#8b5cf6">auth token</text>

  <!-- Validated box -->
  <rect x="525" y="394" width="120" height="36" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.2"/>
  <text x="585" y="410" text-anchor="middle" font-size="10" font-weight="600" fill="#8b5cf6">Access Granted</text>
  <text x="585" y="423" text-anchor="middle" font-size="8" fill="#64748b">to a.com AND b.com</text>

  <!-- Note -->
  <rect x="660" y="394" width="110" height="36" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4"/>
  <text x="715" y="410" text-anchor="middle" font-size="8.5" font-weight="600" fill="#7c3aed">One login grants</text>
  <text x="715" y="423" text-anchor="middle" font-size="8.5" fill="#6d28d9">multi-app access</text>

  <!-- ============================== -->
  <!-- 5. OAuth 2.0 (Emerald) y=465 -->
  <!-- ============================== -->
  <rect x="15" y="465" width="770" height="95" rx="10" fill="white" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="30" y="484" font-size="13" font-weight="700" fill="#10b981">5. OAuth 2.0</text>
  <rect x="120" y="473" width="115" height="16" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
  <text x="177" y="484" text-anchor="middle" font-size="9" font-weight="600" fill="#10b981">Delegated Authorization</text>

  <!-- Client App -->
  <rect x="30" y="498" width="95" height="44" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
  <text x="77" y="516" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">Client App</text>
  <text x="77" y="530" text-anchor="middle" font-size="8" fill="#64748b">(Your App)</text>

  <!-- Arrow 1 -->
  <line x1="127" y1="520" x2="183" y2="520" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrEmerald)"/>
  <text x="155" y="513" text-anchor="middle" font-size="7.5" fill="#10b981">request auth</text>

  <!-- Auth Server -->
  <rect x="185" y="498" width="115" height="44" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="242" y="516" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">Auth Server</text>
  <text x="242" y="530" text-anchor="middle" font-size="8" fill="#64748b">(Google, GitHub)</text>

  <!-- Arrow 2 -->
  <line x1="302" y1="520" x2="358" y2="520" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrEmerald)"/>
  <text x="330" y="513" text-anchor="middle" font-size="7.5" fill="#10b981">auth code</text>

  <!-- Client with code -->
  <rect x="360" y="498" width="95" height="44" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
  <text x="407" y="516" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">Client App</text>
  <text x="407" y="530" text-anchor="middle" font-size="8" fill="#64748b">has auth code</text>

  <!-- Arrow 3 -->
  <line x1="457" y1="520" x2="513" y2="520" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrEmerald)"/>
  <text x="485" y="513" text-anchor="middle" font-size="7.5" fill="#10b981">exchange code</text>

  <!-- Token -->
  <rect x="515" y="498" width="105" height="44" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="567" y="516" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">Access Token</text>
  <text x="567" y="530" text-anchor="middle" font-size="8" fill="#064e3b">+ refresh token</text>

  <!-- Arrow 4 -->
  <line x1="622" y1="520" x2="668" y2="520" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrEmerald)"/>
  <text x="645" y="513" text-anchor="middle" font-size="7.5" fill="#10b981">use token</text>

  <!-- Resource Server -->
  <rect x="670" y="498" width="100" height="44" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.2"/>
  <text x="720" y="516" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">Resource</text>
  <text x="720" y="530" text-anchor="middle" font-size="10" font-weight="600" fill="#10b981">Server</text>

  <!-- ============================== -->
  <!-- Bottom legend -->
  <!-- ============================== -->
  <rect x="15" y="570" width="770" height="22" rx="6" fill="#f1f5f9"/>
  <circle cx="40" cy="581" r="5" fill="#ef4444"/>
  <text x="50" y="585" font-size="8.5" fill="#475569">Session-Cookie</text>
  <circle cx="150" cy="581" r="5" fill="#3b82f6"/>
  <text x="160" y="585" font-size="8.5" fill="#475569">Token-Based</text>
  <circle cx="250" cy="581" r="5" fill="#f59e0b"/>
  <text x="260" y="585" font-size="8.5" fill="#475569">JWT</text>
  <circle cx="310" cy="581" r="5" fill="#8b5cf6"/>
  <text x="320" y="585" font-size="8.5" fill="#475569">SSO</text>
  <circle cx="370" cy="581" r="5" fill="#10b981"/>
  <text x="380" y="585" font-size="8.5" fill="#475569">OAuth 2.0</text>

  <text x="555" y="585" font-size="8" fill="#94a3b8">Stateful needs server storage</text>
  <text x="555" y="585" font-size="8" fill="#94a3b8" dx="180">Stateless = no server state</text>
</svg>
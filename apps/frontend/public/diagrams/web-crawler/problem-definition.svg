<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <rect x="360" y="20" width="480" height="44" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="50" text-anchor="middle" fill="white" font-size="22" font-weight="700">Problem Definition: Designing a Web Crawler</text>

  <!-- Column 1: Users & Core Actions -->
  <text x="200" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">System &amp; Core Actions</text>
  <rect x="40" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <!-- Icons -->
  <circle cx="120" cy="170" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="120" y="176" text-anchor="middle" fill="white" font-size="24">🕷️</text>
  <text x="120" y="215" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Crawler</text>

  <text x="200" y="176" text-anchor="middle" fill="white" font-size="28">&#x2192;</text>

  <circle cx="280" cy="170" r="28" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2"/>
  <text x="280" y="176" text-anchor="middle" fill="white" font-size="24">🌐</text>
  <text x="280" y="215" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="13">Web Pages</text>

  <!-- Core Actions Box -->
  <rect x="55" y="240" width="290" height="230" rx="12" fill="#f97316" filter="url(#shadow)"/>
  <text x="200" y="270" text-anchor="middle" fill="white" font-size="15" font-weight="700">Core Actions</text>
  <line x1="75" y1="282" x2="325" y2="282" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="80" y="310" fill="white" font-size="13">🔗  Manage URL frontier</text>
  <text x="80" y="340" fill="white" font-size="13">📥  Fetch page content</text>
  <text x="80" y="370" fill="white" font-size="13">🤖  Respect robots.txt</text>
  <text x="80" y="400" fill="white" font-size="13">🔍  Extract &amp; discover links</text>
  <text x="80" y="430" fill="white" font-size="13">🚫  Deduplicate URLs &amp; content</text>
  <text x="80" y="460" fill="white" font-size="13">💾  Store crawled pages</text>

  <!-- Column 2: In Scope -->
  <text x="600" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">In Scope: Essentials</text>
  <rect x="440" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="440" y="125" width="320" height="350" rx="12" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <text x="470" y="160" fill="white" font-size="13" font-weight="600">🔗  URL frontier with priority queue</text>
  <text x="490" y="180" fill="rgba(255,255,255,0.7)" font-size="11">(BFS traversal, priority by importance)</text>
  <text x="470" y="210" fill="white" font-size="13" font-weight="600">🤖  Robots.txt compliance</text>
  <text x="490" y="230" fill="rgba(255,255,255,0.7)" font-size="11">(parse and respect crawl rules)</text>
  <text x="470" y="260" fill="white" font-size="13" font-weight="600">⏳  Politeness / rate limiting</text>
  <text x="490" y="280" fill="rgba(255,255,255,0.7)" font-size="11">(per-domain crawl delays)</text>
  <text x="470" y="310" fill="white" font-size="13" font-weight="600">🔍  Content extraction &amp; parsing</text>
  <text x="490" y="330" fill="rgba(255,255,255,0.7)" font-size="11">(HTML parse, link discovery)</text>
  <text x="470" y="360" fill="white" font-size="13" font-weight="600">🚫  URL &amp; content deduplication</text>
  <text x="490" y="380" fill="rgba(255,255,255,0.7)" font-size="11">(Bloom filter + content hashing)</text>
  <text x="470" y="410" fill="white" font-size="13" font-weight="600">🌍  Distributed crawling</text>
  <text x="490" y="430" fill="rgba(255,255,255,0.7)" font-size="11">(thousands of crawler workers)</text>
  <text x="470" y="460" fill="white" font-size="13" font-weight="600">🔄  Recrawl scheduling</text>

  <!-- Column 3: Out of Scope -->
  <text x="1000" y="100" text-anchor="middle" fill="white" font-size="16" font-weight="700">Out of Scope / Future</text>
  <rect x="840" y="108" width="320" height="2" fill="rgba(255,255,255,0.3)" rx="1"/>

  <rect x="840" y="125" width="320" height="280" rx="12" fill="rgba(245,158,11,0.25)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>

  <text x="870" y="160" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  JavaScript rendering (SPA crawling)</text>
  <text x="870" y="195" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  API scraping / REST crawling</text>
  <text x="870" y="230" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  CAPTCHA solving</text>
  <text x="870" y="265" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Deep web / authenticated content</text>
  <text x="870" y="300" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Search indexing / ranking</text>
  <text x="870" y="335" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Image / video content analysis</text>
  <text x="870" y="370" fill="rgba(255,255,255,0.85)" font-size="13">&#x274C;  Natural language processing</text>

  <!-- Bottom -->
  <text x="600" y="540" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="12">Focus on scalable URL frontier, politeness, and deduplication first, then add JS rendering and deep crawling</text>

  <rect x="440" y="490" width="320" height="36" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="600" y="514" text-anchor="middle" fill="white" font-size="13" font-weight="600">🏗️  Distributed Web Crawling System</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgCap" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2563eb"/><stop offset="100%" stop-color="#1e40af"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="1200" height="550" fill="url(#bgCap)" rx="16"/>

  <!-- Title -->
  <rect x="380" y="16" width="440" height="40" rx="8" fill="none" stroke="white" stroke-width="2"/>
  <text x="600" y="43" text-anchor="middle" fill="white" font-size="20" font-weight="700">Back-of-the-Envelope Estimates</text>

  <!-- Column 1: Traffic -->
  <rect x="20" y="80" width="275" height="440" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="20" y="80" width="275" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="157" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Traffic Estimates</text>

  <text x="45" y="145" fill="#fbbf24" font-size="13" font-weight="700">&#x1F50D; 10 Billion searches/day</text>
  <text x="157" y="170" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="200" fill="white" font-size="12">Avg keystrokes per search: 6</text>
  <text x="45" y="218" fill="white" font-size="11">Each keystroke = 1 autocomplete</text>
  <text x="157" y="240" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="268" fill="white" font-size="12">Total autocomplete requests:</text>
  <text x="45" y="288" fill="#fbbf24" font-size="16" font-weight="800">60B requests/day</text>
  <text x="157" y="310" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="338" fill="white" font-size="11">Average QPS:</text>
  <text x="45" y="356" fill="rgba(255,255,255,0.7)" font-size="10">60B / 86,400</text>
  <text x="45" y="378" fill="#fbbf24" font-size="16" font-weight="800">&#x2248; 700K QPS</text>
  <text x="157" y="400" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="45" y="425" fill="white" font-size="11">Peak QPS (3x):</text>
  <text x="45" y="448" fill="#f97316" font-size="18" font-weight="800">&#x2248; 2.1M QPS</text>
  <text x="45" y="470" fill="rgba(255,255,255,0.6)" font-size="10">(Debounce to &#x2248; 350ms reduces 50%)</text>
  <text x="45" y="490" fill="#16a34a" font-size="14" font-weight="700">Effective: &#x2248; 1M QPS</text>

  <!-- Column 2: Latency -->
  <rect x="310" y="80" width="265" height="250" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="80" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Latency Requirements</text>

  <text x="335" y="148" fill="#fbbf24" font-size="13" font-weight="700">&#x26A1; Target: &lt;100ms response</text>
  <text x="442" y="170" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">&#x2193;</text>

  <text x="335" y="198" fill="white" font-size="12">Budget breakdown:</text>
  <text x="335" y="218" fill="rgba(255,255,255,0.7)" font-size="10">Network (client &#x2192; edge): 20ms</text>
  <text x="335" y="236" fill="rgba(255,255,255,0.7)" font-size="10">Trie lookup: 1-5ms</text>
  <text x="335" y="254" fill="rgba(255,255,255,0.7)" font-size="10">Ranking top-5: 5-10ms</text>
  <text x="335" y="272" fill="rgba(255,255,255,0.7)" font-size="10">Serialization: 2ms</text>
  <text x="335" y="290" fill="rgba(255,255,255,0.7)" font-size="10">Network return: 20ms</text>

  <rect x="325" y="302" width="235" height="22" rx="6" fill="rgba(22,163,74,0.3)" stroke="rgba(22,163,74,0.5)" stroke-width="1"/>
  <text x="442" y="318" text-anchor="middle" fill="white" font-size="10" font-weight="600">&#x2705; Total: &#x2248; 50ms — well within budget</text>

  <!-- Column 2b: Trie -->
  <rect x="310" y="350" width="265" height="170" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="310" y="350" width="265" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="442" y="374" text-anchor="middle" fill="white" font-size="14" font-weight="700">Trie Memory</text>

  <text x="335" y="410" fill="white" font-size="11">Unique queries: <tspan fill="#fbbf24" font-weight="700">&#x2248; 5 Billion</tspan></text>
  <text x="335" y="432" fill="white" font-size="11">Avg query length: 15 chars</text>
  <text x="442" y="452" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>

  <text x="335" y="475" fill="white" font-size="11">Naive trie: &#x2248; 500B nodes</text>
  <text x="335" y="495" fill="#fbbf24" font-size="14" font-weight="700">&#x2248; 2-5 TB memory</text>
  <text x="335" y="518" fill="#16a34a" font-size="12" font-weight="700">Compressed trie: &#x2248; 200GB</text>

  <!-- Column 3: Suggestions -->
  <rect x="590" y="80" width="290" height="250" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="80" width="290" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="104" text-anchor="middle" fill="white" font-size="14" font-weight="700">Suggestion Serving</text>

  <text x="615" y="148" fill="white" font-size="12">Return top</text>
  <text x="615" y="175" fill="#fbbf24" font-size="20" font-weight="800">5 suggestions</text>
  <text x="615" y="198" fill="white" font-size="12">per keystroke</text>
  <text x="735" y="218" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>

  <text x="615" y="245" fill="white" font-size="11">Response payload: &#x2248; 200 bytes</text>
  <text x="615" y="268" fill="white" font-size="11">Bandwidth at 1M QPS:</text>
  <text x="615" y="292" fill="#f97316" font-size="16" font-weight="800">&#x2248; 200 MB/s</text>
  <text x="615" y="310" fill="rgba(255,255,255,0.6)" font-size="10">CDN-cacheable for popular prefixes</text>

  <!-- Column 3b: Updates -->
  <rect x="590" y="350" width="290" height="170" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="590" y="350" width="290" height="36" rx="12 12 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="735" y="374" text-anchor="middle" fill="white" font-size="14" font-weight="700">Trie Updates</text>

  <text x="615" y="410" fill="white" font-size="11">New queries/day: &#x2248; 50M</text>
  <text x="615" y="432" fill="white" font-size="11">Frequency updates: batch</text>
  <text x="735" y="452" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="14">&#x2193;</text>

  <text x="615" y="475" fill="white" font-size="11">Rebuild trie: every 15 min</text>
  <text x="615" y="498" fill="#fbbf24" font-size="14" font-weight="700">Blue-green deployment</text>
  <text x="615" y="518" fill="rgba(255,255,255,0.6)" font-size="10">Build new trie &#x2192; swap atomically</text>

  <!-- Key insight box -->
  <rect x="900" y="80" width="280" height="440" rx="12" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
  <text x="1040" y="108" text-anchor="middle" fill="white" font-size="14" font-weight="700">&#x1F4A1; Key Insights</text>
  <line x1="920" y1="118" x2="1160" y2="118" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <text x="920" y="145" fill="white" font-size="11" font-weight="600">Read-only at query time</text>
  <text x="920" y="163" fill="rgba(255,255,255,0.7)" font-size="10">Trie is immutable during serving.</text>
  <text x="920" y="178" fill="rgba(255,255,255,0.7)" font-size="10">Updates happen offline in batches.</text>

  <text x="920" y="210" fill="white" font-size="11" font-weight="600">Debounce saves 50% QPS</text>
  <text x="920" y="228" fill="rgba(255,255,255,0.7)" font-size="10">Client-side 350ms debounce</text>
  <text x="920" y="243" fill="rgba(255,255,255,0.7)" font-size="10">halves server load dramatically.</text>

  <text x="920" y="275" fill="white" font-size="11" font-weight="600">Compressed trie = 50x savings</text>
  <text x="920" y="293" fill="rgba(255,255,255,0.7)" font-size="10">Patricia/radix trie merges nodes.</text>
  <text x="920" y="308" fill="rgba(255,255,255,0.7)" font-size="10">5TB &#x2192; 200GB with compression.</text>

  <text x="920" y="340" fill="white" font-size="11" font-weight="600">Pre-compute top-K per node</text>
  <text x="920" y="358" fill="rgba(255,255,255,0.7)" font-size="10">Store top-5 at each trie node</text>
  <text x="920" y="373" fill="rgba(255,255,255,0.7)" font-size="10">to avoid traversal at query time.</text>

  <text x="920" y="405" fill="white" font-size="11" font-weight="600">CDN for popular prefixes</text>
  <text x="920" y="423" fill="rgba(255,255,255,0.7)" font-size="10">"how to", "what is" etc. are</text>
  <text x="920" y="438" fill="rgba(255,255,255,0.7)" font-size="10">highly cacheable at edge.</text>

  <text x="920" y="470" fill="white" font-size="11" font-weight="600">Sharding by prefix</text>
  <text x="920" y="488" fill="rgba(255,255,255,0.7)" font-size="10">Shard a-f, g-m, n-s, t-z across</text>
  <text x="920" y="503" fill="rgba(255,255,255,0.7)" font-size="10">nodes for horizontal scale.</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
  </defs>

  <rect width="1200" height="450" fill="#ffffff" rx="16"/>

  <text x="600" y="32" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Distributed Key-Value Store: Write Flow</text>
  <text x="600" y="52" text-anchor="middle" fill="#64748b" font-size="12">Client PUT(key,value) through consistent hash, coordinator, parallel writes to N replicas, W acknowledgments</text>

  <!-- Client PUT -->
  <rect x="15" y="110" width="120" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="15" y="110" width="120" height="28" rx="10 10 0 0" fill="#dc382d"/>
  <text x="75" y="129" text-anchor="middle" fill="white" font-size="11" font-weight="700">Client PUT</text>
  <text x="75" y="157" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">PUT(key, value)</text>
  <text x="75" y="175" text-anchor="middle" fill="#64748b" font-size="9">Key: user:123</text>
  <text x="75" y="191" text-anchor="middle" fill="#64748b" font-size="9">Value: {name:...}</text>
  <text x="75" y="207" text-anchor="middle" fill="#94a3b8" font-size="8">Any node entry</text>

  <!-- Consistent Hash -->
  <rect x="185" y="95" width="130" height="140" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="185" y="95" width="130" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="250" y="114" text-anchor="middle" fill="white" font-size="11" font-weight="700">Consistent Hash</text>
  <text x="250" y="142" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Hash Ring Lookup</text>
  <text x="250" y="160" text-anchor="middle" fill="#64748b" font-size="9">MD5(key) mod 2^128</text>
  <text x="250" y="176" text-anchor="middle" fill="#64748b" font-size="9">Find 3 replica nodes</text>
  <text x="250" y="192" text-anchor="middle" fill="#64748b" font-size="9">Virtual nodes (256)</text>
  <text x="250" y="222" text-anchor="middle" fill="#94a3b8" font-size="8">25,600 vnodes total</text>

  <!-- Coordinator -->
  <rect x="365" y="95" width="130" height="140" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="365" y="95" width="130" height="28" rx="10 10 0 0" fill="#f97316"/>
  <text x="430" y="114" text-anchor="middle" fill="white" font-size="11" font-weight="700">Coordinator</text>
  <text x="430" y="142" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Route + Replicate</text>
  <text x="430" y="160" text-anchor="middle" fill="#64748b" font-size="9">Increment vector clock</text>
  <text x="430" y="176" text-anchor="middle" fill="#64748b" font-size="9">Send to all N=3</text>
  <text x="430" y="192" text-anchor="middle" fill="#64748b" font-size="9">replicas in parallel</text>
  <text x="430" y="222" text-anchor="middle" fill="#94a3b8" font-size="8">Any replica can coord</text>

  <!-- Replica 1 -->
  <rect x="555" y="65" width="130" height="100" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="555" y="65" width="130" height="24" rx="10 10 0 0" fill="#16a34a"/>
  <text x="620" y="82" text-anchor="middle" fill="white" font-size="10" font-weight="700">Replica Node 1</text>
  <text x="620" y="106" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Write Path</text>
  <text x="620" y="122" text-anchor="middle" fill="#64748b" font-size="9">1. Append to WAL</text>
  <text x="620" y="138" text-anchor="middle" fill="#64748b" font-size="9">2. Insert MemTable</text>
  <text x="620" y="154" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="600">ACK sent</text>

  <!-- Replica 2 -->
  <rect x="555" y="180" width="130" height="100" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="555" y="180" width="130" height="24" rx="10 10 0 0" fill="#16a34a"/>
  <text x="620" y="197" text-anchor="middle" fill="white" font-size="10" font-weight="700">Replica Node 2</text>
  <text x="620" y="220" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Write Path</text>
  <text x="620" y="236" text-anchor="middle" fill="#64748b" font-size="9">1. Append to WAL</text>
  <text x="620" y="252" text-anchor="middle" fill="#64748b" font-size="9">2. Insert MemTable</text>
  <text x="620" y="268" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="600">ACK sent</text>

  <!-- Replica 3 (async) -->
  <rect x="555" y="295" width="130" height="65" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="555" y="295" width="130" height="24" rx="10 10 0 0" fill="#94a3b8"/>
  <text x="620" y="312" text-anchor="middle" fill="white" font-size="10" font-weight="700">Replica Node 3</text>
  <text x="620" y="336" text-anchor="middle" fill="#64748b" font-size="9">Writes async</text>
  <text x="620" y="352" text-anchor="middle" fill="#94a3b8" font-size="9">(not required for W=2)</text>

  <!-- W Acks -->
  <rect x="740" y="110" width="130" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="740" y="110" width="130" height="28" rx="10 10 0 0" fill="#16a34a"/>
  <text x="805" y="129" text-anchor="middle" fill="white" font-size="11" font-weight="700">W=2 ACKs</text>
  <text x="805" y="157" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Quorum Met</text>
  <text x="805" y="175" text-anchor="middle" fill="#64748b" font-size="9">2 of 3 replicas</text>
  <text x="805" y="191" text-anchor="middle" fill="#64748b" font-size="9">confirmed write</text>
  <text x="805" y="207" text-anchor="middle" fill="#64748b" font-size="9">3rd writes async</text>
  <text x="805" y="220" text-anchor="middle" fill="#16a34a" font-size="12">&#x2713;&#x2713;</text>

  <!-- Return Success -->
  <rect x="920" y="115" width="120" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="920" y="115" width="120" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="980" y="134" text-anchor="middle" fill="white" font-size="11" font-weight="700">Return Success</text>
  <text x="980" y="162" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">{ version }</text>
  <text x="980" y="180" text-anchor="middle" fill="#64748b" font-size="9">Vector clock v2</text>
  <text x="980" y="196" text-anchor="middle" fill="#64748b" font-size="9">Client can read</text>
  <text x="980" y="212" text-anchor="middle" fill="#94a3b8" font-size="8">&lt;10ms p99</text>

  <!-- Hinted Handoff box -->
  <rect x="1080" y="250" width="100" height="80" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="1080" y="250" width="100" height="24" rx="10 10 0 0" fill="#f97316"/>
  <text x="1130" y="267" text-anchor="middle" fill="white" font-size="9" font-weight="700">Hinted Handoff</text>
  <text x="1130" y="294" text-anchor="middle" fill="#64748b" font-size="9">If replica down:</text>
  <text x="1130" y="310" text-anchor="middle" fill="#64748b" font-size="9">store hint for</text>
  <text x="1130" y="322" text-anchor="middle" fill="#64748b" font-size="9">later replay</text>

  <!-- Arrows -->
  <line x1="135" y1="160" x2="182" y2="160" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="137" y="146" width="42" height="14" rx="3" fill="#2563eb"/>
  <text x="158" y="156" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2460;</text>

  <line x1="315" y1="160" x2="362" y2="160" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="317" y="146" width="42" height="14" rx="3" fill="#f97316"/>
  <text x="338" y="156" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2461;</text>

  <!-- Coordinator to replicas -->
  <line x1="495" y1="120" x2="552" y2="110" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="495" y1="165" x2="552" y2="220" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="495" y1="200" x2="552" y2="320" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <rect x="498" y="106" width="50" height="14" rx="3" fill="#16a34a"/>
  <text x="523" y="116" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2462; Write</text>

  <!-- Replicas to W ACKs -->
  <line x1="685" y1="115" x2="737" y2="140" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="685" y1="230" x2="737" y2="195" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="688" y="148" width="46" height="14" rx="3" fill="#16a34a"/>
  <text x="711" y="158" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2463; ACK</text>

  <line x1="870" y1="165" x2="917" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="872" y="151" width="42" height="14" rx="3" fill="#2563eb"/>
  <text x="893" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2464;</text>

  <!-- Hinted handoff arrow -->
  <path d="M 620 360 Q 620 380 1130 380 Q 1130 380 1130 333" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="860" y="374" fill="#f97316" font-size="8" font-weight="600">&#x2465; If down: hinted handoff</text>

  <!-- Legend -->
  <rect x="20" y="340" width="1050" height="95" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="362" fill="#1e293b" font-size="12" font-weight="700">Flow Steps (N=3, W=2):</text>
  <rect x="50" y="372" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="66" y="381" fill="#475569" font-size="9">&#x2460; Client sends PUT(key,value) to any node, consistent hash identifies 3 replica nodes</text>
  <rect x="50" y="388" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="66" y="397" fill="#475569" font-size="9">&#x2461; Coordinator increments vector clock, sends write to all N=3 replicas in parallel</text>
  <rect x="50" y="404" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="66" y="413" fill="#475569" font-size="9">&#x2462; Each replica: append to WAL (durability) + insert into MemTable (fast reads)</text>
  <text x="430" y="381" fill="#475569" font-size="9">&#x2463; Wait for W=2 ACKs (quorum), 3rd replica writes async in background</text>
  <text x="430" y="397" fill="#475569" font-size="9">&#x2464; Return success + new version (vector clock) to client</text>
  <text x="430" y="413" fill="#475569" font-size="9">&#x2465; If a replica is down: store hint on temp node for later replay (hinted handoff)</text>
</svg>
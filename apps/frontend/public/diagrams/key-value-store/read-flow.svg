<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 450" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#334155"/></marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/></marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/></marker>
  </defs>

  <rect width="1200" height="450" fill="#ffffff" rx="16"/>

  <text x="600" y="32" text-anchor="middle" fill="#1e293b" font-size="20" font-weight="700">Distributed Key-Value Store: Read Flow</text>
  <text x="600" y="52" text-anchor="middle" fill="#64748b" font-size="12">Client GET(key) through consistent hash, coordinator, parallel read from R replicas, reconcile with vector clocks</text>

  <!-- Client GET -->
  <rect x="15" y="110" width="120" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="15" y="110" width="120" height="28" rx="10 10 0 0" fill="#dc382d"/>
  <text x="75" y="129" text-anchor="middle" fill="white" font-size="11" font-weight="700">Client GET</text>
  <text x="75" y="157" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">GET(key)</text>
  <text x="75" y="175" text-anchor="middle" fill="#64748b" font-size="9">Key: user:123</text>
  <text x="75" y="191" text-anchor="middle" fill="#64748b" font-size="9">consistency=QUORUM</text>
  <text x="75" y="207" text-anchor="middle" fill="#94a3b8" font-size="8">Any node entry</text>

  <!-- Consistent Hash -->
  <rect x="185" y="95" width="130" height="140" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="185" y="95" width="130" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="250" y="114" text-anchor="middle" fill="white" font-size="11" font-weight="700">Consistent Hash</text>
  <text x="250" y="142" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Hash Ring Lookup</text>
  <text x="250" y="160" text-anchor="middle" fill="#64748b" font-size="9">MD5(key) mod 2^128</text>
  <text x="250" y="176" text-anchor="middle" fill="#64748b" font-size="9">Identify 3 replicas</text>
  <text x="250" y="192" text-anchor="middle" fill="#64748b" font-size="9">on hash ring</text>
  <text x="250" y="222" text-anchor="middle" fill="#94a3b8" font-size="8">O(1) with ring cache</text>

  <!-- Coordinator -->
  <rect x="365" y="95" width="130" height="140" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="365" y="95" width="130" height="28" rx="10 10 0 0" fill="#f97316"/>
  <text x="430" y="114" text-anchor="middle" fill="white" font-size="11" font-weight="700">Coordinator</text>
  <text x="430" y="142" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Parallel Read</text>
  <text x="430" y="160" text-anchor="middle" fill="#64748b" font-size="9">Query R=2 replicas</text>
  <text x="430" y="176" text-anchor="middle" fill="#64748b" font-size="9">(or all 3 for digest</text>
  <text x="430" y="192" text-anchor="middle" fill="#64748b" font-size="9">comparison mode)</text>
  <text x="430" y="222" text-anchor="middle" fill="#94a3b8" font-size="8">Parallel fan-out</text>

  <!-- Replica 1 -->
  <rect x="555" y="70" width="130" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="555" y="70" width="130" height="24" rx="10 10 0 0" fill="#16a34a"/>
  <text x="620" y="87" text-anchor="middle" fill="white" font-size="10" font-weight="700">Replica Node 1</text>
  <text x="620" y="110" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Read Path</text>
  <text x="620" y="126" text-anchor="middle" fill="#64748b" font-size="9">1. Check MemTable</text>
  <text x="620" y="142" text-anchor="middle" fill="#64748b" font-size="9">2. Bloom filter</text>
  <text x="620" y="158" text-anchor="middle" fill="#64748b" font-size="9">3. SSTable scan</text>
  <text x="620" y="172" text-anchor="middle" fill="#16a34a" font-size="9" font-weight="600">v2 (latest)</text>

  <!-- Replica 2 -->
  <rect x="555" y="195" width="130" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="555" y="195" width="130" height="24" rx="10 10 0 0" fill="#f97316"/>
  <text x="620" y="212" text-anchor="middle" fill="white" font-size="10" font-weight="700">Replica Node 2</text>
  <text x="620" y="236" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Read Path</text>
  <text x="620" y="252" text-anchor="middle" fill="#64748b" font-size="9">1. Check MemTable</text>
  <text x="620" y="268" text-anchor="middle" fill="#64748b" font-size="9">2. Bloom filter</text>
  <text x="620" y="284" text-anchor="middle" fill="#64748b" font-size="9">3. SSTable scan</text>
  <text x="620" y="298" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="600">v1 (stale!)</text>

  <!-- Reconcile -->
  <rect x="740" y="100" width="140" height="140" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="740" y="100" width="140" height="28" rx="10 10 0 0" fill="#7c3aed"/>
  <text x="810" y="119" text-anchor="middle" fill="white" font-size="11" font-weight="700">Reconcile</text>
  <text x="810" y="147" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">Vector Clock Compare</text>
  <text x="810" y="165" text-anchor="middle" fill="#64748b" font-size="9">Compare versions</text>
  <text x="810" y="181" text-anchor="middle" fill="#64748b" font-size="9">v2 &gt; v1 (v2 wins)</text>
  <text x="810" y="197" text-anchor="middle" fill="#64748b" font-size="9">If concurrent:</text>
  <text x="810" y="213" text-anchor="middle" fill="#64748b" font-size="9">return both + conflict</text>
  <text x="810" y="228" text-anchor="middle" fill="#94a3b8" font-size="8">Happens-before ordering</text>

  <!-- Return Latest -->
  <rect x="935" y="110" width="120" height="110" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="935" y="110" width="120" height="28" rx="10 10 0 0" fill="#2563eb"/>
  <text x="995" y="129" text-anchor="middle" fill="white" font-size="11" font-weight="700">Return Latest</text>
  <text x="995" y="157" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="600">{ value, version }</text>
  <text x="995" y="175" text-anchor="middle" fill="#64748b" font-size="9">Latest value (v2)</text>
  <text x="995" y="191" text-anchor="middle" fill="#64748b" font-size="9">Vector clock v2</text>
  <text x="995" y="207" text-anchor="middle" fill="#94a3b8" font-size="8">&lt;10ms p99</text>

  <!-- Read Repair -->
  <rect x="1080" y="250" width="105" height="80" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="2" filter="url(#s)"/>
  <rect x="1080" y="250" width="105" height="24" rx="10 10 0 0" fill="#ef4444"/>
  <text x="1132" y="267" text-anchor="middle" fill="white" font-size="9" font-weight="700">Read Repair</text>
  <text x="1132" y="294" text-anchor="middle" fill="#64748b" font-size="9">Async: push v2</text>
  <text x="1132" y="310" text-anchor="middle" fill="#64748b" font-size="9">to stale replica</text>
  <text x="1132" y="322" text-anchor="middle" fill="#64748b" font-size="9">(Node 2: v1 to v2)</text>

  <!-- Arrows -->
  <line x1="135" y1="160" x2="182" y2="160" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="137" y="146" width="42" height="14" rx="3" fill="#2563eb"/>
  <text x="158" y="156" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2460;</text>

  <line x1="315" y1="160" x2="362" y2="160" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="317" y="146" width="42" height="14" rx="3" fill="#f97316"/>
  <text x="338" y="156" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2461;</text>

  <!-- Coordinator to replicas -->
  <line x1="495" y1="130" x2="552" y2="120" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="495" y1="175" x2="552" y2="240" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="498" y="115" width="50" height="14" rx="3" fill="#16a34a"/>
  <text x="523" y="125" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2462; Read</text>

  <!-- Replicas to Reconcile -->
  <line x1="685" y1="125" x2="737" y2="145" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="685" y1="250" x2="737" y2="200" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="688" y="160" width="46" height="14" rx="3" fill="#7c3aed"/>
  <text x="711" y="170" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2463;</text>

  <line x1="880" y1="165" x2="932" y2="165" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <rect x="882" y="151" width="48" height="14" rx="3" fill="#2563eb"/>
  <text x="906" y="161" text-anchor="middle" fill="white" font-size="8" font-weight="600">&#x2464; v2</text>

  <!-- Read repair arrow -->
  <path d="M 810 240 Q 810 310 1132 310 Q 1132 310 1132 333" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrow)"/>
  <text x="960" y="306" fill="#ef4444" font-size="8" font-weight="600">&#x2465; Read repair (async)</text>

  <!-- Legend -->
  <rect x="20" y="340" width="1050" height="95" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="50" y="362" fill="#1e293b" font-size="12" font-weight="700">Flow Steps (N=3, R=2):</text>
  <rect x="50" y="372" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="66" y="381" fill="#475569" font-size="9">&#x2460; Client sends GET(key) to any node, consistent hash identifies the 3 replica nodes</text>
  <rect x="50" y="388" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="66" y="397" fill="#475569" font-size="9">&#x2461; Coordinator queries R=2 replicas in parallel (MemTable, Bloom filter, SSTable)</text>
  <rect x="50" y="404" width="10" height="10" rx="2" fill="#16a34a"/>
  <text x="66" y="413" fill="#475569" font-size="9">&#x2462; Each replica returns value + vector clock (may have different versions)</text>
  <text x="430" y="381" fill="#475569" font-size="9">&#x2463; Reconcile: compare vector clocks, select latest (or return conflict if concurrent)</text>
  <text x="430" y="397" fill="#475569" font-size="9">&#x2464; Return latest value + version to client (&lt;10ms p99)</text>
  <text x="430" y="413" fill="#475569" font-size="9">&#x2465; If stale replica detected: async read repair pushes latest version to it</text>
</svg>